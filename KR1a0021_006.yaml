body:
  text: 紫巖易傳卷六宋張浚撰下經離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎震乘離陽氣滋而盛萬物極其髙大曰豐豐治盛之稱也人君當天下既治内有明德動則中理天下萬物之情靡不周照豐所以亨王假之何如亦曰至誠不息以大吾之明德而已親賢逺色去佞止欲凡事物足以昬吾正性者日去德之明也豈不大邪其德大其治斯大乾陽進居震初曰假乾王也大也盖有天下者不可安於佚樂而自狹其志惟乾體之健以充其明德是以能假假故大豐自泰升夫治安則怠怠則驕驕則亢亢則將一肆其情性而莫知底止此古今之常情也天下可憂者自此生矣曰勿憂宜日中謂勿憂之道當以日中為法耳盖人君之患莫大夫窮一已之樂而心志不在天下惟夫以天下百姓為心知其好惡知其疾苦若日之中去亢去驕去怠求賢而下之舉能而用之其於天下也毫髪无不照之情然後權臣不得擅其政而治安可以長保舍是非豐所宜離伏坎坎為心憂曰勿憂必取日中怠亢者皆不足以有照也且雷電一也動而明為噬嗑明以動為豐何義人君動而有明徳然後能除間而大其明曰噬嗑若豐則君徳既明於内而又持以不息之誠是以能致光明盛大之治無有窮已也有噬嗑之除間而後可以致豐不然雖有明徳於内將安所施于天下邪王假之尚大也日中則昃月盈則食天地盈虚與時消息而況於人乎況於鬼神乎聖人憂豐大之君不知保其治重之以天地盈虚之道俾惕然戒懼而圖厥中也夫數極必反故雖天地之大盈虚猶有不齊者而況人之聚散鬼神之歆享安能必保其常然哉聖人知治必有亂安必有危孳孳然惟勉修明徳俾無過厥中而災眚可弭大業以隆詩曰如月之恒如日之升聖人在上有常安常治之福非深得乎易而以道御數其能至於是乎豐自坎變而内有離體為日月坎離幽明迭運為人為鬼神雜卦曰豐多故也盖天下之弊每生於治安之時擾擾萬事自此起矣有大物者可不精思而熟念之哉豐互體㢲兌盖其順說之志已生於君心日中之訓宜聖人拳拳於豐也象曰雷電皆至豐君子以折獄致刑治至盛大優游是戒折獄所以致刑刑期於無刑明徳之施也此二帝三王心法用能保有天下而享國久長歟豐自坎變離為獄為刑初九遇其配主雖旬无咎往有尚象曰雖旬无咎過旬災也易以隂陽剛柔竒耦為配豐初四皆剛也而曰配主謂其徳同其志與事俱同上下合徳用有為于豐大之世君可正天下可常治夫至治之君而剛徳少貶怠心一生則小人乗閒用事莫可救藥矣必有剛徳君子相與竭盡心腹規之以忠先後輔助弼成其徳豐可久也凡隂陽相敵多有咎初雖旬无咎盖徳同志同事同而後可有為於豐且不獲罪天下後世也往有尚謂往與四合必得上於六五卦體離納已震納庚自庚至已凡十日十日之氣均過旬則失其同而無補於豐豐道既衰君臣上下其能享安靜之福乎故曰過旬災也離火炎上為災六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也蔀茂草壅蔽象也豐大之世而君以柔履隂浸浸然將日淪于昬闇之域為臣者雖有明徳展盡則疑夫惟虚一而誠則君心可格故吉震上震蒼筤竹萑葦為蔀離伏坎卦自坎變為見斗日伏其明斗益煥然權臣用事君徳蔽虧象也甚矣人君傲慢荒滛之志常生治安後當是時賢臣之進說甚難盖其心以為是必無可慮事是將浼我也況權幸用事肆為欺蔽非明徳至誠君子徐有以感動警悟發上之志俾知天命不常人情可畏以我之誠復君之誠則何以維持天下之治哉故曰有孚發若吉離中虚為孚為信九三豐其沛日中見沬折其右肱无咎象曰豐其沛不可大事也折其右肱終不可用也沛幡幔屬蔽有甚於蔀三以明徳位于下而上柔闇為甚必不可與有為斷然知止則免於咎沬斗後小星盖權臣之次若女謁寺人用事於内而自表見者其害治至大夫斗沬見於日中而失其常度則是近幸之臣得志用事君道衰矣折肱而止於是為宜互體艮兊艮手兊毁為折右肱震𤣥黄為沛且可止則止君子何咎微子去箕子為之奴折右肱義也九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四以陽處隂故其象與二同周公遭變召公助之事業以大吉行之謂夷主謂初初四皆剛徳四下應初而同之曰夷遇其夷主則志同道合可以有為於豐矣嗚呼自古治極主闇為臣者率罹權臣便佞之蔽故三爻皆取沛蔀為象然則君有剛明之徳而後豐治可永也剛其貴哉六五來章有慶譽吉象曰六五之吉有慶也二五處雷電中位二以離中而麗於陽為章五下二羣陽畢應之曰來章豐大之業於斯為盛孟子曰天下之父歸之其子焉往曰有慶譽吉反兊為譽周成用之左右師保天下大治而頌聲以作有慶譽也豐諸爻往往發君徳闇弱象六五正位乃有來章之慶謂何盖人君處豐盛時已雖中才能禮賢而身下之闇可明弱可強五處震中柔而有斷是以能來天下下賢聖人委曲致意於豐憂天下後世為君之心甚切謂居此時當此位非有剛中之徳其勢必闇必弱惟下明徳之賢則易闇為明易弱為強在反掌間耳易通變之書也可不潛心而究之哉上六豐其屋蔀其家闚其户闃其无人三嵗不覿凶象曰豐其屋天際翔也闚其户闃其无人自藏也豐其屋以聚斂裒積為事自盈也蔀其家家道不明自蔽也闚其户闃其无人賢者去之天下離心也盈而蔽朝又無人焉方且亢志不知反故卒罹於凶三嵗不覿謂自三至上三折肱為不覿上六以柔處震動之極怙恃其豐曾莫之畜情止性晏然自以為如日中天不悟其闇也禍幾之發殆不旋踵孰與告之悲夫嗚呼自古豐大繼治之主驕盈昬蔽若出一轍非敬修明徳去䜛近賢戒夫前數者之弊鮮不危亂矣互艮為屋為家為户為无人艮門闕也止也艮卦亦曰行其庭不見其人上處卦上為天際賢者退處為自藏若詩所謂其人甚逺者云艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉離一變為旅旅明徳之失也徳失而後有旅卦自否來乾剛易位若火在山所臨者狹而功用不及天下曰旅旅小亨旅貞吉聖人不以旅終不可為而勉夫居旅者也旅之君誠用中以順剛用止以麗明則可以小亨而以貞獲吉六五以柔徳居中虚心以順夫乾之三陽為順乎剛互㢲為順麗乎明卦體盖五以柔中獲剛賢之助於是能止其所不當為抑性損情正心誠意以勉麗乎至明之徳天下之心復歸之柔道以亨宜其吉也曰小亨云者柔中之君未可與大有為於天下也盖人君必内有剛徳然後能不牽於聲色情欲之好不惑於䜛佞諂詖之說任賢不貳去邪不疑以立大功序卦曰窮大者必失其居故受之以旅旅由窮大致之然則在旅而上下内外不改其窮大之操若之何而可以濟旅哉旅之時義大謂可以興可以立顧處之何如耳象曰山上有火旅君子以明慎用刑而不留獄刑不茍用獄不宿留在旅貴懐撫其人兹為先務卦變離離麗為刑獄雜卦曰親寡旅也火棲于山明徳不施親之者寡魯莊公小大之獄雖不能察必以情曹劌謂可以一戰以其用心近夫先王之仁也在旅而於刑慎用獄復不留明之所及雖近而仁心敷暢散者可聚離者可合其用為大噫旅莫大於得人心自古人心得失常在於刑獄間先王之明徳猶難之也而況居旅之君可不慎邪初六旅𤨏𤨏斯其所取災象曰旅𤨏𤨏志窮災也旅初闊略細故人情始安艮下艮小石為𤨏𤨏其細已甚人誰堪之旅其戒哉志窮云者失其常度也初應四四位在離火下為災六二旅即次懐其資得童僕貞象曰得童僕貞終无尤也得中為即次二變離其位艮中為懐其資蘊利己利物之徳曰資得童僕貞謂賢才助之也其周公居東十夫予翼之事歟艮為童僕離蠃蚌艮山為資九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也剛過不中位適承離為焚其次魯昭以之有子家子而不能用近小人失君子是不知與下之義矣曰喪其童僕歎夫失賢才之助也乾五下居艮三變五為離而三復承之曰焚次剛愎自髙是以有焚也貞厲謂危厲莫大於是九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也晉文在秦剛不過柔不屈賢士從之得資斧之義志未及行心其快邪離戈兵㢲木為斧離南方為心四雖剛徳位不得中曰心未快六五射雉一矢亡終以譽命象曰終以譽命上逮也文王孔子之文雖有君道而不得其位上天喜之後世尊之譽命斯大克盡文明之徳曰射雉一矢亡終以譽命離火為雉戈兵為射雉互體兌為舉命五本乾位徳比于上為上逮嗚呼人君不幸在旅徳必若文王孔子然後動無過舉治道可復徳茍不明難其息哉上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也喪牛失土地象土地至大至重矣易而失之吁可畏哉夏桀商紂之君失衆於上天下莫親而已獨以位為樂卒亡天下易之失也況羈旅失國而自樂其樂以偷朝夕之安其能不亡乎盖君旅而剛亢自用則善言不聞善言不聞則荒怠自肆荒怠自肆則廟社殄絶此馴致之理也至是而後憂悔夫何補哉離為火為飛鳥曰鳥焚其巢互兌兌口為笑為號咷離又為牛離之辭曰畜牝牛吉㢲下㢲上㢲小亨利有攸往利見大人彖曰重㢲以申命剛㢲乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人㢲乾道之變也剛以立本柔以出命因時制宜其亨在下繫辭序九卦述㢲者三曰㢲徳之制曰㢲稱而隱曰㢲以行權㢲次旅聖人將以順天下之情而感悅之以大其事業聖人之權也聖人以中正行仁而用其權往无不利大人指二五剛徳中位柔皆順之曰利見大人㢲目為見重㢲以申命謂何㢲不一而止聖人之心必欲使天下曉然知吾徳意志慮而後有為于天下若大誥盤庚之書反復諄諄屢告而屢申之誠之至義之盡也㢲風為命内外㢲為申命剛㢲乎中正而志行柔皆順乎剛是以小亨利見大人言二五之徳如是二五剛中遜志以順入夫中正之道曰剛㢲乎中正君臣以中正行命於上固有以感動人心而變易其風俗若中國若四夷孰不順之是以志行而天下四海之命有所寄託柔道以亨也象曰隨風㢲君子以申命行事風不隨無以成生育之功君子法之申命行事故其感人深而天下罔不率從猶風之鼔舞萬物莫不順以聽命也八風之至各四十五日而後嵗事以成君子體隨風之義其出命也因時為之曰申命自旅而㢲方有事于天下曰行事初六進退利武人之貞象曰進退志疑也利武人之貞志治也柔道常疑初六以柔居㢲先立心不常將何以濟惟果斷而正則志治於内可以有為是以利武人之貞反兌兌西方卦為武人吁君子必先定其志而後可有為於㢲盖出命而二三其心唱之者既疑聽之者必惑尚安能立天下大事哉必也外用其權内濟以果去姑息之弊得中正之宜㢲道行矣聖人故於初發之㢲不果為進退九二㢲在牀下用史巫紛若吉无咎象曰紛若之吉得中也苟有誠信遇㢲無嫌二以剛得中能盡誠信之道故用史巫紛若吉互體兌兌為史巫史巫通於神者誠而已九二得中能以誠上通乎九五之君用以獲吉且當㢲申命行事時號令之發禍福之幾也非得忠藎之臣如伊尹於太甲傅說於髙宗周旦於成王拜手稽首以罄其由中之情朝夕孜孜曾不憚煩則何以置君於無過之地而發號出令罔不當天下之心哉二以剛中乗隂是能深自卑抑以行其志於㢲者故有紛若之吉云㢲木為牀上九應三三處四下亦曰㢲在牀下夫二之用㢲盖將以盡已之誠心而巳故吉且无咎而異夫上九之窮也九三頻㢲吝象曰頻㢲之吝志窮也九三剛過不正志近於偽水厓曰頻三互體兌既迫澤險復又承隂不得已而區區然惟㢲順是事曰頻㢲曰志窮夫士君子之於㢲建中以用之度義以為之至誠以行之則志信於上而民悅於外矣安俟頻頻其吝哉六四悔亡田獲三品象曰田獲三品有功也六四以隂居四陽中有離明徳而用以㢲順羣剛上下順之大臣之守其位諸侯之保其國如是則可以立於無過之地矣故悔亡田獲三品謂事業建立於當時也夫惟徳明而㢲上得於君下得於民是以其動有獲而事業以立焉隂居陽中平夷著見為田三品謂上中下殺自三至五有互離體離佃漁為獲三品夫人臣履髙位而獲上下剛徳助且内蘊明徳以居重㢲之地臣徳之盛也以此事上何功不立哉四位在重㢲初其心其身俱㢲故剛賢協輔動而有獲詩曰靖共爾位好是正直神之聽之介爾景福四其有之互兌兌說惟四得君得民而上下說之著於互𧰼九五貞吉悔亡无不利无初有終先庚三日後庚三日吉象曰九五之吉位正中也用權非聖人常道必貞吉而後悔亡㢲孰為貞先庚後庚㢲之貞也九五以剛處中智足以制天下之變而納之治其貞如是安往而不利云㢲以先之故无初庚以成之故有終震納庚㢲震之配㢲而用庚君道斯得先三日盖慎始而圖其幾後三日盖思終而考其成且㢲為風為權是必有大號令圖回天下之變若大誥盤庚之為者慎始思終權斯行矣卦體先後三日皆變震是以取於庚子夏𫝊曰甲者創事之始庚者甲之中揚雄太元曰庚斷義甲斷仁庚有制變之義嗚呼後之人君不用㢲則巳如欲用㢲於天下當以剛徳為主内強其志外揆其變終有慰天下心而措之於大治不然其弊將淪溺而入於蠱矣九五剛中有生利萬物心故能合震㢲之徳而終享其吉㢲用事東方而卦氣在七月位次兌巽以庚成考之時位其義並見上九㢲在牀下喪其資斧貞凶象曰㢲在牀下上窮也喪其資斧正乎凶也㢲隂木也上處重㢲之極行行然外若至剛而内實柔弱是真㢲而無能者其不可有為明矣夫居上位操利勢而不能有為於天下盖㢲順之至私欲害之俾聦明日昬而失夫斷制之命尚何以保其國家而有終邪故曰貞凶剛上用㢲為上窮本有剛徳而以㢲喪之為喪其資斧資利也斧斷也兌下兌上兌享利貞彖曰兌說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兌以說為體說而不正何以化剛中則不欺於天而有以承天意柔外則不拂於人而有以合人心是為兌之貞說道於是行矣卦剛在内柔在外二五得中曰剛中上卦之柔天位也下卦之柔人位也而順之應之則皆九五事說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉言兌說之功如是聖人以剛中至誠之實躬行仁義道徳于身以率先天下故能得天下心而天下樂從之曰民忘其勞天下大說而後與之同好惡除患難若水東注勢無遏者民知夫本以生我是以忘死効命而求以報上曰民忘其死真誠之感理則然耳禹湯文武周公率循是道大功大業著見天下後世于今未泯本諸此也萬物役乎坤至兌物遂其成為忘其勞歸於坎為忘其死夫死之乃所以生之宜其說也坤為民坎為難象曰麗澤兌君子以朋友講習道義之說無窮已君子貴夫朋友切磋之益其於道也相與講明習行之盖有自說於中者矣嗚呼學之貴乎講習也久矣君人者用是道則人偽盡心術明可同民患而終與之共其樂書曰學於古訓乃有獲後世若唐太宗取學士十八人與之朝夕論議雖未知先王遜志之學而於兌說之道尚庶幾夫用於身也澤滋益為朋友口舌為講習兼山有物我兩止義麗澤有内外俱說義君臣上下中國夷狄與夫朋友交相際皆麗也麗而說斯為兌易象於兌特取朋友講習為義豈非大而天地萬物之說次而一身以及夫中國四夷之說皆自學問中來哉初九和兌吉象曰和兌之吉行未疑也和有可否義君子和而不同說之不以道不說也用能不失其應擇師友隆徳義以成就其器業云兌具少女誠一之性為和為行未疑初應四四有剛徳初因之以成其徳曰和兌九二孚兌吉悔亡象曰孚兌之吉信志也二阻隂于前而以陽居中得兌說之正其志信其道卒孚於九五之君曰孚兌三雖蔽之弗能為己累也是以悔亡夫事君者亦各盡其誠而已誠茍上通說夫何逺君信而說於上則民信而說於下二者皆本夫在我有可信之實故孔子釋之曰信志焉嗚呼士君子於兌不必區區然求說於君為也反身以求其信焉道斯通矣兌西方為信少女為孚六三來兌凶象曰來兌之凶位不當也處四剛中來者說之是謂導諛之人故凶孟子以公孫衍張儀為妾婦之道謂夫事君容說而以順為正俯仰祗愧何以自立於天地間也戒之哉九四商兌未寧介疾有喜象曰九四之喜有慶也商度也從君何商其以六三邪佞取容當斷然疾而去之邪四之所以深思審慮為國家天下計至厚如是則天人喜之上得於君而利澤行乎天下矣下乗三上比五為介三承之已莫之應為疾兌西方為商互㢲㢲進退為未寧互離離亨嘉為有喜且小人賦諛說之性本幸一旦進用終之導君於非正其害有不可勝言者是安可不思所以疾之而為天下國家除害也九五孚于剝有厲象曰孚于剝位正當也君道以化為難夫治至小人信而化之害治者悉除天下其孰有不說者哉有厲戒也必欲使之視安若危汲汲然常脩其身也不然小人將變易心慮乗間復起莫可復遏矣坤隂變陽為剝五剛中而又下應九二之賢君臣同徳誠信足以孚小人而格化之終致天下大說而歸已嗚呼盛矣非得中得位其何以致此邪上六引兌象曰上六引兌未光也處上而有心求說於下大公之道必少貶宜未光也君子修徳于身天下心說而誠服豈常拘拘然求天下之說已也哉互體㢲㢲繩直為引上六以至柔處說極之地剛徳不足牽於求說而不知所以為說盖好名之人也雖然有為善之心而喜人之說我惡必不加于人固亦不罹於凶咎矣坎下㢲上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乗木有功也徳信於内化行於外而大難以之散是曰渙渙斯行矣王假有廟謂何大祖考之徳教天下以孝繫百姓之心莫大乎宗廟之奉渙萃皆曰假有廟合莫之義也萃聚渙散之初首為是舉則朝夕兢兢而思所以保其宗廟者不敢須臾忽孝道以行百姓化之天下和平矣互艮艮闕為有廟渙自否來乾五為王假謂盡其道坎下為利涉序卦曰兌者說也說而後散之故受之以渙渙者離也物不可終離故受之以節然則渙所謂離盖難散而民情未一之義受之以節則有禮制存乎其間而將以合其情非若睽之乖而有難于後也渙亨剛來而不窮柔得位乎外而上同此言乾坤剛柔之變乾陽下來其道不窮曰剛來而不窮坤柔上進六四比九五而承之仁徳以敷曰柔得位乎外而上同夫否之為否凡以上下不交而已今也剛下而得中柔升以順上上下之情其孚若一渙其有不亨者哉王乃在中化行而徳加于天下也王者中天下而立非徒據形勢之利而已盖將體中而行以應天地之心用能正位於上而克盡奉先之道五本乾體為在中乗木有功坎以㢲濟也㢲為木為仁必取乗木以譬人君躬行仁徳于上虚心拱已坐收渙散之功為有功云象曰風行水上渙先王以享于帝立廟天心眷祐莫大於孝惟孝故恭肅寅畏之心生而過失不聞於天下渙治可成盤庚告羣臣百姓必以天以先王盖所以先天下而合其心坎血為享乾上為帝渙為卦有互震體風行於上水動於下風主化水主信享帝立廟所以大其化而非誠信莫能行之兹又立象之㫖初六用拯馬壯吉象曰初六之吉順也渙九二自乾來盖馬之壯者初以隂比二承之獲極而應于四可以有為於渙矣吉孰大云夫子釋之曰順謂得坤順之常也嗚呼士君子欲進為於渙時其亦擇其所親比焉可矣九二渙奔其机悔亡象曰渙奔其机得願也人所恃以安曰机渙九二自乾四下居坤二剛中而順得臣道貞故悔亡且險難始散為大臣者必有解紛息爭之功非遜志以疾趨夫至順之地何以安其身以安於天下也哉互震震動為奔居坤中為机安之至也六三渙其躬无悔象曰渙其躬志在外也身屈曰躬君子之屈身將信以道也若三徳位不中以柔弱之才而處渙險上其屈身也志在應上以私於巳而巳未可與圖渙散功也且君子養其剛徳而持之以中故能體仁履信以濟天下之險三志應上九應不失貞可以无悔於巳而局局然一身之求功利則未著于渙盖有媿君子之剛中者矣六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也六四以坤三上進自㧞於羣隂中在渙為腹心之臣居尊功崇朋類絶思道以光大信矣夫五位互艮上為丘渙有丘一志於五也夷謂下卦二隂與四同類曰夷坤土為思夫在渙而一志于上能使朋類無覬幸之思則公忠之道行難散治成端本于此其光孰禦艮為光大九五渙汗其大號渙王居无咎象曰王居无咎正位也王者處難散之時必有仁政發乎號令以一新天下耳目而去其害除其疾以慰天下心是謂渙汗其大號非居處正位則天下將安所繫望禹之冀商之亳周之洛可考而知也王者正位履中以大其中徳于天下號令之行一出不反何所可咎㢲上為號㢲風居水上為汗互艮為門闕艮止為居九五下應九二君臣剛徳之同發號施令宜無不當盖惟剛中然後能盡去私心以圖回天下之治令其有不行而復反者哉五本乾體曰位正當上九渙其血去逖出无咎象曰渙其血逺害也上九有剛徳而位居㢲順之極盖大臣才徳足以濟治而又能明哲逺害者周公其人矣周公几几直而不撓小人終莫之間血去逖出也坎為血卦渙六三以隂居坎險上其位不中小人也上九以剛應三而三終不能為我害盖㢲徳素著於君心非䜛邪所得而離間是以血去逖出無可憂事大臣逺害渙功成矣兌下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民節者人情所難中則通通則說自身及家及天下其道均一節自泰來治極而泰盈滿已甚不知用節其能久乎惟中正之君以泰為憂不以為說用中立制而以身率下天下說從是以亨若夫強人以所難而我曾莫知節是非天下通行之道其不能有貞也必矣剛柔分而剛得中謂坎兌剛柔之體分上下内外各得其配而九五以乾剛進居尊位曰剛得中凡節之道太剛則暴太柔則事不立剛中履正節之所以亨歟說以行險當位以節中正以通此聖人用節之道也順人情以行所難行曰行險以身先之曰當位度吾身之可行者于天下曰中正中正則可久而其道合天下之情故通夫用節於人而不本之身而欲強以所不可行人必曰是虐我而自安害我而自利拂其情甚矣何以能節惟夫以說順為本而當位以先之中正以平之節其甘哉天地節而四時成天地之道隂陽各趨厥中而後四時之運迭用不窮嵗功以立節自泰來象具天地節以制度不傷財不害民聖人法天地以行其節者如此夫財匱民困國之能存者幾何聖人用禮之中制度于巳以逹于天下無太過無不及始始終終各協其序故能享國長久措天下於至安之地夫立國不以禮使天下蕩然不復有綱紀之制而重斂暴賦以供一己之欲則民困於下國危於上亡無日矣節其貴乎度起黄鍾之律坎上為制度坤隂為民為財象曰澤上有水節君子以制數度議徳行數度之制因於人徳行之議自於己以已之中率天下使皆歸於中曰議徳行記曰君子議道自巳而置法以民盖已之所不能行與其所不可行而強於人誰其從之一言盡節之道中而已中必自身始也坎為數度徳行兌為議坎象亦曰君子以常徳行噫澤中有水水得其防制數度議徳行盖君子所以防民也何則澤无水則困困固物無以相養而水溢於澤物隨飄流莫知所届為害又大財用之在天下王者所以自養且以養民猶澤之有水也然在我不知節則驕侈而日匱在民不知節則放辟邪侈靡所不為終以困窮矣是豈長久之道乎夫惟制得其中然後上下交相養而治可成也中亦大哉澤金為坎水之母以母生子子得其養故節有生養之道而君子必謹其中以盡心焉者也初九不出户庭无咎象曰不出户庭知通塞也慎密不出事乃克濟而節初尤所當謹夫子曰亂之所生也則言語以為階夫合意而謀之一言而漏之利未加于民而適足以産禍召亂豈君子行道之心哉古之君臣必用密况居節之初巳居下位將用說以行險可不慎乎兌初為户為言語兌閉塞之時為知通塞九二不出門庭凶象曰不出門庭凶失時極也方節之時上有建中之君九二以剛在臣位中而漠然不知應五以相與有為于節是盖才健而不肯任事者是盖容說以取媚當世不恤國家大計者夫時之凶殆不獨其身其家天下何所䝉利哉二兌體居坎險下臣之不正者云艮為門庭艮止為不出互震震主動當動而止失動之機矣故曰失時也六三不節若則嗟若无咎象曰不節之嗟又誰咎也處兌說之極不節奈何樂極憂至天之道可不懼哉兌口變說為嗟三位不中以柔履之又居兌說上人臣在髙位而不知自修其身者也巳不知節何以節人咎將誰歸祗自取耳六四安節亨象曰安節之亨承上道也順理以承臣道之正夫在節而違衆生事變亂舊章以重失天下心豈所望於近臣也哉惟當理而後動動斯安矣四以隂居隂得正靜體而下應慎密之初是以居節能安互體艮艮止為安且四承上道不承非道其為亨也不亦宜乎九五甘節吉往有尚象曰甘節之吉居位中也皇極既建人心說歸夫吾之所以為節者本諸身且因天下之情而為之制誰其不欲也哉五剛中天下說之曰甘節坎五土數為甘上六苦節貞凶悔亡象曰苦節貞凶其道窮也險極為苦夫用節太過非可行之道在已无悔正物則凶其道窮者是必不可施於天下也雖然苦節猶愈夫恬不知節者特不可用以正物耳兌下㢲上中孚豚魚吉利涉大川利貞彖曰中孚柔在内而剛得中說而㢲孚乃化邦也豚魚吉信及豚魚也利渉大川乗木舟虚也中孚以利貞乃應乎天也聖人誠信格物盖自心法信及豚魚所格者大周家忠厚行葦之㣲牛羊勿踐誠之至也卦體中虚中虚心象一物或攖其心是能有孚邪變艮有坎體為豚兌澤㢲乗之為魚取之用之皆有時不忍少傷是為信雜卦曰中孚信也信獨在言乎言信之發于外者一事也君子之信本於躬行而著於事實若孝弟仁義之道誠而行之信於心信於行信於身信於家信於天下天下化之信極萬物其用博矣夫以豚魚至㣲使天下愚夫愚婦皆知愛惜其生而取之用之以時禮君子心法所格為如何生物之徳可勝言邪中孚柔在内而剛得中說而㢲孚乃化邦也豚魚吉信及豚魚也始於化邦終及於豚魚誠信之用於是為至柔在内謂三四位乎内剛得中謂二五在中說㢲謂二體夫柔内而虚其心剛中而蓄其徳又躬履說信以充盡夫誠信之道天下孰不格心而化其所行歟下至豚魚小物無暴殄竭取之禍則天下樂遂其生以成大治盖可知也利渉大川乗木舟虚中孚之功矣化以誠信息其險難若虚舟載物然措天下於安平之域曰乗木舟虚二隂為大川㢲木為舟卦體中虚為舟虚中孚以利貞乃應乎天也徳至于此其孚大矣盖中孚以㢲于孚為貞孚則誠誠則不息而博厚髙明可配天地曰應乎天變艮有乾體為天嗚呼中孚之道本於心而能使四方内外畢被徳化終之其道可應乎天至矣哉豚魚取之甚易人所甚欲以養生也誠信格之俾取用之以時禮舉天下至大愛物之心若出於一和平之治其永永無窮矣象曰澤上有風中孚君子以議獄緩死緩死不幾失有罪歟是不然議而緩之盖君子求所以生之之心誠之至仁之至也君子知夫死者不可復生於獄議於死緩懼吾誠化不孚而獄必論其宜猶幸其有可生之道故曰誠之至仁之至也兌口為議㢲不果為緩澤上有風其相感也深而物之羣聚於澤者莫不各得其說君子之仁化行於天下天下利其澤而說之猶風澤之感然特在夫議獄而求所以生之耳其用顧不大哉初九虞吉有它不燕象曰初九虞吉志未變也誠一貴初念念不替為虞君子孚其中非朝夕功也異念一起所以害吾誠者將投隙而生難乎居之安矣四處中虚之地初九應四而有剛徳是以獲虞吉之美且初以兌體在下其志未分若季女之誠一者然聖人設為此爻特以導天下學者而内之誠也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也誠其言行類焉者應書曰惟說式克欽承旁招俊又列于庶位九二之謂也靡之何如若曰我君有好爵吾靡之爾也二居兌中為鳴鶴西方物處二隂下為在隂其子和之謂初夫士修之於山林藪澤之間誠徳已孚一旦處人臣要位剛賢協應心氣之感本於自然是將可以大其徳化於天下矣六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也二隂相偶曰敵敵有競進義使君子而處此其必推賢而下之益修其身而不汲汲然求信於上視賢者之進猶吾進矣六三則不然乗剛履陽位不中正誠信未一而急欲以其信售上疑四阻之或鼔而攻或罷而止或泣而憂或解而歌六四方以誠徳承五如三者豈足以為其輕重哉風澤相激為鼓罷為泣歌六四月幾望馬匹亡无咎象曰馬匹亡絶類上也中孚有離體離為日月見日則望四居二隂先兌承之兌納丁幾望也幾望盖位髙而不亢象臣徳之謙也人臣有至謙之徳則肅欽且正而能盡誠以事其上曰馬匹亡匹兩馬也四與三同體捨三而弗之比故其取象若此云易乾坤俱取况於馬謂其徳健象乾陽其體順象坤隂耳雖然馬匹亡无咎夫子釋之曰絶類上也大臣故當盡絶其類乎曰大臣所宜絶者私類也私則二二則不誠於君若因天下之公舉而用之而其人果賢也何嫌於類哉四應初之剛捨三之柔知所去取而於大臣之公道得矣九五有孚攣如无咎象曰有孚攣如位正當也天下内外罔不一心曰有孚攣如如是而後恵利洽于天下盖君臣之間合志同心相與以誠則治道日舉四方萬里自然協應向若君不以誠唱臣不以誠從則睽離之變自是生矣夫惟君臣交孚天下順比然後上下内外永保福祿之慶是謂攣如而夫子以為位正當也五剛中為有孚互艮艮手艮止為攣二隂中虚羣陽協順為攣如且中孚九五之徳大矣聖人曰无咎云者盖為无所可咎與他卦无咎之辭不同上九翰音登于天貞凶象曰翰音登于天何可長也㢲極信衰志在說人而虚文終不足以欺天下後世若漢新室之諄諄其辭者凶其宜哉周公作大誥成王幾危而復安繫此一篇書周公誠在言先其言足以有格也㢲雞為翰音位在卦上為天聖人立此象其戒後世尚虚言而無其誠者乎艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也二隂在中為中孚陽徳足以孚隂隂為之用也若二陽而四隂陷之則陽失位而不得中隂反過矣是謂小過盖君子體信用順之時凡事之在已者過於厚乃順順斯亨也小過君子方反巳而歸之中且二五俱柔位未可大有為于天下故可小事不可大事飛鳥上逆謂無所底止君子處小過用謙用恕用欽凡理之近厚反本者必力為之懼上逆也去逆取順貞所得矣且陽陷於内羣隂上下阻蔽之小過之時則然故三四皆以剛失位非小有所過以盡其修巳之道而欲抗志有為於天下勢必招咎豈君子與時偕行之道哉二陽自臨進一進有離再進有㢲體而卦畫與頥鼎取象相類為飛鳥象曰山下有雷小過君子以行過乎恭喪過乎哀用過乎儉雷止於山霈澤未敷其君子未得時而處衰之象歟君子躬自厚盡力此三事不以過為歉盖將率天下以恭以孝以儉而庶幾回其風俗惟恐行之不至為之不力也初六飛鳥以凶象曰飛鳥以凶不可如何也初居艮止下上應震四曰飛鳥以凶聖人之戒也當小過用正靜時已位最下而欲肆躁動之性失靜止之常於理為悖於事為逆持是心以往將何所不至凶可既乎六二過其祖遇其妣不及其君遇其臣无咎象曰不及其君臣不可過也聖人發此義以明臣子之大分盖小過君道㣲弱時為臣者尤宜謹於君而厚於禮儻附麗權臣以喪其大節將自罹於咎矣祖謂四妣謂五祖妣取隂陽之義也二艮體居互巽初有止順之徳於二陽則過而遺之於五則遇而下之君臣以中相遇而二能篤守臣道得所處矣遇云者當其分而不敢少渝越也孔子曰麻冕禮也今也純儉吾從衆拜下禮也今拜乎上泰也雖違衆吾從下孔子善處小過者哉不及其君遇其臣謂君不可過而及之臣道當以遇為正耳九三弗過防之從或戕之凶象曰從或戕之凶如何也九三以艮體上承震陽陽陷隂盛理當知止動而失正隂必傷之吁君子於小人方盛時安可渝義越禮昧冒幸進而自失其防也然君子所謂防特反身於善以守吾正而已從之而戕正道其喪可不慎歟九四无咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也四雖離體而以陽處隂有動而知止象四當小過時固宜靜止以俟衆隂之消動而與之挍則危危可戒也四之无咎豈非居動而能止故歟三四以剛徳處羣隂中皆曰弗過謂當謹守中正之道不可過也四上承五曰遇之庶幾乎有以感格君心而復其剛徳耳往厲危也必戒慎也勿用靜也如乾初九勿用永云貞貞不可須臾忘也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也利澤雖未加乎天下而摘發淹滯可用於小事小過六五則然盖小過二五陽徳俱不足異乎君臣以道遇合者是以有密雲不雨象自我西郊言隂盛而陽未孚也然二止二陽下五援而出之有弋取遺隱之功且二應則三四皆離震而動小事其可成耳互兌為西郊二居艮中小過有坎體為穴隂過陽為已上隂陽必相濟廼雨今失騰降之節故不雨也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也隂居動極過中而不知反天人之禍必加曰飛鳥離之凶是謂災眚至哉聖人為小人訓甚嚴也夫小人在天下未有不逆常違理自取敗亂者况居小過而矯亢已甚其能自免於禍邪離之凶言趨上而不能自下也離下坎上既濟亨小利貞𥘉吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也𥘉吉柔得中也終止則亂其道窮也精神交感而君臣之徳俱明是為既濟卦自坎變離位在下互體又重離易險為明何事不濟也亨小謂天地之間無一物失所其象則隂陽得位隂以陽亨曰亨小焉利貞謂何君用剛臣用柔泰之二陽進而得位一卦中剛柔各得其叙而禮行於上分定於下天下無不得其貞既濟之所利在是初吉則以坤柔配乾剛而柔得厥中二五正體互有明徳故吉終或止之明者息矣故終止則亂勉不止則不亂勉勉在我也上六以隂居卦上柔失厥中有終止之厲柔道以窮聖人於既濟首以終亂為訓盖知夫盈必有虧盛必有衰欲為人上者勉其明徳使剛柔之分常正於天下而後治安可長也可不謹哉象曰水在火上既濟君子以思患而豫防之既治而不有其盛所以防患也水火有相勝之勢故聖人致戒焉是安可以不思防之如何修徳立政而已坎險為患離心為思初九曳其輪濡其尾无咎象曰曳其輪義无咎也濟初止以慮患量而後進君子為身為國之圖逺矣自古亂亡之幾常生於巳治進其可易哉然則君子處既濟初終不可往歟曰止以待上之求求必誠誠斯進而後志可行於天下也初處互坎下曰曳其輪離坎相乗曰濡其尾六二婦喪其茀勿逐七日得象曰七日得以中道也茀草盛貎盖婦人飾其首以自蔽者隂居陽中前有重隂未可有行曰喪其茀臣而用中終必得君曰勿逐七日得且既濟二五正應也二喪其茀而又有勿逐之戒聖人意安在哉盖天下初定履人臣正位而恃其才智以爭功亟進䜛閒疑忌之所自生也尚烏能有為於既濟邪二柔中自守不汲汲於茍用正靜不伐以黙修其在巳中道既得君心可格於戱盛哉七日得盖爻之一氣巳復如是而後道通於君志行於天下非至明者孰能見之九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也害除民困不有君子誰與安靜而生養之邪小人勿用言小人之必生事也坎險在上為鬼方離戈兵為伐歴坎三爻為三年離明為克九三在既濟得乾二正中其剛徳足以任大事故有髙宗伐鬼方之象而未濟九四與三同徳亦曰震用伐鬼方三年有賞于大國云鬼方之伐主其事者在君奉而行之在大臣在諸侯鬼方伐而既濟之治成矣六四繻有衣袽終日戒象曰終日戒有所疑也補舟以袽不忘備具周公迨天未隂雨詩讀之使人三復而不能已也盖治至既濟孰不安於佚樂而自謂百世可以無憂邪四居互離中内有明徳知險而戒其心欽慎若不一日忘之懼夫君徳之或失國政之或弛䜛邪投隙將害吾治孜孜然正救彌縫之是務如是則道徳仁義修於上紀綱法度正於下而既濟之治可長也四其智明而先見者歟詩曰衮職有闕惟仲山甫補之四之謂矣坎離索於乾坤為衣襦離為終日離火為戒隂居坎隂為疑九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也離下為明坎上為信既濟九五内有離徳而位居坎中明信之徳著於天下故能以禴祭受福也東鄰指震自坎而震曰東鄰商也西鄰指兌自坎而兌曰西鄰周也離為牛禴薄祭也九五剛中有實徳在天下明信既著鬼神享之禴為可用聖人意若曰我周家有天下本於徳明而信初不在乎禮文之末後世欲臻夫既濟之治宜取法於斯焉重離有文明盛大體為受福為吉大來上六濡其首厲象曰濡其首厲何可久也既濟以坎離相交成卦而坎險在上上以隂履坎險極其道闇而不明盖耽滛於富貴不知紀極者危亡可立而待矣曰厲厲危之至也鳴呼為既濟之主其亦戒夫捨剛而用柔哉盖君徳不剛則嗜欲昬之䜛邪害之殆必濡其身以至夫濡已之國而淪亡之矣是謂終止是謂亂坎上而互體重坎又在下為濡其首坎下離上未濟亨小狐汔濟濡其尾无攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也火炎上而其氣不返水趨下而其氣不升剛柔上下各失其位且變離為坎明徳未充於内未濟為卦則然也未濟何以亨盖六五柔得中而正位在上二四以剛徳應比之卦之剛柔莫不相應是終有可濟之道用是以亨夫人君履離明正位又得天下之剛賢用之而君臣上下罔不同心求以濟難奚為而不亨哉小狐汔濟盖以象夫不度徳量力而求濟者也坎隱伏為狐重坎居下為小狐狐行必擬度小狐果於行而莫之能擬是以濡其尾无攸利焉且未濟坎險在内天下之難盖未平也六五之君雖當陽用事而中徳未大未可大有為於天下必也勉修厥徳俾隂不能陷聲色䜛佞皆不足以少移其心志然後離明之性復於内有所不動動斯能濟無不續終之患矣聖人故設小狐汔濟象欲後之為君者充其中徳無急急於速濟而已也既濟剛在下剛故不息是以獲濟未濟柔在下剛徳既衰無以續終若小狐之濡其尾然二陽皆以剛陷隂中曰未出中惟六五履二陽在上雖有離明之徳而重坎互承之其中未大其明或虧未有可濟之道聖人反復示戒凡以濟天下之難非厥徳剛明審而後動不易為也象曰火在水上未濟君子以慎辨物居方水火性相反其上下趨嚮之性一定不可易君子法之慎以辨物俾各居方用成吾必濟之治盖未濟剛柔失位名實不正大而君臣上下父子兄弟夫婦之序次而君子小人貴賤賢不肖之别凡繫於剛柔者無不顛倒錯亂未得其正君子以明用慎物致其辨則禮法行而天下治矣嗚呼濟天下者莫大於禮而禮非信不行君子法象水火有禮信存乎其間不徒然也初六濡其尾吝象曰濡其尾亦不知極也居重坎下為濡其尾初雖有剛陽之應而才弱志險不足與有為進必速禍昧冒幸用不知止足為吝大矣九二曳其輪貞吉象曰九二貞吉中以行正也時方艱難為臣雖體剛中之徳而欲徑進直行一有不合事蔑濟矣非君子為天下心也夫惟正以待命俟君之應而後展盡其才力則君心可復事功可成是為臣道之貞非進退以中不為身謀者不足語此九二位在坎險中而有互離明徳且六五以離明應于上不患道之不行必曳其輪盖君子難進以守其貞也惟貞故利澤終加於天下用以得吉坎為車輪隂陷之為曳六三未濟征凶利渉大川象曰未濟征凶位不當也三以隂居坎上互體又坎以是而欲進於未濟必陷難矣自古惟中正可以息亂致治反是雖才力有餘不能濟也六三柔險居位所履不中率是以行豈不速禍而敗人之事哉賴上九有剛明之徳三為之應渉坎應上庶乎出險而徳以之修故利渉大川凡此易之變也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也四以剛徳處近臣位責重任大必貞吉而後悔亡未濟九四以除天下害為貞且伐鬼方一也在既濟則曰憊在未濟則曰志行聖人之意斷於除害而急於撫民仁義之道備盡是矣三年克之而後賞以之行豈徳力不足邪是不然盖緩而圖之欲以全其生也周公東征用此矣離南方萬物亨嘉之時為大國為賞歴坎三爻以應初為三年六五貞吉无悔君子之光有孚吉象曰君子之光其暉吉也六五有明徳故能用貞於未濟時厥貞伊何至誠下賢而已賢者用而身日修治日興難日濟光孰禦哉五位離中下應九二而四復以剛徳承比有孚于賢者之象故君子之光有孚吉嗚呼古之聖人出而靖天下大難莫不以得賢為急得賢者其徳大其治光而後世時君世主多忽之凡以耳目心意之間有以昬之志樂一巳而不恤天下治亂是以大悔隨至不復可救藥也六五居離中明足以有見有孚吉宜哉未濟隂陽失位君用柔臣用剛聖人釋九二九四六五爻辭皆曰貞吉謂不貞則失君臣之常不可與有濟也聖人之意不亦㣲矣乎二以曳其輪為貞待應而後行不敢陵上也四以伐鬼方為貞為國任事不敢辭難也六五何為哉虚心以孚于二剛徳盛業大將有不可掩者矣是為五之貞四曰貞吉悔亡五曰貞吉无悔當未濟之時為大臣為君一失其貞凶禍隨至其悔將不可追聖人示戒不亦嚴矣夫上九有孚于飲酒无咎濡其首有孚失是象曰飲酒濡首亦不知節也需大象君子飲食燕樂未濟上九有孚于飲酒皆養徳待時之義濡首則耽一身之養於天下或忘矣是豈仁者之心哉聖人曰不知節者盖以未知夫禮之中也惟君子能謹禮故進退皆可法上九以剛徳在離上明足見幾知時之未可為也而誠於自養聖人因勉而訓之云互坎承上為濡其首坎為酒食紫巖易傳卷六
