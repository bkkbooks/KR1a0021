body:
  text: 紫巖易傳卷三宋張浚撰上經震下離上噬嗑亨利用獄彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也序卦曰物大然後可觀可觀而後有所合臨二陽浸長得位於上天下觀其德而化之莫不心悅誠服於是間可除四海之內可合為一家矣噬嗑除間卦間不除無以興大利動而有明德然後能除閒故噬嗑以震離二體亨利用獄者何罪主斷非至明者不能斷不曰刑而曰獄獄必得其情正其罪而後加刑先王愼刑不敢遽用度夫害之不可不去不得已用之噬嗑明德在上故利用獄互坎為獄為閒頤中有物曰噬嗑噬嗑而亨謂何人資物養生物反為害何以養生剛間之起猶物之為人害天下將不得其生矣此不蚤圖而優游玩日可哉四以剛居中曰頤中有物噬而去之則間去而生養之道得矣剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬嗑之見於用也剛柔分動而明謂乾五下居𥘉坤𥘉上居五動而麗明以成其亨震離二象自乾坤剛柔分得之夫噬嗑本以救否剛柔不分則上下之情不通否盍為而亨哉雷電合而章雷作之電從之德威並著其罰行也柔得中而上行謂五主噬嗑何取於柔中蓋曰君仁而明然後可收除間之功不然門未及除而天下殘困其害滋大嗚呼噬嗑剛位上下而又有負坎險在中者誠亦艱難時也非為君者志動於內德明於外屈巳遜志以孚同心之賢莫克有濟矣六五以柔得中故雖不當位而利用獄雖然柔中固可以致亨於噬嗑之時而用獄終非盛德事盛德者人化之安用獄德非剛中不能有化曰不當位蓋少貶之辭聖人貴德賤刑抑見於此象曰雷電噬嗑先王以明罰敕法使天下格心趨化先王立法本意罰明則善勸惡懼法於是行刑可措矣雷電之作天下愚夫愚婦莫不革心易慮惕然知所畏懼先王明罰似之蓋使民欽畏而莫之敢犯是先王之仁也初九屨校滅趾無咎象曰屨校滅趾不行也聖人於噬嗑止惡息過設意甚嚴必欲杜絶於毫釐方萌之初聖人待天下心一何仁也初剛動在震先卦體居離火下動而麗惡其跡未著其事未大於此而懲之止之誠為小人福故無咎噫在上位而臨下可不熟玩此辭而遏惡於蚤哉一失其制至養成其禍誰之責歟震為足為草木屨校拘以校而滅其趾使不得有所行也陽動於下為趾噬嗑初上皆以剛受刑夫剛用於上則亢用於下則陵刑所必加莫可解也六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也二得柔中其為噬也易且乘初之剛而以柔在上為噬膚膚柔脆隂屬言噬之易為力也滅鼻謂剛間屏息氣不得伸古者五刑用劓示强梗之必除也二柔中動而麗明其德足以杜絶剛閒而能使小人退聽於噬嗑時為臣之責塞矣互艮艮山為鼻六三噬臘肉遇毒小吝無咎象曰遇毒位不當也六三位不中正以柔履剛厥噬為艱臘肉至堅物九四互體坎以剛險位三上為臘肉三才德皆不足以勝四是欲誅强去梗而反為强梗害者惟三志在除惡故雖有小吝終無咎也嗚呼君子有志於除天下間務先修其中德哉惟德足以服人心間易去也坎險為毒九四位剛在坎險中為遇毒九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也四在卦為間頤中有物曰噬嗑正謂四也然四於爻位雖處互坎中而卦體得離之明以明德比五是以爻辭吉金矢黃金以中直之道施諸刑也臣用直君用中舜臯陶之職分四五本乾位為金坤隂在離中為黃金離為戈兵為矢黃中也矢直也艱貞貞厲慎用刑也貞而厲慎之至附骨肉謂之胏肉易於胏所遇異故其辭異二爻皆離體離日為乾胏乾肉四曰未光四居離𥘉且人臣必以道德弼君如臯陶之刑期無刑然後為光五曰得當中以涖刑何往不當也四五皆有坎險體四艱貞五貞厲戒險也周禮大司寇以兩造禁民訟入束矢於朝然後聽之以兩劑禁民獄入鈞金三日乃至於朝然後聽之蓋所以懲不直不中使知自反以杜絶獄訟之生其象義則取諸易而易之得金矢得黃金謂得中直之道周官取易之遺意而用之也上九何校滅耳凶象曰何校滅耳聰不明也惡積罪大夫子之訓自非耳目無所聞見不至是也九處一卦之極離火炎於上震木動於下亢志以動告之弗入戒之不及凶其自取曰何校滅耳凶夫小人為不善起自至微惟肆情循欲告戒不聞卒致大戾悲夫聖人於噬嗑著訓欲後世謹遷善逺罪心無須臾忽其微以盡力於無過之地云耳互坎在下為滅耳離麗坎險互見為何校且𥘉上以剛受刑二輔五以施刑於上下曰滅趾滅鼻滅耳除惡務本之意也三遇毒志不得行四五以中直噬有仁德存其間故三爻不曰滅且胏肉用噬有革化之理非若趾若鼻若耳必刑之去之俾天下竦視知所戒懼兹又懲勸之一道也離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下致飾聖人不得巳夫子筮得賁卦其色愀然惡夫文勝質而日趨於禮文之末流也讀禮運書聖人之心可見矣序卦曰致飾而後亨則盡矣故受之以剝賁非聖人本心因時之宜有不得不用其飾耳賁何以亨且利有攸往哉曰聖人彖辭釋之固詳聖人以賁之亨利直本之天文蓋天道自然其剛柔之相飾亦出於自然運動四時生成萬物始始終終莫知窮巳非若人之溺文喪質莫知返焉者惟文明以止則文不喪質得賁之正而同於天矣柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下聖人本致飾之道於天不徒為也夫日月星辰相錯以成歲時天文之序蓋本於自然若人文則君臣父子夫婦長幼朋友剛柔之宜上下之分內外之别亦各有一定不易之理聖人明夫文本於質其質固有其文因之不可違不可過也違則悖過則逆曰文明以止人文之化成於下天文之動順於上上下相應其道通矣柔來文剛謂坤上來居乾中分剛上而文柔謂乾二復居坤上柔來則剛得中而浸以盛故亨剛上文柔其利在柔柔利剛往以止其窮故利有攸往剛大柔小卦辭首曰賁亨小利有攸往見聖人與質不與文心也嗚呼質宜勝文也尚矣治天下者曷可不明其止止則化成離下為文明艮上為止艮一變為賁賁貴止象曰山下有火賁君子以明庶政無敢折獄用明於政而不用於獄必使無訟也明而能止故於獄不敢折不止則必恃明而察察用之且先政教後刑罰賁飾之道所宜然也離明為庶政互體坎坎險為獄艮止為無敢折獄夫庶政明而獄訟息君子於賁不敢折獄汲汲惟庶政之明蓋得其本矣山下有火山止於上火傅於下其明之著旁燭萬物若庶政交修治道有光云自非德止於身而明加於下其孰能體此象哉初九賁其趾舍車而徒象曰舍車而徒義弗乘也自修廉隅義不茍從曰賁其趾陽在下為趾互坎為車二在前有載而行之之意曰車舍車避寵從義不茍以趨正應得賁之貞不然更為比周求安榮祗危辱何望於賁飾哉六二賁其須象曰賁其須與上興也文本於質質喪文安施聖人著此象後世猶有顛沛末流者夫須譬文采威儀足以藻飾治具而才德俱弱不能自立以有為於天下者九三藴乾剛德且變三有頤體二待以興曰賁其須先王用人先道德後文藝謂其待人而興不能卓然自立於當世也二自坤來文乾之剛且位居離中有附麗象而其麗正曰與上興惟柔中是以得所麗而興苐非剛德其質不足以自為耳吁不有剛健篤實之君子其何以行於世而救文勝之弊邪九三賁如濡如永貞吉象曰永貞之吉終莫之陵也九三以陽居二隂間有互坎體坎水也濡也上下二隂柔也小人也其賁也懼或濡之厥正不永則浸浸焉將相率為不善陵孰大焉君子之於貞不使一日忘於心用貞守道小人不敢以非義相諛說濡其逺矣三處離上而獲吉於賁永貞功也三有剛德用能永貞位不中故先有濡如之憂六四賁如皤如白馬翰如匪寇㛰媾象曰六四當位疑也匪寇㛰媾終無尤也四近臣潔白其德以自守初自下從之猶馬疾馳者然初四皆未受飾質之美者惟四以柔居柔抱道守靜義不苟從始以乘剛疑初卒知其同已應之賢以類同志同道行終可以無尤於賁盛矣互坎居四為皤如為白馬剛阻為寇且氣之清者為賢賢德以清潔為木清潔而後利澤及天下孔子曰清明在躬氣志如神賁之交飾尤惡夫德濁而僞故初四有皤如白馬象若上九白賁德大成矣艮變巽為皤如初本乾體乾為金為馬為白馬初與四正應為㛰媾六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也為賁飾主非得巖野賢則無以反素朴而復其治安能免致飾之吝邪以隂處尊位下乘坎險為吝艮為山為丘園丘園指上九五本坤位坤為帛為衆為束帛戔戔得賢而治道立喜之大也九五柔中得艮之止故能屈身禮賢以成離明之治離南方其性喜離位乎內為有喜上九白賁無咎象曰白賁無咎上得志也變文服質惟以身化者能之上九體剛止之德以乾剛飾坤柔而已不受飾為白賁夫修身至於反朴還質道德之化文可變也上剛止而明行誠志潔無愧天人得志於身固巳厚推而大之且將得志於天下六五之君盡誠禮於束帛之賁蓋知夫文久必弊天下將受其害得白賁如上者而後風俗可淳治道可復聖人之意逺矣夫艮其道光明曰白賁坤下艮上剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也一陽上行為卦皆吉陽窮於上曰剝過中也過中則乾剛內消小人類進蓋必有背道違理之事矣不剝奚為剝變乾乾君道也至上君之剛德盡喪徒亢而巳是以剝夫剝之為剝小人盛也五陽退聽君子道窮故不利有攸往夫小人用事於時豈曰我小人哉彼將以是為非以邪為正以君子為小人君子而往可乎夫致剝者小人而所以致剝則自夫人君之心人君剛德既喪安逸豫盡聲色溺貨賄然後小人得以擅事於下曰剝剝也柔變剛也君德盡喪之謂也雖然時既剝矣天下必將均被其禍使君子視天下之禍而莫之恤是豈仁人用心哉君子有順止之道焉欽修厥德不與力爭以待其復是謂順不然爭不足而小人為害益大正道淪亡天下安所倚望順而止之君子之幾也坤艮位上下順止象伯夷避紂居東海之濱太公避紂居北海之濱蓋得此道伯夷太公非恝然忘其君而不顧不得巳耳君子尚消息盈虛謂何君子體中德以法天無先時後時之失是以於剛能止蓋盛衰相仍天道常理昔箕子遜以避難為道不為身其後為武王陳洪範聖道益明而利及天下後世凡以尚消息盈虛而其行合於天也乾五變為剝曰天行天行言君子之行合乎天云剝五變而艮在上坤在下為順止以一陽而履五隂陽之剛終莫能變旋至於復蓋順止之功象曰山附於地剝上以厚下安宅有以固結民心剝必復老子曰髙以下為基是以聖人後巳先民裕民以政而措天下於磐石之安蓋人君儻以厚下為心則身無失德民懷大惠剝有不復者哉坤為下為厚艮為宅為安山附地為厚初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也民困則國危為上者何以安處甚哉小人進用於時上下不得安枕矣人君甘於順從而終莫之悟曽不念夫危難之及其身惜哉剝自乾變至四皆有巽體巽木坤地承之為牀足辨膚以近身次第取象𥘉曰以滅下剝始於民也民國之元氣安可剝二曰未有與陽德方消孰與敵應陽復終有止而正之者矣蔑貞云者君子之道方消而貞道不復明於天下是可為痛心疾首也六三剝之無咎象曰剝之無咎失上下也一念從正凶可消也三居四隂中捨上下隂而惟剛陽之應是捨惡從善去小人從君子巳雖小人志應君子且不為君子害剛動上行三與有力惟三以隂履陽內有剛德志應上九特立獨行不牽衆隂於剝無咎吁非六三則一陽不獲安於上將無以復君子之與小人詎可一槩論哉幡然從正斯受之矣六四剝牀以膚凶象曰剝牀以膚切近災也嗟乎小人用必以利為本好利之說行毒淪肌膚大學曰與其有聚斂之臣寧有盜臣近體為膚四比五曰剝牀以膚剝至膚身益不安矣自天子及庶人將悉被其害君人者惑小人一時順說不知為身害若此重可歎也四重隂位不中而近君小人之雄者歟六五貫魚以宫人寵無不利象曰以宫人寵終無尤也小人可盡去乎曰待小人有權有化東漢李唐之季可鑑矣惟我太祖收諸鎮節度俾列第京師得易㫖五居艮止中靜而有常厥德不愆且上比剛德之賢其勢足以制小人發貫魚義小人自下而上均被其寵任不付以天下事利及其身害不加於天下其規模洪逺矣羣隂為魚剝自初變乾至四皆有巽體巽以行權六五優為之巽居已五臨之為貫魚坤為宫人上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也隂道既極君子將復君子小人之分於是辨聖人故立象以為天下後世戒上九以剛在上若果碩大不食培之復生譬君子有生生之德民賴以生養君子得時厚載之功著矣曰君子得輿坤為輿若小人殘虐不仁小人在上位則賊賢害民播惡於衆空人之國矣詩曰小東大東杼軸其空剝廬也一陽在上為碩果艮止為不食衆隂戴陽陽復從而載之為得輿陽以庇物隂反剝之為剝廬剝廬謂雖逆旅託宿之地不得有一日而安之也艮為廬序卦曰物不可以終盡剝窮上反下故受之以復蓋天地剛陽之氣隂不能以盡消譬夫正道未嘗一日不在天下是以自古大亂之後必有君子扶持振起之人主之心復於道則君子以類進剝可弭矣雖然剝必有復天也而所以致復則在人故用君子則有生物而載之之功若輿之能載用小人則害物而天下各不得其所安人君亦將無所寄其身於上若人之有廬而剝之也後之為君者不欲復則巳如欲復其求所以復於道而慎用君子哉不然剝喪而不復興起大可畏也震下坤上復亨出入無疾朋來無咎反復其道七日來復利有攸往彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎剛德內復順理而行其道不撓故亨譬之身元氣濳復邪不能勝夫元氣道之一也道以一行隂莫之寇曰出入無疾且復必自心始君心剛復動以正順則公正之道闢私邪之路塞君子獲用小人退聽國以尊安何疾之有人君勉夫所以復其心哉朋來無咎乾陽來復也一氣既復陽以類升曰朋來朋來以貞功利日興咎其至乎反復其道謂陽動於下復乾之一乾道也來復必七日天地之數七則中中則復自午至子剛來而復乾道日亨曰七日來復君子進而有為此為其時故利有攸往七日稱日蓋取六甲之日剛反動而以順行是以出入無疾朋來無咎反復其道七日來復此申言復之所以復也剛自剝反以震動趨坤順其行有漸曰順行夫五陽進而後用決君子之於復固自有坎第哉惟其行也順是以出入無疾朋來無咎也稽之天道驗之人事理莫不然反復其道七日來復天行也聖人勉示後世之君使法天而知所復也自一隂生於姤歷六位以至坤隂道極矣而天之剛健其行不息卒能消隂而復於陽故人君惟法天不息以復於道然後能有復復非易事也君心之剛既復則君子之道合小人之惡著君子利往而剛長於內生物之功大矣復其見天地之心乎乎非疑辭天地貴生貴仁貴陽貴君子天地無心以天下萬物心為心凡天下萬物所甚喜而愛之欲之者天地之心也夫肅殺於秋冬而萬物敷生於春生生之功於是不窮原天地本心生而巳仁而巳貴陽貴君子而巳聖人出而以生物為巳心亦天地心也聖人貴復復而後生物之心起復其大哉君心既復天人順之象曰雷在地中復先王以至日閉關商旅不行后不省方陽動於下其動本靜而發生之功從此出先王體之用道之靜以俟陽復固陽氣止行旅安居淵默賞罰未加謹其復也先王謹復其動也仁夫閉關以助天地之氣止商旅以杜欲利之心不省方以養其中復之功大矣羣隂在震上為商旅坤在外為后不省方嗚呼自古先王之有復於道者必以仁義為先利為後閉關商旅不行後利之義也夫利心一生其靜撓矣動孰為而中於理哉初九不逺復無祗悔元吉象曰不逺之復以修身也復自心始而用之於家於國於天下故復諸爻皆取義於身不逺復謂何一念之非隨知所復復覺也明也仁也身修若此何抵於悔復具天地生物之德初九為一陽主其用至大聖人立爻辭獨曰不逺復謂修之一身其義足以配天地生物之德也修身之道大矣哉夫顔子有王佐才孔子繫辭以顔子配復初許之深也乾初為元君子修身仁及天下為元吉六二休復吉象曰休復之吉以下仁也初以一陽動於下為仁下仁而善日長僞日消心休然與仁為一曰休復且援賢而進之無蔽賢心卒之德孚於上而天下被其仁休復之功也故吉書曰其心休休焉其如有容六二之謂吉二得柔中用能屈巳下初六三頻復厲無咎象曰頻復之厲義無咎也逺初貴勉動極為頻頻危道也動極而復非誠莫反厲而勉之可以補過可以事上故無咎隂過中故厲而後無咎水崖曰頻六四中行獨復象曰中行獨復以從道也自拔於羣隂中從道不從衆曰行獨復初四正應四從初為獨復且隂靜而中知所決擇惟道之從大臣事業自是興矣復四不言吉謂何夫獨復以從道其事業未大於天下也而吉在其中矣六五敦復無悔象曰敦復無悔中以自考也法坤靜厚而自養以中曰敦復記曰致中和天地位焉萬物育焉此敦復事堯舜性之用此耳且中者性之未發也用功於中誠一不二與天地參其無悔也心同天地施之天下仁德甚大亦五以坤中履震之剛體中德而不息是以能敦復也上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也逺性故迷迷則失德而獲罪於天下德失於內兵動於外理必然也秦皇漢武之事可考矣隂極為迷為災眚初升二為師羣隂為大敗五隂數為十年且君道在明於復而迷則性之靜者日以失情之動者日以肆性失情肆志意昏矣君道既反師敗是宜謙六五曰利用侵伐上六曰利用行師聖人用謙道德必充仁義必修人才必得政事必舉是以有侵伐行師之利若迷復則失其常性好大喜動其動必敗孟子曰征之為言正也各欲正巳而巳矣焉用戰迷復而行師可乎哉震下乾上無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉聖人剛德復於內則人僞去天理得其道上信於天下信於人序卦曰復則不妄卦體上乾下震乾剛自遁來止隂之妄而為主於內有人君動而承天之義大象天下雷行宇宙之間均被發生天以誠動物以誠應厥亨斯大無妄之亨利在貞不然則上逆於天而下拂於人故有眚為人害且為巳害眚也乾上為不利有攸往逆天者天惡之何以往無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也申言無妄之所以為無妄也剛自外來指初初在遁位居乾上剛來於外動實自天天命自然其行匪妄動而健二體動於下而健於上至誠之道不息也剛中而應指五五有乾健震動之德又以剛中應二誠信道著賢者從之亨大以正惟貞則德合於天而天所眷佑曰天命天命與貞非智力能為也卦自巽變為天命嗚呼人君欲有為於天下勉剛健之德應柔中之賢亹亹孜孜誠心在是斯可以奉天命而得其貞矣非克己之君孰能與此哉其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉戒妄也堯舜禹湯文武躬至誠之道以惠利天下貞也若無妄之往動不以貞重違天心為生民害其何以自全於世卦上乾下震乾天也震動也夫有為有行於世若天臨之何眚之復得矣象曰天下雷行物與無妄先王以茂對時育萬物天動以誠萬物敷生不失其信先王修胸中之誠止詐僞復敦朴惟公惟正稽順天道而天下萬物率蒙其休利對時育物仁政以行茂不一之辭且夫春陽用事雷動於下而行於上蟄者奮萌者達有生之類莫不恐懼知畏復其誠一之性於此時先王法之化育萬物一本於誠用能安之治之無水旱疾疫之災無兵革寇盜之變薄海內外各得其生仁之所及大矣記曰致中和天地位焉萬物育焉又曰誠者物之終始不誠無物蓋天下之亂常生於利心害之事起於至微而患成於至大先王兢兢欽畏順天下之自然而因以治之朝夕於大公至正之道是以天下萬物均得其生也月令蓋祖述先王對時育物之意而先王之仁政一出於誠不獨拘拘然舉行其典文而巳初九無妄往吉象曰無妄之往得志也德修而動以誠是以得志於無妄語曰言忠信行篤敬雖蠻貊之邦行矣夫至誠者天猶與之况人乎君子有為於天下心之純一上合於天誠信所格以君則合以民則化志必得矣初以震剛應乾四得動應之貞故往吉六二不耕穫不菑畬則利有攸往象曰不耕穫未富也二履隂在震動中順承續終事業乃立其戒臣之妄為邪夫君以誠唱臣以誠應君臣相須而後生物之功著先事擅為拂理逆常誰其孚聽且巳以妄動而欲求合於無妄之主難矣在震動中初陽先之為不耕穫不菑畬隂虛為未富柔得中為利往若夫剛德若伊周臣以道正君心則不獨順承續終而止耳二未富聖人姑責以臣道之常邪六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也無妄之災災非其災也三以隂處陽其位過中且位在震動上當無妄而志動於內欲得之心未息也無故而得得之順且易曰或繫之牛行人之得得已過也邑人之災謂內受其災譬諸竊虛利受實害是為妄之大者可不戒哉震上為行人震自坤索為邑人訟六二歸而逋其邑人邑內之辭惟所得巳去而失則實受之故災夫君子之仕也不幸有望外之福而非所當得必以正處不然遺身名害無窮矣雜卦曰無妄災也以無故得之也變坤互巽為牛無妄三大畜四皆曰牛震為大塗牛信順易致物且貪得心生信順失矣九四可貞無咎象曰可貞無咎固有之也居乾健初貞所固有惟變巽成位以剛履柔不可不戒故曰可貞且四以乾剛居互艮上艮止也剛止則妄息而貞咎何自來吁履髙位於無妄必欲功名全終始莫大夫貞中貞之道可以格天四居乾位有格天之實於其貞也若固有之矣九五無妄之疾勿藥有喜象曰無妄之藥不可試也無妄之疾疾非其疾也九五履乾中動得其正至誠之心巳孚於物而猶有頑不率化者為無妄之疾舜征有苗退修德化苗民率服此其象邪且治天下有意外患當反求諸身求之身則吾之誠心益者鮮有不格譬之人元氣既正疾其自己恃藥攻疾疾未除而害生况嘗試之藥為害滋大歟二五正應三四閒之為疾以中獲應為有喜互兌為喜蓋中則誠積守身動合於道君臣相應以中何疾不除也上九無妄行有眚無攸利象曰無妄之行窮之災也陽極而亢不知正守是謂妄行將獲罪於天人故有眚居大業者誠為貴誠故不息而貞用能永保厥終上九位在乾上震動居下亢以動也亢動必妄是將快心循欲而極意於其所不可為德失於身害加於天下矣眚固有之往何利也乾下艮上大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也德不畜何以辨天下之賢賢不辨何以畜大畜以畜德為貞乾剛止乎內畜德之大者也畜德而後可畜賢野無遺賢曰不家食得賢何難不濟曰利涉大川變艮有坎體乾健乘之為利涉羣陽在下為賢乾為天艮止之天下剛德之賢畢畜是為大畜賢畜而天下受畜矣大畜剛健篤實輝光日新其德此聖人靜止法天之學夫剛德吾性所固有非靜止不撓則剛德有時而喪篤實輝光何自而生惟剛德內畜輔之以健誠於是充業於是著德之日新孰禦也哉乾天為剛健乾金為篤實為輝光互震震動於內為日新剛上而尚賢謂何大壯一陽上升為大畜而上九以剛在上六五秉盛德以承之是為尚賢孟子曰舜尚見帝尚云者尊之之義也尚賢而巳下之使剛賢在上衆才畢止可以化天下而內之治君道莫急乎此商髙宗恭默思道夢寐求賢得傅說置諸左右而說為旁招俊乂列之庶位尚賢止健髙宗得之矣不家食吉養賢也言聖人養賢以及民若天之付六子以生成萬物之功其道博其功大養賢之道不一二而足必欲其無遺於天下而聖人之心庶幾其無慊焉利涉大川應乎天也用賢則難濟而可以上當天心也賢者民所歸天所與非賢無以濟天下而承天之休曰應乎天嗚呼賢者之有益於人之國也大矣為天下君誠能畜德以畜賢畜賢以畜天下天下其有不治哉象曰天在山中大畜君子以多識前言往行以畜其德天博以大山止而崇多識若天德其崇矣羣賢並畜相與考言行於先王而心志益明聞見益廣德於是日崇互體震兌震動兌說為言行傅說告髙宗曰學于古訓乃有獲貴多識也初九有厲利巳象曰有厲利巳不犯災也大畜初曰有厲漸初曰小子厲進難事也慮之當蚤初應四四隂位其德未同未同强合何以畜利巳謂止其行君子止其行而不止其道初在乾下乾固不息惟艮體在上四為之應所慮在巳四近乾為天災曰災無妄之三亦曰災非四為巳災未信而進有犯災之道也九二輿說輹象曰輿說輹終無尤也才剛德健而又得位得中君子進可也大畜九二乃有輿說輹象何邪蓋止以畜德義不苟行君子之中也君子有載物厚德肯漠然忘意天下哉謂畜之不深其行也近且挽而後行功利及物是以起說輹之義使三賢於巳上已位在三下不求之三以同應於上而欲果於有行以自通於五是不度才德大小何如先羣賢以幸用也尤其免哉乾為馬處乾中為輿互兌兌毁折為說輹九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也良馬乾象三居下卦先援二陽而進之上二陽從之曰良馬逐大畜至三羣賢道通矣猶以艱貞為利間輿衛為戒君子之進肯易邪有其德有其朋君子常若曰恐吾德不勝任故艱枉道求合君子不為也故貞艱貞則順天而惠利及天下故利輿以載物在上者賴以衛身焉間習也才德備具雖進而不忘自間君子誠身之道也往而獲應志合道行必矣嗚呼士君子以進為榮而不知進之難大畜初利巳二說輹至三德業巳隆二陽從類君子於是可有為矣曰利艱貞曰間輿衛兢兢勉勉懼或失之君子以天下治亂為己責以生民為己命以身進道不行為巳恥其用心剛健不忘自治上與天一可為後世法也三位有互震體艮山在前其動也艱為利艱貞變三有坤體坤衆為輿為衛與上同德往必志合為利往六四童牛之牿元吉象曰六四元吉有喜也艮三索坤得之四居艮下為童牛艮止為牿童牛私欲不行其性至順牿所以止逸且君臣之美莫大乎私欲不行臣無私欲而履順事上又重以禮義法度之防若童牛施牿然必正必公必能下賢而進之君畜道成矣書曰如一個臣斷斷猗無他技其心休休焉其如有容人之有技若巳有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民人臣病夫私欲之勝內不知順外不知防矜智能安􅎱嫉竊位蔽賢以亂人之國大畜羣剛並進四以至隂順止乾上其氣象溫厚德靜有常可思見風采故能畜賢以畜君畜君以畜民終使天下俱止為至善其為元吉也至矣夫六五豶豕之牙吉象曰六五之吉有慶也大畜六五有靜止中德卦體位在乾上乾為剛健為髙明五藴剛明之德於內而用之以靜止是以獲畜賢之慶久之天下莫不懷畏其德豕北方物智屬有蹢躅之操豶豕則躁去欲息而不得行譬人君沉濳其剛而黜其聰明且復誠一之性以止於至靜之地無失德無過舉剛賢樂歸天下內外孰不懷畏而服從也蓋人君內有乾德而靜止於上羣賢應之以輔成其德天下相率而化為禮義惟恐不及姦宄寇攘何自而生畜道始大故吉大畜畜賢卦五在君位四實同德而象皆取私欲不行嗚呼欲之為害大矣自天子至公卿大夫士庶人以欲喪身亡家失國若出一轍蓋私欲生則志意昏志意昏則讒佞進讒佞進則賢者逺害不肯止故夫君臣所以自畜者莫過夫力去私欲而畜賢畜天下之道悉本此四曰有喜五曰有慶喜在已喜夫得賢而道行也慶及天下天下受惠其效大矣互兌為喜五在互兌上為慶坎為豕陽止於上為艮為豶豕艮山為牙堯之為君蕩蕩民無能名舜之為君巍巍有天下而不與禹稷禼臯陶伯夷䕫龍之徒相與吁咈都俞一堂之上而中國夷狄罔不率化德威之格也堯舜惟蕩蕩巍巍無欲於巳是以能畜賢以畜天下堯舜其盛矣乎上九何天之衢亨象曰何天之衢道大行也羣賢並進無所滯礙治其立功其成致之自人與之自天曰天衢互震震大塗為衢剛在上為何何謂勝其任大畜二陽從九三應上上九有剛止之德堯之舜舜之禹也堯無為畜賢之任付舜舜無為畜賢之任付禹堯舜垂衣裳而治以有舜禹為之輔耳然則三陽上所畜也上五所畜也五之能畜上有六四同德之臣相與畜德賢為是畜健為是止故曰大畜以畜德為貞也震下艮上頥貞吉觀頤自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉頤以道德仁義之養為貞率是道也天下蒙福孟子有養小體大體之論卒篇曰飲食之人則人賤之矣謂其養小以失大也嗚呼自天子至庶人莫不以養小體而害其身害其家害其天下故頥以養貞吉也頤何取於觀乎君子之養外觀於人而取諸人以為楷式及其終也將使天下均被其惠養存心博大不徒觀也卦自巽變頥肖離離巽皆有觀象觀頤蓋觀所養考其正否且將取其正者而推之以養天下自求口實反求諸巳也夫人之養身邪正善惡惟我所擇若飲食之於人或利或害率其自足是安可不慎歟君子不以其道得之富貴不處貧賤不去無終食之間違仁凡此皆自求之正者也禹菲飲食舜飯糗茹草文王不遑暇食夫子之飯疏食飲水聖人之養在道而不在物故不急急於小體之求而光明盛大之德千萬世有不得而掩者自養之道聖人其盡之且顔子陋巷簞瓢一夫耳聖人直以王佐推許誠以養天下之道自一身起顔子之學足以知其正惠利自此出矣天地養萬物聖人養賢以及萬民言頥以養民為大天地無為其養萬物也付之六子聖人儲精神一堂之上而天下均被其養蓋得夫養賢之道賢養而道德益充政治益盛天下四海之大莫不均被其澤然聖人養賢蓋將正巳而又有以正天下不特使之家給人足而巳方將以中養不中以才養不才禮義之化洋洋宇宙養賢及民其道甚大頤在卦氣為十一月頤本坤體乾陽來交生養之德自頤啓之其時義大二陽位上下為天地羣隂居中為萬物為萬民坤隂為賢艮陽在上為聖人象曰山下有雷頥君子以慎言語節飲食天下為口腹害為身害不出言語飲食二事於動知止其害乃除言語之慎而發諸號令無不慎飲食之節而施諸政事無不節君子用頥其道大矣夫夫言語飲食至微於微知所慎節則自一身以至天下莫不皆得其養微其貴哉頥象以上止下動成天地生養萬物之功於是乎出君子慎言語節飲食非徒為一已養蓋將法天地以養天下兹蓋聖人立象之㫖初九舍爾靈龜觀我朵頥凶象曰觀我朵頥亦不足貴也龜北方物求之於身一陽所舍精神之本也初震體以陽處卦下務動而不求之靜舍正養事外慕口腹之欲一生其害將自身以及於天下語曰士志於道恥惡衣惡食未足與議蓋惡衣食之恥充而不巳害加百姓聖人示後世學者養身要處以靈龜為喻使知止其動復其性庶幾不從事口腹間而養及於天下也陽止坤下為靈龜四隂在前為朵頥六二顛頥拂經于丘頥征凶象曰六二征凶行失類也二雖得中而以隂履隂位在三隂下蓋識暗而智不明者下比初以求養曰顛頥夫五為二正應五之弗從而欲因初以親麗於上以隂附陽乖其本性是逆亂天常捨中正而求為不中不正之養也道違天人其行也凶且六五以柔中處君位我之類也類而失之是失之君失之中正其求養也顛倒拂亂己德喪何所逃罪於天地哉丘指上艮山為丘六三拂頥貞凶十年勿用無攸利象曰十年勿用道大悖也隂居動極失靜養之常且躁動貪得不知止極以是為養將身之不能保豈不拂哉貞凶凶其貞也上以剛德處艮先上止三動其道大悖震艮反也十年坤數六四顛頥吉虎視耽耽其欲逐逐無咎象曰顛頥之吉上施光也四初正應資初之剛以養成其德曰顛頥吉虎隂屬其視靜以正大臣沉毅象其欲逐逐强為善而不肯宿留之義有是二德而以初之施巳者施上可致文明之治矣又何咎艮寅為虎互坤亦為虎位居震上互體又震為逐逐艮止為光夫四以柔順之質資初之剛以大其養厥施用光蓋大臣而能資養於剛德之賢其自養必正其惠養必博道可以上施於君業可以光大於後理必然也不亦美哉六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也頤六五君道之變也資上以養曰拂經柔順用中進修其德曰居貞不正則權移居貞乃吉不可涉大川謂何濟大難者必以剛五以柔資養於上何大川之可涉也處艮止中震動在內有動而修德之象為居貞互坤在中為川上九由頥厲吉利涉大川象曰由頥厲吉大有慶也處伊周之任不敢不厲衆隂資以養曰由頥靜養既正動無不利正靜者德日隆是以天下莫不由之而養厲吉謂何君子之恭也上九體剛止至德其德足以得賢得民而天下皆蒙其養皆自厲中來為吉莫大坤為川四隂歸之為有慶夫四隂歸之是率土之心皆歸之也以剛德止於上下有互坤涉無不利為利涉大川巽下兌上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉周公遭變孔子轍環勢不得但已故大過以攸往亨下巽外卦互體亦巽為棟橈輔相非人上而君下而民弱不可支若大厦之顛危云夫國所恃為國者材也材不勝任國危奈何非剛德君子奮不顧身往而求濟何以救民於塗炭哉遁二隂位上下為大過蓋小人不克負荷君子過以救之之象夫小人用事於內外導君說豫以上弱其君竭民之財以下弱其民君說於上民怨於下國若綴旒斯可憂矣兌上為君說巽下反兌為民怨剛過而中巽而說行利有攸往乃亨君子扶危持顛之道也剛中故能立天下事巽說故能得天下心剛中巽說奚往不亨四陽同德二五得中曰剛過而中巽為仁仁以說行曰巽而說行用利往於大過時東漢之季剛過有餘巽說不足事窮勢激卒肇大亂其事可鑑雖然剛過何以中曰剛過自有中也順天理合人心中也剛中而濟以巽說其亨固宜大過十月卦位在亥且坤隂交乾變乾陽於上下乾剛之德特立其中可過以濟乾君子之道也故夫人君居大過時莫急乎任用剛德之臣而剛德貴中又不可不深察默辨剛過不中若九三之棟橈非獨為君子羞利害在天下甚大也噫以大過之世而四陽居中何世無剛德之賢惟人君樂順從安怠豫不以拯天下生民之命為心剛者逺矣可不念乎象曰澤滅木大過君子以獨立不懼遁世無悶澤滅木君子蒙難仁德不敷象也君子剛毅不為危難變守易心獨立不懼有大過之才遁世無悶有大過之志木掩於澤為木者常自若獨立也木困於水不得敷生且一陽掩之遁世也伊尹周公孔子則然伊周孔子以天下為巳任且度吾才德足辦之履正待時何懼何悶陽過為不懼兌上為不悶序卦曰頥者養也不養則不可動故受之以大過考大過之象非養之有素其能至於是雖然大過利往何取於遁世豈不曰行藏有道用舍在時茍志在必行以遁為悶是知有人而不知有天違正逆理何以能濟易之為訓備矣初六藉用白茅無咎象曰藉用白茅柔在下也君子大有為於天下蓋必先之以禮而又重以潔白之德禮行德立可通神明然後人心化服事業以著且列牲牢陳簠簋以薦鬼神以奉祭祀君子蓋將以行禮也而又藉之以茅禮行德稱誠文兩盡兢兢之慎不敢寧忽鬼神其有不亨哉用斯術於大過之世孰為而不中理又何咎也初處巽下為茅九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也英才遇合而後化育之功成隂陽氣數相得方生生而不窮曰枯楊生稊二巽位中上有互兌兌少女為枯楊為稊蓋人臣排大難建大功為國家生民計非得天下英才與之共事則無以立國之本存國之亡復民之生二五君臣皆取象枯楊聖人意直謂在大過時必得如二之臣援初六英才而進之始可有為於大過若五華而不實無益於國用之適為大過醜為九五訓戒甚嚴也九三棟橈凶象曰棟橈之凶不可以有輔也三居巽上巽隂木其位剛過外强中弱任重必折惟履中者足以輔蓋履中則衆賢歸之而輔上之道得矣且匠者營室先惟棟木之求必視其材之大小質之堅弱中之虛實晝參夜度謀而取焉有天下而任大臣以社稷生民寄如何而有愧夫匠者營室之心哉夫剛而不中行必不堅志必不實材必不可以任大觀夫棟橈而大厦以傾柄臣如之國家危矣可不慎邪大過雖以剛為主而剛德貴中九三承二陽本輕而末重剛過於外者也九四履二陽木重而末輕剛積於中者也且三處巽上一陽一隂在其下小人雜進輔之者弱不橈奚為四處互乾中剛健得中二陽從之是以棟隆而異乎三之橈也九四棟隆吉有他吝象曰棟隆之吉不橈乎下也大臣剛健而中賢材協從乃能任重九四以陽履隂沉濳其剛位益髙德益崇謙益大有大臣剛健謙中之度而居互乾中才德勝其任衆陽輔之用以立事為棟隆為不橈乎下有他謂應初隂為小人係應於初則賢者逺不肖者用進賢之路塞矣何以辦天下大事故曰有他吝云九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也楊隂木之柔者而悴其本榮其末生理窮矣譬夫飾文采守故常以自得於君而內無生物剛德何補於大過邪婦謂上二五正互各有巽體為枯楊下反兌為無譽隂在下為稊在上為華夫九五剛中得臣可醜若是蓋位在兌中其志或安夫燕逸而中材之臣得以偷合茍容也處大過之時其慎此哉然則五何為無咎謂其以剛中居位無妄動之咎耳要之日復一日浸以陵遲是亦烏能長有其國家乎可醜之戒厥訓甚明也上六過涉滅頂凶無咎象曰過涉之凶不可咎也夫子歷聘天下而耦耕之徒非之懼凶也是盍足以知聖人心周公遭變箕子奴龍逄比干死聖賢終不以凶而易其仁得仁奚咎彼荷蕢者自謂深厲淺揭不及於難為君子至德其於利澤天下之志蓋蔑如也兹豈天地之心聖賢之仁乎澤在木上為過涉為滅頂坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉八卦坎獨曰習習安行不息之稱習坎險可出矣夫陽陷於隂非出險則生物之功無自興曰習坎聖人不與陽之陷且欲在險者勉進中德求以出險也陽中為有孚為心亨夫心以剛中亨剛中則與道為一視生死窮通猶之旦暮也是以能欽修厥德而不怵迫於險難之變時至道行惠澤必加人矣習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也習坎何以謂之重險在人內之心外之身流而顛沛於邪惡重險也在國則敵國外患與夫姦宄之竊作於中皆重險義惟剛中德修且行以不息然後險可出焉水流而不盈行險而不失其信坎之有孚者在此水在山習習不止終有利物之功人之居險兢業常若不足去不善而勉為善以大其中德則天下信之孰險不濟曰行有尚自坎而震陽動生物曰往有功天險不可升也地險山川丘陵也王公設險以守其國王公如之何而設險邪隆道德以象天立禮樂刑政以象地王公設險如是天地之險本於自然聖人法之雖曰設險其險夷矣乾坤相交為天地互艮震為山川丘陵坎以用中為大曰坎之時用大象曰水洊至習坎君子以常德行習教事德行有常厥教始行詩美宣王有常德以立武事蓋濟險莫大於教化禮樂刑政均教事也君子持不息之心內誠其身外勤其教出險之功可期以日坎水為德行為教事洊至為常為習初六習坎入于坎窞凶象曰習坎入坎失道凶也隂居重坎下迷不知復以習於惡故凶失正道也傳曰小人行險以徼幸初六之謂九二坎有險求小得象曰求小得未出中也居二隂中曰有險以身則私心以國則小人均曰險隂蔽陽也學問未躋於聖賢事業未大於國家利澤未加於天下皆九二求小得義豈以其中未足以上行而下施邪坎二五俱有剛中德而隂蔽之聖人曰未出中曰中未大蓋將勉坎君臣俾益進厥德以行其中於天下若坤六二得臣道之正道行於上下莫阻之者聖人繫以辭云直方大不習無不利則非特小有得而巳六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也六三位內卦上互體有震動艮止體蓋小人才險不度德量力欲有為於坎險者曰來之坎坎惟三不務修德易行於險安之曰險且枕枕安也艮止為枕入于坎窞謂顛沛末流不可與語出險功也嗚呼小人小有才中懷至險而用以隂柔外若君子然跡其徇私挾數專志利巳動無非險人君不可不辨曰勿用深疾之之辭上有重坎為入于坎窞六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也艱難之時君臣相與貴應貴誠貴質貴通以至誠質實之道自通於君且因君心之明而感入之其事易為力君臣心同險難以濟咎必終免大臣事業盡是美哉漢留侯用坎之四觀夫絶棧之請據鞍之對借箸之决躡足之幾偶語之警布越之封四隱之來莫不因君心之明徐感悟之留侯誠且聞道漢祖深知信之恃為腹心得剛柔交際之義向使剛柔不際道何以通邪卦體二隂一陽為樽簋三四以隂虛居中坎水承之為缶隂虛為牖互艮止艮手為納約納之於中道曰約雖然約之用大矣傅說告髙宗曰學于古訓有獲曰后從諫則聖納約之大者若漢留侯因險難以導君之明在坎一時事耳九五坎不盈祗既平無咎象曰坎不盈中未大也出險之君務剛健以充厥德中德不大何以化何以格何以利九五以剛中為險主執德之常僅能免咎中未大耳然則人君處艱難時日新之功詎可忽哉書曰德日新萬邦惟懷凡以德盛於內惠利及之天下歸心也九五得位得中而隂猶蔽之曰坎不盈祗既平無咎諸卦坎在上往往獲吉惟屯九五屯其膏聖人釋之曰施未光坎九五曰坎不盈聖人釋之曰中未大蓋方天下有事時而欲興其利除其患非汲汲皇皇益大厥德無以克濟聖人為後世之勸者至矣上六係用徽纆置于叢棘三歲不得凶象曰上六失道凶三歲也水逆行謂之洚水上處重險之極失道彌甚是懷險而入於刑者坎北方其色黑為弓輪於木為堅多心故有徽纆叢棘象歷三爻復歸於坎為三歲不得離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也二則麗麗戒在不貞隂中麗剛養之以貞也惟貞故上下順說而亨坤二五來居乾中曰牝牛二陽畜之曰畜牝牛中順之德積於中出而交物物莫不服從其中正而事功以建是以吉離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下何謂也天地麗於道日月之運百榖草木之生麗於天地聖人中天地以有為貴在麗正孰為正中道也其確然至當不可易之理與天地並順則吉違則凶聖人何為而麗正蓋有重明之功焉明本於性因而重之緝熙光明之學也學則正正則明明則化成蓋君為善天下孰與為不善化盍為而不成也或曰重明謂上下俱明是不然臣不可用明臣有明德當歸之君用明則凶况明自麗正處生非上下明而後麗正也重明以麗正而化成於天下重明而曰上下俱明不可也互坎為日月互巽為草木百榖坤索於乾為天為土柔麗乎中正故亨謂二五二五以柔中麗乾陽曰柔麗乎中正且剛健中正純粹精乾德也二五麗中正故能養成其中順之德在離以亨蓋中正天下所視效而率化也君臣協比剛德躬行中正天下孰不順麗天下順麗而離道亨矣象曰明兩作離大人以繼明照于四方法先王之明德曰繼明若舜之於堯湯文武之於堯舜明不繼則明息故取象兩作且日運於天相繼不巳故能成照物之功大人有作欲以臻夫光明盛大之治如之何而不法先王之明德乎初九履錯然敬之無咎象曰履錯之敬以辟咎也交物莫大於敬離文明萬物相見時離初禮所始行也徇文失實悔咎隨起惟不獨敬之身且欽之心庶寡悔矣初以剛陽居離明先有剛明之質用能行禮於離且先聖王之致恭也尚矣聖人畫離首著是訓謂南面聽天下所履錯然不可不致其敬於早惟敬則知所省畏無失德於天下天下心服文明之治不難致也初承二剛柔相際曰履錯然吁敬尚矣何獨君天下者為然哉士君子修身以行於世不敬其始咎將及之可不慎哉六二黃離元吉象曰黃離元吉得中道也臣之麗君非中莫通黃土之正色於色為中萬物以土生萬事以中揆心虛而明中道乃得二麗乾陽以應乎五所麗得中故元吉且二虛心以應五蓋臣之德厚而道足以格天者也用能君臣協一委信剛德之賢俾專任出征之責於上離道以成黃離之德至矣哉九三日昃之離不鼓缶而歌則大耊之嗟凶象曰日昃之離何可久也過中曰昃聖人至戒夫人臣履髙位居晚節不知虛心樂道守志以正則陵犯貪得將無不為而每戚戚其中以自取禍敗也自昔士君子之學貴知道語曰血氣既衰戒之在得彼知道者視死生為一致况得失微事肯屑屑經意也哉蓋日昃不可久物理之常也惟知其常而安之是以無往不樂且君子獨樂其道則心定而志不衰得時遇君猶可攄素積以惠利生民也若日昃是懼所慕所說在物利之域鮮不蹈夫喪巳之凶矣孔子發憤忘食樂以忘憂不知老之將至孔子安有大耊之嗟邪中虛為缶互兌為歌九十曰耊老陽數也九三剛過在離內卦上失中虛之道宜聖人重致戒於三九四突如其來如焚如死如棄如象曰突如其來如無所容也悖理違道殄殞自貽離情炎上四處重離先而又重剛不中蓋陵犯而莫知止者棄安靖之福蔑忠義之訓何所容於天地間也哉卦有互巽體巽為木為風木火以風行突如其來如焚如也火出木盡死如棄如也六五出涕沱若戚嗟若吉象曰六五之吉離王公也處離明之極且下有陵亢之臣居是位當是時不可以無是憂五自乾索離中虛而明故能先天下而憂其憂且思有以除天下害憂則敬敬則治生成王用周公之時為然考書大誥勤勤之辭可見矣離目為涕互兌為戚嗟蓋九四負炎上凶將為天下大害是以六五至誠憂怛見於辭色虛巳用上俾專征伐終之獲吉非憂敬生於心何以得此哉周禮曰坐而論道謂之王公離王公云者離上也音麗上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也必除天下害而後享天下福然則出征其可巳於離哉罰一人而天下畏曰獲匪其醜離為戈兵有征伐義四位不中正在內卦上其象為首而上九德備剛明六五用之以征是以有嘉折首云且其德剛明而能繼大事除大惡施大惠志在正邦不事誅殺臣之盛也𦙍征之書曰火炎昆岡玉石俱焚天吏逸德烈於猛火殱厥渠魁脅從罔治正上九事也離二陽包一隂為邦互兌兌毁為折首紫巖易傳卷三
