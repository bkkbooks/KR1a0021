body:
  text: 紫巖易傳卷五宋張浚撰下經乾下兊上夬揚于王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也五陽長而後用決何決之難邪蓋一隂在上以說為體而內畜二心若堯之四凶舜之有苗自非羣陽用事君臣同心其勢未易決去揚于王庭暴白其罪狀於天下也小人用事久寵固交締其跡祕其根深非使天下曉然知其惡而莫之應則呼吸之間兵戎所起豈不殆哉孚號有厲用決之道也本至公而持以敬慎之謂厲厲蓋君子為天下心也夫號令之孚固有以感動觀聽分别善惡矣君子猶惕然懼不能濟誠恐爭難一生為吾百姓患也孚號以厲人心可格刑罰可省兹又君子之仁歟反巽為號乾五陽為王庭陽實為孚告自邑不利即戎聖人至戒也夫道貴德勝邑內也自邑謂修德以治內戎爭也兵也尚德不尚兵天心聖人心故不利即戎兊西方為戎五陽同升德應于乾何憂不決故利有攸往往則柔終矣如其利且夬一隂用事于上內之小人外之夷狄得位得勢為國家害皆其象也惟人君有大中至正之德剛賢協應政治畢舉則小人退聽不敢擅事彼為夷狄者將斂袵服畏之不暇夬道成矣序卦曰損而不巳必益益而不巳必決故夫君人者莫急於損巳之學損巳厥德益修君子畢用何決而不利哉非獨決小人也聖人之治夷狄由是也健而說決而和謂何健決乾剛之德也無怒之之心曰說有生之之意曰和此中正之道也如是而後能興大利除大害蓋夬決之道譬諸治病要當使疾去而元氣無損不然後必有憂讀夬而聖人待小人治夷狄之道可端坐而議矣兊上為說為和孚號有厲其危乃光也謂以決為危其危乃光聖人惟憂天下之誠無巳其增修厥德亦無巳故夬道行而天下治其光莫大也坤隂盡消乾道以成光德著矣告自邑不利即戎所尚乃窮也利有攸往剛長乃終也聖人以夬為難丁寧反復為天下後世言之也東漢王允李唐崔嗣逺不知易各以尚兵窮夫有天下而不知修德用君子以自強其國使小人氣喪夷狄心讋其勢不敢不聽服乃切切然兵戎是急則爭難不解而為天下害滋大不亦過歟嗚乎夫夬之為卦五陽序進於一隂之決甚易為功也聖人猶憂之健必欲用說決必欲用和且孚大號于先俾姦慝消伏天下不見決之之跡而默受其利聖人知夫戎不可啓啓則生亂若此其慎也聖人之訓至矣哉剛長乃終謂剛進至乾隂道於是終云象曰澤上於天夬君子以施祿及下居德則忌功力爭歸惟霈天之澤不自以為功則人心悅而天意得周公東征而歸其施設可見矣公孫碩膚赤舄几几周公未嘗居德也澤上於天利澤下施而與天下同之也古者謂祿曰天祿乾下為祿乾剛健為德居德則兊毁隨至曰居德則忌夫居德則必恣情恃功有悖道逆理事天下將羣起而攻之矣忌孰大邪初九壯于前趾往不勝為咎象曰不勝而往咎也在夬之初厥德未孚而果於有行其理必不能勝是以君子務強其德德積類合天下莫屈夬孰禦哉初以陽在卦下德不上應若從君子之後可也往奚益乎嗚呼事君量德盡義而巳逆理躁進動必招悔故君子欲有為於夬莫若反巳修德以俟朋陽之助焉坤一變有震艮體為趾九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也二居乾中乾健不息為惕乾九三亦曰夕惕若厲號先事戒備也教化素行禮法刑政素修皆惕號事惕號君子之恭也戎烏恤乎莫夜莫夜有戎變皆倉卒浮言胥起未易明也斯蓋衆人所甚懼君子得中先事備具尚奚恤乎吁夬決非得臣如九二其不為小人搖動幾希矣二之有功於夬大矣哉乾二位在日為暮夜兊上為有戎九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也疾惡見夫顔色之間惡者其懼懼則絶而弗通何以革何以化君子有憂天下心不忍小人毒加于人其心欲革而化之其行獨其迹若濡羣陽必有疑之者是以有愠原其用心則志於決而合於天故無咎善乎君子之夬夬也然則善論君子者論其心而不論其迹可矣乾上剛過為頄位兊體下為有愠應上上居兊澤先為遇雨若濡九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也方君子健決時四以陽履隂其位不中而竊據三陽上為臀無膚其行次且謂依違遲回疑有首鼠心也互巽巽不果為次且戒之曰牽羊悔亡必從衆陽而後亡悔耳兊為羊大壯夬皆自坤變有兊體兊為羊羊取剛進觸物為義反巽為聞言不信甚矣夬決之難也五陽同類以進謂夬可以決矣四猶次且其行何哉蓋斷大事決大議非剛中者莫能為之而剛中之賢豈易得邪周公大告邦君卿士周不反曰艱大所見蓋不同也周公未嘗直抵以罪丁寧反復孜孜之敬訓備見于書然則雖有不同之論不害為君子要在察其設心之正不正耳心本為國不同何害四之次且蓋若邦君卿士謂東征為艱大而非懷姦以動搖國是者乎不然何以無凶咎悔吝辭也九五莧陸夬夬中行無咎象曰中行無咎中未光也陽德既盛用決匪難猶莧陸之易為功也持中而行僅以免咎聖人之戒一何嚴哉蓋夫貴說貴和中以涖之後必有光不然鳥獸之窮容為害茍使凡為小人者生反側心安平之福不易致也聖人法天用中是以無咎意聖人以革化小人為大夬聖人不得巳也不以化而以決斯九五之所以未光歟兊隂掩之為未光莧陸澤草至柔脆物上六無號終有凶象曰無號之凶終不可長也君子孚大公而天下信遂使小人黨日消勢日削天下誰其從之夫小人據利勢在上猶足以合黨欺衆簧鼓天下惟屈之以道使天下曉然知其為小人知其為惡知其不可復恃史道斯成巽上為號無號莫之應也在小人凶在天下吉小人道窮其勢不能久於上為有凶巽下乾上始女壯勿用取女彖曰垢遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也妬之時義大矣哉姤一隂生而曰女壯其勢方興足以消陽也巽為長女所應失正遇不以道譬小人才力有餘而容恱苟合宜辨於早也且姤雖隂長之卦而隂陽至理以遇合為貴特在夫所遇正不正之間聖人於卦辭首曰勿用取女言女之不正不可遇也蓋女不正足以敗家譬諸小人柔巽不正內挾權術足以敗國其為遇也可不畏哉繼之曰天地相遇品物咸章也剛遇中正天下大行也遇之時義大矣哉言遇得其正則功利及於萬物而遇道行乎天下其為義大矣隂生於坤午與乾子迭相終始萬物至此畢趨亨嘉之地曰天地相遇品物咸章剛遇中正指二五二五剛中以中正之道相遇風化被於天下天下悉從其中正若天地之遇然聖人致意於姤者可謂至矣且夫柔遇剛一也在卦體則勿用取女而不可長在二五則剛遇中正天下盛行蓋聖人發其兩端示後世君臣相遇之道俾知一治一亂本夫所遇之正不正後之為人上者可不知察而為之戒也哉嗚呼自右小人常遇於時而君子率不遇姤一隂生乎下小人將有必遇之勢其事大可畏茍非君臣剛中固莫能止而遏之宜聖人所甚憂而丁寧垂訓也然小人在下何因而遇於時乎在其君有以啓之而巳君心剛以正則正者遇君心柔以不正則柔者遇氣之相感不約而符姤一隂在內其象君心之隂已生君心不剛則樂其身而忘其民是以小人得乘間而進一小人遇引類以至天下將受其禍宜慎矣夫坤隂變乾為天地相遇象曰天下有風姤后以施命誥四方風行天下無所不被施命法之是命自天出而一本於至公兹蓋聖人所以止隂之生也夫使天下各安其治而日以無事聖人安用命惟夫乾道不足一隂消之小人害治者生則必肆其邪說以惑亂天下聖人憂之先事告戒使天下曉然識善惡趨嚮知所避就而納之於中正化不足而後有命命非聖人得巳也盤庚周公誥書丁寧反復不啻慈父母之訓正隂生防微之幾風於萬物有鼓舞生養功聖人抑隂助陽若風之行為命風在天下所及者逺為誥四方初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也金堅剛物金柅用止車行以金柅止車而又繫之聖人於小人方長疾之止之若是其嚴邪聖人何惡乎小人懼為天下生民害也貞吉謂何止小人莫大於貞失貞則窺伺乘間以類竊起將不可勝制矣有攸往見凶不許隂長也夫隂長則陽消矣凶孰甚焉羸豕孚蹢躅蓋聖人深明小人情狀發之於先也夫小人之進必倚君子以幸用若循循可與為善者而蹢躅之性常萌於中不制之早其害未易言乾金為金柅巽繩直為繫豕北方畜至隂之物羸豕象隂之微自午以往蹢躅決矣曰孚孚信然之辭也且姤一隂居初小人在下而位實處內有得君志合之勢坤隂將羣起而附之聖人著訓使後之君子謹微而大正其始用意逺矣九二包有魚無咎不利賔象曰包有魚義不及賔也遇道貴一君於臣於民夫於婦上於下其為遇也不一則離九二以剛中應五而下比於初隂初專遇之有近民而得其心象夫得民心而天下歸之則道足以制小人而止其進遇道行矣故無咎不利賓謂四四初正應而其位逺隂夫民近之則親逺之則去惟九二剛中以中正之道涖其下而下歸之民歸之在二四安得利邪吁君臣相遇本以為民觀有魚無魚二象一以無咎一以凶後之為臣其可不竭盡誠以勤撫其民人也歟陽包隂為包巽隱伏為魚巽位東南四居巽上為賔互兊為義九三臀無膚其行次且厲無大咎象曰其行次且行未牽也隂陽之情以相遇為說三眷眷然若有意初之說從而九二體剛中之德巳實乘之不敢不從故曰臀無膚其行次且次且謂居之不安且踟蹰其行也三以剛居位故雖有從小人心終自知厲厲危也以其危而厲焉遂無大咎嗚乎小人不可邇尚矣居上位而有邇小人心則德與名俱喪為咎孰大幸三能厲未牽於初耳巽為股為木三在巽上為臀無膚巽進退不果為其行次且夬九四有互巽體亦曰臀無膚其行次且云初曰柔道牽三曰行未牽幸其未牽於初也九四包無魚起凶象曰無魚之凶逺民也失民何以事上而保其位隂為民四初正應而失之曰包無魚魚柔巽隱伏民象也且四位近君人臣必下遇於民而後能上遇於君民有逺志位其虛矣吁人君責任其臣以求治蓋將必使之加惠吾民以固結天下心今也在上位而邈然不以民為念而失其心雖有民與無民同下將交怨而疾攻之為國産禍無疑矣曰起凶四剛過不中亢滿失民凶自致之也故曰起云九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也用君子以封殖百姓且內藴其美而嚴恭寅畏仰承天心以降命行事如是而後隂可復消也命出於正若上帝在左右號令賞罰惟帝心之順曰自天雖然五何取於含章蓋人君惟不自恃其聰明然後剛中之賢得以展盡底藴成君臣相遇之治而命之所降率合天心後世若秦皇漢武矜其智能羣下不敢盡情卒以毒亂天下遇之失也雖然五之含章非謂拱手責成於二而於君道莫之省也曰有隕自天蓋一本大公之道以施命於天下而我之所操者要所執者大若五其深得君道之正歟二居巽中有剛德為把初以柔居巽先為瓜乾中為含章乾為天巽為命上九姤其角吝無咎象曰姤其角上窮吝也剛上曰角剛亢處上何以遇惟逺隂故雖吝無咎晉上九亦曰晉其角蓋居晉遇之極而剛亢不反其必窮莫之進莫之遇矣坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣國以民為本民以賢為命順以說得民之心也剛中而應得賢之心也得賢斯得民矣不萃奚為濟渙治萃得四海歡心以順事其先而教天下以孝以中合其心故萃渙皆曰假有廟坤在內為得民民說則國家有磐石之安宗廟之祭可以極盡其誠禮矣曰假有廟上為宗廟互體巽木在上為有廟利見大人亨利貞何謂貞若商湯之於伊尹周武之於太公為萃之貞何哉湯武伊吕之為君臣志在天下而不在身是為貞大人謂五牲何取於用大萃而歸功天地鬼神內誠外禮不可不竭盡也誠禮盡而教化行故吉且生民之命在食人何以聚曰食而巳矣聖人於萃聚之時既盡力於民事報本之禮牲必用大有深意其間蓋澤上於地農事興矣所以報本不可後也坤為牛曰大牲兊金在下曰用利有攸往謂宜勉修厥德以有為於天下夫天命以萃非德曷承二陽以剛德相比剛進上行其剛得中往必利矣互巽為天命坤下為順天命觀其所萃而天地萬物之情可見矣謂天地萬物以萃為大聖人承天地育萬物不可不求其所以致萃之道而增修吾之德政以上承天地之心也象曰澤上於地萃君子以除戎巽戒不虞既治偃兵適以啓兵盍若先事有備可以息姦慝弭後患乎今夫澤之儲水一失防範則決矣惟水得其防而澤行於地然後利澤及物生養之道興焉君子法之戎器是除不虞是戒所以大利澤於後也而況順說之極上恬下熙安於佚豫倉卒之變可不慮哉君子知聚必有散安必有危有國有家不可一日忘備其急急夫戎器之除非曰先武事而後德政也蓋以吾之德政既有以感說民心而俾之萃又恐夫害治者起而重為之防初不敢一日自恃其治焉則德益修政益立天下之萃不知何時而巳也君子規模逺矣哉兊西方為戎器互艮震震動為不虞艮手為除兊口為戎孔子答子貢問政曰足食足兵民信之矣故夫萃聚足食之時武備不可一日忘於天下以武傋之不可忘而不敢安於逸樂則其為德政之補亦云大矣抑衛武公刺厲王詩其三章曰夙興夜寐灑掃庭內修爾車馬弓矢戎兵用戒戎作用逖蠻方終之曰用戒不虞武公之學其有得於易歟初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也居萃聚之初信君子逺小人聚斯光矣信貴有終二三其心合斯離以此行世何以立事知而憂之終得其應咎其免焉君子先定志於內而後求聚於外結之以信持之以久故志行事立而能有為於萃聚之時也初以柔應四剛柔交孚於應為得惟二隂在前有昵比從類之心其孚不終用亂乃萃是欲棄君子而為小人之歸者德必喪矣何以萃而升哉若號憂發於聲音也初自兊變以剛履順故能知其過憂之終得正應以獲一握之笑于後勿恤往無咎謂所從適之正自能免咎不用恤也嗚呼君子之於聚不可不慎所孚而勉其終慎之何如亦在夫先定其志而巳兊口為號艮手為握兊說為笑六二引吉無咎孚乃利用禴象曰引吉無咎中未變也萃貴合戒在苟合二居坤隂中必引而後吉無咎蓋君臣之間相遇而不以誠則信之不篤任之不專萃其難矣夫惟上以誠求下以誠應道斯可行君臣之心交孚若一弼違補過中不自疑故用禴為利禴夏祭也薄祭也禴之利用謂至誠可通心腹可盡若祭祀之不待備物也用是居萃則大利以興大功以立治其盛矣上說下順為引吉二五皆中正為孚坤位西南為禴中未變謂何言君子守中於身不以既萃而輕變其志必上我求而後應之謂不如是不足以有為于萃也六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也求萃而不得志故嗟萃三處坤順之極其位不中欲上比於陽而二隂牽之夫二陽君子也若曰小人歸而君子不與焉故萃如嗟如以此事君何為而利嗟歎辭也嗟則知悔矣往而應上庶幾無咎蓋上方巽身待下三往應之猶愈於獨行無助於萃也惜乎上非剛德終不足與有為故三於萃小吝吁聚而君子也則善日聞德日進名日彰功日興小人反是矣宜三之所以重發嘆歟三位在二陽二隂中蓋處君子小人之間者也然則三者安可不審擇其所與聚後之求萃於君臣朋友者宜鑑兹兊口為嗟互巽為上巽九四大吉無咎象曰大吉無咎位不當也四多懼謂近君也萃九四以剛陽居萃聚時德足以說天下而天下順服之禍福安危之幾於是乎生是實德位使然也惟夫上得於君下得於民兩者兼之吉斯大大吉而後無咎蓋得君而不得民則道不信於天下固不可與大有為于天下也得民矣君或未之信焉閒隙疑忌之起殆不可勝言終亦何以行其志哉萃四自臨來君臣同德相說以正坤衆順之是上得於君下得于民者也是以大吉無咎嗚呼以四之大吉僅能免咎于萃古人謂蹈富貴為危機信矣夫九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也臨變而萃九五以剛中為萃主天下順應曰萃有位無可咎者曰無咎蓋為匪孚其下剛阻於下羣隂之情未盡通且五之剛德未立德未洽于天下心故歟勉修其德萃其光矣元為衆德之先其用仁也善也持以永守以貞奚患不孚湯武之舉有愧堯舜匪孚也若元永貞在二君則優之故終能得志天下且有令望於後世聖人懼萃聚之主安順說而忽修德曰匪孚曰元永貞悔亡戒也蓋五於萃有說體是或以天下歸之為巳樂不可不戒隂掩之為志未光上六齎咨涕洟無咎象曰齎咨涕洟未安上也處萃聚上說極必反惟憂所當憂而誠以求應始免於咎聖人至訓也方天下順說之極而巳身在上位孰不晏然自以為樂聖人獨以為是大可憂非至誠省懼急於得人若齎咨涕洟者然殆未可免夫禍難聖人之訓微哉兌口為齎咨三隂在下順應於陽上六有失應之憂曰未安上巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也臨二陽五變為升二陽升也而曰柔以時升蓋二陽升於內剛德浸盛柔道用得位而上行曰柔以時升巽而順有可升之德剛中而應有可升之資剛中謂二二以剛中應五五得二應而剛德盛於內是以其亨大曰元亨譬夫木在地中其本既盛二陽之氣並進上達木之升也莫之禦矣且內巽外順仁德既行而又有剛中之應內強其志柔之時升不亦宜乎自巽而離自離而坤柔道正位於離而成物於坤曰時升用見大人指剛中之陽也五居尊位曰大人見大人以趨亨嘉之㑹何往不利曰勿恤南征吉巽在下巽不果勿恤宜戒巽至離萬物皆相見南征之所以吉歟嗚呼讀升而知君人者欲德位俱升亦在勉求剛中之賢而巳誠能巽順下賢而吾之剛德日進不巳帝王之治可歷階而至也雖然升之用亦大矣六五柔中何以為升之主邪曰五所謂柔非志於怠安之柔也二陽內應有得賢之益吾之剛德方浸長於內而未艾是以能有生養萬物之功而志得行於天下其升豈不信哉互兊為有慶坤進而上為志行象曰地中生木升君子以順德積小以高大山上有木其進也漸若木生地中則陽動於內停蓄含養之日久得時而升升不可測君子法象曷取於順德之積乎蓋德契天人是謂順德順德既積斯有以感入天下之心天下從而化之自邑至國自國至天下德業兩大莫之與並若木之升矣古之用此者其周文王乎坤巽皆順體為順二剛居內為德內剛外柔為順德初六允升大吉象曰允升大吉上合志也允信也在巳有可信之德然後獲信於上以是居升升其合矣夫在下位者不患道之不行而患已德無可信者惟體巽之仁應坤之順二陽既孚上必我信斯可與有為於升之時矣蓋陽為君子君子信巳而援之則上信之上信之則天下信之吉於是乎大初承二陽以應四坤隂在上莫不一意下之曰允升初之允升蓋得巽仁以應四而二陽為之援是以無往不合也九二孚乃利用禴無咎象曰九二之孚有喜也事君猶事神事天然舍誠固不能有格也蓋毫髮欺愧於中則精神之感必不交孚尚何以得君而惠利天下哉九二以剛德在巽中五順二巽中道默通曰孚剛賢以中孚君君德日新斯可以體至公亡形跡竭盡忠嘉以強其所難拂其所順致君於堯舜之前矣曰利用禴禴薄祭夏曰禴貴誠不貴物也志得道行君子之喜曰有喜互兊為喜九三升虛邑象曰升虛邑無所疑也坤上為邑升二陽自臨來三有剛德二又比之巽仁充於內坤衆順於外仁德感通邑人之心先歸焉邑我邑也邑其虛矣升又何疑湯武之舉則然士君子巽志入道收後獲功其進也如虛邑之升亦在夫勉其不息之剛而巳六四王用亨于岐山吉無咎象曰王用亨于岐山順事也有文王謹守臣節之心乃亨文王有憂愛天下之誠而德益進志益恭守益正上天所喜後世所仰文王惟順於天順於道故能順於君順于人後世莫得而少疵之也升至九三巳有虛邑象文王處四位而心不忘順紂眷然日望其遷悔豈非盛德事歟不孚奚為互兊為西山六五貞吉升階象曰貞吉升階大得志也德合天人為貞坤以柔升五坤中而順德格於上下剛賢應之德進不巳升罔不吉用得志于四海云坤土為階自下而上曰升階以德為階也五之德若是可與為王可與為帝矣故曰大得志蓋六五剛德浸長於內是以其升若此上六冥升利于不息之貞象曰冥升在上消不富也向晦曰冥冥何以升冥升謂處富貴極至利欲牽之於升必冥非謂以冥獲升利于不息之貞謂其貞不息則有出晦之道猶日月之行地中也嗚呼自天子至公卿大人勢位既崇冒昧利欲不知厭極其能不喪身而亡家國者幾何惟惕然懼省以增修夫仁義之道則無憂乎消不富矣聖人灼知至理之必然而為之戒上六履隂居巽順極為冥升蓋巽順之至剛德必衰晦其宜也坎下兊上困亨貞大人吉無咎有言不信彖曰困剛掩也險以說困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也困自否變時之否矣君子宜困君子有乾剛生物之德而三隂掩之三隂挾說險之資外示和易內蓄姦阻上下交蔽復有用事於中以離間吾君臣心腹者君子雖有巽仁離明之德無所用於時而其道以窮是以困也困以剛中為貞惟貞乃亨大人居困而吉端在此蓋剛中則能勉進乎道而明足以見仁足以守不為窮達死生變其志何為不亨哉無咎謂無可咎險以說困而不失其所亨言君子處險以說其修身礪行無愧天人身雖在險道自亨也且困何為而取於說說謂說於道非於物而說也說道者視險無險其心尚亨且士君子之有志於道孰不欲以道為說惟其養之不粹行之不力一為憂患所迫鮮不戚戚於中故夫在險能說其事為難非剛中者莫克行之大人指二五二五有剛中之德守貞不撓困極而通其事業將大於天下曰大人吉無咎有言不信言無益也兊上為言坎在下其道不能上達為不信夫小人布列於上下內外以是為非以正為邪當是時其可以口舌爭邪天實為之尚口則窮君子修道待時可也雜卦曰井通而困相遇也井坎一在上困則反之故在井者其道通處困者其道窮序卦曰困乎上者必反下蓋道之為一浩然常存初不以困亡君子何患哉樂巳之道忘身之困斯無入不自得而變窮為通矣文王孔子善處困者文王孔子道傳後世厥亨孰大象曰澤無水困君子以致命遂志致在天之命遂在我之志致云者委之於無可奈何也道之不行豈人力也哉雖然水未嘗一日無也澤無之而水趨於下時而巳陽氣奮達澤水必滋道未嘗無一日不在天下也道之不行時則使然君子知之固窮樂道自求其志得時得君殆將攄素所藴蓄而行之天下君子之心亦豈一日忘君忘天下也邪其遂志也時焉而有不得巳耳困自兊變在卦氣正坎水趨下而澤涸之時初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也困三隂有株木蒺藜葛藟象蓋卦體巽木在中兊一變坎為困而兊復有互巽體且自秋徂冬草木雕落困之時也是以爻之取象如此嗚呼小人之困君子適足以自困惜其快一時私意曽莫悟耳觀三隂皆以草木衰敗不振者為況見聖人之心嫉小人深也初以柔居坎險下其應在四四互體巽兊金制之枝葉不敷無以芘下曰株木初六從二隂以困君子君子道窮天下以否而巳身失芘將亦不得一日安曰臀困于株木臀困云者謂不可以有行也入于幽谷趨險不反也三嵗不覿前有互離不覿其明也然則小人暗於天理惟險之懷其困君子也祗以自困不知其將何所寄六尺之軀於天地間哉自初至四為三嵗九二困于酒食朱紱方來利用享祀征凶無咎象曰困于酒食中有慶也九二有中和之德可以養人而方處險中德未及施曰困于酒食九五同德之君方傾意嚮之謂其德之可以通於神明也曰朱紱方來征凶時未可為也君子貴因時違之則凶無所可咎坎中為酒食朱紱謂五朱陽正色君道也二自否來位本乾體故利用享祀天曰祀美德可以養天下為中有慶嗚呼自昔小人困君子必先離間其君臣之心六三以隂在內蓋小人用事於中者幸二五君臣道通雖困終合故曰有慶云此非二之慶也天下之慶也六三困于石據于蒺藜入于其宮不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不􅖤也困于石掩四五也據于蒺藜掩二也四五有篤實之德三在下而欲困之是將獲罪於天下後世故名必辱九二剛中三竊處其上懷不自安天下其起而攻之矣故身必危名辱身危有死之道不祥莫大嗟夫小人幸君子困行行然貪欲日肆自以為得不知獲罪天人之深適足以困巳其名其身其家將不能悉保于後在彼何利哉惜夫隂柔不正日以昧昧智不知此耳互體離中離不當位坎復易之為不見其妻九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也車之載物必獲輔於下而後可以有行君子在困雖藴載物之德非求應於下則其道亦不能上達矣四居兊金先本有乾體曰金車三以隂間之坎險在下莫之能進以協比于二而求於初故其來徐徐惟四志在應初終必有與雖吝得終也自外而內曰來巽不果為徐徐嗚呼人臣居四而處近君之位在夫勉求其應而巳不然雖有剛強之德終無以出困而止難也戒之哉九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也人君有剛中至德而又得剛中之賢然後可以除間去險而息天下之困困二五以剛居上下卦中而三隂蔽其耳目離其心腹使二不得上應於五曰困于赤紱赤臣道也劓刖欲施刑於上下之隂有志而無助志不得行是以困惟中直故乃徐有說蓋君臣以中直之道相與則天人之心可格何間不除哉兌上為說利用祭祀謂品物可備誠禮可盡也五位兌中萬物盛多時故於祭祀利用夫間我者去而君臣相說則巽仁離明之德可被于天下而治道以興險難迄平矣受福于天夫復何疑也五本乾位得賢而天人之心說曰受福兊金為劓刖兊巫為祭祀紱相蔽飾之服二五來自乾乾為衣朱赤皆乾陽色赤朱之發見於外者諸侯服也二五德剛中曰以中直上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也上以隂居兊終有互巽體二隂牽之相與掩剛上位一卦上逡巡忸怩若困于葛藟而臲卼不自安者然葛藟柔脆滋蔓小人相與牽連狀也小人欲困君子而赧然有歉于心故臲卼其居動悔則變而從陽矣誠能有悔乎其征斯吉揚雄曰侍君子晦斯光窒斯通辱斯榮敗斯成夫通君子乃所以自通困君子乃所以自困聖人示動悔之象使後世為小人者知所以棄惡而趨善也反巽為臲卼兊說為吉行巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也靜養之功既成以中守之以仁出之俾天下各安性命之情井之用大矣坤五下居乾初坤為邑邑可改井不可改謂坤隂往來坎一不變蓋邑有興廢而井之在地常自若譬諸君子有剛中至德不為天下之動而變其守惠澤於是生焉無喪無得中先定也定故能應求者應之隨取而與曰往來井井往來雖不常而吾之為井未嘗加損耳困三四易位而成井在困坎之一潛於下在井坎之一升於上困則君子道窮而利澤不能以上施井則君子道通而仁澤遍及於天下君子德成於井凡以養之不窮不為居困而變其心志故其德益修其利益大也且陽中於坎養以靜正行以巽仁而其施不匱井之功用不亦大哉汔至亦未繘井羸其瓶凶聖人勉後之君子修誠礪器以大仁德於天下也蓋聖賢以利澤及物為功惟心誠於內而後功著於外汔至未繘井而羸其瓶焉誠不至也巽為繩為進退為不果互兊互離在中離中虛兊毁折為汔至未繘井為羸瓶象曰木上有水井君子以勞民勸相古者設庠序禮樂之教法度政令之防非以勤民蓋將誘而納諸善以輔翼之耳水得木而功利施君子以德行仁而天下受惠孟子載帝堯憂民自勞之來之下皆勞民勸相義也坎勞卦坤五下降為民為勞民互兊兊言為勸相勞云者使之朝夕從事於教化勸其未至相其未成也初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也井以汚濁廢鳥獸猶去之而况於人乎初以柔順居坎險下蓋不能潔白其德而自抵於廢棄者也君子惡居下流凡以失其清明之性故耳坎水在上巽入之兊毁之為泥互兊為不食四有離體與物不相應為無禽為時舍九二井谷射鮒甕敝漏象曰井谷射鮒無與也士君子必有聖賢之與厥德乃修二不獲上應於五而下比初隂趨向不正德以之墮曰井谷射鮒甕敝漏位居坎險下為谷巽為鮒鮒魚細者坤五下居初坤土在下兊毁乘之為甕敝漏二本剛中而以順說之資下比於隂棄中正從昏濁剛德既虧才器淪喪惜哉雖然為二者亦在夫求與巳修巳而巳聖人不著凶咎辭幸二一朝反身而從善也九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也九三備清潔之德而位在坎後小人蔽之王明則蔽者退矣故並受其福夫井之為水善利萬物凡以至潔而巳傳曰氣之清者為賢三有可食之德而不及食孰不惻然念之可用汲宜在髙位之謂君子而在高位惠澤必加于天下汲可用也巽上巽潔齊為井泄兊毁為不食坎加憂為心惻上應之為可用汲五以乾德居互離上為王明曰求云者德修于巳君子求之是以不求求之也天下被澤為受福蓋君臣之福繫在天下陽為福六四井甃無咎象曰井甃無咎修井也德莫大夫養之修之修之所以大其養井六四位在坎下互體離兊兊毁離明明足以有見故能先毁而用其修云是可以塞近臣之責矣曰無咎且人臣修巳之德以修其君之德君德既修善政斯出其利豈淺淺哉坎離有水火用為甃九五井冽寒泉食象曰寒泉之食中正也居中履正美德厭天下心若寒泉足以息天下之熱者然曰井冽寒泉食夫中正本之身達之天下人君誠能恭己無為以行吾之中正則天下莫不日用而默化之相與去惡從善如渴得飲熱以寒息惠所及者大矣坎中為冽陽萌黃鍾泉所自發潜養之功非一日曰寒泉泉寒而天下喜食之猶聖賢有美德天下仰惠斟酌飽滿各得其欲也五以坎中居互離上中正而明有靜一之德故其取象如此上六井收勿幕有孚元吉象曰元吉在上大成也井道既成曰井收勿幕勿幕戒也上以隂居井上隂性吝嗇宜戒聖人一視同仁方且公天下而惠利之天下求之無窮己而聖人與之亦無窮巳豈曰幕之云哉聖人有誠一之德飲德者莫不率化不勞而惠自及之所孚者大矣虞舜文王行此舜以正文王以淵懿向使二聖人斂德弗用天下安所繫命哉舜文王之心不一日忘天下故天下後世樂推其德而不厭也隂上為收坎北方為有孚其吉以仁曰元吉元吉吉之大也離下兊上革巳日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革巳日乃孚革而信之文明以說太亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉火動而上澤動而下二女志不同行為睽睽離之義也至澤火相息而志不相得事勢既窮不可一朝居矣曰革序卦曰井道不可不革故受之以革易汚濁而為清明革道也雖然有乾德而後可革革非易事也必德明而有以孚信之于先然後革可用德之能孚非一日事曰巳日乃孚革而信之孚而後革聖人不輕為也元亨利貞乾德也互體乾在中故曰元亨利貞云悔亡謂不獲罪於天人也離為日自初進四革道乃成為巳日周自后稷至太王王季文王德孚天下久矣武王繼之始用革孚而革也惟湯之革夏亦然嗚呼革非德明著見之君莫能行之矣水火相息二女同居其志不相得曰革聖人甚言革之不得巳也水火陵害生理絶滅其勢有不得不大變之以惠利天下萬物者火炎上而澤息之澤趨下而火息之曰相息夫卦體澤火也而曰水火相息蓋水火在天地間未嘗一日無之故水在火上為既濟蔑有息也若澤火則質性不同澤金為水母夫澤水所鍾也水在澤而火克之金日以消水日以涸火日以衰其勢必息自離午至兊酉水火敗絶之時兊金又為死火所尅宜其息卦以坎變至震革始用事震仁也聖人必俟仁德之孚而後革也兊離索於乾而得曰同居居同而志不相得則上下侵奪將不得以生養是豈可不革哉雖然革金火之變也聖人用土之信以濟革曰革而信之何以言邪稽諸時運方火金相息之時得未土以生金土承火母生金子於是有庚伏之候而嵗功以成聖人出而應天下之革非信固無以服億兆心拯之塗炭中也故曰革而信之云文明以說大亨以正革而當其悔乃亡謂順天人之心其革必當不然利未及興而害巳隨起矣當僅悔亡不當之害可勝言邪君子慎革惟德之文明而天人胥說亨大以正然後革可為也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉聖人因天地以明革也天地以生物為心其革也所以成四時而生物之功於是不窮春夏生養秋冬肅殺循環致用于以見天地之仁湯武法天拯天下於塗炭中而納之於仁壽之域湯武之心配天地革於時為大殆未可輕議也象曰澤中有火革君子以治厯明時君子之革本以順天君子觀澤火象治厯蓋將與天下同奉天地之革敬授而日月之也是其設施舉措凡有因革于天下罔不稽於天而協於人矣卦自坎變坎離日月之㑹而澤火相息久必差忒厯不可不治也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也以中順自固曰鞏用黃牛之革此周文王心離初為黃牛陽外為革鞏固也初以陽德居離明先非才之不可以有為謂謹守中順然後上合天心耳周文鞏用夷齊來歸天下大義於是而正六二已日乃革之征吉無咎象曰已日革之行有嘉也桀紂之惡著伊尹太公不得已而與商周令聞令望傳于後世商周之革二臣之力也其征吉誠以契天人之心耳二離中有文明德是以能上應九五敷大信於天下離於時為亨曰行有嘉九三征凶貞厲革言三就有孚象曰革言三就又何之矣湯武之師弔民而止革道既成過中則殘必貞必厲始合天心武不可黷也夫革言而就者三衆信之天下歸之也撫以寬仁斯為貞矣武之歸馬放牛示天下弗服湯之栗栗危懼若將隕于深淵其貞厲之謂乎兊體在上為言三陽為三就剛過為征凶自三以往有互乾體皆曰有孚如天在上孰不信也九四悔亡有孚改命吉象曰改命之吉信志也處互乾中其革當天下信之信其為天下心也以我明德易彼昏政曰改命吉互體巽位居水火相息之際為改命四不正本有悔得乾中而悔亡九五大人虎變未占有孚象曰大人虎變其文炳也文王道德之化默施天下天下靡然從風所變者大不待質之鬼神而其道巳孚無他躬行之應也兊西方為虎兊互離龜為占嗚呼紂之不道文王巳革之於先矣觀詩漢廣德教所及汝墳道化所行其為孚也豈待占而後知哉上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也其湯武事乎兵不戢將有自焚之災曰征凶治之以仁義為居貞禮法刑政密矣曰其文蔚考周公訓迪頑民辭凡欲革其心也兊說見于外為革面巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨聖人有明德而羣才樂為之用仁德並施海內大治曰鼎元吉亨風自火出為家人禮明於內而化行於外也家道正而天下治鼎象治道之成明德升於上人才用於下坐收調一之功其吉也大巽木為才鼎之才家人之化也故鼎治自家人始然則正身以齊家齊家以治天下真古今不易之道歟鼎象也以木巽火亨飪也鼎當求之象而不求之器鼎象天下夫天下大器也虛器也扶持綱紀之在人聖人治天下不自恃其明用衆才為明曰以木巽火賢才用而吾明德以著教化以行亨飪之功於是成矣陽實為飪聖人亨以享上帝而大亨以養聖賢亨飪之見于事者也夫人才並用治道聿興上可當天心下可育人物其效顧不博大哉必曰大亨治大成也互乾發享帝義乾剛為聖賢蓋人生宇宙閒導而使為聖為賢在上養之何如耳聖人之治孰有大此者乎巽而耳目聰明言聖人體巽用才而明德之大蔑有加也且斂天下聰明而歸諸已非巽以下賢者莫能行之夫惟內巽其志外巽其身則善道日聞下情上達不復有壅蔽之患何施何為而不中於理也天下其有不治邪卦自離變伏坎在下坎為耳離為目曰巽而耳目聰明柔進而上行其道進也自巽而離曰柔進得中而應乎剛應上下之剛也六五以明德處互乾上道雖用柔身履乾剛是以能應得中應剛鼎道成於是矣蓋剛中之賢應然後可與大有為於鼎以盡用天下之才而大吾明德也或曰鼎自遁來二隂卦也何以為鼎曰遁二隂位窮于上是謂大壯鼎為卦大壯之上來居鼎初大壯之初往居鼎上剛賢用事君道得中鼎大壯之效也羣賢並用而位乎上下鼎治其昌矣象曰木上有火鼎君子以正位凝命分定而後禮化行孟子曰中天下而立定四海之民正君位以正天下之位使賢不肖貴賤人心各安其分而不相錯亂命其凝矣蓋治莫大於分聖人斂賢才而布之天下非正位於上而動無非禮何以一天下之志而納之中和之治哉惟夫位得其正羣賢在列各當其序君命以定禮化遂行離南方為禮為正位巽在下為凝命巽為命巽隂為凝初六鼎顛趾利出否得妾以其子無咎象曰鼎顛趾未悖也利出否以從貴也居鼎初有取新義曰鼎顛趾顛趾非鼎之正利在出否得妾非家之正利在得子且鼎繼革後必去其濁穢而後飪可亨也譬士乘風雲之會雖起魚鹽屠狗所不當問生化之功繫以成曰以其子無咎其事非正其理未悖也初以隂居三陽下為顛趾巽下為妾三陽在前為子陽有生物之德為無咎陽為貴應四為從貴九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也剛中履正義不苟從曰有實陽為實怨耦曰仇指四言之四折足為疾四處近臣位亢滿不正阻蔽二陽之進而擅權用事于鼎我之仇也九二操德守義懼四即之故獲吉天地間終能濟亨飪之治慎所之云者以其心之必將應五也夫人臣而所適應之正何尤之者九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也四阻之其道不得上行為耳革乾金離火乘之為革獲應而後吉曰方雨虧悔終吉言遇上而吉也鼎自離變離文明為雉膏反兊為不食忠嘉之德未獲信用於上曰雉膏不食互乾天氣下降隂承之為方雨雨則遇遇則悔虧為終吉甚矣小人為君子患而扼其進也故君子雖有美德莫獲展盡小人扼之而已人主可不深念哉失其義謂可舉鼎在鉉輔鉉在耳耳革而行塞則失協濟之義吁若三者非上以剛德力振之又安能有行於時而終保其吉也哉是以古之君子必貴夫汲引之助也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也四以離初處互乾上乾陽在下鼎實也四在三陽上所受過量其位不中才德皆不能勝任而竊居上位是以有覆餗之凶且四阻二陽之進而專應初棄陽從隂謂邪為正謂小人為君子恣其邪心上下莫之孚信卒敗鼎事固其宜也聖人以天下大器不可付之匪人而辨之宜早丁寧力言之使後世知以取訓不然禍至徐圖為社禝百姓憂莫可悔矣嗚呼觀大臣者必考其信蓋信不足則欺必將蔽賢援不肖以重違天人之心使如斯人而獲用幾何而不肇亂産禍邪四應初初以隂在下為折足離雉為餗互兌兌毁為覆餗兊澤為形渥渥沾濡貌夫鼎而覆餗則無以享上帝養聖賢至天下不得食矣凶其大哉六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也五位離中其德文明而又下有剛德臣為之正應以輔成其德舉天下之大而措之治有餘裕矣且天下治亂率由人君聽納之得失五得中而明虛已以聽是以九二剛賢樂為之用而吾之明德由此日新鼎治於是成焉曰鼎黃耳金鉉所以舉鼎金西方至堅之物其質不變而有常剛德之譬也蓋天下大器非剛莫舉五雖柔位乾剛承之柔進上行剛復往應故曰金鉉云互乾在下為金利貞蓋勉以貞固之道也嗚呼天下雖大其治不難致也以中聽以剛舉天下何患不治中故無不用之賢剛故無不舉之治鼎之為鼎殆將功用不窮矣上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也堯舜盡道進於帝矣道者何也皇極之中也玉為物溫潤而堅曰玉鉉蓋必有中和之道中和之化中和之治熙熙乎堯舜時矣金鉉舉天下以剛玉鉉舉天下以中帝王之治於此分上本乾位六五柔中進而承之粹美積中而德益盛業益大為玉鉉乾為玉為金剛柔節謂五承之也震下震上震亨震來􅊒􅊒笑言啞啞震驚百里不喪匕鬯彖曰震亨震來􅊒􅊒恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社禝以為祭主也上坤下震為復復其一在內雖動而靜至震則內外俱動矣四下應初是曰震來四動互坎中且有互艮體止動不寧其來也恐而陽氣奮達萬物以生其恐斯福曰震亨震動也在人吉凶悔吝所自生也動而畏天必獲後福􅊒動物之周旋觀視者陽之未升不無􅊒􅊒之虞􅊒􅊒憂也欽也畏也陽動于一浸至於泰中和之氣自是而達曰笑言啞啞陽動為笑言夫人君動而臨涖天下而能知天之畏常若天威咫尺肅恭之心不替斯須則德進身修行為天下式言為天下法薄海中外是則是效罔不知恱矣故曰震來􅊒􅊒恐致福也笑言啞啞後有則也此繼天為子事也震驚百里不喪匕鬯謂何震長子主器有動而代天之象不必専主儲二言之夫惟動而畏天欽誠所格逺邇聳服於守國何有生養之功自是興矣故曰不喪七鬯七鬯有中和美德而可以養人者也且君子之道本之身而施之人由吾省懼使逺邇皆知省懼天下遷善逺罪自我化之是為震驚震驚而止曰百里蓋由邇而逺其動不息所及者大自百里而及千萬里也惟震驚百里故德通於神鬼神歆享社稷有磐石之固宗廟以享子孫以保繫辭曰帝出乎震震動而有為時也乾坤功用付於震猶人君配天地而為之子也人君必上畏於天而後天下知畏於君而七鬯以守蓋畏天則德積於身動無過舉天下孰不肅畏而回心鄉道以從我之化哉震一變坤坤為邑為百里七以舉鼎實鬯鬱鬯也其色中互艮艮手互坎坎酒食為匕鬯象曰洊雷震君子以恐懼修省聖賢畏天之學肅肅祇祇如天威常在其上常在其左右而思以遷善悔過德如之何而不盛哉雷不一曰洊初九震來􅊒􅊒後笑言啞啞吉象曰震來􅊒􅊒恐致福也笑言啞啞後有則也初為震動主動以欽畏道不違天故天下取則而說在動後其理固然也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也剛動于下二以隂乘之在震處此甚難剛陽浸長必喪其資惟應五斯不失臣道之常七日爻之一氣周也居震動時為臣當一心誠意上應於君忠嘉乃著不然名實俱喪為天下後世罪人矣變離為貝五在互艮上為九陵九陽數貝所資之利也周公遇管蔡之變則然當是時厲其孰大六三震蘇蘇震行無眚象曰震蘇蘇位不當也在震必恐懼省巳盡力於誠一之德而後其動無過足以息變興利于震三以隂居下卦上有互艮體欽慎之心止矣惟震行不息以充其道眚乃亡也可不勉邪夫士君子立人之朝於震動有為時而不磨礪德業以趨赴功名㑹天地鬼神之責將及之而况於人乎眚得免哉蘇蘇志意舒緩貌也互艮自艮而震為震行九四震遂泥象曰震遂泥未光也處四隂中其道未申曰震遂泥君子必慎所與不然雖有剛動之才不克施為矣羣隂退聽其道始光也嗚呼大臣欲有為於天下莫先於親君子逺小人以輔助其剛德此而不圖何以享令望於天下後世哉互體坎坎為泥互艮隂陷之為未光六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也六五進則遇上而動極退則乘四而履剛往來震動之間有坎險體其理危甚而五以柔居震動中是能損巳修德汲汲兢兢不以天下為樂而以為已憂者中和之氣足以息強暴鎮浮俗不獨變故可盡弭而事業之大從此興矣宜聖人嘆嘉謂無失德于天下而可以大有為於震也互坎坎信為無喪嗚呼人君處震動時亦在夫躬至誠不息之德以勉其中中者天所與人所歸中則自身施之天下無不當於理而順於人易道尚中周成東征之後不敢自逸王業更昌宣遇災而懼王化復行二君以柔中得大無喪義云上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也上六以隂居互坎上處震動之極莫知所安故志窮於內目動於外若是者自守猶懼凶也況征乎且巳在震上有其位矣而心不得須臾寧凡以不得中道耳夫得中則誠誠則事事中理俯仰之間了無愧怍何索索矍矍之為哉震不于其躬于其鄰不待禍災及巳而後悔悟也視鄰以戒鄰之中我以為中斯無咎矣夫自一國以至於天下當震動擾攘之極才德不足以弭之儻非親比有德遷善悔過何以自保也婚媾有言謂三三正應也舍三從五為有言君子於震從其正而巳矣言奚恤乎隂居動極為索索為矍矍震目為視反艮為躬鄰謂三五有互坎體水㶁㶁成聲為有言艮下艮上艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光眀艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也乾陽中於坎止于艮動於震終終始始生化不窮艮其背不獲其身忘巳也隂為腹陽為背聖人止德於靜其心泰然與天地為一曰艮其背行其庭不見其人巳忘而物亦忘之也蓋靜而後能止我止而天下萬物莫不各止其所矣夫艮萬物潛冥時也聖人法之體道之靜天下事物莫或干焉曰不見其人聖人豈絶物而漠然不與事物接哉惟其深明夫物我之分內不知有巳視天下若無與是以因時而動酬酢萬變不失其中而可以參配天地生物之德天下莫窺其應用之跡也古人繡黻於裳兩已相背正取止靜之義以示至戒有天下者不可不知艮蓋止靜則性復於一耳目聲色之好不萌於心而纍德者去其出而臨涖天下若出於不得巳而莫不以禮法從事惠利之及于天下萬物豈可一二勝言哉艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相應也是以不獲其身行其庭不見其人無咎也申言艮之所以為艮也真止不繫動靜故行止因時而動靜當於道道以光明萬物屈於丑申於寅動以靜基而發生大德著見於外曰動靜不失其時其道光明聖人用艮於身而得夫真止之道動靜應天事業以大蓋由吾一性之光明已極夫天下之光明也堯之光被四表舜之重華協于帝皆自真止中來書稱堯安安傳稱舜幸能正生以正衆生其君臣相警戒亦曰安汝止堯舜蓋深得於易者且夫子固嘗用艮矣可仕則仕可止則止可久則久可速則速夫子之道昭明於天下後世亦以性止於內故動靜無往不當也艮其止止其所也上下敵應不相與也此以卦體論艮一陽止於外而在上二隂止於內而在下上下敵應無一不止其所安斯無咎之道互震坎為動靜陽上為光明坎險則止震動則行為時止時行象曰兼山艮君子以思不出其位夫山至靜而雲物興焉淵泉出焉草木生焉禽獸居焉貨財殖焉人止心於靜功用之及於天下殆未可測也君子觀艮象而安於所止是以心念至正有所不動動斯光矣思不出其位謂何為人子思孝為人臣思忠在士思學在朝廷思治在上思所以利下在下思所以事上夫子著思無邪之訓自艮發之若曰不出其分位是畎畝之間不容有拳拳思忠者邪兼山內外俱靜義艮土為思初六艮其趾無咎利永貞象曰艮其趾未失正也在艮而止於下夫何咎利永貞戒也蓋士君子進為於時以知止為本夫不知止鮮克有終者情欲內牽勢利外誘則無往能止心不知止而一肆其所行尚何惠利之及人哉是不可不貞於蚤而持以久也隂下為趾柔初而能止為未失正六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也其德中正又時位當可行莫或拯之而録録隨人曰不拯其隨眷眷然有不忘君心曰其心不快夫更相汲引臯夔盛事也九三履剛曽不下其聽於二惑哉若二之中德三或援之可以應五而有行於艮不拯若何隂居下為腓陽止其位為不拯互坎坎心病為不快蓋腓在下必股肱拯之然後能有行耳嗚呼君子之急於得君蓋欲以行道彼固非若小人求快其私志也二其忠於事君果於立事者哉九三艮其限列其夤厲薰心象曰艮其限危薰心也艮一陽居上陽止其所得止靜之道因而重之三位在四隂中有互坎互震體為艮其限列其夤厲薰心爻言變也身中曰限上下之氣所自達也三處內卦上不安分位有乘險以動壅塞正道之心於止靜失矣且小而一身之否大而天下之否莫不皆自夫上下之情氣不通而上下之情氣蔽隔不通以有物間之耳在人則邪氣為身害在天下則小人為天下害是也三剛過不正陷四隂中於艮蓋小人之雄者夫小人能為國家患必才過人者能之彼徒切切然經營於胸中日以壅塞正道為務事幾一發大而亡人之國小而亡已之身可不畏哉居下體上為限夾脊肉為夤陽止為列隂陽之氣窒不通為薰心九三以陽居陽譬小人之有才而能蔽塞賢路以危其君者是以取象若此心為君互坎為心六四艮其身無咎象曰艮其身止諸躬也艮以不獲其身為義蓋聖人忘巳以應天下之道也四位失厥中未能融物我為一方致力於修其身而巳用止於身自守以正動遵禮法曰艮其身四以隂居隂才德俱不足不能舉天下而盡納之正是未可任天下之重而應天下之變也於已無咎位則未稱聖人曰止諸躬謂躅躅然從事於一巳之修德未加于人耳雖然四知身之止而行以不息庶幾亦可以輔成其君之德故無咎陽在下為止諸躬蓋所止在一巳之辭六五艮其輔言有序悔亡象曰良其輔以中正也輔車之輔人主安危榮辱之機在言一失其序左右者得以窺伺而讒閒疑隙所生也況發號出令將以止天下之動安可不重慎其言以自貽悔哉夫惟止靜之功既成於性而中正之道內足於身發之於言言必嘗道悔其亡矣嗚呼人君不可不知止也久矣為君而不知止則事物惑之諂佞移之聲色蔽之玩好奪之殆將淪於不中不正之域故心不誠於言言不得其序今日是之明日非之雖紛紛多言誰其信從也哉艮六爻象皆取諸身人之相感與夫行止動靜之幾莫切於身爻位上下象體自具五下乘互震上止下動有頤象為輔互坎在下為言雖然聖人不言而化化在言前蓋其躬行之實有以感之於先不待言也五柔中僅能用中正以見於言而巳未可以語化化其大乎上九敦艮吉象曰敦艮之吉以厚終也因性之正而加止也淳之至也利物之德興矣其存心厚其行事亦厚內外兩盡而生養之功施於萬物配於天地臣道有終莫過於此蓋居止知止則少欲於身而公道行於天下利物之德可量也哉古人於晚節尤加慎畏夫失性不知止不能保厥終也良自坤索為敦艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸否之變坤三上行乾四下承男下女女歸之其歸以禮是謂女貞漸臣道也卦象女歸以貞為本爻象鴻漸則以其進有序為義互離在中離為日為明君明於上時可進矣進得位往有功也進以正可以正邦也言君子之進不茍也坤隂位巽下為得位仁德內止上通於君位與德稱利澤其大是以有功生物之功起於震巽為有功進以正謂上仁下順上下交孚以禮而進有回天格心之功無順旨阿諛之事君臣之間用無失德於天下而天下從其正曰進以正可以正邦其位剛得中也指五言之蓋君有剛中之德而後可與有為於時臣之進也恃此而巳如是而後能行其正而巽動不窮也終言漸進之道也艮七變為漸而艮在內巽在外漸以艮止立本以巽仁行之德止事順功業其興矣蓋人臣進為於時莫病乎躁動不知止方且得失利害交戰胸中尚焉能擇義而行以盡其愛物之仁哉知止則定定則能應度時而動徐以堯舜仁義之道啓沃君心鮮不入矣是以上得於君且能有所建立於天下功業之興無有窮巳也象曰山上有木漸君子以居賢德善俗德修之身可以芘人譬木在山山止於下木漸於上積非一日賢德必居乃能有化孟子曰居天下之廣居宅而行之之謂居賢德仁德也德非止乎仁善俗仁德之施也艮山為居巽風鼓舞為善俗初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也柔處艮下其進為難知難而厲義無茍合或者不察惟急於應是以有言處巳茍當言無傷也且士君子之進當致難於初不然幸進喜得外行險內愆義以重獲罪於天人君子不為也厲其貴哉漸自艮變坎離在中鴻水物其色文明飛有序來有時故漸六爻皆況鴻初位互坎下為干艮下為小子四居互兊中為有言干近水言厥進甚徐不敢輕也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也身安道行君子樂之食人之祿可以無愧矣二本坤中得臣道之正曰鴻漸于磐互坎為飲食艮中為磐磐石之安平者蓋五以剛中應二而二得行其志故身安志舒飲食衎衎衎衎舒和貌也孔子曰邦有道穀邦無道穀恥也若二其食粟於有道時而言聽計從歟不然何為衎然其和而了無愧怍于心也嗚呼士君子之進而志不得信于上下不肯一朝安居矣詩曰彼君子兮不素飱兮二之謂矣九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也易以夫婦象君臣三舍乾陽趨坤隂於道為逺且三四以相比而私親非以應相求也安能成生育功邪譬夫君臣之間本非志合道同而遇不以正鮮能成事矣利禦寇謂何四順比三緩急有相保勢而開國承家之君則非所當用也三四在卦體象歸女貞爻言其變聖人復以乾坤自否相交發君臣進合不以道示為臣大戒夫鴻漸于陸進得位矣而君背道臣無治功之實徒以順親比借曰禦寇利終非為國之利蓋君臣之遇不正固無以正天下也互離離南方為陸三以乾居互坎中坎險背道陽止於下為不復四自坤居互離中其性順麗無治功之實離復為婦孕坎盜為寇離坎不相濟為不育且坤進上行失母之道是以不育也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也位髙危道也履髙位而至安其惟順乎且君子所謂順順於道非順於事順於道故其感人深而君安之吾身亦以之安巽木為桷桷平柯也或云者得之難也公孫碩膚赤舄几几詩人詠周公四其是哉四有離明體順巽蓋所優為自坤之巽曰順以巽九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也間除道合生化之功於是成曰終莫之勝吉蓋二五得剛柔之中君臣皆有中德睽必合自二至五歷三位而應為三嵗三嵗不孕三與四實間之也艮上為陵三四位不中正為終莫之勝夫漸臣進之卦而二五居乾坤中得君臣正位志同道合卒得所願臣之獲進斯為盛矣上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也巽上何以為陸巽位東南陸也位在上而與三同曰陸美哉盛德事也蓋大臣以謙恭自處而禮行於身有安平之德無高亢之纍則進止施為皆有法度行之天下施之後世莫不視為楷式不可少易孰吉如之詩美周公鴻飛遵渚遵陸卒章曰是以有衮衣兮無以我公歸兮無使我心悲兮謂其儀刑可法也巽白為羽互離文明為儀為不可亂兊下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也說以動所歸妹也征凶位不當也無攸利柔乘剛也隂陽之義必始終相續然後生生化化其道不窮此歸妹設卦之旨也節之在禮守之在中故征凶不然說動不巳而失順靜之道何以能久惟臣之於君亦若是夫英才遇時有說動之志而不知謹禮揆中若後世漢賈生蔑視絳灌紛改制度事功亦何從而立哉宜征凶之所以致戒歟歸妹天地之大義也天地不交而萬物不生歸妹人之終始也聖人釋彖辭未有若此深切著明而特發其義者要使後世明天地之道察男女之情而用之於君臣之間可以長久而無不繼之弊也天地交為泰其至和之氣復相交於中為歸妹生化之理於是滋出生物之義斯為大聖人知泰必有否稽諸天地以究夫時運之所以終始而反復言之且坤位西南乾位西北兊居坤乾之間萬物至是而搖落歸根時也乾三上進坤四下承而發震兊二象是為歸妹自兊而往乾陽用事中男之坎少男之艮承父以大其生物之德終終始始無有窮極生理昌矣故夫夫婦君臣之道不繼則息禮之有娣妹所以求繼而人君於英才勤勤下之蓋將以為天下社禝長久無窮計也三四相易隂陽各失其位曰位不當夫失位而說動不巳則柔之所遇不一將舍震陽而有下從二剛之心生化之功或幾乎絶滅能無凶乎惟安靜不征然後獲所歸而終始之道得也象曰澤上有雷歸妹君子以永終知敝雷動澤應說感以正利物之功益大非若雷風之為恆也君子法之事圖厥終歸妹永終之道也內而一家外而天下生生化化其理惟均知敝云者謂不然則生化之理或幾夫絶滅耳初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也兊下為娣兊毁足為跛承二為能履為吉二以剛得中女子之貞者所承既貞何動不吉且士君子固有因大臣之援以遂其進為之志者斯亦分義之常惟適從之正乃能有行有為於時也慎哉九二眇能視利幽人之貞象曰利幽人之貞未變常也離為目為視兊毁之為眇二以互離居兊中若眇者之有見然其德本明其毁外至曰眇能視澤中為幽人夫九二以剛履柔位又得中用離明乘兊毁在歸妹為德勝而容貌不足動人者惟遵晦守貞待上之求斯不失其常聖人設此爻以明歸妹說動之極苟不知以德守貞失女子之常則無以保終獲吉于後也吁為人臣當歸妹時上動以求下說以應謂可進矣然一於進而不知守其常德以待際遇其勢必不能久合以取信於上且敷大利于下故士君子雖容貌閥閲不足動人苟有中德要當自晦君我信而後應之始能有為於天下儻說動不貞以至喪巳招辱何往而見其利也哉六三歸妹以須反歸以娣象曰歸妹以須未當也六三自坤四來歸妹所由以成卦而德位俱不正故發此象須賤妾星也織星貴須星賤譬夫士起微賤而進不以正何𥙷于用反歸以娣始為合禮反歸謂反從初也從初而得承二之正斯為當矣孟子有父母國人賤之之喻其須之類歟三麗於二陽之間為須九四歸妹愆期遲歸有時象曰愆期之志有待而行也四居兊上兊正秋為愆期至震而動為有時夫君子之心不一日忘天下豈固於進而難之哉顧進非其時則無以遇合而行其志是君子必艱於進震位東方君子至是可以行其仁矣六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也歸妹自泰來故五爻辭與泰六五同曰帝乙歸妹君謂二娣謂初乾為衣初二本乾體其象取袂袂飾禮容之服互體坎坎為月月幾望謂德明而守之以謙也婦事夫臣事君亢則纍夫小君有謙中之德而婦容則下於娣君子何貴哉貴夫德而已矣帝乙尊者稱尊者而曰乙取屈體待下義以貴行貴德也蓋五位在中故所歸者亦貴於中鳴呼自昔有天下者英才必相繼以進然後治功可永古人所以甚惡夫竊位而賢君禮賢求士心不敢須臾忽正謂此耳然人才以德為貴此帝乙歸妹之心儻舍德而取其文采容貌之末祗以害治非所以成治尚何所用於歸妹哉上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也不誠何以相與君臣上下夫婦率以此敗女謂三士女云者夫婦之道睽也震為竹筐竹為之其形方隂數也三以隂承震為無實兊為羊為金互坎在上為無血見上之不誠於三云上下不以誠遇何以久尚安能成生化之功邪序卦曰進必有所歸故受之以歸妹得其所歸者必大故受之以豐歸妹賢才迭進卦也彖辭首以天地不交則萬物不興為訓然則大臣而專祿固寵竊有其位而不汲汲於援引賢才以輔其上譬由天地既泰而其氣不復交也生生之理不幾於息而重違天地之心乎紫巖易傳卷五
