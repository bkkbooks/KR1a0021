body:
  text: 紫巖易傳卷十宋張浚撰讀易雜記甲已乙庚丙辛丁壬戊癸素問謂五天之氣經歴二十八宿同分為合太元曰一與六共宗二與七共朋三與八成友四與九同道五與五相守十干合數也一六水土數甲已為土乙庚九數乙庚為金三八十一數一水也丙辛為水四九十三數三木也丁壬為木五與五二五數二火也戊癸為火自昔論河洛圖書必曰河圖四十五數虚五為五十與大衍數合而不知河圖實五十有五數也夫大衍本之洛書而虚五至揲蓍則又用四十有九而虚一聖人用天地自然之數以立法不茍為也今考河圖縱橫數之皆十五而一九離坎子午位其數十二八坤艮寅申位其數十三七震兊卯酉位其數十四六巽乾已亥位其數十十在中矣合之不曰五十有五而何歟二七六九五一四三八易九六數也而六在九中然則易九數也伏犧卦數乾一坤八九也兊二艮七九也離四坎五九也震三巽六九也合之為三十六六六之數亦在中矣至文王易八卦定位乾坤之數九乾三得以包坤之六坤六不得包乾三震巽之數九坎離之數九艮兊之數九皆自其畫推之陽為一隂為二也合之亦為三十六或曰易數九而八卦之數止於八何也曰八卦九數也獨不觀八卦各守其位太極居中以運動八卦而神之乎或曰然則大衍之數五十其用四十有九四十有九七七數也易何獨用九哉曰十百千萬盈數也天地之數五十有五聖人不取地十盈數兩其五而取之貴變也大衍之數五十聖人用四十九而虚一四其十一其九而後蓍可揲大衍揲之以四用十始數也分二掛一歸竒則有九以周變乎中而後四象可成八卦可定易之數九不可過也過斯亢而不能變巽五坎六艮七坤兊乾伏犧乾一太極居中坤八文王離太極居中坎兊二離三震四巽震艮老陽老隂數六十少陽少隂數六十卦數也六十四卦去四正為六十老陽少隂數六十四六十四卦數也蓋八卦之體本一七其變為八八數八卦列而九行其中然則六十四卦四九四七之數也易以陽變莊子曰其數一二三四是也此正天地十數配以五則七八九六與十數皆全矣一四二三兩合之俱為五五固在其中列子曰易變而為一一變而為七七變而為九至九復歸一一太極也自少陽變老陽復歸大衍曰復歸一九復歸一還淳反樸體謙用虚象也甲乙壬癸乾坤納甲也甲乙木壬癸水何以屬之乾坤蓋天地生成之功在木水考諸四時之運可得也聖人以生成大功歸乾坤非五行所得専耳七八九六為四象何也七八九六五行成數有象可見天下之象從此出也故夫七八九六火木金水象也而五土在其中一二三四得五而其象著見則是天地十數皆具四象中矣聖人非用四用十也非用十用五十有五也七八九六五十有五全數也易有太極是生兩儀太極一也兩儀三之矣兩儀不必天地凡分為二者皆兩也分為二而七八九六之數成五行之象於是大著焉乾配甲壬坤配乙癸艮兊配丙丁坎離配戊己震巽配庚辛此納甲法也乾數一九而竒坤數二十而耦艮兊之數三四坎離之數五六震巽之數七八隨十干次第而立數也甲乙乾坤之始闡於仁也壬癸乾坤之終藏於智也火一土二木三金四水五為納音元數自揚子雲𤼵之子午甲已之數九丑未乙庚八寅申丙辛七夘酉丁壬六辰戌戊癸五己亥四以十干十二支配數五而數之餘一火數也餘二土數也餘三木數也餘四金數也餘五水數也六十甲子立矣火無聲水滅之而成聲土無聲火堅之而成聲水無聲土激之而成聲土數一金數七水數五火數三木數九為納音正數以庚子土論之一數也甲子金七數丙子水五數戊子火三數壬子木九數各以天元立數斯得矣乾一九坤四六艮三兊八坎十震七巽二離五退藏數也合而為五十五十有五之數在中矣乾一九合為十坤四六合為十艮震合為十巽兊合為十坎兩其五為十五十也離以五數居以虚位蓋天五行乎其中先天圖以乾之一加八卦數於其上若一與一為乾一與二為夬一與三為大有一與四為大壯一與五為小畜一與六為需一與七為大畜一與八為泰自乾而兊自兊而離自離而震自震而巽自巽而坎自坎而艮自艮而坤先天之象立矣故復之一交姤之一得一陽復之二交姤之二得二陽復之三交姤之三得四陽復之四交姤之四得八陽復之五交姤之五得十六陽復之上交姤之上得三十二陽其法下交而上施所謂一陽陽卦隂卦各一也畫而至復之一則為陽卦三十二矣惟姤亦然天數二十有五地數三十凡天地之數五十有五此天地之中數也而聖人用之何以知其然蓋二三五七九合之為天數而天數不過五二四六八十合之為地數而地數不過五天地竒耦生成數總之為十五其十而為五十五復因之為五十有五自然之數皆不離於中中故變變故其道不窮聖人體道之中以用數之中故達夫消息盈虚之理明夫吉凶禍福之幾審於動靜避就之方其修之於身見之於行事施之於天下莫不一本於中而易道以興卦爻自是作也一其五為七十二候二其五為三十六旬三其五為二十四氣用數者徃徃以五為宗參天一三五而為九也兩地二四而為六也三才之數兩之為地三之為天亦不出乎九六故曰參天兩地而倚數七十二候乾陽三十六坤隂三十六也乾四其九坤六其六易八卦之畫乾三坤六九也震五巽四九也坎五離四九也艮五兊四九也合之三十六矣火用事見六庚有庚伏之節何也曰此革之時也澤金離火相息不有土以救之金其滅矣故革之彖曰革而信之信土也夫金生於已歴六庚於離火旣相且王之時非未口中之承其母養其子何以使天地生化之功不絶邪故氣至未而庚金伏於土火不能害而後能裁成萬物也一陽數之始二隂數之始三陽數之次四隂數之次由一至九而五為數之中一陽生於子子屬北方水故一為水二隂生於未未屬南方火故二為火三陽生於寅寅屬東方木故三為木四隂生於酉酉屬西方金故四為金五陽生於辰五隂生於戌辰戌皆土故五為土楊元素陽為生數則隂為之成數隂為生數則陽為之成數所謂一隂一陽之謂道也生成之數配於十干甲為陽木數三乙為隂木數八丙為陽火數七丁為隂火數二庚為陽金數九辛為隂金數四壬為陽水數一癸為隂水數六戊己各以五為配配於四方東南陽也甲丙乙丁其數各合而為十西北隂也庚壬辛癸其數各合而為十土居中宫分王四季戊癸之數合而為十所謂大衍之數東少陽位南老陽位陽極生隂故離隂在其中西少隂位北老隂位隂極生陽故坎陽在其中元素乾之畫三而震坎艮之畫皆五坤之畫六而巽離兊之畫皆四合之為三十六分之為十八太元曰天數十八地數十八其本諸此乎歸竒於扐以象閏何也大衍用四十九老陽餘數十有三老隂餘數二十有五合之為三十八少陽餘數二十有一少隂餘數十有七合之亦為三十八乘以六爻之位則二百二十有八也凡術於筭者率以二百二十八為求閏之法蓋自然之紀如此厯法十九年為七閏七閏為一章四章為一蔀四蔀之數七十有六黃帝筭法總二十有三數謂一二三四五六七八九十百千萬億兆京垓垶息營反壤溝澗正載從壤已去有三等數法其下者十十變之中者萬萬變之上者億億變之乾九金成數也坤六土成數也乾坤之數衍錯而為八卦九六十五也七八亦十五也以五成之而合九六七八之生數皆為五五者數之中也坎離水火以隂陽造化之中居於南北而精神之運生物之功於是出矣坎離之用在八卦最為大震兊位東西長男配少女也生生化化之功終而復始隂陽相繼之道也先天圖兊以二巽以五居乾左右震以四艮以七居坤左右隂從陽陽從隂各以其性之自然也父母正位於上下而男女各以其配協成造化坎離位東西之中以運動出入之造化妙處生此夫震坎艮本坤體索乾得之巽離兊本乾體索坤得之隂陽相從其理然矣洪範九疇之數合之為四十五與河圖配也一五行水之生數也蓋五行生於水有水而後有火猶人之有精而神從之也木之著見金之堅剛土之敦實自此次第以生然則五行雖五合之水也天地渾冥之初惟水而已次二曰敬用五事敬禮也火之生數也次三曰農用八政木之生數也仁政於是行矣次四曰協用五紀稽之天道以成其性金之生數也次五曰建用皇極皇極土生數也次六曰乂用三德取水之成數而道之著見於德者也次七曰明用稽疑取火之成數而用其明以決疑也次八曰念用庶徵取木之成數而用其仁以修政也次九曰嚮用五福威用六極取金之成數而用其信以裁斷也乾天也寄用在坎水坤地也寄用在離火天之始數一一即水也地之始數二二即火也乾坤始用著在坎離吾不知乾坤之為水火乎水火之為乾坤乎氣以水行塊以火結雲徂於天日行乎地萬物以化文王之易退乾進坤坎離以正上下之位不徒然也坎離二卦具艮震兊巽之體然則五行之大者莫大於水火而金木土藏其中矣夫五行雖五其數則一洪範一五行一水數也而繫之五行蓋五行皆本於水人物之生自水中來及其死也復化而歸於水為火為木為金為土次第而成在人則精神筋脈骨肉之象也若考之於天地萬物莫不然矣九六為乾坤之數而通變不窮予固著論以辯之矣故凡易之爻數皆用九六以盡其變易道於是行也夫九六七八合之皆為十五十五者天地人之中數皇極之道在是聖人用九六而不用七八豈非九六得數之中而能變七八得數之中而不能變邪吾以知聖人之心惡夫執中無權舉一廢百者也學中於聖賢者可不盡心於此哉諸儒所𫝊變卦圖謂自復姤自臨遯自泰否變名不正矣故紛紛然持異同之論於其間也曷不曰自乾坤之一隂一陽而變至於三隂三陽乎夫乾坤成列而易行乎其中六十四卦皆乾坤錯變而成以盡天下萬物之理者也復姤臨遯泰否之名乾坤之見於時用者安可以易道變而特歸之於此數卦哉故夫不知九六之變者不可與論乾坤不知乾坤成列而易行乎其中者不可與論易乾坤者何也一隂一陽之道也繫辭曰易有太極是生兩儀兩儀生四象四象生八卦夫子之言豈不明甚矣乎一三五為九二四為六九六隂陽之生數而能變者合四九之數為三十有六合六六之數亦為三十有六然則乾坤一道耳隂陽一理耳用之於乾則健為九用之於坤則順為六若七八為隂陽之成數數窮而不能變聖人以是不用此天地萬物自然之理非聖人私也彼謂夫陽道主進故九為老陽隂道主退故六為老隂豈知夫聖人所以取九六者特在夫得隂陽之生數而能變乎九六之生數五也七八之生數亦五也夫隂陽之生數無所徃而不中矣中故變變故通重易立畫諸儒多以數推之而其理則未明也盍不以孔子之言而正之乎繫辭曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章嗚呼盡之矣聖人𤼵明天地之中道以示天下後世使知夫得中為吉為貞過中不及中為悔為吝為凶也然而聖人所謂中非有一定之體而過與不及之間又各有中道要在明權識變不悖於天地之理不拂於天下之心所以立已所以趨時曲折合道而罔不適於中生利萬物之功自此出也嗚呼非潛心於聖人而私僞盡去安足與論此哉文王之易六畫所以𤼵明天地人之中道也伏犧三之未得為中乎是不然數始於一分為二演而為三重而為六其實皆一也三之六之一未嘗不行其間一者何也中也伏犧畫以象天地人之設位天陽也地隂也一隂一陽合之而未嘗不中矣天剛也地柔也一剛一柔合之而未嘗不中矣人生於天地間處隂陽剛柔之中故聖賢修已之學可以配天地而裁成輔相其道人其大哉𫝊曰人受天地之中以生中所固有人自棄耳然則伏犧畫易中之本也文王重之中之用也參伍以變錯綜其數何也此論卦爻之數也卦爻之數本於大衍故揲蓍布卦三而成乾三而成坤因三而參之以盡其變合其數而六十四卦成七八九六數之成者也一二三四數之生者也因五而五之以盡其變合其數而老陽少陽老隂少隂迭相為用三百八十四爻具通其變而隂陽之運於天地者可得而稽矣故曰遂成天地之文極其數而隂陽之著於萬物者可得而考矣故曰遂定天下之象參之伍之所以肇數也錯之綜之所以成變也變者數之始數者變之終其實一也河圖天地自然之數伏犧未作易已有是數矣其後文王以八卦配之得無義乎夫河圖五位其中此太極也六為乾父道用事七為兊八為艮九為離蓋隂陽造化之理自少而中也至九復變為一坎配於離而生生不窮矣於是二為坤三為震四為巽母道復用事震巽生長萬物而㑹歸於太極之五終終始始迭運無窮其理豈不至微至妙哉河圖四正及中皆陽數經之也四維皆隂數緯之也陽數専於東北而備於西南甲巳化土木克土而土之氣達乙庚化金金克木而金之用利丙辛化水火克金而水以生也蓋陽火克隂金然後金得其融結成體丁壬化木水克火而木以生也戊癸化火土克水而火以盛也雜記乾坤說其唯聖人乎知進退存亡而不失其正者其惟聖人乎乾上之元所知者進而已存而已得而已晏然自謂如日當中而恣情悖理無不至是為失其正聖人知進有退之道存有亡之道得有失之道兢兢業業謹守厥中使不至亢於正得以後世承之天下可常治而百其𫝊也聖人知幾以中止亢吁處乾上之位有必悔之理而非聖人不可以變悔為吉也知至至之可與幾也知終終之可與存義也知德業以進修必大乾乾夕惕若厲而勉之曰可與幾幾者道之微謂可以盡乾之道也若夫居下卦之上而身履乾德義有不得一朝安處者矣惟乾乾夕惕若謹守臣道不敢少踰於禮曰可與存義存君之大義云耳乾六爻皆君道而爻盡變則又有君臣之訓若二五之水流濕火就躁雲從龍風從虎君臣事也乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉何謂也元亨利貞雖曰四德其實一也分為四德合之畢歸於乾其在五行金木水火象也金木水火皆本乎土之一氣故曰其實一也聖人明為之訓曰乾元者始而亨者也是亨在元中元實該乎亨利貞者性情也是利貞為元之動靜而元又該夫利貞何以謂利貞為元之動靜利情也動也貞性也靜也利以成物貞以止物獨不觀四時乎利成物於秋貞止物於冬一動一靜乾元之德以大而復歸於元矣元以利物為大此天地之心亨通之貞止之皆以成其利故曰乾始能以美利利天下不言所利大矣哉聖人釋利貞必曰性情者教學者以利物之功俾知所適從也夫性靜情動情動所以利物而動不以貞反以害物必也修性之靜然後情動於外者無不當物蒙其利故貞之於冬亨之於夏利之於秋元之功也學者法乾元之功欲以利物宜善用其貞初九潛龍勿用乾用皆龍天一之水為潛陽生於一中和之氣方萌於中靜以養之所以大其德也舜之居深山傅之築伊之耕吕之釣顔之陋巷皆勿用也而舜正得乾初象吁豈獨聖賢行身為然哉人之養生而不知乾精神莫之全一矣潛龍勿用陽在下也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也潛龍勿用下也潛龍勿用陽氣潛藏君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子勿用也九二見龍在田利見大人自一而二乾德著見惟存其誠化以之行利見大人可以興事造業而大有為於天下也一動而二為見處下卦中為田三畫其天地人象二地數也舜三徙成都在田也見龍在田德施普也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也見龍在田時舍也見龍在田天下文明君子學以聚之問以辯之寛以居之仁以行之易曰見龍在田利見大人君德也九三君子終日乾乾夕惕若厲无咎體剛用謙以大德業法天之時其健不已三在六位為人在時為辰其數十二終日也以乾承乾乾乾也數至三而變夕惕若懼不合於天也厲无咎有為不可易也終日乾乾反復道也九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣終日乾乾行事也終日乾乾與時偕行九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣九四或躍在淵无咎動以趨時動不妄動聖賢之心本以利物乾卦體實為天一之水生成數四應初而動上下進退惟恐失時勉德業之為趨事功之㑹四其志也或躍在淵進无咎也九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无常非離羣也君子進德修業欲及時也故无咎或躍在淵自試也或躍在淵乾道乃革九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎九五飛龍在天利見大人居中守正德與天同天下樂推其變莫測聖人得時一德者應飛龍在天大人造也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流溼火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也飛龍在天上治也飛龍在天乃位乎天德夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎上九亢龍有悔用九見羣龍无首吉數變至九而窮變而通之復歸於一聖人之難也必復其心復其性以復於道然後能不亢是以自後而人先之自下而人高之亢龍有悔盈不可久也用九天德不可為首也上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而无輔是以動而有悔也亢龍有悔窮之災也乾元用九天下治也亢龍有悔與時偕極乾元用九乃見天則亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎不易乎世不成乎名遯世无悶不見是而无悶一而不變不易乎世也靜而復本不成乎名也不為世移不為名遷潛養其一與道為居故遯世不見知不屑屑於心夫君子求知於天何悶之為樂則行之憂則違之有可樂之道無可憂之事道與事之判也久矣陽一為樂隂二為憂君子以成德為行德成於内而後行著於外庸言之信庸行之謹言行德之符君子養德於一動以渉世其言行足以格化云庸者常也言行之常不失信謹自然之符耳君子學以聚之問以辯之寛以居之仁以行之博學以窮天下之理審問以求聖賢之中寛足以得衆仁足以利物君德於是著矣故夫學問所以求諸已也寛仁所以施諸人也四者一不備皆不能以有化時舍也君子德成而動以時或躍在淵乾道乃革龍蟠於淵養其靜也或躍而動其勢必變在田出而著見也在淵則利澤將施矣同聲相應同氣相求水流濕火就燥雲從龍風從虎水火以氣求風雲以聲應水之於濕火之於燥以相制為用君臣交修之道也雲之於龍風之於虎以相感為用君臣㑹遇之道也五土數也二火數也乾元用九乃見天則天則之行未嘗有過惟其中而已聖人用九豈非存之以中哉聰明聖智而持以謙崇髙博大而守以約用九之道也君子以自強不息其不息者何事亦曰強於為善而已矣夫天運以健生利之德於是乎著君子遇時恵澤之及乎天下何可息也九四或躍在淵无咎德業俱進而存身至靜之地文王在岐心則然也九二見龍在田至君德也君德以正中為本惟正中則无所不通而順合天人之心正中何為而德哉其本起於言行之微其效著於家形於國行於天下故夫言信行謹君德以成閑邪存誠求諸内以養其德也善世不伐有諸外而用以謙也如是則德博而化矣君子以自強不息天行之大者莫如日月日月以健故其行不息其行不息故其明不息君子法天其自強如之何亦曰強於為善以充其生利萬物之心而已夫雞鳴而起孜孜為善舜之徒也舜惟自強於善天下均得其生雞鳴而起孜孜為利跖之徒也跖惟自暴自棄而果於為不善故天下均不得其生大哉乾乎以生物為大而君子勉之一身至誠之道足以配乾其用大矣夫乾九三不言龍九三位人道龍之在人變化不測不可以象見終日乾乾夕惕若厲无咎君子法乾之不息以充其德其所乾乾者何事德業之道修而已故能體乾在我動罔非乾正念旣存邪志自去德積於身而業成於外嗚呼盛矣乾九三獨曰人事知乾一為天乾二為地乾三為人若夫乾之四則非人矣故曰上不在天下不在田中不在人君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事體仁則與仁為一全體在仁人誰不信服故足以長人嘉㑹則仁義禮知充塞於心動無不當理矣故足以合禮義以制物而所主在利義其有不和知以建功而所守在貞事其有不幹幹者何事之所自立也和者何義無不得其宜也君子以厚德載物何也善論大臣者必曰力量何如非力固不足以任天下之重而所以養成其力量者在厚德而已矣德何為而厚乎曰至謙至恭至虚至正德之所以厚也若是也天與之人說之合天人之助以立乎人之朝其於在物也何有坤體柔順謙恭虚正所自生也君子法之以厚其德莊子曰水之積也不厚則其負大舟也無力風之積也不厚則其負大翼也無力厚其貴乎先迷後得主說者謂君唱臣和先之則迷信是說也君唱而非其道從而隨之可乎先迷者何謂夫道未合誠未恪而區區然強之以難從行其所不可行君胡為而信之天下胡為而化之將身之不能保何以恵利天下也故曰先迷失道後順得常孟子曰一正君而國定懼先迷也君正而順可行矣西南得朋乃與類行東北喪朋乃終有慶君造始臣代終率朋類以竭力於下而功則歸之君代終之道也故夫喪朋者非謂絶朋類而不用也初六履霜堅氷至初六姤之一隂也一隂方生已有氷堅之漸豈非其勢旣盛其事必至哉甚矣夫小人之不可用事於内而恃之以為心腹也彼其得君於内是將變亂是非以邪害正馴至無疑矣夫人君不善之心生則不善之言入不善之言入則不善之人至應捷影響不約而合一氣之所召一聲之所感也有天下者誠能慎其心術之微無使流入於不善小人何自而投間乘隙以幸其得用乎聖人於坤之初六丁寧訓告甚嚴且曰積善之家必有餘慶積不善之家必有餘殃以明堅氷之禍本自夫所積善不善之間而臣子之為大惡者實由夫君父之心有以啟而致之於先也不然彼安得而在吾君之左右以養成其病以竊盜其柄邪詩云戰戰兢兢如臨深淵如履薄氷亦有意夫使知辯之於早者也六二直方大不習无不利坤有靜厚之德而六二得中於内所養博大矣故動而見於事業其直可以上通於天其方可以下法於地直自敬來雖闇室不欺也方自義來雖死生不變也吁為臣若此安有欺天賣國之事哉事業之大復何疑也不習无不利君子以敬義而行乎内外其設施舉措罔不契合於天人之心矣何所疑而復習之邪一為仁二為義二火數為敬六三含章可貞或從王事无成有終書曰爾有嘉謀嘉猷則入告爾后於内爾乃順之於外曰斯謀斯猷惟我后之徳古人非徒為謙謹之末節也道不通於君君心未信之而欲急急然行其道於外難乎格化矣坤六三之含章蓋守臣道之貞而欲推其美而告之君使君心感悟而自行之吾知謹守臣職以從於王事而已大臣諸侯之事也故曰隂雖有美含之以從王事弗敢成也如是則利澤及於天下萬物而其智光大矣周公之告君陳亦曰臣人咸若時惟良顯哉其以是夫六四括囊无咎无譽坤臣道也六五得人臣正位而四為未得位得時者否泰之分繫乎四之用否其責任甚大進而至五則𤼵為事業有不可掩者矣括囊蓋内充其德靜以待時之義漢儒乃以囊括不言為訓豈不陋哉坤在内為括囊孔子釋之曰蓋言謹也謹於養德謹於正也論乾坤剛柔剛陽也健也君子也柔隂也順也小人也然則坤何以取於純柔哉曰乾坤之剛柔剛柔之中也剛柔之正也剛柔之見於用者也諸儒之論剛柔則失之矣夫君道主剛而其動也用柔故乾動則為坤矣臣道主柔而其動也用剛故坤動則為乾矣故夫必欲修德必欲立政必欲逺聲色必欲去小人必欲配帝王必欲定社稷必欲安民人必欲服四夷乾之剛也君得之於内而主斷者也至於禮臣下下賢才懐中國撫四鄰愛百姓恤孤寡賤刑貴德舍己從人其動莫非柔矣恭欽之誠若天威臨之不敢唱始不敢先事謹禮法循分守安進退守職業坤之柔也臣得之於内而有承者也至於犯顔逆㫖捐軀致命可以託六尺之孤可以寄百里之命可殺不可辱可困不可使為不義持忠義之大訓弭患難於當時斷大計定大疑正色立朝華夷讋服其動莫非剛矣故夫善觀易者必觀剛柔之中而究其所以用則六十四卦三百八十四爻之或得或失或悔或吝或吉或凶可以類推矣故夫不知剛柔之中正與夫見於用者不可與言易也論九六九六之為老陽老隂何也變也九六何以能變曰一三五合之為九陽之生數也二四合之為六隂之生數也九六為隂陽生數之極是曰老隂老陽若七八則隂陽之數不純莫之能變矣故夫數備於三中於六究於九九可以兼六見乾坤之畫而六不可以兼九若其變則相通而不窮焉四九三十六也六六亦三十六也九六之數總之則一變之則通非若七八之不可一而通也然則老隂老陽云者取其隂陽生數之純而通變也健順動入陷麗止說八卦之所以生利萬物而見於其性者然也坎之為陷何取於易乎曰坎以乾一陽而變乎坤二隂之間陽養其中以陷乎險非真陷也中微則陷中養則出八卦坎離之用最大自坎而艮自艮而震中動以利生物之功著矣用不亦大哉故乾位西北養中於坎動化流出天地无為嵗功成焉无妄災也明夷誅也聖人於二卦何辭之嚴且切歟曰无妄不以貞是其動也非有利天下心適足以害天下獲罪於天大矣故曰災若夫明夷而傷其明雖在君位有可誅之道孟子曰聞誅一夫紂矣未聞弑君也吁人君安可忽逆耳之論自傷其明德哉君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭何也以象考之五在外二在内出處不同也五以陽動二以隂靜語黙不同也而二五各得中位有中直之道故曰同心金乾象也變而為離曰斷金且互體有兊毁象斷之義也互兊為言互巽巽潔齊為臭曰其臭如蘭夫二五有中直相與象三四間之三伏戎四乘墉其包藏恃險之心將流毒於天下而二五中直之道足以消其強梗制其堅悍使天下卒以安靜而措天下於無事之域誠之所格者大矣故曰二人同心其利斷金若夫同心之言其臭如蘭則𤼵號施令而民恱懌之象德言之足以感動於人心也不然易之為易將無所見於實用而聖人繫易之辭徒為空言而已聖人以此洗心退藏於宻吉凶與民同患何也蓍卦爻告人以吉凶之道著矣備矣如是而吉如是而凶如是而可以避凶如是而可以趨吉用靜用作不可以有違也小貞大貞不可以有常也過中得中不可以有差也若是者固非一事矣聖人何營營思慮其間哉一念之私毫髪不起於胷中而退藏於至虚至公至正之地為其所當為行其所當行施為動靜固不可易而天下蒙其恵利焉是其所以與民同患也且凶固聖人所甚憂矣而吉何為而與民同患曰天下之難常生於治安吉之同患又有大於憂聖人之憂天下豈一日而忘之哉詩曰上天之載云云退藏於宻文王盡之矣周流六虚何也六位惟變所適而本無定體者也故繼之曰上下無常剛柔相易不可為典要惟變所適易道猶太虚聖人兼三才而兩之以六畫盡其變而太虚不易之理於是乎不可逃生利萬物之功無餘藴矣履德之基謙德之柄復德之本履者坤之少隂三索乾於内而成卦者也夫乾父道也少隂之於父也說而誠此君子至誠以法天之學也謙者乾之少陽三索坤於内而成卦者也夫坤母道也少陽之於母也止而順此君子至止以法地之學也君子之學法天地然後能復其性以反於初利物功用於是興矣故復之為卦一陽動乎五隂之下至靜之中𤼵生萬物其利豈不大哉君子誠正之學功成於是用著於是一隂一陽之謂道繼之者善也成之者性也一隂一陽非謂隂陽相配也道之在隂亦一在陽亦一曰一隂一陽一者何也中也中者何也無不通無不當無不正也道之在隂陽無不得其中生利萬物之功則日興也繼之者善凡人為不善者皆非道也古之論君人者必曰有道無道云其善不善之間歟成之者性性本具道人自離之修其性則全於道而無不善矣子思之中庸明此者也洪範皇極陳此者也和順於道德而理於義窮理盡性以至於命自道術為天下裂諸子百家之書紛然並出言天者主於虚無言道者棄夫仁義言儉者不知約之以禮言刑者不知本之以德為己者不知有人為人者不知有己道德之中於斯失之聖人作易本諸心體諸天通諸神著諸用無徃而不得其中故能和順道德而天人之道罔不協備用之於一身一身得其宜用之一家一家得其宜用之天下天下得其宜纎悉小大一一有倫為用妙矣象數旣立天下之理於是而窮卦爻旣成天下之性於是而盡從之而吉違之而凶順之而福逆之而禍吾不知天命之為易易之為天命也至於命易於是無餘藴學者學易學此而已矣始於窮理終於盡性命固在我孔子五十知天命惟孔子能體易大畜時也无妄災也聖人之言有不窮之意為天下後世士君子之訓甚厚也大畜羣陽得路以升進於上蓋有剛德之君臣乾剛在内而能用柔以來天下之賢聖人斷然曰時謂夫君臣遇合決非偶然有天數存於其間聖人所以立天道也若夫无妄而曰災匪徒有眚固災也剛自外也其動雖貞弔民伐罪所殘害多然則湯武之師其出於不得已乎其聖人之所未甚深許乎謂无妄為災聖人所以立人道也謙輕而豫怠也謙之失在輕豫之失在怠聖人正救其失而謙之德豫之功益光大矣紫巖易傳卷十
