body:
  text: 紫巖易傳易類提要臣等謹案紫巖易傳十卷宋張浚撰紫巖者浚自號也其曽孫獻之跋云忠獻公潛心於易嘗為之傳前後兩著稿親題第二稿云此本改正處極多紹興戊寅四月六日某書始為定本矣獻之嘗繕録之附以讀易雜説通為十卷藏之於家據此則雜説一卷似獻之所續附者然考獻之是跋在嘉定庚辰而朱子作浚行狀已稱有易解及雜説共十卷則獻之特繕録而已未嘗編次也其書立言醇粹凡説隂陽動靜皆適於義理之正末一卷即所謂雜説胡一桂議其専主劉牧今觀所論河圖信然朱子不取牧説而作浚行狀但稱尤深於易春秋論孟不言其易出於牧殆諱之歟乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f5e48af7da17dff612d344b6accb482100d369850f58803b1a3a98ec7df136d7
