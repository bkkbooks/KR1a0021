body:
  text: 紫巖易𫝊易𩔖提要臣等謹案紫巖易傳十卷宋張浚撰紫巖者浚自號也其曽孫獻之跋云忠獻公潛心於易嘗為之傳前後兩著稿親題第二稿云此本改正處極多紹興戊寅四月六日某書始為定本矣獻之嘗繕録之附以讀易襍説通為十卷藏之於家據此則襍説一卷似獻之所續附者然考獻之是跋在嘉定庚辰而朱子作浚行狀已稱有易解及襍説共十卷則獻之特繕録而已未嘗編次也其書立言醇粹凡説隂陽動静皆適於義理之正末一卷即所謂襍説胡一桂議其専主劉牧今觀所論河圖信然朱子不取牧説而作浚行狀但稱尤深於易春秋論孟不言其易出於牧殆諱之歟乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6fcb803a34d6c372b6bcd0c412c16d4cc0499a442fc9ef9273cd24af590a1f46
