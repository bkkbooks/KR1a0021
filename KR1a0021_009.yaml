body:
  text: 紫巖易傳卷九宋張浚撰說卦昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命天地之神明聖人之神明也天地贊聖人以生蓍聖人發神明之妙用參天九之也兩地六之也九六之數定而易道行矣獨取諸九六立乾坤之數曰倚數云觀變隂陽觀蓍之變也發揮剛柔揆變之體也道德至奥義其著見者焉性理至微命其一定者焉易具太極之中道德合而為一初非淪於太髙失之矯拂而不可行於天下者故辭之所指無在不宜義其理㦲是故窮天地萬物之理若隱若顯皆不得遁其情盡已之性以盡人之性盡人之性以盡物之性盡物之性可以贊天地之化育天地萬物吉凶死生之數皆繫於易順易則治悖易則亂易之為道不亦妙乎昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章性命之理中道也文王兼三才以發太極之藴三極之道於是而著吉凶始太明於天下得中則吉失中則凶莫非理之自然故曰將以順性命之理焉分隂分陽天地人之隂陽也迭用柔剛九六交錯之柔剛也畫言其數位言其序天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也伏犧氏以數畫八卦自一至八九實周流乎其間天地定位上下分也山澤通氣氣之感也雷風相薄勢之激也水火不相射性之反也此八物者或分或感或激或反相與致用於宇宙之内而萬物以成八卦之錯錯此而已八卦相錯而八物之象通變不窮時有往來道則一致考千古於目睫之前明百世於指掌之近皆不離夫六十四卦中易之逆數道通神矣然聖人用易能逆而變之非特逆知其吉凶而已也雷以動之風以散之雨以潤之日以暄之艮以止之兊以說之乾以君之坤以藏之動散潤暄見於用故以物言止說君藏本於道故以卦言動之於始藏之於終始終生化莫知紀極是易之神也帝出乎震齊乎巽相見乎離致役乎坤說言乎兊戰乎乾勞乎坎成言乎艮帝之出也萬物莫不出帝與萬物非一非二舍萬物而帝之為神亦不可得而見矣說萬物終始萬物非艮兊得專之故曰言云萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所說也故曰說言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮木落糞本萬物致養於坤其孰不然萬物役役皆為坤之役自有宇宙一息不停夫坤何為者邪神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也帝與萬物相終始有神以運動乎其中至神功用寄於六子動之撓之燥之說之潤之終始之萬物之生成悉繫於兹其序則文王八卦之序也澤不足以盡說物之道而萬物所甚說莫過於澤前言兊以說之謂澤不足以盡說也若夫終萬物始萬物艮實司其任山靜而已烏能成始終於一致㢤水火相逮相資以致用也雷風不相悖相成以施化也山澤通氣相感以利物也變化之道於是而興神之妙物有不可致之者此也自天地定位而下本八卦相錯者言之自水火相逮而下本六子之變化者言之是以其辭之不同乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊說也凡此皆隂陽自然之性坎陷於隂有出險之道不終陷也故曰習坎云乾為馬坤為牛震為龍巽為鷄坎為豕離為雉艮為狗兊為羊馬況健牛況順龍況變動巽何以為鷄鷄知時巽之權也坎何以為豕豕北方至隂之物其色黒其位為智也離之雉文明也艮之狗善守也兊之羊說順也乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口乾為首唱之於始也坤為腹容之於終也震為足有行也巽為股隨震也震動於下巽則權之坎為耳天一所通也離為目地二所中也艮為手止也兊為口說也乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女乾索於坤為男陽為主也坤索於乾為女隂為主也此隂陽相感之義乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果金乾體也乾何以玉以其體常而盡變故歟為寒氷位在亥前卦起於子為大赤至陽赫赫為良馬健而有順體為駁馬五色備為木果生生不窮坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒為布萬物芒芒廣無不被為釜熟物而化之為吝嗇陽動施隂翕靜為子母牛至順之性無時而已為文陽一隂二錯雜為文山川草木炳然於下為衆為柄萬物依坤以出入生物之柄在坤其於地也為黒至隂之色震為雷為龍為元黃為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮為龍蒼龍直東方變化不常為元黃坤體一索於乾為震得元黃之正云為敷萬物敷生為大塗物自震出為蒼筤竹以色取陽動於一貫四時而不改為萑葦蔓行相連其生不窮一陽之動似之其於馬也為善鳴乾動於下為馵足為作足後足左白曰馵震地在左而德配於巽其於稼也為反生一陽之復則然巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦為繩直風之鼓物甲拆齊一巽之繩直取齊一也為工巽以入之惟工則然為白萬物潔齊為長為髙乾陽在上巽順而升為進退柔道多疑巽一索於乾以柔遇剛進退其心為不果果斷非用權事為臭物致潔則香逺聞其於人也為寡髪為廣顙隂不敷於上故寡髪二陽廣顙象為多白眼離為目巽一隂在下萬物潔齊而未相見也為近利市三倍巽以權之也坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曵其於輿也為多眚為通為月為盜其於木也為堅多心為水為溝瀆泉始達為隱伏陽陷於隂為矯輮水之行也其象如此為弓輪矯輮之功為加憂為心病為耳痛陽陷之應為血卦為赤至陽生於坎中赤陽正色為美脊為亟心乾陽居中陽健而動為下首水性趨下為薄蹄一隂處於下為曳陽陷而隂病之其於輿也為多眚坤為大輿坎中剛而上下俱柔失坤之性剛陷必拆為通習坎故通為盜隂始陷陽其情貪其中險其於木也為堅多心剛在中離為火為日為電為中女為甲冑為戈兵其於人也為大腹為乾卦為鼈為蠏為蠃為蚌為龜其於木也為科上槁為甲胄為戈兵火炎兵象也甲冑取外剛義為大腹中虚有容為科上槁火性進上艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節為山為徑路山徑象陽之在上萬物之出入至艮而止所由行者鮮矣為小石有動止之象焉為門闕萬物出入之機為果蓏果蓏草木之實陽止於上故云為閽寺職主禁止為狗善守為鼠晝伏夜動艮次坎故云為黔喙之屬陽元在前為堅多節陽止在上二隂承之兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊為巫巫之通神以言為說為毁折隂毁居上為附決少隂之性為剛鹵兊居西方其性堅剛鹵澤水之結也序卦有天地然後萬物生焉盈天地之間者惟萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稺也物稺不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜天下順比不畜則放臣之畜君其可無邪物畜然後有禮故受之以履履而泰然後安故受之以泰由我之泰致天下之泰禮其貴乎人君行禮君子進矣行禮者其德剛泰者通也物不可以終通故受之以否知泰必有否而兢兢勉修厥德泰可長也物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨天下之事至於陵夷大壞自恱豫中來豫而隨隨而蠱理之必然也非仁心動於内而有事於天下何以致剛陽之浸長而治道以大哉臨者大也物大然後可觀故受之以觀陽德盛大天下觀化可觀而後有所合故受之以噬嗑嗚呼君人而欲除大間於天下非德修於内黙有以動天下心閒固未易除矣嗑者合也物不可以茍合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剥剥者剥也物不可以終盡剥窮上反下故受之以復致飾亨盡馴致於剥千萬世一轍也三代而下喜文華忽敦樸略介冑恬不知變此何理哉此何理哉復則不妄矣故受之以无妄有无妄然後可畜故受之以大畜畜賢莫大於誠物畜然後可養故受之以頤頤者養也不養則不可動故受之以大過德之剛中非養莫成物不可以終過故受之以坎剛過於中其失必陷沈濳其剛乃能有濟中其大哉坎者陷也坎之為卦陽雖得中二隂陷之取諸習坎中德貴大德大而後可以出險陷必有所麗故受之以離離者麗也陽德旣充孚於上下隂乃麗焉有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯嗟夫父子君臣夫婦之道不明於天下天下不流入於夷狄禽獸者幾希矣嗟夫有父子君臣夫婦之名而欽之不至誠之不盡忠之不竭信之不立和之不生其與無之何異哉治道之不興所由來久矣不有君子獲用於時而得行其道風俗豈易變歟夫婦之道不可以不久也故受之以恒恒者久也物不可以久居其所故受之以遯遯者退也物不可以終遯故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反其家故受之以家人德之昬明自家始家道正而明家道不正而昬明德之傷不反諸家其能治乎家道窮必乖故受之以睽二女同居志不同行睽為卦則然家道之窮其惟好色歟先王謹禮家道日昌睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損荒怠安佚亂所由生厲精為治周宣所以中興也損而不已必益故受之以益損己獲益天之道也行之不力徒損無益益而不已必決故受之以夬德盛者賢必助不決奚為夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妺得其所歸者必大故受之以豐漸而受之以歸妺歸妹受之以豐賢者獲進得所歸治道亨大可期也必取諸歸妺豈非英才迭進之象歟豐者大也窮大者必失其居故受之以旅旅而无所容故受之以巽亂生於治窮奢極侈致之也居豐用約非有德之君孰能行之不然耳目心志之閒鮮不為讒佞所侈惑矣巽者入也入而後說之故受之以兊兊者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節渙離散之卦離散之初人情未通不為之節何以能久節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以旣濟物不可窮也故受之以未濟終焉雜卦乾剛坤柔比樂師憂聖人無憂樂與天下同其憂樂夫行師以除天下之害而聖人憂之何哉豈非兵凶器戰危事人命至重有不可不憂者邪嗚呼德失而後有師師非先王得已也臨觀之義或與或求臨二陽在下四隂與之與之者在上觀二陽在上四隂求之求之者在下嗚呼剛德之貴於人也久矣夫屯見而不失其居萬物盈於天地間方屯之初形色著見各以類居屯之利見侯因所居而治之也蒙雜而著蒙者蒙也蒙故雜而性之清明與蒙俱存蒙去而著者見矣震起也艮止也陽起於下而止於上萬物隨之損益盛衰之始也損自泰來益自否來盛衰之㡬見於損益非損則泰必有衰矣非益則否必有盛矣此易之變通而聖人所以扶治弭亂獲自天之祐也大畜時也无妄災也人君剛德之修健為之正是謂千載之遇此時也非人力所能為也是以君子貴逢時无妄本於自然之謂非所宜得而得非所宜有而有為无妄天實使之聖人則以為災云萃聚而升不來也謙輕而豫怠也謙之失輕豫之失怠噬嗑食也賁无色也兊見而巽伏也隨无故也蠱則飭也剥爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恒久也渙離也節止也解緩也蹇難也睽外也家人内也家道乖於内睽孤見於外易始乾坤禮始敬詩始二南書始二女畏睽也其事莫不以正身正家為本堯典曰我其試哉意蓋有在矣否泰反其類也大壯則止遯則退也大有衆也賢者歸則天下歸之矣同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頤養正也旣濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也夬決而乾成易道通矣小人之憂其必思所以害君子君子守正積德詎可一日已邪紫巖易傳卷九
