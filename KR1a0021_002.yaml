body:
  text: 紫巖易傳卷二宋張浚撰上經乾下坤上泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也坤變而乾隂往於外陽來於內隂小陽大君子小人之分也大來何以為泰大來則自君及天下無不正至格天地裕萬物安中國服四夷宜其泰然則人君盍為而能致大者之來其必自心始人君之心剛於內則君子之有剛德者並進夫君之心若曰我之社稷將有以保之我之百姓將有以利之吾心勃然改不善而從其為善正念一興天地鬼神知之君子聞風孰不改圖而來乎使君而無有是念是陽氣未復天未欲泰也君子知夫道之不同不肯違天以幸萬一得以危其身以敗亂天下國家陽自內來一為復二為臨三為泰至泰剛德成矣剛內為泰其心剛也於是剛德之君子悉處於內為心腹在要職者莫非君子罔有小人間之夫為人君而剛內柔外執德之中皇極之道斯為盡是必寡欲而無私必以社稷天下為巳憂必能斷而不惑於衆說小人將何所容跡哉往來自此判然則言致泰者在君心之剛而巳泰治功利及天地萬物曰吉亨泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也申言泰之所以為泰也君子類進發號施令罔有不順人心者人心悅歸和氣可致故天地交而萬物通方春三陽用事天地之氣騰降於上下而萬物莫不奮達交通之應也而天地之氣得其正實自夫君子獲用於時何謂上下交而其志同君臣之志在天下而不在身是為志同上下交云者君之心即臣心臣之心即君心相與以誠讒邪莫閒是為交二事皆國有君子致之故曰則是天地交而萬物通也上下交而其志同也內陽外隂隂陽得正也內健外順君臣得體也君用健臣用順事無不濟內君子而外小人君子小人各當其位也聖人之於小人也外而巳如曰必絶棄之則姦心滋生為吾治害外之所以俟其化聖人之心仁矣大矣夫象曰天地交泰后以財成天地之道輔相天地之宜以左右民君子並進治道可行正心術而五行得其序敷政教而萬物得其性自然民協於中致力於天地是致力於民也夫財成本自君心心正則身正身正則所為罔不正固有以格天地而均節其道其用微矣若夫輔相則見於政教之跡因天下萬物之宜而還以導之也箕子為武王陳洪範自五行至五福六極財成輔相之道畢備其中其曰斂時五福用敷錫厥庶民凡厥庶民惟汝極錫汝保極所以左右民者至矣坤衆在外為民且陽下隂上二氣交感各得其中陽為左隂為右左右之而使歸中也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也何取於茅以況君子有潔白正直之德而可以通神明也君子不後時以縮在泰必類而進為道為天下也曰志在外且上有柔中之君下有同志之賢進必合合必澤加於人曰征吉乾初變巽為茅三陽連進為拔茅為彚初應四而二剛俱上應曰以其彚征九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚於中行以光大也二有乾剛之德其容如天其公如天中道上通君心應之包荒用馮河容也不遐遺朋亡公也包荒則不才者勉馮河用則强暴者化不遐遺朋亡則志仁身正臣道洪矣泰治之時君臣各得其志為大臣者孰不以天下為心且以天下為公哉二剛中知保治之難汲汲乎荒之包馮河之用不以逺棄不以近比所以作成人才杜絶私黨之意甚備宜得尚于中行之君也嘗考二之心處至治而兢兢若未治惟恐一夫失所一才見棄一事不公有以害吾治其為中也至矣事業豈不從而光大哉坤隂在上包荒象三比衆隂二承之用馮河象隂荒也隂在外包也陽剛不中馮河也應坤為不遐遺為朋亡乾中為光大九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也天地氣數中則平過中必變人事亦然聖人知幾示訓於泰觀山川陵谷之遷變日月星辰之推移平陂往復故不能逃氣數自然也夫治至於泰其君必驕其臣必怠其德必衰其政必慢斯亦自然之理不有剛德君子知艱守正不恤一巳利害而盡誠以輔道其君俾知夫以泰為憂不以為樂鮮不顚覆於後也九三雖剛過不中而有乾健震動不息之體故勉以孚若曰盡在我之誠以啓迪弼正而不恤其他則泰治可長保也夫國家尊榮君子食人之祿可以無愧而道行志得利澤加施矣曰于食有福乾坤相交而中進退盈虛自此分平陂往復所由生也互兌兌口為食陽為福互體震震以恐致福六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也三陽內升君子盛矣其道足以格小人而信之俾率類從化君子為天下圖何其逺乎夫小人未嘗一日無於世使之中心樂從君子之化是小人皆為君子也泰至是而盛四自內為三隂首下從羣陽其順若鳥飛有翩翩勢小人降心從君子象也知君子有可信之道其心若一不戒以孚安有害治於後者哉隂下順為翩翩隂虛為不富三隂為鄰隂從陽為孚反兌為不戒六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也帝乙古賢王稱也在易象取謙以下下之義甲十日長乙次也舍甲之剛用乙之柔非賢德之君孰能為之歸妹謂何應九二而并與三陽下之也三陽而謂之妹三陽自坤變有妹象也祉謂何福也治盛而天降之休曰祉六五為泰主以柔用中不謂既治而一日忘下賢廣覽博取惟恐英才一或沉於下其於天下之仁有加無巳於此見其心矣嗚呼賢者民之命天下賴以生也至治而不忘下賢英才繼進如妹之歸生化之功此為大曰以祉元吉云以仁而獲吉之大也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也在泰以隂居上剛德不足而權移於下衆失於內否其反矣城復失衆也失衆何以守邦況用師乎勿用師云者當反已而自治耳自邑告命命自下出也命不由君其吝為貞且天下之亂莫大於權臣擅命而政出多門讀雨無正之詩可以槩見此最泰極之大戒嗟夫治至泰極荒淫驕奢所自生也荒淫驕奢之主命必移於臣而天下之心失矣內何以守外何以戰哉坤土為城復互兌互巽為告命坤下乾上否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也否三隂在內其象有二人君剛德消於內一象也小人柔邪者畢處要位而擅事於內二象也蓋人君剛德既消則小人乘閒緣類而進莫可止遏矣孰為人君之剛逺聲色輕貨利捨一巳之樂先百姓之憂君之剛也否將有蔑貞之凶君子卷道而懷可也故不利君子貞君子不用國非國矣天地不交是隂陽錯亂萬物不得遂其生也上下不交是君臣各有心其道不通為君者驕亢於上為臣者蔽塞於下綱紀法度蕩然不復有也此猶可以為國乎否泰內外卦體同也泰曰健順至否易之為柔剛蓋君臣失德巳見於事朝廷微弱諸臣强大中國微弱四夷强大內柔外剛義也嗟乎君子一不用於時大而天地細而萬物俱不得其理且君臣各有心志不在天下曰有邦與無邦同夫君子為國輕重如此而世主貪一己私欲踈逺剛賢終莫悟也嗟乎坤內邦邑象也否以乾變乾君道也而坤隂變其內剛德消矣夫人君內無剛德則政失厥中小人乘隙以進而禍亂亟作否所由成也且致否者人也而否之則匪人不然何以棄君子不用自罹其禍夫用君子必治用小人必亂此亘古今不易之理今也舍君子而用小人其必以小人為君子矣兹非天奪之鑑而然乎聖人知其不可奈何而曰否之匪人慨歎之辭也變坤為泰變乾為否隂可消也陽不可消也坤變至三君之剛德淪喪殆盡是以否一隂生曰姤二曰遁三曰否至否剛德內消矣小人得志引類而來亦聲同氣感之符也嘗考唐明皇在開元時侈心已萌於中若姤一隂之始生云楊李乘閒進卒肇大亂人君愼夫心念之微哉象曰天地不交否君子以儉德辟難不可榮以祿君子共儉律身不為時變否之儉德蓋隱德不彰可言不敢言可為不敢為髙爵厚祿可致不敢致君子非忘君且忘天下也知夫言為之無益祗害其身而正道一喪將孰與維持振起之於後君子見幾其心仁坤吝嗇為儉德三陽在外為辟難陽本內也而居外為不可榮坤邑為祿𥘉六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也相期以守正是為憂君之深君子陽陽詩相招為祿仕全身逺害而已蓋君子為正之守所以存道道存而志可行且國有人焉國終不亡矣兹亦不憂君者所為與曰志在君否三隂在內小人用事時也而初貞吉二否亨皆君子事何邪曰聖人不與小人在內勉君子使各盡其道也聖人仁愛生民不忍小人迭進以害其生其意不亦逺哉茅至柔物乾一變巽為茅三隂為彚初本乾體為貞茹根也初應四連四之剛與陽俱退貞可嘉也六二包承小人吉大人否亨象曰大人否亨不亂羣也包初承三俟時之復其事則吉其道以亨陳卑用於漢狄仁傑用於唐二得中於否曰大人大人以道為任而識其大者不肯規規然自異羣陰中招怨取疑以害吾道也曰不亂羣否之二五何以皆曰大人否陽消隂盛卦也非智識洪大者為之扶危解紛天下終否而巳二五得剛柔中聖人立此象勉後世君臣使不以既否而怠其道且君子俱退巳獨進為體道之權不失其正此又二所以為大而亨於否也六三包羞象曰包羞位不當也三過中有互巽兌體於否為柔順不正且志在諛說者也羣隂用事三先之跡其不中不正之資欺天罔上妬賢賊民何所不至三順而處之不自以為羞曰包羞而仰視天俯察地終不能無歉於心也陽在外為包巽進退不果為包羞九四有命無咎疇離祉象曰有命無咎志行也君奉天命以施令臣奉君命以行事萬世不易之理而否亂之時以剛德處近君位能承君命而大有為於天下臣之恭也其事為難四居互巽中巽風為命有剛德而巽順事上故能承命以動均福其類夫天下所同戴者君也近臣而挾剛以擅君命於否是為權臣夫權臣天人之心所共惡而深疾之者其背道失心必遺害於天下後世何祉之離惟夫在否而以君命行志於道為順且君子同心致時於治並受福矣周公大誥書命皆本成王是以十夫翼豫大難竟平曰有命心每有之不敢忽也其至誠恭順之意未嘗自用而忘君云三陽為疇陽實為祉九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也慮患若繫馬於苞桑者然苞桑民柔象也有國之本在民寧忍傷之傷之則危亡無日矣書曰若朽索之御六馬為人上者奈何不敬繫桑之義也且休否之道在於安在於存在於治不待夫既否而後為也先事預圖此大人之所以吉與九五以剛中至德履乾位下六二之賢而應之君臣兢兢思所以保乂百姓於上無須臾忽其否可休必致理也且大人休否之功微矣天下徒見其常安常存常治而莫知所以休之道詩曰逮天之未隂雨徹彼桑土綢繆牖户孔子曰為此詩者其知道乎休否非知道者莫能也互體巽巽柔木為苞桑巽繩直為繫乾五為大人嗚呼民者國之元氣也人君一念在民則恣情悖理之事必不肯更為民之心歸之元氣復矣否以休也人君惟患乎不能誠意以復其心心復而天人可格為用豈不大哉其亡其亡又以見其心念之正也上九傾否先否後喜象曰否終則傾何可長也天地之理隂陽之運數極必反上九居否終以乾剛之德在上進德不巳陽可復而秦也曰先否從喜且數之消長與德終始人君嘗因否極至時固有可傾之道茍非自强其剛德而以利天下定社稷為志優游玩日則怠樂是安否不可得而傾矣為君者其勉於剛不可歸之時而曰姑俟時之來也必若上九之剛而後否可傾可不戒夫互兌為後喜離下乾上同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志君子至明之德上同於天故能同天下而天下心歸之曰同人大同無私若天之公曰于野亨野曠大無適莫之地公道盛行大難以濟曰利涉大川利君子貞不正則有所不利君子秉文明中正之德天下所謂善與同好天下所謂惡與同惡欲與聚惡勿施天下之心孰不服從是為同人之貞乾上為野乾健為利涉大川九五剛中為君子為貞柔得位得中而應乎乾曰同人同人于野亨利涉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志申言同人之所以為同人也六二以柔中為一卦主而上應九五曰柔得位得中而應乎乾九五德同於天故不曰剛而曰乾夫以大中應乾而羣陽畢從則所同者大乾行謂其道不息難以健濟文明離體健乾體以禮交物物無不燭曰文明文明而用以誠之謂健中正而應謂五五以大中至正之道下應於二曰中正而應二五應天下莫不應君子之貞不亦大哉夫貞天下所歸惟貞則以我之心為天下心欲惡靡不一且將合天下之志通為一矣曰惟君子為能通天下之志離火在人屬心為志象曰天與火同人君子以類族辨物不同同之非有至公至明之德何以克為自伏犧至周人各有族類而辨之則愚智處宜貴賤履位賢不肖襲情記曰非此族也不在祀典然則君子小人善惡凡以類同者皆曰族類而用辨大同之道也族類物辨天下以治則車書可同四海可一矣火性炎上與天同體同人取天火立象君子法象則法其至公至明之德而巳初九同人于門無咎象曰出門同人又誰咎也出而不忤於物故得物之情而可以用其同自為崖異怪激之行誰其從之不若靜退不出之愈也𥘉履剛有離明德位居同人先而泛然能與人同無私黨偏係心是必將攬天下之情而用其同於後故無咎蓋君子之同非物我盡忘渾渾與世為一如莊老所為也彼將有以用其同於天下使天下各蒙其惠利不茍然耳二以隂在上為門六二同人于宗吝象曰同人于宗吝道也二柔中為一卦主聖人嚴為之訓曰同人于宗吝夫君子無意於天下則已君子而有意惠利天下非同人則莫為之助而所同之狹亦不能大有為於時且二以隂居五陽中羣陽樂同儻必欲捨剛陽惟柔隂之從則為我應者鮮矣又安能廣攬人才以輔成人主有大之業哉宜其吝象釋之曰吝道謂於道為吝也或曰應五為宗夫二五君臣位且五陽二隂非巳宗也語曰如有周公之才之美使驕且吝其餘不足觀也巳周公惟賢才並用不牽私黨道以盛行二其愼哉二居離中離麗必有所附其在同人不可不愼九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也離處乾下離為戈兵為伏戎互體巽兊巽以隂木生兌澤為莽變乾有重艮體為髙陵三嵗乾數夫二五正應三四以剛閒之譬諸侯强大與夫小人才健害吾君臣正應懼聖賢同心而正道行於天下巳不得以逞肆私欲非巳之利者大可畏哉夫小人為身計不為國計不為百姓計設心不仁莫肯恤也三嵗不興而象曰安行蓋以惡長不悛恬不知悔吁其可畏也夫九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也四位近君而以陽居隂知道之不勝而能自反以歸義故吉吾於此見聖人之心許遷善困而反則謂不害其為同也九四乘離之剛離中虛陽包之為墉夫二五以中直相與天人與之義安可閒義所弗克而反身從義棄前非圖後善是不拂於天地之心矣九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也心通迹閒其憂在先道之茍勝閒何能為吁經天地理萬物莫大乎中直夫中直物可格也况於人乎中直則君臣之心本自相通何憂不遇同人本離體而天之與火其德又同二五俱得中位是五之心即二心二之心即五心其為中直也大矣繫辭曰二人同心其利斷金同心之言其臭如蘭以離火乘乾金其心無所不通非强梗堅剛者所能閒曰斷金心同而發號施令罔不盡善曰如蘭互巽為蘭夫五二正應而二剛害之二剛方健巳德不足必欲以巳不正之心求合於上嫉媢有德排之讒之九五剛中心惟二同卒用相遇以一天下而靜其難可謂盛矣先號咷後笑何也以天下為憂至誠惻恆之意發見於外曰號咷君臣相遇道行天下有足樂者曰後笑憂樂在天下而不在身聖賢之心也互離巽兌巽風兌說兌口為號咷為笑大師克相遇克言與之者衆所勝在道若師之克離為戈兵九五以剛處中離體在下羣陽從之為大師嗚呼君臣之閒亦在夫勉巳中直之心而已中直者無欺愧於天地為用至大故惟中直則君臣一心而可以大同於天下也上九同人于郊無悔象曰同人于郊志未得也邑外為郊逺人而同之於郊相與為淡泊寂寞之遊忘寵辱逺勢利悔無自生雖然君子之心未嘗一日不在天下使得位於時今日設施前日靜飬功耳同人於郊志雖未得悔則無之其心初不忘天下也乾上為郊邑內也郊外也且郊猶取於同人君子何適不用其同邪雖窮居約處而志同道合以琢以磨君子進德不謂居無事而輒巳也乾下離上大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨大有自乾變乾變而巽仁德以行所亨者大曰元亨六五蓋乾五尊位惟其以乾剛用離明體協大中上下羣陽莫不畢應曰柔得尊位大中而上下應之夫中者天下之所歸而况於賢哉剛賢畢應所有者大是為大有剛健文明二體剛健善斷文明善應剛健而誠盡於內文明而禮盡於外合是二美中德斯大其位得乾之中曰大中應乎天而時行謂五求乾剛稽諸天道而用離柔離萬物相見於時為正為時行時行云者蓋以當有大之世非用柔無以得天下賢非得賢無以保天下大業時乎時不可違也人君仁德至是大矣象曰火在天上大有君子以遏惡揚善順天休命如日之升明德普施明德既行則善惡各得其正而天休滋至矣夫善者天下所甚愛惡者天下所甚惡善必善加於天下惡必惡加於天下遏惡揚善以順天下心是為順天天人之心本自一致也天心眷佑和氣致福休命之來莫可止禦人君大業其將永久不替夫火有揚之之義天有遏之之義詳觀此象而知善人之有益天下國家也善人在上天休滋至然則曷可不亟求之於微下而進用之哉卦自一變坤至五而艮止之四陽俱復是為大有陽善隂惡為遏惡揚善初九無交害匪咎艱則無咎象曰大有初九無交害也初居四陽下曰無交害四居四陽上曰匪其彭何義也𥘉未有位當大有時君子莫不欲進以行其道道之不行君子恥之懼利澤不及於人也故曰無交害若夫四處近君位茍非以中正絶類之道立人之朝則嫌疑讒謗之興殆不可遏止明哲君子欲全其道以利天下有所不肯為也故曰匪其彭雖然無交非初罪也四方體公忠事上有炎上之體初不得交曰匪咎惟艱以守貞安順義命不妄求合上必我知咎不長矣曰艱則無咎三陽在前其行也艱艱斯無咎聖人著此訓惡夫舍正應而他適也九二大車以載有攸往無咎象曰大車以載積中不敗也處乾陽中乾良馬其德健變卦有坤體為大車臣之積中非一日事中積用能任天下之重如大車載物沛乎其有餘裕曰大車以載有攸往無咎中者何總言之德也其目正也公也直也誠也恭欽也仁也善也凡德之美者皆曰中君子於中不可須臾忘閉邪去僞止私寡欲積中之道也積若水之積其積厚其負大舟必勝任矣二得乾剛正中剛故不息是以能積且在上有柔中君屈巳下之羣賢並進而已獨得中君子志可行時也何往不利哉嗚呼中不積則敗天下事生民之命將無所託後之為臣於大有愼勿以既治而怠其中也一日失中天下被害可不畏與可不愼與九三公用亨于天子小人弗克象曰公用亨于天子小人害也以直道格君非心而致君為堯舜之君大人事業五以柔居離中五陽宗之曰天子九三剛健履位位居互乾中用能盡至公之道曰公公道盛行大治可永為國家之利無窮曰公用亨于天子小人弗克小人不能勝已之私不可與言公也三重剛立互巽初互兌下兌說巽順為小人嗚呼小人以事君為容悅無所不用其私為民之賊為政之患為國之憂是將壅蔽其君以毒亂天下者也使若斯人而居上位必為天下大害有大之君尤宜察諸九四匪其彭無咎象曰匪其彭無咎明辨晳也盡忠於君無下比三陽之嫌非見幾孰能之四以剛德為三陽先且其位近承柔中之君儻挾羣陽以事上得無矯拂取疑之憂乎四匪其彭非絶棄賢才而逺之也心公道直不牽其私使人人得盡其道於上是謂匪其彭是謂無咎不然蔽賢取容將得罪天下後世咎之大者四位在離明先下履乾剛明足以辨得失禍福之幾而剛能行之曰明辨晳三陽為彭六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也君臣交孚以道則德修政立天下悚然遷善逺罪而莫敢為非雖荒服逺裔知所畏慕率從吾化𥘉不待征伐刑罰之施也六五自乾變內剛外明其明足以知天下之賢九二剛中順而應之剛柔相交一德以孚曰厥孚交如威如吉離為火為戈兵為威如夫聖人有天下大業政令教化之防不可一日弛自古紀之六五威如象辭何取夫易而無備傳曰百萬之衆不如一賢蓋賢者立人之朝則衆賢從而輔之君正於上綱紀法度明於下君臣相說德威逺揚四方莫敢豫侮不必屑屑然事備具之末非謂壞法亂紀漠然無以備也卦本乾體乾以易知曰易堯舜之時君臣惟道德是𢎞民不犯有司蠻夷率服威如也堯舜安用備惟其君臣交孚所備大矣信以發志謂何夫君臣而一有欺愧之心必不能相與合志而有為君臣之間宜先勉夫信信立而志發於外斯有合矣五柔中為無備離明中虛為信為志上九自天祐之吉無不利象曰大有上吉自天祐也上九以乾體位離明上剛健有明德故能上賢而自天祐之夫子繫辭釋之曰履信思乎順又以尚賢也蓋信順可以得天人心信順一體事順天者必信於人上九體信順在上又能以此尚信順之臣君臣遇合其道盛行而惠澤加於天下是以自天祐之吉無不利爻獨曰自天祐之辭兼天人而言天無心以人為心人之所助天其祐之也昔夫子對子貢足食足兵問謂兵食可去民無信不立蓋號令賞罰舉措之閒一失其信天下將漠然離心莫可復合雖有兵食無𥙷於用是逆天者所為何以得天下之賢與之共保有大之治上九躬履信順剛賢畢應人既助之天道斯祐其吉大矣互兌承之為履信乾五變得坤卦復於乾坤伏其下為思乎順艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也自天子至庶人未有不謙而能保國持身謙則虛虛則久久則光大之道也惟有德者為能謙卦體內止外順德盛而止於內禮恭而順乎外是為謙無德而徒為卑順焉禮之文也君子用止於謙凡外物之役吾心意與夫窮通得喪之分好惡喜怒之節飲食言語之宜處之不競守以至虛節以禮義持以退抑天道所喜神物所祐民人所歸其為亨也大矣艮在下艮萬物終始為有終天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙何謂也天地人一道幽明一心滿招損謙獲益猶朝必有暮冬必有春乾上自剝居謙之三曰下濟而光明光明艮體坤三自剝居謙之上曰上行陽止於外而在坤上為剝陽止於內而在坤下為謙觀一陽升降天地人鬼之情狀畢見矣聖人立象繫辭於謙尤拳拳蓋使天下後世俯仰動作之閒不敢須臾忘謙而思所以善其後也謙尊而光卑而不可踰君子之終也君子德盛禮恭以充盡謙道故處上而人樂推之居下而天下後世視為楷式周公孔子為然周公令德久而不替有終也然則聖人何為而臻此其必曰性止而德極於盛體順而禮極於恭故歟九三以陽處艮上為尊為光位在坤下為卑為不可踰周孔一道用之尊則光用之卑則不可踰惟所用也象曰地中有山謙君子以裒多益寡稱物平施摧其髙剛而心止乎順然後能行禮於身以盡夫謙禮行於身斯可以行於天下矣夫順天地鬼神之道使天下逺害而就利必有禮制存其閒艮有止限義而坤道主平若井田行而王道盛無他聖人用謙於身又率天下而納之謙大功以立大治以成謙用大哉昔先王制禮使賢可俯而就不肖可跂而及貴者不至驕賤者不至汙無有餘無不及用此道也雜卦曰謙以制禮地中有山山得其平斯蓋制禮之象初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也其身謙其心謙內外俱進非靜飬之功何以至此且人不能盡力於謙本夫放心不知求放心則驕亢怠傲將一肆心之所為其能行已以恭而有所建立於天下乎君子止心至靜不撓不奪其積功非一日欲忿畢除誠信益大故德止於內而盛禮順於外而恭謙之又謙可以得天下心而濟其難卑以自牧蓋君子止心之道必曰卑云者遜志之學惟遜志不矜伐用能自牧謙謙之德本夫自牧初以柔處艮下體又承坤為謙謙互坎為涉大川上坤下艮坤為馬為牛坤為地艮為山為自牧六二鳴謙貞吉象曰鳴謙貞吉中心得也二以柔德居艮止中德積於中謙形於言其所以感動上心莫非至誠忠厚有益國家之論非諛說無益之辭曰鳴謙貞吉二何以貞惟中心自得不畔於道是以貞貞則得君而道行天下是以吉互坎坎水為鳴謙坎陽在中為中心九三勞謙君子有終吉象曰勞謙君子萬民服也有大功而不自以為功若禹不矜伐周公公孫碩膚二聖人者皆獲有終之吉三自師來曰勞謙夫勤勞王家臣之常分也矜伐之心一生則恃功忽下安寵擅事天下之爭所歸非所以自全也其能保有萬世令名而服天下之心乎以剛陽居羣隂中為君子艮終始為有終坤衆在上巳下之為萬民服六四無不利撝謙象曰無不利撝謙不違則也謙至四德成矣上承謙恭不伐之君下履功德盛大之臣撝其謙而散之不陵上不瀆下動皆中理臣道斯盛艮下互體又艮艮手為撝謙不違則謂何撝謙疑有失中之舉惟德成而動容周旋中禮故不違則四以六居位得坤道正且德順有常撝謙孰利互坎坎法律為則嗚呼若四豈徒能保守其爵位而已其敦厚有容之德殆將使天下後世一視以為法而安靖國家之福何可量哉六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也履天下大位而不自滿假以親比上下上下一心不服可征五柔中得順止正且剛中羣隂莫不協輔謙德為大然則五猶有侵伐何也蓋奸宄害治治世所不能無惟謙德之大天下屬心用能正天下之不謙以成其治舜命禹征有苗舞干羽格之初不待兵刃之接無不利也互坎在中坎隂為不服為侵伐夫聖人用謙蓋將以收天下心而除其為天下害非徒徇謙德虛名而優游玩日不恤生民之罹毒也君人而欲得志天下莫若反身而求其謙惟謙則不自滿假而謂莫我若必欽必畏必恭必儉必親賢必聼言惠澤及人者大上下順服歡若四鄰用於侵伐何往不利羣隂為鄰坤地生飬萬物為富上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也二鳴謙應五也上六鳴謙將以率天下而納之謙五曰利用侵伐上曰利用行師利用云者於用為利未必用也征者正也以我之謙正彼不謙聖人必欲大其謙於天下先自內始曰征邑國文王事也文王居岐謙德著聞伐崇崇違之退修德教而崇降其征邑國之謂乎志未得云者天下未由於謙聖人所憂也坤為牛為馬曰鳴謙坤為衆曰邑國邑內也上六正應在三三以剛陽居互坎中有負恃懷險心為志未得坤下震上豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉陽德內升順道而動其動也因天下百姓之心天下悅之建侯以共治行師以除害安往不利曰利云者有是象不必有是事蓋陽動於地羣隂協應天地中和之氣達矣是為豫豫惟順動故治可興害可去而豫治益大坤震位上下為侯四自師來為行師剛應而志行謂四也九四以剛獲羣隂應而其道上行曰剛應志行云順以動豫九四致豫之道豫順以動故天地如之而况建侯行師乎言豫之順動上可與天地合其德建侯行師之利蓋理之必然無可疑者天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉申言聖人合德於天地者如此夫天地之動無心而行以中氣未至不先之至不後之是以日月四時得其正聖人法天地因人心之中而用吾之中以有為於天下道無不順刑罰可省民心說服曰刑罰清而民服刑罰不清則中和之德不能純被於上下民之從之革面而巳故豫以刑罰清為大雷動於上坤順於下為天地以順動震春陽用事時以序行為四時不忒互坎在中為日月不過坎水為刑罰清坤下坤衆為民服且陽乾自剝來一曰復復心之剛以復其德也二曰師德復而後可以去天下害也三曰謙聖人德大功立不自矜伐以來天下之善也四曰豫陽氣奮達利物之功益著樂所由作也五曰比天下順比王道至是而盛也六曰剝守中則比過則剝剝聖人之戒也中其至乎君用之仁也嘗考一陽之生自復至比皆有兵戎象復上六曰迷復凶有災眚用行師終有大敗師九二曰在師中吉六五曰田有禽利執言謙六五曰利用侵伐上六曰利用行師豫曰利建侯行師比九五曰王用三驅失前禽蓋陽動而復天威已行至比則威德益著而生物之功至大聖人生物之功在兵兵以德勝聖人復其心以復其德復其政事然後可以行師之衆正可以舉謙之征伐可以體豫之行師可以講比之三驅此一陽用事之序也夫天下順比而不忘三驅禮焉聖人仁愛天下惟恐一朝備弛而害加於百姓後世天下始定儒者急急偃兵息民之說以從事夫禮樂之文導君驕奢縱逸之地卒至敗人之國豈不陋哉若夫天下未定而曰我無事於復玩歲樂身以兵為諱吾不知危亡之日矣戒之哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考先王躬行之德洽於天下百姓之害除而天下大悅樂於是可作樂由陽來樂作而德益崇夫使天下率由禮樂之化是先王有以生之先王聖德日加於天下後世不知何時而巳故曰作樂崇德云薦上帝歸功於天也配祖考歸德於祖考也帝出乎震震在卦上為帝二隂在震上為祖考上帝曰薦薦以盡誠祖考曰配配以合德初六鳴豫凶象曰初六鳴豫志窮凶也諛說之志萌於中發於聲音顔色蓋小人隂柔至甚而無持操者是豈惟安逸豫以害其身推是心以往且將害家害國害天下故凶初以柔處坤下其志委靡不振以己不正資幸四應惟諛說之圖而四有剛德不巳合是以志窮而凶夫初本震體用震變坤失其剛矣剛德一失邪枉若是吁可畏哉震動為鳴聖人於豫首發鳴豫戒蓋方天下安樂無事諂佞者易進聖人致戒於初不惟使小人知所懲艾欲天下後世之為君臣者深察而欽逺之也六二介于石不終日貞吉象曰不終日貞吉以中正也靜故能照夫當天下說豫時諂瀆以交上下不比於權即昵於諂馴至喪身亡家亂國無疑矣豈為先見者哉二有靜止至德道之光明足以見幾於先曰介于石不終日貞吉或曰二履人臣正位而介于石若安靜無𥙷於豫者得無過乎是不然夫天下說豫人各循其所說而不虞後害古今一情也二處坤位中立德止靜之地而智足以見天下幾上不諂於九四下不瀆於二隂厚德鎮浮存豫有移風易俗守正止難之功為用至大夫子著上交下交之義於繫辭蓋以卦之上下言之互艮艮為石震再變有離體為日貞吉謂以中正獲吉豫九四有權臣象天下說從禍福之分在四所處正不正閒吁為四亦可危也不有中正君子若二者孰能行禮於身以杜絶未萌之志而正君臣大義哉若二隂小人諛說之雄安可邇邇之喪德必矣繫辭曰君子知微知彰知柔知剛萬夫之望聖人深以二有功於豫謂天下後世宜仰望以為標凖也六三盱豫悔遲有悔象曰盱豫有悔位不當也仰而視曰盱三位不中正以隂比陽切切然覬望之意見眉睫閒曰盱豫悔而四方為由豫主遲其行又無以趨事赴功曰遲有悔然則君子處此如何惟自反以修德而巳德茍中正上必我求何盱遲足云聖人惡夫在豫求之人不求之已殆為容悅計者設此象以示悔之必至也震再變離離為目曰盱在坤隂上隂性緩曰遲九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也姬旦總羣臣以輔成王誠信而巳矣惟其待天下以不疑是以得賢才之助而永保功業漢霍光反之不再世而丹族吁可戒哉夫疑心一萌於胸中天下士將望望而去之孰與輔其德成其治乎曰勿疑言疑之不可一朝而或生於心也衆隂歸之由我而豫為由豫為朋為大有得坎中為勿疑一陽為首為簪衆隂為髮夫四以陽德孚五隂惟履位不正聖人故有勿疑之戒懼夫誠意或怠以失天下之賢極言誠之不可巳耳夫衆賢協歸則上可安宗廟次可安百姓下可安吾身疑心一生合者將離尚可以致天下之豫哉夫惟盡其在我之誠使無愧於天地無欺於幽明若雷動而奮仁德以行天下之賢其將合志同心以赴事功之㑹而我之德業永永無窮矣豈不美夫且近臣何疑哉不過曰恐賢才之勝已而扼其進自非有至謙之德而以天下為心不以一巳失得為心能勿疑乎九四自謙來宜其由豫而大有得志以之行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也嗚呼人君惟不安於逸豫則志氣清明其德剛健大臣烏得以擅事於下六五以柔履中剛健不足四承之曰貞疾蓋柔道多牽雖曰柔中而衆柔位上下在豫必怠宜不能有為天下也周室東遷則然五猶居中位曰中未亡其以先王德澤尚存乎互坎坎心病為疾震於稼反生為不死夫五以四豫聖人有貞疾之訓聖人戒豫之君必欲勉進剛德以總攬權綱於上不當安於豫怠倒持太阿以授其臣春秋尊王之義也且豫惟四履陽位羣隂剛德不足不能為五助孟子所謂一薛居州獨如宋王何者也是以五不免夫貞疾嗚呼人君慎無厭夫剛德之賢而亟逺之使朝多君子君其有不尊德其有不修國其有不治雖有任事當權之臣不能私已而擅其事矣何貞疾之憂乎上六冥豫成有渝無咎象曰冥豫在上何可長也隂極為冥性移志昏故冥成有渝許變也書曰惟狂克念作聖有渝之功也上處震上震動曰有渝云夫冥而渝猶庶幾可保其宗廟社稷也不渝淪亡無日矣人君其戒夫豫而不知反者哉震下兌上隨元亨利貞無咎彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉隨否之變剛自乾來下坤之柔曰隨一變隨再變歸妹三變泰隨大亨利在貞不貞則無以率化天下而天下莫之從曰隨元亨利貞無咎夫剛來下柔民心以孚有所不動動則說矣是謂隨蓋民之繫命在賢下柔則賢者獲用而得民之心用是以動天下其有不說從而率化者哉大亨正無咎而天下隨時謂得賢而民心歸亨大以正且夏忠商質周文聖人不能違天下心惟正故天下樂從而莫違其教化然則天下所隨者時也時實聖人為之是天下之隨在聖人不在時聖人貞動天下說隨其義大矣且天道之運自春徂秋嵗功以成天下日用而不知隨焉而巳若夫聖人以貞動而使天下欣欣然從而化之亦若人之隨時於天也象曰澤中有雷隨君子以嚮晦入宴息濳神至靜之地而後能盡動說之道於隨莊子曰淵默而雷聲神動而天隨從容無為萬物炊纍焉蓋靜者動之基濳陽之德養於至靜動以利物其動乃說君子嚮晦宴息蓋隨時而養之以靜也君子存身於靜其動也仁天下說隨大功以著兌西方為嚮晦互巽為入互艮為宴息互震至兌息伏曰澤中有雷嗚呼天地以至靜之德生養萬物君子以至靜之德生養天下傳曰君子有四時朝以聽政晝以訪問夕以修令夜以安身夫安身而後動則清明在躬平旦之氣不昧而利物之仁大矣此君子用隨於一日之閒者然也可不慎夫初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也君子動靜本道惟道之從事雖變渝於道常貞得所隨矣故吉出門交有功謂如是而後可有為於隨也蓋吾之所隨既貞功利何為而不及天下哉𥘉從乾上居震下為有渝互艮為門初本乾體乾道也貞也自震以往萬物滋生為有功交謂應四六二係小子失丈夫象曰係小子弗兼與也隨道在係夫正否且隨匪其貞在我則德損在事功則必不能建立在天下則必不能惠利可不慎擇歟二柔中無失德然於隨用柔柔道多牽曰係小子失丈夫謂舍五正應係初也且𥘉於隨為動說主何以謂之小子初自乾上居坤下在卦體得動說貞卦曰隨自𥘉發也若爻言其變則初位在最下有互艮體為小子係小子失丈夫惑彼動說捨吾正應是失隨之貞者也失貞何以從事於隨聖人繫六二象辭曰弗兼與也以二在隨居人臣中位舍應與𥘉義有大不可者其戒夫居陋而不誠心一意以事其君者歟四五以乾陽在上為夫六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也捨初從四四以道事五因四以通五志必行於隨隨有求而得者也利居貞謂何臣事君有君而巳惟道惟君之隨人臣大義也其可不安而行之三係四而曰利居貞者蓋聖人深著不可附麗權臣之戒夫四事君以道三之係四本以通五求而得之貞莫大矣志舍下謂舍初互巽巽入為求有得九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也伊尹周公臣也而實受天下隨處伊周任重甚難其道雖貞其義則凶惟至誠守道動皆中理則君信不疑功可成矣伊周事業卒暴白於天下後世誠也且巳孜孜然正心欽巳日以匡國家利天下為事譬日月在天有目有趾莫不待以成功何咎復得哉故曰有孚在道以明何咎而象以為明功也蓋有孚在道則動必中道事業日著是為明功九四居動說相應中有互艮體艮手為有獲艮剛止於中為孚為道艮其道光明為以明九五孚于嘉吉象曰孚于嘉吉位正中也中德日修賢者信之惠然肯來曰孚于嘉賢者隨之則天下莫不隨矣傳曰天下之父歸之其子焉往故吉嘉指二二柔順中正在隨為嘉不然君臣俱剛何以隨惟剛柔相濟而以中率天下隨隨道亨矣二居震中萬物自此趨亨嘉之㑹為嘉五以兌中應二隂陽之氣各得中相應是以孚也上六拘係之乃從維之王用亨于西山象曰拘係之上窮也既拘係之又維之人之說從有不能自解也固結人心本於仁太王去邠周業以昌王道以行上窮云者若太王事之以皮幣犬馬珠玉不得免焉也太王其事窮其道通自三至上互體皆巽巽為繩故有拘係維之之辭上六居動說上天下樂隨而所履隂位以隂在上志未行於隨曰上窮巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也天下事至陵遲大壞莫可支持自人君心念始君心不仁而奢侈暴虐之為流毒天下則邪佞得志忠良退黜日復一日綱紀浸弛蠱之為由心起也坤柔下消乾剛仁心淪失泰治以墮風化於是衰矣必復其心蠱乃可治蠱以元亨元仁也蠱元亨利涉大川將有事於天下以正其弊大其治也故涉川為利序卦曰有事而後可大變巽互坎在中為利涉先甲三日後甲三日何謂治蠱在仁德在挈綱領而圖其本在不息甲十日長仁也萬事之本也夫事之弊壞非大振其綱領而務以仁德洽天下使天下歸心則事莫之興起先甲三日要終而思其弊後甲三日圖始而慎其行終而復始法天之健可以致治乾納甲先三日巽初也後三日艮上也治蠱者可以復泰巽一變為小畜乾在下四變為無妄乾在上先甲後甲象也蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也人君剛健篤實輝光日新其德事奚蠱惟剛上而止柔下而順為君者髙亢而德日消為臣者邪佞而權日盛臣順而諂君止而怠治道以墮蠱之所以蠱也且夫剛上柔下巽而動為恆震巽剛柔相配隂陽各得其位是以有常而亨也剛上柔下巽而止為蠱少男在上長女承之隂陽失其序拂其常譬夫柔順之臣有以蔽惑其君而君安之不蠱何為哉聖人觀象治蠱用巽之仁復艮之靜仁德既止天下率化而蠱可亨曰蠱元亨而天下治曰元亨云者仁而後亨蠱以仁亨也如是而後可以大有為於天下巽一變乾為天行巽木為利涉象曰山下有風蠱君子以振民育德作成人材以興弊補壞周宣用之夫人各有德顧在上者養之如何耳先王盛時學校興禮化行終致天下之材不可勝用振而育之之功也且山下有風失其常度非長養萬物之風也譬諸風俗陵壞於天下君子觀象將以復風化而大變其俗育德其可緩哉初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也行巽之權隂救其弊而實顯其美曰有子考無咎坤上來居乾下為幹父之蠱乾初在上父象也夫初以巽仁居蠱下有仁德以治蠱而欲一大變其風俗其意專在尊宗廟定國家育民人子道既盡考德以大是謂有子是謂考無咎厲終吉戒以誠勉也厲而吉可終矣初柔順非厲則德莫之進位去上最逺曰意承考九二幹母之蠱不可貞象曰幹母之蠱得中道也事繼世主而事適墮壞求以治之其道貴中不可過過則失中且强所難能卒不可行何益於治周公相成王善用其中終能大文武之業不可貞謂不可過貞非直謂貞道不可行也故夫子明為之訓曰得中道云二以剛居巽中是謂得中道九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也為子為臣剛中是貴剛不可過然在蠱剛過猶愈於裕三剛過中與上敵應事固有力爭必行者故小有悔惟其設心立意本於治蠱而卒歸於正是以無大咎然則人君用臣於蠱寧取剛過無取裕裕何以立事而保其社稷人民邪六四裕父之蠱往見吝象曰裕父之蠱往未得也蠱至四巽極而止故裕西漢公孫𢎞以阿容無補君臣之閒吝道也夫居上位不汲汲救天下弊玩日偷安以幸其無事不仁莫大若是者民將視之猶仇讎謂不我恤也何往而得志於君哉隂止於下有兌說體為裕上本乾位故二四五皆曰幹父之蠱六五幹父之蠱用譽象曰幹父用譽承以德也承以德不承以事故用譽且舉行政事末節孝之細又安能有惠及天下且有令聞於後世哉五得柔中其位艮止巽上心止於仁臣剛而應用能修德於蠱以來厥譽夫天下之事委靡弊壞莫之振起究其本原在德不在事德失則事弛德修則事立君人者欲顯親而大其業以盡夫奉先寧親之孝莫若反己行仁勉夫在我之德互兌為譽上九不事王侯髙尚其事象曰不事王侯志可則也不有其功記曰終事而退臣之厚也位居艮上艮止為不事王侯伊尹復辟告歸體此也後世若漢留侯天下巳定奉身而退庶幾髙尚者哉不然已在上位無補天下國家而曰我姑退是足為髙乎上九自乾來有剛健果斷之德且蠱至上仁德已孚天下已治君子潔身而去以順天道可也不然咎將及之志可則謂何功成身退不率寵辱志在利天下而不在夫享天下之利進退有度其志可則變巽有離體為志兌下坤上臨元亨利貞至于八月有凶彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也乾陽序進以復其位至臨而二陽生於下剛德內充足以有臨元亨利貞乾四德也臨有復乾之道而乾德未備其見於用者大亨以正而巳故彖辭别白言之八月有凶戒也陽長而臨巳戒隂生聖人知幾自昔保天下者率兢兢堯咨舜舜命禹皆曰四海困窮天祿永終懼有凶也推是心以臨天下又安有失德於身者乎自此至遁歷八數曰八月剛浸而長說而順剛中而應大亨以正天之道也聖人明臨之利貞本諸天也臨自坤變乾剛上進將復坤以歸乾天道行乎其中剛浸而長指二陽說而順卦體剛中而應謂二九二剛中道德之美上說君心而六五下之君臣合德以臨天下天下順說其亨也大臨曰天之道無妄曰天之命道自下升命自上降蓋剛德浸長而生物之功著道之自然也是故天道之大在生物生物者天道之貞君子協進生物之功可以配天易以剛長為天之道其㫖深矣象曰澤上有地臨君子以教思無窮容保民無疆二陽說於下四隂順於上陽為德隂為民君子之德足以說民心而民順從之也自古先王臨天下任德教不任刑罰深仁厚澤思有以固結天下之心無巳民之從其教化也亦無巳故逺而夷狄恃之以安所容保者大哉後世以勢臨人一決而潰德教淺也三復斯象知教化防範不可一日弛於天下兌口澤說為教澤為容無窮無疆皆自坤發之澤上有地臨民而得其防且得其歡心也讀禮書坊記篇君子設教其思為長久計也審矣初九咸臨貞吉象曰咸臨貞吉志行正也二陽以兌說進兌為澤其體虛曰咸臨咸臨蓋公其志虛其心以道而感通乎上者也初九位在陽先必貞而吉夫四隂以上臨下隂惟陽之求初以隂居下茍所適不正莫可有為於臨矣惟初得陽之一志專應四而求比於五以陽感隂其誠易通臨大之治其基於此乎漸曰進以正可以正邦然則在臨之先必貞然後可以臨人而易變其風俗也九二咸臨吉無不利象曰咸臨吉無不利未順命也事君而感之以道利孰大焉道何也中也二得位得時而以剛中應五道合從弗合去蓋必有以感動人主心意收大人正君之效俾純於乾德而後已固不肯偷容茍合終至危人之國使其君不能有臨也故曰無不利陽進隂伏而君臣之德同何往不利大抵致其君為堯舜君必有所以大正其心固非屑屑順命者能之巽為命反巽曰未順命且陽進變隂志方上達彼豈肯以順而喪其節也哉六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也三居兌說上其位不中以柔順之資求說二陽是謂甘臨君子說之不以道不說也如之何欲以甘臨君子哉夫臨人而不能內盡其誠徒規規求說於外若百姓固可欺斯須而其久必離何哉誠不足以固結其心也况用之君子安能有說而覬幸君子肯從巳歟在臨無攸利矣六三互位有坤順震動艮止象動而能止為既憂憂之如何易心退聽而以至誠順君子斯可也下君子而化之隂消陽復馴可致泰於臨何咎且夫甘德之失也德失憂之可以無咎吾以是知遷善功足以格天獨患夫為之不力耳六四至臨無咎象曰至臨無咎位當也五曰大君四曰至臨至坤德也四以順德下應初陽臨下順賢其德必進其道必行臨之至也夫四位近君互體坤中而一心應陽不撓其進上順於君下說於民臣德至矣何所可咎象言位當謂與初正應其位當也六五知臨大君之宜吉象曰大君之宜行中之謂也內有剛德而用之以柔知臨也且夫人君惟不知行中而亢志自用踈逺忠賢是以在治忘亂不戒隂生政事法度浸至墮壞而失夫所以臨涖之道臨二陽浸長君子道盛君天下者於此何為哉行中德以任君子斯無為而利澤及天下得臨之正矣蓋人君據大位以臨天下每患恃其聰明智力而不知屈巳下賢驕盈怠傲日肆一日忠言莫告以顛以覆若是則君不君矣非所宜於臨也六五用柔之中德順有常虛其心損其剛下應於陽凛凛然惟懼隂之復生而盡誠以行其中二陽協應臨道以大吉孰禦也周成任周公為知臨政事一出恃為心腹周公聰明智力成王之聰明智力也成王知臨矣剛長於內將復於乾且得賢而所臨者大曰大君六五居坤順中下履兌澤之虛德順有常而能虛己下賢是以有大君之稱云上六敦臨吉無咎象曰敦臨之吉志在內也上處臨極反得坤之厚不以勢位臨下操心積意惟賢之順二陽非巳應拳拳若不一日忘德之厚也曰敦臨且居上臨下而獨以厚賢為志賢進道泰天下說歸吉可得矣坤上為敦兌承坤以兌隂合坤隂復有坤體下臨二陽為志在內夫臨人而在上位鮮不驕亢自處蔑棄賢才非厚德君子以天下百姓為心未有能善用其志者矣坤下巽上觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣隂生一曰姤二曰遁三曰否五曰剝隂長陽消其卦多凶四隂乃有觀象聖人意何在也聖人憂隂之起思有以止而化之為君天下計甚厚也夫使為天下君而能本中正至剛之德以涖天下天下觀而化之可常治無亂又何憂隂之復起哉且觀自臨來二剛之德浸長於內至觀剛得位而在上執巽之仁以孚率天下悅服歸之化道於是盛行焉稽諸天道觀為八月卦兌金用事化萬物而揫斂之將使復其純一之性非若否之閉而不通此觀之所以獨異於諸卦也觀盥而不薦有孚顒若謂何祭祀之禮先盥後薦始盥則誠至薦怠矣人之通情也盥而不薦則誠德不息始終如一足以感格其孚顒若下觀而化觀道於是盛矣舜恭巳正南面顒若也蓋聖人之誠本自修身而中正者修身之本聖人體中用正無過失於天下舉海內之心皆為我心心之所格孰不化顒若之用斯為大九五以巽仁居互艮上艮止為有孚互巽潔齊艮手為盥下坤坤地備物為薦坤在內為不薦大觀在上順而巽中正以觀天下謂何聖人於天下一視同之其德大曰大觀陽大在上曰大觀在上順巽所以行其化中正所以成其化順巽中正孰不心悅而從之下觀而化理宜然也觀天之神道而四時不忒聖人以神道設教而天下服矣神者何誠也天以誠運而四時不失其序曰天之神道聖人仰觀諸天以躬行其至誠有教存乎其間本之仁義著之禮樂施之刑政皆教也聖人之教自身達之天下斯民從化莫知所從其道如神曰聖人以神道設教詩云自西自東自南自北無思不服神道格應之功也四隂有四時數巽風為神坤順為天下服象曰風行地上觀先王以省方觀民設教教之本在誠其具則禮樂刑政夫禮樂刑政必因其俗若風行地中隨所寓以致生養之功夫先王之省方以至誠愛民之心而修其教化不徒出也巽白眼為省方為觀申命為教坤地為方衆為民初六童觀小人無咎君子吝象曰初六童觀小人道也初以隂處坤下為童智不足以有觀若童之無知曰童觀語曰民可使由之不可使知之謂民可率而使由吾化不可强以知也童觀在小人則無咎若夫士君子不能觀上德化以修其身而朝夕於中正之歸何補天下是君子無所用於觀也其道吝觀自乾變坤故初有君子小人二象六二窺觀利女貞象曰窺觀女貞亦可醜也闔户謂之坤居坤隂中曰窺乾一變巽卦體互巽巽白眼為窺隂得中為利女貞互巽兌有順說之性為醜且夫履柔守靜臣道之常然大觀在上非剛中之臣則不能與上合德以格正其君而大有為於當世故君子必謹飬剛德俾識明學正而後有逺大之見可副大觀之求也且處羣隂中而厥觀不逺昧於大體上有剛健中正君以至誠之意風動天下而巳默默守常無所建明順說以從其上而巳君子不知恥可也君子而知恥能一日安於觀哉曰利女貞女以是為貞其事則可醜也夫女從人者也若君子道合而後從其所見逺且大又安肯枉己狥人若窺觀者所為乎六三觀我生進退象曰觀我生進退未失道也度已德業以為進退曰觀我生君子事業以生物為本讀生民尊祖之詩可見矣六三位雖不中而得坤正體順靜有常進退之際知所欽擇雖然三在觀巳近髙位於是而始圖進退可乎蓋三度巳德不若四推四而下之不敢率先以上比大觀主於臣道未失也變巽為進退坤地為生嗚呼後世不度德量才以貪冒大位蔽賢疾能莫知省己以貽禍天下觀六三之風亦可少愧矣彼豈知一巳進退天下休戚利害繫之安可重一巳而輕天下哉是大惑大愚者所為君子不取也六四觀國之光利用賔於王象曰觀國之光尚賔也書稱堯曰光被四表舜曰重華協于帝人君光明之德本於性成於學著於天下君有明德動作施為罔不率由禮義天下將化之而為禮義國其光矣四體仁巽之實羣隂畢順蓋賢德之大者用能觀國以觀君觀君以行志王如賔之弗臣則道德日聞功效日著利莫大矣且大觀在上必有不召之臣相與躬行中正於上化道斯盛巽東南賔位故曰利用賔孔子釋四曰尚賔謂道德之臣宜尊顯其禮而師友之不可輕也二陽得位在坤上為國光九五觀我生君子無咎象曰觀我生觀民也君臣事業在生物而人主生物之德尤著見於民蓋君正則民正君民一體耳譬猶響之應聲影之隨形德修於身民化於逺而天下莫不安其生遂其性其理自然也九五剛中在位至誠之德既已先天下而化之復視民從化於我何如以反求諸身九五化民之心誠矣故無咎夫民猶水也水能載舟亦能覆舟君子設法至公戰戰栗栗若朽索之御六馬無斯須之念不在民是以能常保其治也大觀四隂在下九五剛中復有君子助而象止無咎蓋隂勢巳盛須至誠之道不息治抵於泰而後吉耳五巽體互艮仁以止故於觀能盡其誠而為大觀主上九觀其生君子無咎象曰觀其生志未平也志不忘君且不忘天下曰觀其生二爻陽居之皆曰君子且夫四隂浸長上九雖不當位而道德足以為天下觀使遂漠然無意於時將孰與助五而止隂之消又况隂道日進為天下害君子於此其能自免於戾邪志未平見君子憂君憂時心不少忘也五觀我生上觀其生皆取坤隂生物為義紫巖易傳卷二
