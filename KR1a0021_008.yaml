body:
  text: 紫巖易傳卷八宋張浚撰繫辭下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也易書有作凡以明吉凶于天下而同民患也故下繫首推吉凶貞勝之理使後世學易以著之事業者知所尊尚焉卦列而象具重之而爻成剛柔迭推以盡其變繫之以辭而言動吉凶之理大明于兹吉凶悔吝生乎動爻之動也六爻列位有應有與故象以言賾爻以言動夫吉一也而凶悔吝三之動其可不慎乎剛柔者立本者也爻之剛柔也乾剛坤柔交錯六十四卦之間六位以成卦之大本於此乎立故曰立本變通者趣時者也爻之變通也老陽老陰之數過之而變生且其剛柔相推往來進退為變無常而莫不因夫自然之時故曰趣時君子體之用以制動吉凶自是分矣吉凶者貞勝者也吉凶之道本於得失惟貞勝之貞勝凶則無凶矣貞其大乎聖人所以配天地育萬物生天下從此出也是故天地之大以貞而觀日月之運以貞而明天下之動以貞而治貞者何也一也一者何也道也故曰天下之動貞夫一焉嗚呼一之為用妙矣天得之以清地得之以寧侯王得之以為天下貞是一也自太極發之而其至中之理默運於三百八十四爻間適中則吉過中則凶貞之所以為貞者因其適中而行之約其過中而反之天下之動雖萬變不齊而吾應之以貞莫不適當事幾綽綽然有餘地曰吉曰凶制變在我斯可常吉無凶而治道用以長久也論易至此不亦神矣乎夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭一言盡易之道曰易簡而已矣易簡易書也故上繫論聖人之德業下繫論爻象之吉凶皆首之以此夫乾確然擬其誠也誠故無難知之事而示人易矣夫坤隤然擬其順也順故無難從之事而示人簡矣爻者效此效易簡之義也象者像此像易簡之理也爻象動乎內吉凶見乎外其以有得於易簡則吉失之則凶歟功業見乎變蓋因爻之變以趣於中乾坤易簡我自得之功業以成聖人之情見乎辭蓋聖人憂天下後世而思與之同患辭之所指曲盡爻變生物之情於是而得嗚呼天下本無事也誠能指諸爻象考諸吉凶因天地之自然順萬物之常理行其所當為而不行其所不可為清明其性以奉天心何凶咎悔吝之復起惟夫性以情動情以欲肆欲以物遷邪偽滋生天理蔑棄易簡至善於是而喪內之不足以利一身外之不足以利天下而乾坤妙用始不明於天下天下萬物將不得遂其生矣聖人憂天下後世之情切著于辭其亦有所不得已邪天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義天地好生大德自易簡中來陽舒陰慘皆所以成生物之功聖人配天地而行其易簡之道則亦有仁義而已矣夫仁立而天下歸之非行義以為之輔其能生物乎不然仁或幾乎息也理財在正辭在禁民為非恭儉節用我之不行而強人以行辭之不正者也辭正矣而天下不肯相率為儉且莫知禮法之循禁民為非又烏可已邪玩節卦澤中有水之象聖人之情得矣古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離卦起於數而理備於象包犧氏得易于心者也其臨涖天下以自一至八之數擬諸卦而定之復著自然之象於天地之間用以配易而闡其義凡象之在天法之在地與夫鳥獸之有文土地之所冝莫不心通而默識焉由身至物無有逺近取之不遺八卦用是而成於書故曰於是始作八卦神明幽深之德至此而顯萬物不齊之情至此而盡其用妙矣嗚呼天地之間舉無非易情生智昧心精以虧故易自易象自象方且為物遷變失其本元尚烏能融此一心於天地萬物之表發其至理具之象器以為天下後世利哉古者民未粒食未知火化網罟之作所以生之也蓋取諸離求諸麗焉者耳而中虛之義則存其中包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑包犧氏之智非不能教天下以耒耨而粒食之也包犧設為網罟而已必待神農為之何邪蓋時數之所未至而民心未以為便利聖人不先時而強之也故夫易者因時而已矣因時而易以奉天心變通盡利道乃行焉是易之所以為神也夫風雷為益有木動之象巽工在上致斫揉之功坤土承之興稼穡之利聖人所以教天下而益之也故曰蓋取諸益噬嗑以雷電成體離為日卦自巽變巽為近利市三倍是謂日中為市致天下之民坤衆承之也聚天下之貨離麗居之也噬而合合而決天下以市道交者如此故曰蓋取諸噬嗑嗚呼聖人有作必思所生養天下於先包犧之網罟神農之耒耨莫不皆以生養為心聖人之仁也若夫日中為市致民聚貨以盡其利則有義存乎其中然則聖人之為義亦本諸利乎曰聖人所謂利使天下交相利非若後世之利其身利其國者所為也不然乾何取於元亨利貞四德哉神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民冝之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤上古之時民知生養而已黃帝堯舜以已之心因民之心以民之心因天地之心其事有不得不變其道則民莫知所以然而神夫聖人非私意於變之也易窮而變本諸自然有不可不因焉者也何以知其為易之窮邪夫網罟耒耜之興而輔之以致民聚貨之事民粒食而趨利爭訟之所由生巧偽之所由起也是易之窮也是安可不變邪變故通通故久垂衣裳而天下治黃帝堯舜之所以為神化也歟在上曰衣在下曰裳衣裳之制無為而示於上禮法之化不言而行於下爭訟以息巧偽以除其為大治孰禦哉乾坤尊卑衣裳之義也刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙服牛乘馬引重致逺以利天下蓋取諸隨重門擊柝以待暴客蓋取諸豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬凡此皆變通之道而時之所當為有不得不然者也自包犧以至堯舜其所以生養天下而教之之道得矣古者民至老死不相往來黃帝堯舜而來洪水既定民得平土居之鳥獸之害除稼穡之功著人用滋繁則夫設舟楫以濟不通别牛馬以任逺重是可一日而但已乎重門繫柝防侵陵也斷木為杵掘地為臼而食可足也弧矢之利以威天下而兵以設也宫室之制使之安身也棺椁之用使之送死也終以書契如上所陳非書契則其事無以行也嗚呼觀十三卦制器之序聖人治天下國家之道備盡于此矣其先後本末之冝稽之可以為法用之可以為治更歷數聖若出一聖人之心而天下四海之心無不安之夫聖人無心以天為心天時未至聖人不先之天時既至聖人不後之兹所以神化之妙與民同心而有不可測識者歟凡象之取木皆自巽來或因卦體互見而取焉渙為卦風行水上乘木有功故舟楫取之渙隨為卦乾坤互備動説而隨故牛馬取之隨豫為卦艮震迭見互坎在中有備豫不虞之義故重門取之豫小過為卦震動于上艮止于下有過以濟物之義故臼杵取之小過睽為卦水火用事戎器著象天下睽離非兵曷威故弧矢取之睽大壯為卦陽實承之陰虛以覆宫室之義以壯為美故宫室取之大壯大過為卦上下互巽陽藏其中送死之義不嫌於過故棺椁取之大過若夫夬之書契取義在決書契不立器何以通終以取諸夬義不茍然是為十三卦之象而制器者尚之也是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也易無非象數立而象具矣所以神而明之則自於聖人行象也者像也言象之所從本諸天成諸人也且夫書不盡言言不盡意聖人立象以盡意繫辭焉以盡其言是言必擬於象象必參於意後之學者乃欲捨象以求言意之旨胡可得哉彖論一卦之體而道之變動則效於爻吉凶以生悔吝以著聖人同民之患捨是固無以行於世也繫辭於十三卦制器之後發爻象之蘊示吉凶之生蓋以明夫聖人有作因時奉天以興大利初非任私智為之兹其所以自天祐之吉無不利也歟陽卦多陰陰卦多陽其故何也陽卦竒陰卦耦其德行何也陽一君而二民君子之道也陰二君而一民小人之道也陽者乾道也天道也君道也父道也夫道也陰者坤道也地道也臣道也子道也婦道也大而得專者為陽小而不得專者為陰得專故所總治者衆陰則反此所謂君子小人之道凡以明夫陽大陰小耳觀夫陰陽之理而得失以明吉凶著見焉是以陽貴剛貴健貴唱陰貴柔貴順貴和易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮聖人於是發明致一之義咸九四位互乾中憧憧于二陽之思二陽以類從之嗚呼咸感之道大矣聖人所以成天地育萬物一本諸此究其極要自私念不起中來是以大中至正之道大明于天下施及蠻貊無不感化九四致思於二陽固不失其為正而私狹之心殆未足以盡咸感也夫天下雖大理本同歸道則一致誠能以至公為心顧何所往而不通哉日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也過此以往未之或知也窮神知化德之盛也凡此皆聖人極論同歸一致之理觀諸天地驗諸萬物其往來之相推屈伸之相感莫非自然而妙理實存乎其中是故日月迭運而大明以著寒暑潛移而歲功以成不有往也來何以興不有屈也信何以見往來屈信交相還復以成大利塗雖有殊致則歸一營營思慮之間而欲以已之私智見諸行事豈不重拂于天理而亦奚補乎事哉是故尺蠖之行其屈乃所以求信龍蛇之變其蟄乃所以存身天地之間物各有理聖人泛觀物理而用之於身進退之所宜精神之所舍幾何而不吻合於道邪是故精義入神以曲盡天下之理而用因以致利用安身以深體夫應變之道而德因以崇如尺蠖之屈信以屈求如龍蛇之蟄身以蟄存常因自然不違天心過此以往道通於神天下利之莫知所以為利曰未之或知夫然故窮妙物之神而不遺知天地之化而不昧德之盛大莫有加矣後之學聖人思其所以屈求其所以蟄神化之道得之在我其於經天地利萬物或庶幾焉易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪聖人出而致用莫憂乎小人之或為我害也自困于石據于蒺藜以下深明小人情狀劇言之至於再至於三庶幾夫世之為小人者知所戒懼而改悔焉聖人憂天下後世之心不其仁矣夫其義並詳見於爻説易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也遇其事而無其器君子弗為也有其器而無其時君子弗行也君子者務盡天人之道而已矣子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶嗚呼聖人論小人情狀於是無餘蘊矣小人惟欺其心以欺於天故於不仁不義之為行之無愧而原其設心不過為身謀也身之所安則冒昧必圖之曽何有於天乎儻非利以勸之於前威以懲之於早彼將一肆所欲為而負大惡於千百載之下是以聖王奉天行事以施賞罰折其萌芽杜其微眇絶其本源非徒不使小人之惡得加施于天下亦將以驚懼保全之俾無抵於滅耳之凶也後之有天下其可於小人初起而謂其無能為也而略之不問哉子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑大人休否在未否之前惟其以天為心而不以一已為心是以能不亡也慮亡之誠念念不置是寧有過舉者邪苞桑義見爻辭子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也自昔居台鼎之任德知力三者一有闕則弗能勝其事而況俱不足者乎宰相以德為主有德而無智則不足以應變有智而無力則不足以鎮浮若夫德之不立雖有智力亦無以感格天人而措天下於治矣德其貴乎鼎九四以陽承陰位不中正而又下應於隂德薄也位離明下知小也互兌兌毁力少也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望靜止之功成於內則光明所燭自得于心理之幾微何有不照不待深思而後得也君子獲天之祐吉無不利知此而已夫涉世而動與吉會其道不亦神矣乎方天下悅豫時六二居大臣正位不諂不瀆以交孚於上下中正之道上合於天上無附麗之嫌下無狎比之失全身逺害而禮行朝廷微彰柔剛用之以中可以折權勢之氣可以消淫佚之心有補於豫治甚大嗚呼讀禮傳大學篇君子知幾之道其盡於此矣學者安可一日於是書而忽之哉子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉衆人之所憂顏子不以為憂聖人之所樂顏子自得其樂心之虛靜可想而見矣不善之來也豈不坐照而悉了之邪如鑑之明塵自不止如水之清形自不昧兹蓋必然之理語所謂不二過謂其不復有過心生正不逺復之義若夫聖人之從心則又進于此矣天地絪縕萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也一之用大矣天地萬物所以成化育之功起諸此也一之本在心心茍通一格化之功其孰能禦夫三人行而損一人豈非道義之感所造不同容有二三其心者邪此周公所以輔相成王茂建大治畢召之徒皆不足以擬其專也周公損下上受其益子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶君子之動將以有為也身之不安則必有悖道之事動能有功乎君子之言將以出令也心之不易則必有拂理之言語能有格乎君子之求人將以濟治也無交而求則心已不同矣求能有得乎是三者發於心作於身而其事之從違則繫諸天下百姓如影之從如響之隨斷然有不可易者夫天下一心心法所存不約而感民雖至愚神則不殊此無他一心之所通也益上九立心勿恆旋致或擊之凶夫子以是繫之辭蓋曰天下之禍常起於動作語言用舍之間有國有邦者不可不慎也子曰乾坤其易之門邪乾陽物也坤陰物也陰陽合德而剛柔有體以體天地之撰以通神明之德其稱名也雜而不越於稽其類其衰世之意邪乾坤之數既設易於是而行相應相感陰陽有交通之德或九或六剛柔有不易之體德合而體分象斯立焉天地之撰自是而體神明之德自是而通天地之間貌象聲色莫不皆有自然之撰剛柔迭居天地之撰畢著于象象立而神明妙用即之可求德故通焉君子法之而吉凶與民同患之道備盡於此矣稱名不越不外乎一理也名固萬殊理歸一致聖人先得夫理而名又烏乎越邪嗚呼至德之世吉凶得失之道泯然為一德失而後易作衰世之意聖人有不得已焉者也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報太極本乎一而萬理俱融往者不得隱其理來者不得遁其情數之所攝自無遺也微顯若八物之顯而道則微也闡幽若八卦之幽而義則闡也當名事理之稱也辨物陰陽之分也正言言不失其正也斷辭辭以明夫象也易書有作合是四者而大備矣其稱名也小其取類也大道之所在一塵之微可以該萬有也其旨逺與天地同心不可淺求也其辭文本之自然如四時錯行也其言曲而中委曲而約之使歸於中也其事肆而隱直肆而體之則可以通於神也聖人何區區於此哉或因或二極盡變常之道使天下後世知所避就以悉趨夫中正之域吉凶之理至是而大明矣易之興也其於中古乎作易者其有憂患乎是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權九卦之序文王用之而夫子實明之或曰履也謙也復也用數之一恆也損也益也困也井也用數之三巽用數之四或曰履用九謙用十此悉以卦次言之是皆臆論也文王當危難之世上憂天子下憂百姓汲汲然增修其德故於易取九卦之德以成其德文王之身文王之時文王之事德之可為無出於九卦而文王躬行是德卒成其聖嗚呼至矣哉卦之取九蓋變通之道終始而不息焉者也履者禮也德莫大於禮禮莫大於躬行躬行而德積故曰履德之基也德立而矜心生焉人之常情也若是則違拂天人之心德以浸墮持之以謙其德日進故曰謙德之柄也履而能謙情可制也心可一也性可復也道可得也德之大本於是而得故曰復德之本也知復矣弗能恆焉其靜必變復無益也故曰恆德之固也恆而後能損用損致虛不善之端由以消靡故曰損德之修也損故益益故裕裕始於吾身而用及於天下故曰益德之裕也德至於益德既成矣不有困也德何以明故曰困德之辨也在困不撓道斯可行生利大功自是而興故曰井德之地也井功上出施及天下權之不知必失厥中巽以立制中道乃行故曰巽德之制也是九卦之德也中和內充厥德為至曰履和而至道尊於已光被上下曰謙尊而光至靜至虛莫見其朕曰復小而辨於物始終萬變其一自若曰恆雜而不厭克已於此天下歸仁曰損先難而後易德之日新與天地並曰益長裕而不設於事則鈍於道則亨曰困窮而通淵乎其靜人自資之曰井居其所而遷斟酌應變莫測其用曰巽稱而隱是九德之用也履以和行制行於身也謙以制禮行禮于人也復以自知盡性以至命也恆以一德久於其道也損以逺害偽消而誠積也益以興利利已以利人也困以寡怨取必於天也井以辨義隨取而冝之也巽以行權中正以揆之也是九卦之功也文王之所以為文捨九卦無以見之矣不然嘗試於六十四卦之中求所以為德者而附之九卦吾未知其不可也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適其出入以度外內使知懼又明於憂患與故無有師保如臨父母初率其辭而揆其方既有典常茍非其人道不虛行易以載道於易書而違之是背道也其何以行於世哉易本於天肇於數形於象具於卦變於爻成於自然蓋太極之道在天地先以我至虛流出萬有聖人會太極于一心因其自然揲數以出之立象以闡之設卦以命之畫爻以通之天地神明之理隂陽不測之用萬物無窮之化自形自色自纖自悉神理妙用總括無遺舍易而天地之理或幾乎息隂陽之用或幾乎泯萬物之化或幾乎絶矣是故易道尚變非故多變也數不得不變聖人不得於易而不變之是故六爻之位謂之六虛其道自太極虛中來惟變所適吻合於天地隂陽之數聖人體其虛而用之天下萬物由是而得其生故爻之有變非徒變也剛柔迭推出入以度外內使天下知所戒懼以明夫避凶趨吉之理凜乎若臨淵冰惕乎若登岐坂去不善之心以從於善不待師保如臨父母之畏焉嗚呼易之有功於天下深矣率辭揆方聖人所以用易於天下也用易於天下者必因其時典常之設時所冝也然茍非其人其心固已異于太極矣道其行哉道其行哉易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣夫乾大明終始六位時成而歲功之運千古不息是故易書之作莫不因天地萬物之終始而立其體焉六爻之設剛柔迭移非故為是紛紛也時物遷變與天地相終始有不得不然者矣其初難知事未著也其上易知象已成也雜物撰德剛柔之體錯雜不一而天地陰陽之德於以顯明也辨是與非得中為是過中為非德之至中是非之所分也非中爻不備感求應與之道備於中爻而存亡吉凶可坐而照也嗚呼易道甚大用之於天下國家亡可存凶可吉而易當求之於復復其心以極於虛靜之道易可學焉為臣者冝盡心於此然後以之而導其君庶幾夫忠臣之為也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪二逺故譽四近故懼而所謂逺近者自權勢之相敵為辭也二之柔中其臯夔稷契之倫歟若伊尹周公則有不可不懼焉者耳三五同功諸侯之於天王功固一也齊威晉文之於周有凶德矣文武成王功可勝計邪文武成王之德剛是以勝幽厲平王之德柔是以危易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非它也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉易作八卦天地人之道悉備其中一天也二地也三人也兼而兩之則一與二為地三與四為人五與六為天太極中道於是乎行中無定體隨所在為中變動不居周流六虛道之所行爻之所存也物謂剛柔之物剛柔相雜自然之文成乎其中天地日月之所以運隂陽四時之所以成莫不一本於自然而人事則體之文之不當數所攝也君子趨中則吉小人背中則凶君子常居其吉小人常居其凶吉凶之生自文不當中來故夫聖賢用易有安無危有治無亂有存無亡凡以明易之心而已矣然則學之為聖賢事其可一日已乎易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也嗚呼讀易而聖人之心可見矣聖人憂天下後世之為君臣與夫凡有生於天地間不知欽畏修已以自蹈安平無事之域是故辭不得不危知危而危之則平於危而易之則傾平故吉傾故凶其道甚大心法之一與天地並蓋周流於太虛之間而莫知其紀極者也而象之所示百物不遺因象求意道可得焉若夫爻之終始吉凶微著悉具其中一失厥理凶吝隨生考象玩爻以危為懼易道之大得之在我斯可與天下同其憂患吉凶矣用顧不大邪夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者易以乾坤成書乾一坤二周流于六十四卦之中惟一故健惟二故順健而不繁險以之知順而不難阻以之知險阻者天下之至情而乾坤之畫動於此險阻之幾著於彼蓋陽陷于隂則為險隂困于陽則為阻乾坤得隂陽之變險阻以明大中至正之道於是通焉天下始知所以避就於吉凶而亟趨夫中正之域矣能説諸心順天下之心而明示以吉凶天下之心孰不説也能研諸侯之慮精有為有行者之慮而成就其亹亹之誠諸侯之慮以之研也惟説心故能研慮豈不曰吉凶之理既定君子於是可以有為有行者邪諸侯有民人有社稷其慮為危故獨取諸侯言之若衆人之慮則有無淺深固自不齊也是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能聖人於易得乾坤之易簡而曲盡其變化云為之道有吉而已凶莫加焉吉祥之幾已為先著象事知器器成而天下以之利占事知來蓍立而大疑以之決天地設位于上下成能實待於聖人其道孰先此于二者人謀謀之人以盡其智也鬼謀謀之鬼神以盡其神也聖人之制器設蓍夫豈任一已之私意為之哉此百姓之所以與能而莫不便利之以迄於今也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝自八卦以象告聖人於是論易之情易復于性莫見其朕爻以效動情乃生焉凡易之情天地萬物之情也剛柔雜居而情生情生而吉凶見矣變動以利言吉凶以情遷變動以成天下之大利而吉凶之遷則自乎其情情得其正為吉情夫其正為凶愛惡相攻逺近相取情偽相感皆情之所發也愛惡之正吉生焉愛惡不正凶生焉悔吝者吉凶之未著悔可至於無悔相取之間一有失正悔吝隨之是其可不慎邪若夫情偽之感其端甚微其兆甚大情本於誠偽入於邪感與見於己利害形於事易書盡天下之情偽在學者誠意以明之而已矣凡易之情近而不相得則凶或害之悔且吝申言愛惡逺近之情也聖人憂天下後世而作易故所以垂訓纖悉備盡嗚呼至矣夫將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈聖人於是論易之辭聖人立象以盡意設卦以盡情偽繫辭焉以盡其言聖人之辭本諸天理自然之文與道適契六辭之設為諸子百家言為異端言也諸子百家不明於道而馳騁於辭惟吉人之辭雖未足以盡道亦庶幾乎有常而不敢支離其説者焉是皆作之於心見之於言害道害政為弊至大不可不察也觀六辭而聖人之辭若日星之麗天雖歷千萬年煥乎有不可掩者矣嗚呼辭六而巳凡天下之有言靡不曲盡其情其一吉其五凶辭其可不慎歟非得道之中正者遽可著之於辭歟將叛謂叛於理叛於道叛於事知其不可言而言之不可為而為之故慙也紫巖易傳卷八
