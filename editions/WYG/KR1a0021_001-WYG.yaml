body:
  text: 紫巖易傳卷一宋張浚撰上經乾下乾上乾元亨利貞乾道也元亨利貞徳也道一也徳有四焉自然之理自然之序自然之數不可易也故夫數者一二三四是也數至四而備矣合之為十别之為五莫非自然故夫天有四時地有四方人有四端五實周流乎中五者皇極之中道也乾道也乾以中運元亨利貞終始不息生化之功於是乎出元以始之亨以通之利以裁之貞以固之天人之理無餘蘊矣初九潛龍勿用陽潛於一靜養之功不可不謹說之築巖尹之耕野望之釣渭顔子之陋巷大舜之深山皆勿用也而虞舜之徳正配乾周文實法舜九二見龍在田利見大人三畫一為天二為地三為人有天斯有地有地斯有人以數言也六畫一二為地三四為人五六為天天處乎上地處乎下人處乎中以位言也見龍在田其徳著見言行之脩巳聞於時不有應也徳罔克施利見大人志可行矣舜三徙成都利見於堯其此時乎九三君子終日乾乾夕惕若厲无咎天地設位能以人成乾至於三三才備具君子觀𧰼進徳脩業以配天地乾乾動罔非天也既惕且厲畏天之誠見於此矣徳業其有不大哉雖然君子何惕君子出而同人盖將與天下共其憂是以惕乾三四不言龍龍之在人其變莫測不可以形求舜由仁義行聞善言善行若決江河莫之能禦乾乾也九四或躍在淵无咎四陽既壯其氣上逹徳成於内天其察之故或躍下應初九正靜之心不忘脩已故在淵書記舜元徳升聞莊子謂受命於天惟舜獨也正或躍在淵也九五飛龍在天利見大人虞舜於是不得巳而紹堯之統矣舜豈以得天下為心哉有若飛龍勢莫可禦夫徳同於天然後能霈天之澤聖人脩徳於身積非一日時至徳行孰不觀化而被恵邪禹稷契臯陶之徒相與出而輔舜見大人之利莫尚於此上九亢龍有悔過中故亢九而六之天地之數將窮於是聖賢處此猶難也而况其下者乎盖居富貴極至之地耳目之所感移意氣之所動蕩有不可勝言者矣故有悔云用九見羣龍无首吉聰明聖智守以愚貴為天子守以謙富有天下守以儉皆用九之道九復為一羣龍畢應行中􅂂正不自尊貴為吉孰大帝庸作歌其在是歟彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乗六龍以御天乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧萬物皆出乎一一氣之運形以之統雲行雨施功用出矣自乾而坎自坎而艮生生化化終始無窮理既大明位斯時定乾何為哉乗此六陽之氣均調造化遲速進退制之在我元亨之功於是為大乾道變化聖人賛乾之功也乾之變化聖人成之聖人正心誠意以黙賛乾元變化代興凡物有生各得其正天地大和參之為一利貞行矣首出庶物萬國咸寧不亦宜乎乾元之徳至是而備四徳分之為四合之為一於一之中四以之行𧰼曰天行健君子以自強不息天以誠運其行至健生物大功自是流出君子法天去偽存誠求以自強自強而後能不息記曰不息則久久則悠逺悠逺則博厚博厚則髙明且夫君子之所不息者何道曰善道也君子勉於為善生物之徳可以配天功用大矣潛龍勿用陽在下也見龍在田徳施普也終日乾乾反復道也陽之生數中於三三三而九其變無窮故乾之九三有通變不息之道反復道謂心念之所起無須臾而離於道上下互體俱乾為乾乾為反復道乾道也三位在辰為終日或躍在淵進无咎也進不失正何咎之有惟靜故正乾體具天一成數四應初為在淵居下卦上為躍飛龍在天大人造也九五得陽數正中數與徳符斯可以大有為於天下盖龍至於五而徳全徳全故能變能化其道若神而功利所及者大亢龍有悔盈不可久也盈則失天人之心夫盈天道所虧地道所變鬼神所害人道所惡是安能久哉有大物者必用謙謙斯亨亨斯有終矣用九天徳不可為首也髙其目而下其耳者匪天也夫有為首之心天下孰告以善道何以主利萬物而配天之徳也文言曰元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞仁者人之本心也體之在我天下歸仁故曰體仁足以長人萬善積於中則動皆中禮故曰嘉㑹足以合禮我之為義本以利物何往而不適其宜也故曰利物足以和義天下之動貞夫一貞固而事業其有不立乎故曰貞固足以幹事不言智而言貞惡夫智容有不貞者貞固而其為智也大矣初九曰潛龍勿用何謂也子曰龍徳而隱者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之􅃀乎其不可㧞潛龍也紆朱懐金不足以移顔氏之樂與以天下不足以改夷齊之操曰不易乎世知我者天夫何悶所樂在道夫何憂九二曰見龍在田利見大人何謂也子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也中之用大矣言靡不信行靡不謹自然之符莫可掩也君子方且閑邪於耳目所聞見以内守其誠謂夫有而為之不可易耳閑邪而誠自存曰閑邪存其誠善世不伐謙徳行也徳博而化人心格也一則潛二則見為言行上下俱陽為閑邪一在中為存誠初二皆地位二位近人為田為善世為博二隂數為不伐九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進徳修業忠信所以進徳也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣三四位在人人道以徳業為大忠信則不欺於天人故徳進修辭立誠則有以感動天下心故業修知至至之以内充乾徳故可與幾知終終之以外盡臣節故可與存義文王在􅄮則然詩曰惟此文王小心翼翼文王雖危无咎矣九四曰或躍在淵无咎何謂也子曰上下无常非為邪也進退无恒非離羣也君子進徳修業欲及時也故无咎自三而四卦體於是分發上下進退義夫君子進而有為豈曰富貴是圖而為一巳私計哉盖將以大其徳業而生利萬物於天下其心合天其身何咎且四陽用事萬物發生君子體之安可失也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其𩔖也水火之於濕燥以氣求也風雲之於龍虎以聲應也水火以相制為用有君臣交修之道風雲以相感為用有君臣遇合之道聖人有作如日在天萬物畢照凡以得聖臣為之輔若水火風雲之流從耳故上治則日月星辰得其序下治則鳥獸草木順其性天地之間豈容有失其道理者哉乾五備皇極數水火金木之象具其中上九曰亢龍有悔何謂也子曰貴而无位髙而无民賢人在下位而無輔是以動而有悔也无正位曰无位變坤隂曰无民民逺之賢去之動悔固宜矣嗚呼為君者其戒於亢哉潛龍勿用下也見龍在田時舍也因時而動動得所居生利之功於是乎出終日乾乾行事也至誠不息以應於天曰行事或躍在淵自試也視吾徳之所格者何如曰自試聖賢以生利萬物為心不以一已為心其自試也非私巳也飛龍在天上治也亢龍有悔窮之災也九六之數俱窮故災乾元用九天下治也潛龍勿用陽氣潛藏見龍在田天下文明徳化之所格致終日乾乾與時偕行或躍在淵乾道乃革乾至三而内卦之體具自四以往離乎人而進乎天矣乾道至是而變飛龍在天乃位乎天徳徳同於天曰天徳聖人撫有天下以徳不以𫝑亢龍有悔與時偕極乾元用九乃見天則惟天為大惟堯則之以天為則烏乎亢故夫天運以中聖人有為亦曰中而已乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉四徳緫於元成於貞貞其至矣乎利天下萬物之道自是而出若性情之相為用也是為美利而乾元所以為大君子貴貞用能利物大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乗六龍以御天也雲行雨施天下平也剛健中正徳也純粹精徳之幾於道也乾六陽錯雜於六十四卦之間而天地萬物之情靡不該貫其中曰旁通情乗六龍以調節天地之正曰以御天雲行雨施天徳行矣天下之所以平也天徳以澤物為大君子以成徳為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也徳不成無以孚天人之心君子欽畏天道是以貴於潛也君子學以聚之問以辯之寛以居之仁以行之易曰見龍在田利見大人君徳也君子之成其徳如是學問以求益寛仁以躬行君徳備矣九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣周公思兼三王以施四事則然九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎天地以位言中不在人謂徳進於天也文王有君民之大徳有事君之小心卒免羑里之難其用是道歟夫大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶天地之徳莫大乎生大人生萬物之徳配天地曰與天地合其徳與日月合其明無不照也與四時合其序無不均也與鬼神合其吉凶無不當也大人建用中徳自然之合莫可致詰矣先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎道有以財成之於先政有以欽承之於後聖人與天為一天其違之人受命於天者也鬼神依人而行者也其性其心其情其理惟一耳天且弗違人鬼其有不格享者哉亢之為言也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎進有退之道存有亡之理得有喪之幾惟亢則天下之善言不聞而莫有輔之者方且偃然自謂如日之在天禍亂之生可勝諱邪聖人誠立於身學充乎内羣賢應之中徳以大用能有思有為罔不歸正治道之永配天無極也聖人所以至此凡以知進退存亡迭相消長而能常守其貞耳噫有大物者可不勉夫貞哉坤下坤上坤元亨利牝馬之貞坤道貴順坤所謂順順於道非順於事牝馬取順義而牝馬之貞有載重致逺之功必曰貞云者聖人惡夫順而背於道不足與有為於時者也坤數二為牝馬君子有攸往先迷後得主聽唱而應臣之事也然唱之不以道亦可應乎坤之先迷厥旨安在哉其戒夫君心未格而強之以難行者邪君子必先正君君正道合上以正而唱下以正而應得主之道莫加於此矣學者不可不辯利西南得朋東北喪朋自午而進隂日以長曰得朋自子而進隂日以消曰喪朋盖君造始臣代終人臣立事建業以有為於下失朋儕之助有不能獨勝其任者矣故西南以得朋為利若夫立於本朝左右天子茍非絶𩔖忘私以充盡夫大公至正之道知有國家而不知有身知有君而不知有臣其何以上得君心相與合徳以治天下哉然則得朋臣之職也喪朋臣之心也以是心行是職庶幾足以體坤之道非曰今日得之明日喪之也故夫喪朋云者喪其私云耳歸功以報於上持美以效於君但見君徳而莫或有専事擅權之咎曰東北喪朋為臣如此不亦善歟安貞吉順道喪朋以安其貞生物之功斯為大吉孰甚焉􅂏曰至哉坤元萬物資生大無不包至則隨之萬物賦形曰資生乃順承天乾以一唱坤以二應其道順其承以貞坤厚載物徳合无疆徳厚故莫測其分量含𢎞光大品物咸亨蘊蓄於中者既𢎞發見於外者必大是以君子貴積徳也積徳而泰治可致牝馬地𩔖行地无疆其性順其才健牝馬之貞如是徒順而巳何貴夫馬哉柔順利貞君子攸行柔順不貞則將阿諛諂佞為天下萬物之害君子戒之先迷失道後順得常失弼亮之道得正靜之常西南得朋乃與𩔖行東北喪朋乃終有慶隂與隂為𩔖曰𩔖行生化之功始終不息曰有慶安貞之吉應地无疆臣道至是而配乎地𧰼曰地勢坤君子以厚徳載物地自上而下其勢至順不復有閒君子體之順於天順於道順於理順於人無所不順而徳積厥躬足以安養萬物矣不亦大乎初六履霜堅冰至𧰼曰履霜堅冰隂始凝也馴致其道至堅冰也方隂初生而有履霜之戒聖人其知幾矣乎盖一念之起發之㳙㳙流之江河況夫不善之跡已發見於外者哉馴致大惡無難也聖人謹禮内以正身外以正人辯之不蚤盖非所患嗚呼君臣之間誠難也用察則近於疑疑心一生何以共事惟夫以禮正身而又以正人不待察察而姦邪無所隱其情矣六二直方大不習无不利𧰼曰六二之動直以方也不習无不利地道光也坤有靜厚之徳而六二得中於内所養博大故動而見於事業其直可以上通於天其方可以下法於地直自敬來雖闇室不欺也方自義來雖死生不變也惟直故方惟直方故大吁為臣若坤六二又安有欺天失節之事哉事業之大復何疑也且君子以敬義而行乎内外其設施注措罔不悉契天人之心矣尚何待於習而後利邪竒之而一耦之而四為直方二火數為地道光六三含章可貞或從王事无成有終𧰼曰含章可貞以時發也或從王事知光大也先事則迷三用含章含章盖推美以效之君而不自暴耀於外者得臣道之貞矣書曰爾有嘉謀嘉猷則入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳嗚呼臣人咸若時惟良顯哉夫古人豈固為是區區者乎以謂道之不通於君而君心未孚雖欲行之天下孰與格化故美徳善政必歸之君而弗敢成盖將使吾君身自行之吾知或從王事以續終於後而已或不一之辭所從者非一也君子行此是以恵澤加於天下令聞傳於後世君子之智不亦光且大乎坤三四得互坤中位一以光大一以无咎三含章盖中徳之積耳六四括囊无咎无譽𧰼曰括囊无咎慎不害也四近君在諸卦為大臣位坤臣道也六五得臣之正體四未得位惟含養厥徳靜以待時進而至五臣道亨矣括囊盖内充其徳待時而有為者也漢儒乃以囊括為譏豈不陋哉陽舒隂閉故孔子發天地閉之訓夫閉於前而舒於後生化之功自是出也括囊之慎庸有害邪六五黄裳元吉象曰黄裳元吉文在中也美徳積於中而事業著於下君子之仁孰大於是業以徳成曰黄裳黄中央之色也上六龍戰于野其血𤣥黄𧰼曰龍戰于野其道窮也六五之數疑於乾疑故戰禍亂自此起矣其道豈不窮哉坤土為野用六利永貞𧰼曰用六永貞以大終也乾坤二卦義以大作代君以動造始臣以靜大終天地隂陽之理不可易也用六守貞不先事不擅權不越理不過度臣道之美復何以加於此哉文言曰坤至柔而動也剛坤變則成乾矣故夫論坤者往往淪入於小人之柔順而失坤之貞後世貪位冒寵者或借是說以卒行其私志馴致亂國喪家而莫知悔也君子謹養其剛而用之以柔柔以承上剛以立事至靜而徳方後得主而有常含萬物而化光坤道其順乎承天而時行天以誠運地以誠應天地合徳萬物以生因時而行動不違道然則坤所謂順順於道非順於事也積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不早辯也易曰􅂂霜堅冰至盖言順也隂主於内其事順其勢浸長嗚呼小人在下位而不正之術足以熒惑人主之心意必自阿意順㫖中來以國以家由之而亂吁可畏也惟克巳之君為能辯之直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也敬義既立賢以𩔖應天下悦服隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也无成謂不敢専其事且専其功天地變化草木蕃天地閉賢人隱易曰括囊无咎无譽盖言謹也謹養其徳也君子黄中通理正位居體美在其中而暢於四支發於事業美之至也中徳内充天人之理宜無不貫揚雄曰通天地人曰儒正位居體禮之著於外者也美在其中而暢於四支發於事業盖徳禮之符云陰疑於陽必戰為其嫌於无陽也故稱龍焉猶未離其𩔖也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄震下坎上屯元亨利貞勿用有攸往利建侯􅂏曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧有君徳而後可濟屯屯為卦震坎繼乾坤用事體具四徳􅂏釋之曰大亨貞謂其亨之大在貞非若乾於四徳全也陽動於震變坎之險剛健不撓而生物之功於是出是為屯之貞惟貞斯有生物大徳康屯者必有生物心用以剛健不為險陷厥亨以大故曰屯剛柔始交而難生動乎險中大亨貞乾陽一再索坤得震坎曰剛柔始交陽氣未逹隂阻其施曰難生勿用有攸往戒渉險也居屯務進徳務安人貞其徳建侯所以安人不此之務而欲以兵力勝是動天下兵也此其可邪互坤為建侯建侯盖分地而與之共理期以濟屯夫屯難初若草不齊若日之昧天實為之急之則亂譬夫雷雨之動厥澤未霈易涸也於是而不擇人以勞來安集之得無亂乎故曰宜建侯而不寧震下為不寧盖惟至誠不息之君然後足以濟屯至誠故不敢安寧其道不息嗚呼康屯之利在貞在建侯而不寧又為康屯之本盖人君惟無􅇣而增修中徳然後賢才樂附協心一徳以濟大難不然怠忽驕慢任非其人淪溺陷險而不可復出矣嗚呼人君必至誠生物之心動於内然後屯難可散也屯自坎變䝉自離變天地功用付之水火屯以澤施䝉以明著其用大矣震萑葦為草互坤上有坎位為昧坎變有乾體為天造震下承互坤為建侯自伏犧至周悉用建侯制至後世民兵分為二牧守將帥皆侯也然則後之欲濟屯者牧守將帥之任安可不重其𨕖乎象曰雲雷屯君子以經綸先定規模次興事業經綸也經綸之功起於建侯而所以經綸在不寧方屯天下望治若望雲霓而須雨之來也儻非至誠不息事事得理何以使恵澤必加於下哉乾坤而繼以屯所付者大君宜盡其子誠也陽一再索經綸之義坎為弓輪􅀄九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也得民心非朝夕事初之所以磐桓也志在生利天下是謂居貞位在三隂下而隂阻之為盤桓陽動於一為貞震不喪匕鬯為侯變坎而震陽在隂下陽貴隂賤為以貴下賤其事則康屯之主下賢建侯而得天下心坤臣道賢也衆也邑也國也夫康屯而以身下賢民知恵澤必加於巳胡為而不得其心哉坤衆為得民且爻辭獨言利居貞建侯而孔子復起以貴下賤之文盖是𧰼固有姦雄用之逆天倫亂天下者矣非正也聖人曰必正而後可故爻止曰利居貞而孔子於志行正後發此義意或曰必若湯武而後可為康屯主也六二屯如邅如乗馬班如匪寇㛰媾女子貞不字十年乃字𧰼曰六二之難乗剛也十年乃字反常也震動坎下六二以柔乗震剛將比初而與之合邪則為失正而陽必求隂處之甚難進退惟艱曰屯如邅如乗馬班如三隂並進有互坤體為馬阻險未進為班如二五剛柔相際五為二正應非乗初之剛則遇五而有合矣曰匪寇㛰媾女子貞不字十年乃字盖以二抱節守志於艱難之世而不失其貞也若太公在海濵伊尹在莘野孔明在南陽義不茍合是謂女貞十坤數自震初歴互坤至坎五而徳位俱正君臣之分將復其常曰十年乃字君子於是可以有為而生生之功及天下矣夫君子居屯生養天下心未甞一日忘之獨惡夫遇合不貞動不以禮喪巳違天終不能建立事功以生利萬物而𫉬罪於天下後世恥之不為耳互坤為女子六三即鹿无虞惟入于林中君子幾不如舍往吝𧰼曰即鹿无虞以從禽也君子舍之往吝窮也方天下屯孰無趨赴事功之志六三以隂處震上志動而欲有為於屯險者也曰即鹿鹿性決躁三以互㢲居震為鹿且三居互坤中上下皆隂所應在上上亦隂位動而用柔之剛徳助何以有行於屯曰即鹿无虞惟入于林中若是則非徒莫之有𫉬窮不知反將罹失身之憂矣曰君子幾不如舍往吝二五上下有互艮體艮山為林中山澤之官取名以虞謂山非虞不行也艮止止故見幾曰君子幾夫當屯難之時知己才力不足任事且无剛徳之賢先後之履正而用靜焉雖无𥙷於屯而不至冒昧僥進以敗屯事是亦君子所為也六三雖失中位而以隂履剛又在互艮中得君子之幾六四乗馬班如求㛰媾往吉无不利𧰼曰求而往明也屯必剛徳可濟四以已柔求􅀄剛曰求㛰媾乗馬班如欲以禮而交接於初也三爻取義各不同夫柔遇剛而𫉬聖徳之益往以事五其能輸忠止難於屯矣曰往吉无不利且三无虞入林中四以求往𫉬吉是三淪入於暗而四趨於明也明云者非徒識智之明事業亦將暴白於天下盖四位比五得初陽之應而往以承五冝无不利四以隂求陽陽為明程氏曰居得致之地巳不能而遂已至暗者也九五屯其膏小貞吉大貞凶𧰼曰屯其膏施未光也陽動而上中未出險曰屯其膏夫徳澤未厭人心欲一大丕變之甚難武克商歸馬放牛示天下弗服其後周公於商民勤勤訓勉曾不憚煩不敢輒以刑罰加之懼屯膏也古之欲濟大難於天下先務畜徳於身徳畜而大其動必應深仁厚澤既有以服化其心將何施不得志又奚大貞凶云屯九五雖以剛中履位下無剛徳臣為應卦體雲雷之氣方屯君臣之徳未大孚於天下故小貞吉大貞凶然則五求剛徳以大其中施斯光矣互艮艮為光明隂掩之為未光上六乗馬班如泣血漣如𧰼曰泣血漣如何可長也二三四皆坤體三爻方安靜處下乗馬班如也上居坎險極處而下又無應將何以久於上居屯者其戒之哉坎血卦為泣血坎下艮上䝉亨匪我求童䝉童䝉求我初筮告再三瀆瀆則不告利貞彖曰䝉山下有險險而止䝉䝉亨以亨行時中也匪我求童䝉童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也䝉以養正聖功也離四變為䝉䝉之為卦坎處艮下遇險而止非由物蔽之而䝉也蒙有亨之道若泉止山下淵乎其居時而導之不愆厥中功利行矣匪我求童蒙童蒙求我謂九二二剛中與五本皆離體其志應中以志同五必我求初筮告誠而後告也精神之感道義之孚不啻若挾蓍而應之再三瀆瀆則不告啟廸之道然耳夫占筮至再三則吉凶未定適足為筮者瀆君臣師弟子閒求不以誠而莫之躬行屑屑告之於道瀆矣孟子曰故將大有為之君必有所不召之臣欲有謀焉則就之其尊徳樂道不如是不足與有為初筮有尊徳樂道心告宜也䝉之利在貞而養正盖六五事業五以柔履中得坤之靜復性反徳與天為一無私無欲謹養其正且九二以剛中輔導之養正之功於是大曰聖功言功利著見於天下後世而莫之已也且夫天下之亂常生於中才之主自用聰明而不能復性至靜止其私欲浸以放恣流毒天下其發甚邇其施甚逺盖下無剛中臣告以養正之道使淪溺而與蔽䝉者均也吁可畏哉惟九二所蓄至厚以時行中上應於五志同道合聖功以著君臣之間可謂盛矣艮少男為童蒙坎信初為筮三隂為再三坎水止山下為養正艮其道光明為聖功象曰山下出泉蒙君子以果行育徳徳本諸性克己復禮其徳斯成譬泉之在山下循而通之滔滔兹始果行果於行也初六發蒙利用刑人用說桎梏以往吝𧰼曰利用刑人以正法也蒙自離變坎變其明而離明之體常存於中初六發蒙發其明也利用刑人用說桎梏盖將肅以憲令使天下曉然知所趨向逺罪去惡日趨善域殆有教化存於其中非謂直加刑罰故孔子釋之曰以正法過是而至用刑是懲蒙非發蒙故曰用說桎梏以往吝且天下之蒙久矣聖人不忍天下蹈陷罪惡首著發蒙大訓俾治之於蚤惟人之於身亦然治心修性盖不可不蚤圖必也以聖賢為典刑息心之偽去性之欲靜極明生得蒙之貞不然失禮入邪自罹戚患將無所用於世矣坎北方為刑法坎險為桎梏九二包蒙吉納婦吉子克家𧰼曰子克家剛柔接也包蒙若泰九二包􅂽以吾中養彼不中以吾才養彼不才曰包蒙納婦取女子得其所歸為義隂蒙也婦也包蒙納婦則羣隂畢應人各任職天下之善殆將歸我大臣事業盡是矣是可以正天下而止其蒙曰子克家且九二剛中徳足以包上下羣隂既有以養之又納其可任職者俾佐吾事於蒙誠有功矣雖然此非二功五之功也六五體童蒙之徳方至誠虚已以下應於二二得以展盡其才曰剛柔接剛柔二五位也二剛中有震體震長男為克家六三勿用取女見金夫不有躬无攸利𧰼曰勿用取女行不順也三過中位坎險上互坤為女互震震動三其女之行險而從私欲者歟見金夫謂二二有乾剛體為金三應在上而見金夫女失正也女失正則將失其身何以正家故无攸利女臣𧰼也嗚呼在臣而進不以正惟勢利之視悖天逆人以徇其私必不能忠於君而愛於人尚何所用臣哉三以不中不正資而負坎險之行巳麗於惡昬蔽已甚莫可救藥故蒙六爻惟三獨不言蒙吁若三盖人臣邪僻之尤者矣坎險為行不順處艮下為不有躬艮為身為躬六四困蒙吝𧰼曰困蒙之吝獨逺實也陽實隂虚四居互坤中離明之體盡消視九二上九為逺曰獨逺實實而逺之將無啟迪其蒙者矣於䝉困於道吝且人之自立天地間而可以无咎尤於身者不過誠實而巳惟君子以實徳行已親君子而復性之誠蒙可脫也若小人邪偽虚誕不幸而與之處日積月改浸隨以化困其免乎四近君迺有逺實之困智慮日昬舉措日謬是將何以有行嗟夫居大位者宜以暱比小人為戒哉六五童蒙吉𧰼曰童䝉之吉順以㢲也五位艮中互坤承之坤順艮止有順止於道象夫䝉貞性未逹若泉在山五以順㢲居中誠一之徳與天同心究其所養厥功為大盖非特黜去聰明退托謙沖以用䝉於一時者所為耳故曰童䝉吉堯則天舜恭巳文王純亦不巳童䝉也惟六五順止於道以下剛中之賢性修反徳徳至同初聖功遂成恵利甚大盖君人而以誠一之徳在上賢誰不為之盡力智誰不為之盡謀所收之功將使夷狄禽獸草木各得其生矧人也哉艮少男為童卦自離變六五有離明體是以𫉬童䝉之吉也上九擊䝉不利為寇利禦寇象曰利用禦寇上下順也上九以剛止之徳在䝉上羣隂順聽得天下心有思止昬昧功夫天下皆䝉待聖人迪之聖人以正治䝉不能使天下盡去其䝉盖必有害吾治害吾道於終者是謂寇上九以剛徳下臨羣隂徳位俱勝自上而下禦寇為順以我之順正彼之逆寇將何利曰擊云者擊而散之滌其昬蔽易其強梗徳化之行若虞帝舞干羽而有苗格云艮手為擊三隂居坎險上為寇乾下坎上需有孚光亨貞吉利涉大川􅂏曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也坎險在前阻乾之進乾剛遇險待時以動曰需夫需九五以一陽居二隂中則是陽陷於隂也何以光何以亨盖九五以坎中履乾剛内有剛徳衆陽輔之有不陷之義曰需有孚光亨夫需天下須以養也為天下須非有孚君子剛健不息克盡中正之道其能養恵天下而充其所以為光乎貞吉以中正吉也中正則道協天人治以光大險難聿濟大功以立位乎天位謂五位在乾上必曰天位盖言中正之徳足以格天云嗚呼中正之貴於君也尚矣茍非剛健在内則違中失正注意聲色密邇邪佞徳衰政壊天下失望雖有其位與無位同聖人於需􅂏辭有天位之稱謂不如是無以繼天而大其養也其義不困窮言剛健者必治嗚呼人君於需其勉夫剛而戒夫陷哉利渉大川往有功也需出險而震陽徳施矣是以有功𧰼曰雲上於天需君子以飲食宴樂致中和於一已將以位天地育萬物君子得時之心如此飲食宴樂盖自養𧰼非真為飲食宴樂事也夫君子豈徒求養其氣體心志而巳哉君臣上下同徳一心相與臻乎至和之域庶幾足以盡其義詩鹿鳴燕羣臣嘉賔詩先王非為􅇣樂也小雅首以此篇盖政事之大者其二章曰我有嘉賔徳音孔昭示民不恌君子是則是傚言君臣務徳不務樂其心無須臾而不在天下百姓也雲上於天利澤必下施君子觀象養其身以養人至九五需於酒食則養人之功博矣雖然君子先天下而憂飲食宴樂雖曰取𧰼而君子若有優游忘憂之意何也曰君子中和之養正所以盡其憂時心不然時未可為雖憂奚益天下序卦曰物穉不可不養故受之以需需者飲食之道也夫天下一飲一食之間繫命君子君子知夫天下繋命在我是以謹養中和庶幾不負天下而利澤及之於後夫子曰飲食之道非真為宴樂之事明矣初九需于郊利用恒无咎𧰼曰需于郊不犯難行也利用恒无咎未失常也郊在邑外以邑視郊猶夫外也卦自坤變而初在乾下為郊初去險最逺為恒其徳咎无自生曰利用恒无咎盖君子於需不以險逺且巳在下位而於徳或怠為所當為以俟天命其心不𫉬罪天人故无咎也坤隂也初變坤隂有乾剛徳為未失常夫初惟不犯難以行險而欽慎戒懼不替厥徳常若處險於需得矣豈比夫妄冒僥倖者所為哉九二需於沙小有言終吉𧰼曰需于沙衍在中也雖小有言以吉終也近坎險為沙互兌兌口為有言惟剛中克吉剛中者必強為善而平裕寛大之徳積於中故吉盖需以徳為本為臣於需非有裕大之徳必競利急功昧於逺圖九二處乾中其徳足以應五而衍然在中初無犯難心是以小有言而二五道同志合利澤必將大著於後故𫉬吉也且二非怠於濟需者惟急於徳而緩於難以吾正直屈彼險醜需必濟矣九三需于泥致寇至𧰼曰需于泥災在外也自我致寇敬慎不敗也居易則逺禍廹險則致寇敬之慎之法乾之三其免於敗君子必平其心平其政戒險也且夫剛健不中而前遇坎險是健以行險者也用健涉險必有邀功趨利之心啟敵玩寇之事敗亡無日矣敬慎則知畏知畏則能自反而治在我庶幾可收保全之功於後為臣於需者戒之哉坎水為泥坎北方為寇坎險為災坎上為災在外互離南方禮為敬慎六四需于血出自穴𧰼曰需于血順以聽也文王居羑里時為然陽健承坎坎血卦為血位坎下為出穴卦變坤為順以聽夫䝉大難而處以順舍文王其誰能之文王善處需者二隂陷陽四於位為不正然四互體居離中巽初以明順之徳在坎險下且乾之剛健在内其道足以有濟聖賢事也論易者當通其變九五需于酒食貞吉𧰼曰酒食貞吉以中正也需九五以剛徳處乾上有中正大徳而位天位九二復以剛中應其道足以養天下而納之中和曰需于酒食夫天下不能自養須聖人而養聖人非家至人給以養天下也君臣同心行吾中正之徳於上而天下率化和氣肇豐年應酒食之需莫盛此矣盖惟中正可格天而感人且天下須以養而有不中不正之為是必拂於天而逆於人災害禍亂之將作不旋踵矣民尚何所寄命哉五剛中徳與位稱居險難在前之時剛健不息卒以濟難遂使天下䝉酒食養變憂嗟之聲為和樂之俗吉孰大兹五以中正位天位為貞坎在上坎天一之水物所生也為酒食上六入于穴有不速之客三人來敬之終吉𧰼曰不速之客來敬之終吉雖不當位未大失也上處坎極而賴君子以出險用以終吉三陽在下協𩔖上應為不速之客夫君子有益於人尚矣上六居險上在需又不當位以得君子為應猶未大失況當位而可行其志君子應之其事業豈不暴白於天下哉揚雄曰侍君子晦斯光窒斯通辱斯榮敗斯成且濟需在剛健上乏剛徳而身履髙位自安險中初無補於需曰入于穴惟三陽之來有以強其志復其剛上敬以從之故其失未大終以𫉬吉也嗚呼當需難時已以柔居上而不汲引剛賢用以自輔賢者之來又蔑有欽敬之心徳何自而明難何自而解是將淪入於險而不復出矣可不畏歟坎險為穴互離承之為敬坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川􅂏曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟自離變内卦變離明為坎險且乾陽居上其才健其行與水相違險健而爭是以訟夫訟必思求其所以訟誠信之道虧而上下之情不通訟所由生也惟復誠信以杜絶其原且惕然畏夫情之窒塞而增修厥徳以中息訟訟可弭也恃力必爭害加於人矣故曰訟有孚窒惕中吉終凶且自天子至庶人有敵必有訟兵爭辯詰小大不同為訟一也聖人以天下百姓為心不以一已喜怒為心君臣交孚於上而窒惕省懼惟憂中徳不大無以革其心而化之是以薄海内外罔不率順天下坐受無訟之福訟上剛下險險而健訟此申言訟之所以為訟也心險才健烏往不訟春秋詰夷狄不一盖謂其險且健勢易以訟吾一日徳衰政弛將起釁肈亂不可遏止譬人之身與其家一有不正且才力不勝訟由以生不反身而歸之正爭競是務為身為家害未易言矣訟剛自外來而居二二五各得中君臣以中應剛健至誠聿修徳政而有以止天下訟險健者將易心為恭順彼知夫訟不可成必將順以聽命也利見大人謂九五九五中正天下訟待之以定見大人而誠信之道格其非心訟可息焉不利涉大川訟宜靜宜止徐繹其所以訟而以中正弭之冒昧以爭不思反巳而自蹈險陷則無以息訟矣遯陽下降一變為訟再變為无妄為有孚二隂陷陽為窒乾健在上為惕二五俱得中為中吉訟必有衆起為終凶坎在下其行上與天違為不利涉大川乾陽居坎險為入于淵嗚呼遯二隂既外而乾陽自外來陷乎坎中於是有訟二隂小人𧰼也小人用於時必紛紛生事為國起難非構利即黷兵非黷兵即朋黨非朋黨即沈溺禮文徒為聚訟小人行險而健不肯求安靜之福自非君臣有剛中之徳斥而逺之充吾誠信以行其政令使四方莫之敢侮訟其入於師矣若夫徒有止訟心而剛中之徳不修則君子必不用政事必不立四方必予侮是姑息而致訟之大者兹不可不辯𧰼曰天與水違行訟君子以作事謀始宇宙之内趣舍各殊如天與水違行然謀始所以靖之於先設為書契亦謹始之大者詩云迨天之未隂雨徹彼桑土綢繆牖户謀始之大者盖當閒暇無事時徳立政行天下誰敢侮之舍此弗謀莫知為國矣嘗謂中國於夷狄義利趣操不侔若天西轉而水流東其能無訟幾希王者大正始兢兢然惟恐徳政一日失以肈禍産亂是以謀之欲其蚤也初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辯明也訟戒在初初用柔故不永所事夫忿戾之心一起而能息之以順靜訟必不永訟諸爻率以柔𫉬吉聖人戒夫強愎不悛紛紛口舌閒不知自反而求其直也小有言終吉順靜而言息也順靜者天人所相厥理自明於訟吉矣四以互兌應而為有言互離在前離明為其辯明九二不克訟歸而逋其邑人三百户无眚𧰼曰不克訟歸逋竄也自下訟上患至掇也剛險陷中而二隂挾之且卦體天與水相違二適在坎中遯隂乗之為閒於上下君臣之間道固不同小人䜛謗之說盖已得行矣是未易可以口舌爭也曰弗克訟而義有所不可必為也𫝊曰富而能臣乃免於難歸而逋其邑人三百户恭徳行也臣有恭徳眚其免焉事固有下訟上者乎曰臣不能自節以禮義而區區欲必伸其志於道不遜於天不順有致訟之理而刑罰所由加也是謂自貽伊戚曰患至掇云聖人著此訓明君臣之間道貴於同不同則疑疑則爭爭則亂自非賢哲之君子安能全身逺害以自立於無過之地若二之能逋其邑人者哉且九五中正主也二雖居險中而亦有中徳所以發不克訟之義者自夫卦體之相違明其趣向有不同耳乾陽變坤隂為邑人為逋三百坤數六三食舊徳貞厲終吉或從王事无成𧰼曰食舊徳從上吉也有吉徳有凶徳舊徳謂坎險之舊三雖位在坎上有互離體變坎險為離明曰食舊徳食猶日月之食舍剛險用中順善居訟者貞厲以貞自守而不忘憂懼也懼而知戒居險可吉曰終吉或從王事无成不敢專也且為臣於訟其位過中而不敢專且能洗濯其心以從於上訟何自生坤傳曰地道无成而代有終夫臣而擅君之成命天人所共惡誅罰之所必加也戒哉三得從上之吉去坎險之舊用麗順之正變天水之相違非有剛明至徳莫至是矣九五剛中有事於訟為王事九四不克訟復即命渝安貞吉𧰼曰復即命渝安貞不失也四以乾剛乗坎上且下履遯二隂其位剛過依險以動動必逆理而況夫過中失正暱近小人訟安可克復即命渝安貞謂何渝變也變已剛強之心以順上命且安夫臣道之貞以不克成其訟可吉也互㢲㢲順為即命乾道主變為渝四位互離離明是以能渝夫近臣而悔過易慮安貞於訟以順從中正主其不為朝廷生事而恵利之黙及人亦大矣宜𫉬吉也九四以息訟則徳不足而用靜之功庶幾無過舉於訟夫何失之有九五訟元吉𧰼曰訟元吉以中正也履中守正仁徳大孚息爭靜難何往不宜曰訟元吉盖聖人利天下之功在止訟不在治訟天下事物之來無巳其𫝑必有訟不思止而息之區區欲用其治則智力將有所不逮矣夫訟必本於心之相違惟九五所履中正得乾之仁視天下若一已初無怒之疾之之意且其仁足以化天下而服其心是以訟息而天下治以仁𫉬吉嗚呼中正不可一日忘於訟久矣中正則施為注措悉本於仁而有以當於人心天下誰不悅從故雖強大暴悍者亦將畏義欽服無所用訟況其下者邪故夫爭端之起嘗生於人主不知乎中正之道般樂怠敖自巳啓禍是其不可不慎歟訟諸爻皆以柔吉九四雖剛亦履隂位獨五以剛中吉五君也天下訟待以決且君道以剛為正五方以仁徳止天下訟非剛中則莫能至誠而勉修其徳此又聖人立爻㣲㫖上九或錫之鞶帶終朝三褫之𧰼曰以訟受服亦不足敬也上以剛亢處訟極才健不中有撃柱論功之氣曰或錫之命雖自上其徳非順𩔖夫或者錫之也若齊威普文在春秋時而天子錫以命服弓矢車馬云終朝三褫之服之不自安也鞶帶所以束身而用其恭上挾險不遜是謂不稱其服適足為已羞矣故曰亦不足貴也乾金乾衣為鞶帶互離離日為終朝互兌兌毁乾陽之數三為三褫坎下坤上師貞丈人吉无咎􅂏曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣師凶事也師貞在徳徳足以結天下心以吾之徳伐彼不徳曰師貞已貞而後可以貞人也一陽在内徳進而中為師之貞丈人吉者何丈人謂二丈人徳智俱全之稱仁愛足以撫天下之命法度足以制天下之命謀猷足以託天下之命為丈人五隂有地十數丈人象也九二剛中羣隂歸之五以柔中付二閫外事俾因天下之心用天下之力以興大利除大害是能左右九二而使之用事於師得王道之要矣吉无咎者何師凶事也師若毒藥治病於元氣不能無少損惟丈人知夫元氣在國當謹養而保全之不得已用師將以同民而去其害不殘民以逞欲也是以𫉬師之吉而可以无咎於後夫塗炭之禍非兵莫息然兵非有徳智者用之利未及成而害巳先及天下民之從之適以重禍是流毒天下非用毒以止天下之病聖人不肯為也師自坎變六五本坎五中位變坤之順與九二剛中應其徳本同惟五柔順在中沈潛其剛以師屬二行險而順天人之心靡不悅從知其本心以利天下非害天下故曰民從之吉又何咎夫坎險為毒坤為衆可以王謂王道於是成二剛中五能用二王業以建也嗚呼陽來在一為復升二為師復自心起人君必先復其心使悉歸於中然後能復其情性復其政事以從事於師不然已之無徳幸一旦成祗亂天下非以利天下也可不察歟可不慎歟嗚呼惟復而後可言師𧰼曰地中有水師君子以容民畜衆仁以養之義以訓之先王之兵也水居地中容而有制君子法𧰼民欲容衆欲畜盖不容無以得天下心不畜無以制天下命觀井田􅉌乗法師𧰼見矣師五得坤中盡容畜義初六師出以律否臧凶象曰師出以律失律凶也以義舉以禮動以法制是謂師出以律弗善於此凶固宜也坎險刑法𧰼為律夫師以禁暴止亂用師失律是自暴自亂者所為何以禁止天下暴亂若火弗戢將自焚矣聖人之師以我之正征天下之弗正其出以律初以隂位坎下難作兵動之始也天下休戚所繫聖人故首發此訓九二在師中吉无咎王三錫命𧰼曰在師中吉承天寵也王三錫命懐萬邦也難除而民安之莫大於中中生乎胷中愛物之誠過中則殘不及中則不濟師而用中天人與之故吉王三錫命順命也盖非徒寵數之蕃是欲全天下之民而生之若坤之生物然此萬邦心悅而懐其仁也五處坤位中其為命順承天寵者何中格於天天所眷祐王命三錫天其使之矣九二自乾來曰天寵且二以剛徳為師一卦主六五履順處中俾二展盡其志五若無與於師然聖人尚徳不尚兵不得已有師一付剛中臣為吾排患止難聖人知修吾徳而已不肯以兵爭為己任而臨以剛也聖人可謂知所本矣湯伊尹周公太公得師之中二居下卦中曰在師中吉自五至二歴互坤三位曰王三錫命坤在上曰萬邦師􅂏爻皆具王𧰼六五以乾剛而用坤柔變險以順仁徳為大曰王指五言之師而若五王道顯矣六三師或輿尸凶𧰼曰師或輿尸大无功也三位不中在四隂下有互震體而才徳俱不足號令賞罰莫適為主是謂輿尸尸坤象輿尸有行師之名事不已出也百戰百北無疑矣此最用兵大戒夫三挾險而動才徳既劣且有不肯為國任事心師罪人也六四師左次无咎𧰼曰左次无咎未失常也六四乗坎險處互坤中靜順有常知師不可易為於是左次以全士卒之命左次不幾於慢命避事之嫌歟曰度師之不可進而不進是知彼此者所為也其為國家計至厚復何咎且九二以剛徳為師主四守常足以輔二而濟其剛蔑有失矣晉士匄不伐齊喪而退君子大之楚伐陳吳季札帥師救之曰二國不務徳而務兵遂旋師左次也四以坤順居五震上動而不失其靜且震位居左為左次六五田有禽利執言无咎長子帥師弟子輿尸貞凶𧰼曰長子帥師以中行也弟子輿尸使不當也禽害稼物田有禽姦宄寇竊為民之害者也用兵為有辭曰利執言夫正辭伐罪為天下止暴興利是亦足矣而爻辭止曰无咎何邪夫徳政衰而後有兵夫兵凶器聖人不得已用之用得其人雖足以致大利而征役之起疾病之作創疫之傷財用之費所損和氣固多矣矧一失委任禍均天下其利害豈不大哉聖人以兵為難故為見在辭而又丁寧分别致意於後曰長子帥師弟子輿尸凶言師之用人不可不慎耳坤上為田互震震動為禽坎北方主信為執言長子謂二弟子謂三六五柔中得師之仁為利執言上六大君有命開國承家小人勿用𧰼曰大君有命以正功也小人勿用必亂邦也君子尚義志在天下小人不然喜爭生事惟利是視安可任重於平定日邪其為國生事無疑矣師至上六師道已終聖人以勿用小人為戒且曰大君之命盖大君必欲休息天下而芘其生民方其為天下除害小人並用有不得已焉者患難既平摩撫養愛之不暇寧忍使小人用事於此時以動揺天下之情也哉曰大君言仁徳之大也坤衆為家國三隂為小人坎至四變有互㢲體故二曰錫命上曰有命以正功云者大君體坤順之徳以安養天下為心不使小人任開國承家之責盖所以成天下萬物之功且安養之功於是乎正曰正功云坤載物為功坤下坎上比吉原筮元永貞无咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞无咎以剛中也不寧方來上下應也後夫凶其道窮也比孰為吉五隂協輔一心順從薄海内外罔不臣服比之吉也原筮謂何先王合天下之心以誠惟精神心術之間審而後動動必中理天下用是順比元永貞所以守此元仁也元故無失徳持以永行以貞天下之比其有窮已哉書曰慎厥身修思永邇可逺在兹元永貞也原筮元永貞非剛中之主莫能行之盖剛中則誠動於内不以天下既比而怠於修徳以害其比是以无咎不寧方來既比之效也周公相成王逺服重譯至不敢一日寧處懼後時也羣隂俱應若水行地不舍晝夜曰不寧方來後夫凶謂上上位卦外處衆隂之後曰後夫如書稱紂獨夫上之後時昧慢智不足以有見一夫之為耳䝉曰初筮比曰原筮誠在内曰初在外曰原比之為卦坎位於外原有再繹義於比而至誠審慎若此其有失乎比師之反一陽為復二為師三為謙四為豫五為比聖人既復其心而有以除天下害於師方且法天用謙大功建立初無滿假自盈之心謙故豫豫故比然則比之功始於復用於師成於謙著於豫陽升至比而君臣之分大正君用剛臣用柔天子當陽權歸於一以總攬萬方於上而天下大比矣嗚呼盛哉君天下者可不玩此而加勉矣夫𧰼曰地上有水比先王以建萬國親諸侯水行地上小大相比卒以歸東功利及天下博矣先王法之建萬國以下比其民親諸侯以上比其君若身使臂臂使指小大相維順以聽命制得其道也且比不獨比其跡必將有以比其心而後天下常治不亂親諸侯比其心也讀蓼蕭湛露之詩先王待諸侯何其勤哉先王得比道矣不然利澤何以及天下後世若此夫初六有孚比之无咎有孚盈缶終來有他吉𧰼曰比之初六有他吉也處坤順下為有孚孚尚矣而比道尤貴孚天下未有不誠不信而可以比人且於人之比已其理必不久合也初六有孚在比先故无咎有孚盈缶終來有他吉謂誠信之徳日充終必有應而應之不獨四曰有他吉居比初來比者衆且在巳上者皆順徳君子是可以相與有為於比矣宜其吉四隂中虚為缶坎水坤土相承為有孚盈缶雖然易貴正應而比以有他吉謂何比自下比上以親比為義且當天下大同時君子同心不專其應專其應則比道狹而不順比初六以有他吉大有初九以无交害易之變也易變因時不失其正六二比之自内貞吉𧰼曰比之自内不自失也二柔得中内比初以成其中順曰比之自内夫君子惡夫暱比循私者若親比有徳忠以事上在君子為貞而道可行於君臣已奚失曰貞吉曰不自失比道自近始二比初四比五取内外近比義六三比之匪人象曰比之匪人不亦傷乎三居坤隂中其應在上上坎險曰比之匪人荀鄉曰與不善人居如入鮑魚之肆久不聞其臭言不善足以移人知慮使流入邪惡也三以柔居剛位不得中識闇體順所應在上而跡所近比皆非其人幾何而不至喪身忘家也哉是可傷已坤隂為傷六四外比之貞吉𧰼曰外比于賢以從上也四位居坤上率三隂從五五賢君四能率𩔖從五是為貞顯比之功自四成之語曰君子無適也無莫也義之與比況夫上有剛徳之主從而事之功以立貞吉孰大焉六四徳位俱隂在比得臣道順貞用以貞吉九五顯比王用三驅失前禽邑人不誡吉𧰼曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也比至九五其道大成五以一陽主衆隂剛中而貞且位居互艮上中正之道足以制羣隂而止之内之中國外之四夷莫不效順是謂顯比王用三驅失前禽邑人不誡吉聖人之仁徳也古者天子蒐田講三驅禮失前禽則違而去之者弗之取仁之至也聖人以中正比天下其道既顯而荒逖之俗猶有不化聖人增修徳政而巳不脅以武力曰失前禽寧失之寛也失前禽正所以兼愛華夏之人成湯祝三面之網諸侯聞之相率以朝得比之吉邑人不誡謂内治著明不待誡令盖聖人躬行之徳有以格之比至邑人不誡徳足以洽其心矣何患乎天下不比吉其宜哉坎北方為兵坎隱伏坎弓矢為三驅上以隂在外為失前禽坤下為邑人坤順為不誡讀易至比九五知聖人緩於治外急於治内也九五以邑人不誡𫉬吉中以治内之效也失前禽則遐裔猶有未賔附者撫之以寛而遂其生仁徳益大合是二美𫉬顯比之吉聖人於天下既比後不肯邀功生事於夷狄不毛地也後世若漢武唐宗窮兵極武於顯比失之然顯比而用三驅之禮是聖人亦不以天下比而忘武備也吁孰謂天下未比而備可遽忘乎上六比之无首凶𧰼曰比之无首无所終也禹㑹諸侯塗山防風氏以後至誅聖人度其懐險不悛必將為天下害誅之不疑也上六位坎險上比終已獨失所附從是徳不可以格化而必將至加兵故凶且上下小大相比在理為順不順何所容於天地間曰无首盖恃險而莫知親其主云坎下㢲上小畜亨密雲不雨自我西郊􅂏曰小畜柔得位而上下應之曰小畜健而㢲剛中而志行乃亨密雲不雨尚往也自我西郊施未行也小畜以隂畜陽六四居近臣位體㢲順至徳總攬羣剛而上畜於君曰小畜亨健而㢲卦體有至健不息之誠而又將之以㢲順畜其入矣剛中志行謂四以㢲順承五九五剛中六四比而承之其志遂行健㢲志行故亨密雲不雨徳澤未施也臣之誠意雖通於上而君徳未孚若天氣未應曰密雲不雨自我西郊者何隂陽和則雨西郊隂位自我西郊言陽氣不應也然則小畜何以尚往曰臣事君勉盡吾道而巳不以未孚而怠其愛君心畜道斯成孟子曰畜君何尤畜君者好君也小畜貴往序卦曰物畜然後有禮小畜其必自禮始乎故夫君行禮而天下率由於禮所畜滋盛矣小畜㢲在乾上㢲居己巳乾上位也㢲以入之畜乾之亢大畜艮在乾上艮居寅寅乾三位也艮以止之畜君子之進夫畜亢而使其君復於禮君子之忠也且小畜大畜二卦異者五位耳在小畜則以剛中受畜在大畜則以柔中言賢二卦之義盖人君體皇極之道而沈潛其剛髙明其柔者也剛中以厲進徳之誠故能受畜於其臣柔中以盡虚已之道故能畜賢以畜下惟賢人能用易之中而動無不當於理也隂居五陽中為密雲互兌為西郊必曰我西郊云者我周之西郊也夫聖人之心豈不欲得君行志霈膏澤於天下哉得剛中之主然後聖人之志可行自我西郊聖人之難也𧰼曰風行天上小畜君子以懿文徳仲尼曰文王既没文不在兹乎内剛外順為文徳盖中之發見夫事業者也其道則無不順於天人君子觀象於小畜思有以格君心而正之曰懿文徳疾夫已徳不充不能格也文王能懿文徳而其徳浸以光大化可上行於君矣㢲為風為化㢲在乾上㢲柔乾剛為文徳以一隂畜五陽為懿羣陽之美盡在於是云噫君子畜君必先畜巳徳惟文王之文為能行此吁以文王之徳之美而終無益於紂豈以紂非剛中之主故歟吁為君而用心不剛雖有賢聖之佐莫可救藥矣初九復自道何其咎吉𧰼曰復自道其義吉也小畜自㢲變初以㢲隂變乾陽而上應於四受四畜而能反身以歸道者也且居小畜初所復在道其行已操心必不悖於理是能自畜者也是可進為於小畜時矣故曰其義吉以隂復陽曰復自道九二牽復吉𧰼曰牽復在中亦不自失也初自㢲復乾二於是得處乾中曰牽復不比於初不失厥中以比應九五同徳之君其道必行故吉記曰或安而行之或利而行之或勉強而行之及成功一也二勉從初復得畜之中於巳無失曰亦不自失云九三輿說輻夫妻反目𧰼曰夫妻反目不能正室也九三剛過中且進不知止隂扼其行曰輿說輻乾健為金為圜為良馬有輿輻象四履隂在前三以陽承四陽受畜於隂隂反制之失内外上下之序為夫妻反目互離為目㢲多白眼為反目夫臣之畜君必先正身以正家而後畜道可行於吾室之不正是不能正身也規規然欲信其說於君上不能有行矣聖人於小畜九三示人臣自畜之道盖能畜已然後能畜君天人相通之理也小畜雖以四為主而凡居臣位者皆上畜義故六爻取義各不同六四有孚血去惕出无咎𧰼曰有孚惕出上合志也四五皆曰有孚君臣之際非孚莫畜盖情不通心不同道不合姑相與順從於聲音顔色間畜無益也惟臣孚於愛君君孚於從臣各以恵利天下為心則君受畜而不疑臣效忠而不憂君臣之心若出於一大安大榮何咎之有四以一隂處五陽中有臣徳之一互體離㢲順而明用能有孚血去惕出言誠信之道行無復可憂事也盖四志合於五羣陽並從蔑有能傷者周公歸相成王詩美之曰公孫碩膚赤舄几几正血去惕出象伏坎為血去互兌兌說為惕出夫履上位而身比於君君子歸之且以畜君為己任傷者必至若周公之管蔡是也周公之徳足以格於天而信於人是以成王終悟志以上合而傷之者去其道豈不盛大哉九五有孚攣如富以其隣𧰼曰有孚攣如不獨富也君臣交孚王道以昌致之在臣孚之在君九五剛中六四以誠徳上交於五而畜之羣陽罔不順比剛賢協從則天下歸心莫可解矣曰有孚攣如富以其鄰且夫剛中之主而能受畜於臣不自矜伐惟善是從至誠之感所攣者大宜其富有天下卒能使天下同其富也陽實為富㢲繩為攣如四五以㢲順履乾位内剛外順隂陽交濟為有孚上九既雨既處尚徳載婦貞厲月幾望君子征凶𧰼曰既雨既處徳積載也君子征凶有所疑也居上而畜道大成利澤以敷曰既雨既處盖六四九五其位近比隂陽以和至上為既雨尚徳載以徳任重也婦貞厲守正而不敢忽也月幾望君子征凶居此位當此時不可過也其周公還歸事乎上九以剛在小畜上得君而澤加於民臣道至此足矣聖人特勉之曰尚徳載懼其或慢於修徳而不知積也曰婦貞厲欲其謹守臣道之貞不可一日忘厲也曰月幾望君子征凶欲其用謙持恭於禮不敢少越也盖上九居五陽先於臣道疑若過亢自非體㢲君子莫知自畜而犯義矣周公不敢寧上帝命尚徳載也天命不易天難諶乃其墜命弗克經歴婦貞厲也公孫碩膚月幾望也周公肯越禮而行哉後世言臣道盛者必周公信矣㢲木其𧰼仁為徳載長女為婦互兌在下兌納丁為月幾望兌下乾上履虎尾不咥人亨􅂏曰履柔履剛也說而應乎乾是以履虎尾不咥人亨剛中正履帝位而不疚光明也物畜然後有禮故受之以履以禮行世孰能害之曰履虎尾不咥人亨兌西方為虎乾剛在上兌柔承之以乾臨兌柔為剛履說順之性無所忤拂曰柔履剛柔履剛而上下之分定說而應乎乾謂至誠恭已以順天道履至此而禮行矣禮行於上姦息於下為不咥人亨然則君子出而有臨安可不慎所履乎剛中正履帝位而不疚謂何九五履乾正位曰剛中正中正者為能行禮九五剛健不息徳同於天體大中至正之道以君臨天下禮化既行天下樂推不厭曰履帝位而不疚堯舜事也堯安安允恭克讓光被四表舜溫恭􅁢塞重華協帝奚其疚互體離離日為光明為不疚吁涉世之患為可愕也繫辭曰吉凶悔吝生乎動吉一也而凶悔吝三之故君臨天下者其可危為大盖人君以一身撫御海内内而姦宄外而夷狄乗間伺隙欲逞其志不知其幾向使所履一不正而蹈於非禮則政令紀綱弛於上䜛賊寇攘起於下若虎咥人不可制遏人君其慎夫咥穆王命君牙曰心之憂危若蹈虎尾渉于春冰穆王周􅇣君也能不忘蹈虎尾之憂以戒其臣下況不為穆王者哉宜周室卜世長久也𧰼曰上天下澤履君子以辨上下定民志履莫大於禮禮莫大於分分明而天下不復有覬覦心曰辨上下定民志君子為此盖亦有政教法度存乎其間雖然行禮自身始乾天也君也其徳則剛健而誠人君法乾之剛至誠行禮以化天下而又因天下之情以為之制不矯拂其常理是以天下說從民志以定履不取地而取澤澤氣上通其性說不若上天下地之否盖禮必人情通說而後可久且澤水靜止𧰼民志之定云初九素履往无咎𧰼曰素履之往獨行願也􅀄以陽處卦下下無承之者而能為吾所當為不愆其素曰素履夫孝悌仁義忠信皆徳之清明而履所宜常行者也素履既修往而𫉬應徳斯施矣故无咎且夫君子修身不以已在下位而輒廢其行盖君子之志未嘗一日不在天下操行雖獨其設心則不遺於天下國家今日行於已皆異日施之人者曰獨行願兌下兌西方為素下無所履為獨行九二履道坦坦幽人貞吉𧰼曰幽人貞吉中不自亂也履道者其心安二得中下履初九曰履道陽以一在下為道所履在道幽人之吉死生窮逹視之惟一曰坦坦夫能定者能應況天下固有不可易之正理營營於中曾何補哉二居澤中隂掩之為幽人中正為坦坦互體離有明徳而又得中二盖臣之能定者如是而後可任天下大事履六三亦以一隂而宗五陽而位不中正負凶徳懐異心二適承之聖人故示大訓使後世君子知所法尚而履夫道也六三眇能視跛能履履虎尾咥人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也柔為一卦主位乖中正徳不足矣其欲以威力先天下者乎惟夫不中不正而負恃其才若眇之能視跛之能履是必以暴虐加天下天下亦將從而殘之矣曰履虎尾咥人凶反正俱兌兌毁折為眇為跛互體離㢲離為目㢲為股虎踞必旋其尾履之咥人三位兌上為虎尾為咥人凶履虎尾一也卦以說應亨爻以不正凶得禮失禮之符也三本隂體居二剛上所履失正大哉夫子之訓斷然曰眇能視不足與有明跛能履不足與有行謂能視與無明同能履與無行同跡其凶暴之資方且為天下大害必不能有所建立於天下後世也武人為大君則以立志之剛用僥倖一時後世若西楚近似矣兌隂為武人以隂居五陽中其徳不足其志則剛爻互離為大君為志上下俱陽為志剛夫以一隂總五陽所總者亦大矣惟履位不中徳非其稱是以致凶戒之哉九四履虎尾愬愬終吉𧰼曰愬愬終吉志行也欽畏者後必吉欽畏則無失徳而所履益修夫君子居上位戰兢臨履之心不須臾忘之則其道足以通君而庇民志行何疑履兌為履虎尾乾剛不息為愬愬輔五決隂為終吉為志行九五夬履貞厲𧰼曰夬履貞厲位正當也九五剛中而正羣陽歸之且以乾剛乗兌說有天下說從𧰼夬決之道其可行矣夫因民心說從與之同去其害以正吾之所履宜無所可疵而其道光明也且聖人行禮必將正天下之悖禮者使不為天下百姓患此夬履之㫖貞厲謂貞其徳厲其志徳貞志厲夬道乃成有為不可易也得乾中為位正當上九視履考祥其旋元吉𧰼曰元吉在上大有慶也稽天道以修人事是為視履洪範敬用五事視履之義旋歸也反求諸已仁徳斯大而天人共喜矣曰其旋元吉元吉吉之大者上九位在乾上兌說承之天應於上而人說於下宜其吉且視履聖人克己之學盖履卦至上徳成位尊履道已成方且汲汲益視所履而思有不合於天者必將正心誠已而求致其祥非剛健不息得乾元用九之道其孰能至此哉上與三應三位互離中離目為視盖自視其徳之明與否耳兌下兌說為祥紫巖易傳卷一
