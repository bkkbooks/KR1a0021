body:
  text: 紫巖易傳卷四宋張浚撰下經艮下兊上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣聖人致止虚之功於損誠一既著其虚上達其止内充相感之道成是為咸咸自否來咸利在貞剛柔上下感應相與而止說之道行咸之正也夫天地不交而二氣不通則萬物不得其生惟少陽之氣下降於天少隂之氣上升於地隂陽交感而生生之道於是不窮矣隂陽之感少則一一則誠誠則速聖人取臣巖野間一心相與而化育之功成用此道也柔上剛下謂坤三升而上行乾上降而下際二氣謂少陽少隂之氣自乾坤而升降止而說心之一也男下女禮之誠也心一而禮誠其感以正用能有始有卒生理益蕃君臣相感以致治蓋不異此夫君臣之間誠意不通則其德二三又安能成生生化化之功邪夫惟相感以誠故德修身正並立於無過之地而天下莫不觀感而化也天地感而萬物化生聖人感人心而天下和平此言聖人下賢而得其心用能修身以法天地而大其感於天下也天地以無心相感流動之功出焉聖人之感人心亦以無心無心故格格故化夫聖人無心用天下心為心衣思天下衣食思天下食居思天下居躬行中正之道於上天下從而化之於下德侔天地矣聖人以大中至正之德繫屬天下天下莫不說之是聖人於天下心通為一和平之應不約自然也觀其所感而天地萬物之情見矣謂天地萬物之情本自一致在感以貞耳卦自否來為天地乾上下臨坤位坤衆為感人心象曰山上有澤咸君子以虚受人此君子止性之功君子以吾至虚受天下實無不容無不利山澤氣通雲雨以施君子致虚利澤以大老子曰知常容容乃公公乃王虚受之謂也初六咸其拇象曰咸其拇志在外也止於下動於先誠一之功不著且其感也志在外而專應於四感亦細矣初履隂居卦下為拇六二咸其腓凶居吉象曰雖凶居吉順不害也六二以艮體位互巽下巽為股曰咸其腓巽究為躁卦腓性躁動以是而欲有感於上必顛必覆故凶惟居則靜而順凶可弭也且人臣在下位將有感於上而誠志未孚迺欲直前徑趨不待心腹之思股肱之援其行鮮不及禍矣夫惟以順道自居待上之求身可安志可行也為臣慎所以求感哉二得中為居吉互巽巽順為順不害九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也夫以剛德履人臣髙位當咸感時宜有以格君心者矣而三乃營營於事為末流録録隨人為咸之羞雖盡力有行於下終何補㦲蓋咸以止說為貞初之拇二之腓皆以躁動繫應失艮止常三在艮上而應兊說之隂是亦不能安靜守正以心為感者也志在二剛之隨而欲因之以求說於上其感也失貞矣故曰所執下也互巽為股二剛在前隨二剛以應上為執其隨往斯否為吝九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也九四位處艮止上兊說初離止趨說其感也戒在不貞貞而後吉吉而後悔亡咸九四以正其心為貞夫心貞則虚靜而公所感者大夫感人而不致力於虚靜以大其公心其感也陋矣朋謂上下二陽此以思感彼以思應曰朋從爾思朋從私也天下從之公也天下從則光大矣且四以剛德近君位不中正區區朋類之思有所偏繫於道為戾其何以感天下之賢宜聖人力致戒焉位介二陽中陽動為憧憧為往來互乾上下三陽蔽之為未光大孔子繋辭釋之曰天下何思何慮謂天下有公道第虚靜其心以守夫貞則自然之感得矣營營思慮祗私無益也九五咸其脢无悔象曰咸其脢志末也脢處心上輔下其位居艮背先上不為上之頰舌下不為四之憧憧若夫在上无思无為而躬行大中至正之道是為咸其脢夫言不足以感人而思之所感又狹惟中正之道行於身格於人天下皆曰吾君充損已之功以極夫至虚之徳有行有為莫非中正孰不感格而化之也㦲九五正得乾中體澤之虚其道可說賢為畢止用能淵黙法天无悔於咸復六五亦曰敦復无悔无悔聖功也其道大矣商髙宗夢帝賚予良弼其代予言蓋君盡道於上臣行令於下感之在君而宣布君德者在臣髙宗知所以為君矣志末謂何以志為末得无思无為之正不切切留心於事為之細也上六咸其輔頰舌象曰咸其輔頰舌滕口說也咸以感心為大不求諸誠以盡其所以感而屑屑然從事口舌言辭間必不可以有格矣故用之於上則无以感悟人主而回其心念之失用之於下則无以動化天下而納之於中正之歸聖人於咸上六𤼵頰舌之訓欲後之居上位者感以心不感以言反身而誠以盡其在我者也上處兊澤極而卦體在艮山上有止虚之功惜其以天下說己為心而口說是務故上下莫之信而實利不加於天下也或曰若是則君有過矣朝廷有大議論臣下緘黙不爭可乎曰君子之事君必先求諸感其感也必先求諸誠誠至矣言無不從君不我從天也去之可矣滕口何益兊上為輔為頰舌輔輔車也巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣乾坤動靜震巽先索得之剛柔當位其德有常曰恒亨利貞謂何恒以不息為貞惟不息故能勉進其道厥德有常而利澤及天下後世無窮矣故曰利貞利有攸往云卦象上震下巽乾坤付生物之功於震巽雷動風散終始不易與天地並夫乾位西北坤位西南乾坤無為震巽以常久之德𤼵生萬物於天地間剛柔迭應不違其序故以八卦之位論之震巽復居乾坤中震巽得隂陽一數而又處乾坤中是以巽動有常道以亨也恒久也剛上而柔下言震巽各當其分也蓋咸以感而情通恒以久而分正天地君臣夫婦之理始始終終生化不窮凡以分得其正耳夫君臣皆有常一之德而其徳日新君用剛於上臣用柔於下上下各得其正治道之永豈不宜㦲雷風相與巽而動剛柔皆應恒貞常之理如是夫不與不動不應何以生何以化雷風相與合德以成功也巽而動順於道以動也順道以動其動莫禦剛柔皆應謂乾初上交坤四下從卦體爻位若剛若柔莫不相配也是為貞常恒亨无咎利貞久於其道也天地之道常久而不已也利有攸往終則有始也申言恒非守其故常之恒勉勉孜孜久於其道厥德乃常也蓋天下所謂常莫不皆以不變為常常久必弊無他泥夫事而昧夫道也道以不息為常不息何弊夫天地不息以遂生化之功使聖人於道而止且息何以配天地而成其生化邪惟聖人誠一不息故恒德以著而利有攸往焉觀夫雷風動散終終始始與天地為一生化之理不知何時而有窮己聖人之道豈異此乎日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣申言常德不可一日而怠其行也日月以麗健常明四時以變化常運聖人以不替常行之道故常治卦自震變自㤗來具天地日月四時衆嗚呼讀恒而書所謂君臣一徳者可得而論矣故一德非謂君臣之德如一也其德有常終始不變是為一德君臣之德皆常故曰咸有一德也後之論者失之矣象曰雷風恒君子以立不易方雷動風散雖變而常君子體之守道之正詩曰風雨淒淒雞嗚喈喈既見君子云胡不夷語曰士不可以不宏毅任重而道逺仁以為己任不亦重乎死而後已不亦逺乎立不易方也坤六二直方大敦靜有常不為世變推移不易方之義初六浚恒貞凶无攸利象曰浚恒之凶始求深也天地萬物之理其相感相應求之有漸乃能久初變震位在巽先其求入於四也深曰浚恒君子必信而後動語曰未信而諫人以為謗已繫辭曰定其交而後求夫在下位不度德守已規規然望於上者深以是處恒動必不合合必不久困辱之憂殆將不免乾剛阻之為貞凶隂承三陽為无攸利惟士學聖賢亦然踐履之間要在誠久浚恒猶學步邯鄲而失其故行也子夏教門人先灑掃應對進退蓋入道之序不可躐進動止言語微處志意先定而正身之學一本於此安在夫求之深也邪九二悔亡象曰九二悔亡能久中也二在巽位中巽為不果為進退於恒疑有悔惟其内有剛德而體乾健不息之貞以守厥中用能得臣道之恒雷動風應事業以永其悔亡也二本乾中互體又乾故能久中記曰回之為人也擇乎中庸得一善服膺勿失語曰回也其心三月不違仁久中也蓋久中非剛健者莫能為之且中則无所往而不善曰公曰正曰忠曰仁曰誠凡天下所謂善悉自中生伊尹一德終始惟一久中之功也其用顧不大㦲九三不恒其德或承之羞貞吝象曰不恒其德无所容也語曰人而無恒不可以作巫醫謂夫吉凶死生不可取信也在上位而德不恒誰其信不信何以自立於天地間是必小人所歸而君子所棄矣曰或承之羞以巽風承震莫知守正用靜曰不常其德夫德一不常夫子直謂無所容人惟率意妄行不知自反耳禍患之來視天而吁其何及㦲或承謂二巽體互兊為羞於吝為正曰貞吝九四田无禽象曰久非其位安得禽也大臣履非其位失靜順之常難乎得君得民而於事功有獲矣巽六四田獲三品功位順也恒九四位不中正卦體居震初位在互乾上亢動失正事功不立若田而無獲云曰田无禽謂妄動而田非其田也蓋在上位於恒而無志以動失常之正必不能去民之害而與其利何以有獲邪震動為禽恒自㤗來乾初變坤四坤為田今變之禽不在田矣六五恒其德貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也君道主中主健主斷反是為非常而恒六五以柔居位為恒德之貞何謂也蓋五以柔用中下應九二剛德臣上動下巽於恒為貞然居是時有是德有是臣在恒誠可久矣遂以為君道之常則失之豈知夫吉凶禍福之㡬自此而起㦲聖人之意若曰治安守成之君得賢臣尊任之若恒六五用貞吉矣若創業中興之君大有為於天下乃欲以柔中為恒安能制義於天下使天下畢聽命乎然則剛健而斷君道之正六五在恒為貞非君道貞也故曰婦人吉夫子凶五本坤位為婦人卦體震震長男為夫子上六振恒凶象曰振恒在上大无功也違道而動曰振恒是當天下無事時乃欲變亂先王法度行私志於天下否則闢國聚財欲有為於一時設心本以幸功其得罪天下後世甚大何錙銖之功可録㦲上居震動極且已非剛德仁不足矣故凶嗟夫繼世以有天下莫大乎用常而變常亂法每由大臣生事觀上之訓有天下者不可不察也艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣㢤遯者何聖賢屈伸翕張之道不必處山林為遯遯有亨之道小利貞聖人之戒也陽大隂小隂生而二不戒斯否若是不特不利於其身且將不利於天下國家故遯小之所利在貞聖人拳拳致戒於小人遷善也小人一日而遷乎善則君子之道未至剥䘮而生民畢被其恵天下庶㡬夫不入於否聖人烏得不與之㦲遯亨遯而亨也二隂浸長不可不遯先事逺否明哲之為遯胡為而亨君子為天下晦迹以全其道而待時以有為於後道固亨矣然則君子之於遯不以時之不可為而遂不為亦隂扶而黙救之要求所以全吾之道焉剛當位而應與時行也謂五五下應二二五以中正之德相與身雖在遯志不忘天下五之爻辭曰正志二之爻辭曰固志言不以時遯易志也且二五方至誠協應上順乎天將以止遯於天下其行則又因時遯何往而不亨㦲小利貞浸而長也隂勢方盛不可不及時而歸諸正不正則凶遯之時義大非知㡬者莫能辨之也象曰天下有山遯君子以逺小人不惡而嚴健者止外為遯君子可止則止君子之止不絶小人夫小人絶則怨親則累惟厥中不惡以衛道嚴以守道君子中也不惡若天之無不容嚴若山之靜而止且小人在内有侵陵之勢是不可不止也初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也在下為尾四陽已遯君子去矣初以柔位艮止下難乎居遯者曰遯尾厲夫隂生道窮進必違天進斯否焉士君子當此時守其志樂其職可也安用往詩曰君子陶陶左執翿右招我由敖其樂只且勿用有攸往也不往則不否何災之有六二執之用黄牛之革莫之勝說象曰執用黃牛固志也六二不言遯六二遯於道非遯於時且志專應五故不言遯黄中也牛順也革固也二執中順之德時雖浸否已一意嘉遯主莫撓莫奪處遯而能决所從向可謂君子㢤坤中為黃牛陽外為革互兊為莫之勝說噫二其太公望散宜生之儔與九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也小人浸長一大正之甚難姑容說之使不為吾道深害君子之仁故吉下比二隂為係隂承之不安其上為疾厲二隂為臣妾處遯九三位尤難㢤二隂方用事係之為吾道累凡學為君子而處此其去决矣聖人迺𤼵畜臣妾吉象畜斯順順斯從蓋庶㡬乎小人之革心從化也聖人以天下為心不以身為心拯溺救焚不肯但已其訓甚大也九三有乾剛德而位不中正故先疾厲而後獲吉云在剥貫魚為君道之利在遯畜臣妾為臣道之吉易道通變聖人用易亦通變未可與權不足言易也然臣妾之畜可小事而已蓋小人雖退聽終不可與大有為於時彼其包藏之心方進而未艾故也九四好遯君子吉小人否象曰君子好遯小人否也好遯非君子本心不得已也遯而亨故吉伊尹去桀微子去紂懼夫一木不足支大厦而正道將墜不可不去也茍不度時變必欲引朋合類僥倖萬一是誠小人所為恐適足以産禍召亂於後日曰小人否聖人之訓微矣夫隂進而二其勢方盛四位近君下應於初知時之不可為捨好從遯剛健以斷不牽私交君子之勇也互兊為好九五嘉遯貞吉象曰嘉遯貞吉以正志也聖賢美利之心湯居亳文王居岐嘉遯也乾中為嘉志在利天下而不在己私為正志若人君履大位不可言遯嘉遯正志湯在亳文王在岐是也上九肥遯无不利象曰肥遯无不利无所疑也時苟窮矣退而養德奚嫌上當天心復何疑於已也且羣賢俱遯我又何疑孔子歸魯孟子出晝盛德令聞千世不泯若漢留侯願從赤松逰誠恐平勃絳灌輩未知其心肥遯之次也楊子曰至蠡䇿種而遯肥矣㦲蠡又其次焉夫有上九德當上九時遯斯肥茍无其德而遯遯宜也何肥之為陽在外為肥乾剛為无所疑所利在道曰无不利乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣壯而負恃天下之情正則善用其壯故大壯利貞三陽為泰隂陽各得其中也壯過中矣惟貞斯能自反以守其中而中和之氣常存是以利大壯為卦震陽以一動乎外而應乎内蓋自反而守夫中者也大者壯也剛以動故壯合卦體而論其所以致壯也乾剛動於上陽氣振達萬物滋生聖賢法之功利以興孟子曰以直養而無害則塞乎天地之間言君子剛動之德配天地不可屈也大者正也正大而天地之情可見矣聖人推明大壯之正與天地同也天地之情異乎天下之私情正大而萬物敷生焉何㦲天地不壯無以成動出之功君子不壯無以立朝廷之治元氣不壯無以保一身之安陽勝隂剛勝柔君子勝小人正氣勝邪氣皆大者壯也惟不貞則必暴必折必拂常必逆理而違厥中何以生何以治何以強兹大壯所以貴於正與方春之中陽氣振達羣動欣榮正大之功也大之得正蓋以能復用其中而已而其情則本於生物異乎天下私情也象曰雷在天上大壯君子以非禮弗履雷震於天仁德以大君子克己復禮天下歸仁當時仰治後世化德為壯孰大堯舜禹湯文武得之於上周公孔子得之於下乾在内為禮傳曰禮必本於天君子執禮之中得配天地故禮行於身天下化之敵國畏之陵爭以息馴致大治壯之貞也然則後之君子欲得志於天下莫若反身而求之禮吾所為誠合於禮而動無過失與天下孰不歸心而愛之若父母欽之若神明夷狄雖強可使革心畏服也壯有大於此者㢤初九壯于趾征凶有孚象曰壯于趾其孚窮也位在三陽下剛德未充而急於求壯曽不知反已以自修焉壯于趾之謂也夫在上用壯攻之疾之惡之者衆必不能附一天下而得其心在下用壯以拂戾於人心其難以有行於世而自罹伊禍信㦲君子貴中惟中則動必當理其道不窮陽健在下為趾居互乾下衆陽抑之俾不得坤為征凶為孚窮九二貞吉象曰九二貞吉以中也當大壯時二以剛中履大臣正位德充勢盛疑有大過人之為而二一守之以中美㢤夫士君子以剛德立人之朝其志必欲盡革天下之弊而興其利鋤去小人俾無遺種志固善矣誠恐夫矯枉過正激成禍端非所以為天下長久計中故貞貞故循理而動其建立於天下國家者一一中理後世不可復易是為貞吉堯舜之世禹稷契臯䕫相與都俞賡歌於一堂初無變常駭俗之政而天下隂受大恵中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也陽極而壯小人以壯為說故用之君子見㡬至剛若柔老子曰天下莫柔弱於水而攻堅強者莫能先罔也用罔則中和之積參天地故能興大利成大事揚雄以罔直蒙首冥配四時罔繼以直𤼵生之德從此出也用罔有先天之功貞厲謂用壯之危可戒冝以貞守也互兊為羝羊二隂為藩前遇剛為羸角遯九四大壯九三皆𤼵君子小人象三四有剛德互體得乾之中而其位則不中不正且居否泰隂陽易位間顧處之何如善易者求之德不求之數德可以消數而弭其變也嘗謂易論君子小人各以卦之時揆之若大壯𤼵小人象謂雖有剛過才視君子之罔差不足耳非直若世俗所謂小人也故夫用罔之義惟周公為能盡周公以叔父之尊有大勲勞於天下羣賢皆樂為用周公之道大矣而公孫美不居不驕不吝以大中至謙之德納天下於禮樂和平之域其所以居壯者何如後世如唐李德裕才術之優唯識量氣度方周公為小及得君得位竊竊然恃其勢力快意朋黨之私用不旋踵而敗唐之大業卒以不振用壯之過也觀周公之得與夫德裕之失大壯九三之象思過半矣九四貞吉悔亡藩決不羸壯于大輿之輹象曰藩決不羸尚往也九四履剛居震動先其位不中且四陽方壯已獨處先不貞則過能无悔乎故貞吉而後悔亡四以震之一復應乾初是以能貞互艮止互巽順止而順貞之功也蓋人臣當大壯時而以止順之道事上則道孚志行事業必大任重載物綽有餘裕矣一隂在上莫之能阻為藩決互乾乾變坤得之四又履震位才健足以載上為壯於大輿之輹坤為大輿以乾變坤為壯輹尚往者何與陽也與君子之進也勉君子有為於天下也六五喪羊于易无悔象曰喪羊于易位不當也沉潛其剛君道之變大壯四陽浸盛其進甚銳六五位適處上非有中和至德化服其心使無所用壯悔必生焉剛健者獲用強硬者革化易之功也易其德易其心無所不用易而後至誠足以感動之五得中得位且卦有互巽互兊體順說足以得羣下之心兊為羊兊毁為喪羊乾在下為易乾以易知易實君德故大有六五亦曰易而无備若旅上九喪牛于易不欽厥德以失其土地人民是慢易者所為非易簡之德也易象不可一軌求嗚呼居大壯五位亦難乎其為君矣用得其道則周成之衆建諸侯皆所以藩屏周用失其道則唐自德宗以後藩鎮擅命莫可誰何矣非六五有坤順之德動靜不違天人之心何以无悔㢤位不當云者以柔用易非君道之常得位則為夬矣上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也用壯而不知止之戒震其性躁動震位卦上下有互兊體若羊之反角觸物勢不能自已為羝羊二隂在上為藩處卦窮極為觸藩窮極故不能退履隂故不能遂且君子進而有為必其志先定於内然後度德量力緩而圖之鮮有不濟上六以隂柔處大壯極至之勢而已之才德不能止壯冐昧以固其位踟蹰以幸其成幾何而不敗㢤惟難則知止故吉蓋上六隂位非一於亢者艱可免也變夬變乾為咎不長夫四陽在下而已以隂竊據其上位不中正且莫知求應為已助以至夫事窮勢極不能退不能遂亦可醜矣坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉自乾變六變而離位乎上坤位乎下明以順故康康安之至也身安君安民又安之為康錫馬蕃庶況侯才健且順曰蕃庶言其才之無不宜也乾變坤為馬致之自侯錫之自君曰用錫侯坤象也君乾象也晝日三接況侯德明而不亢接之至三則上誠而禮盡下謙而體恭君臣之間以明德相與而光被天下矣坤三隂在下為三接坤衆為蕃庶離為日讀孝經諸侯章康侯之義備見矣明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接古者以日中象君旦至夜象公卿諸侯大夫士庶順麗大明柔進上行正以申論康侯明德柔進謂柔道進而上行麗大明而得乎君以致錫馬之蕃三接於晝也觀四進而為晉之五曰柔進象曰明出地上晉君子以自昭明德君子逢時若日方升其德上格於君下被於民天下有目趾者莫不賴以生養安息君子清明在躬修已之功不斯湏廢有為有行德自昭著非急急然昭之也夫時可進矣德之不著道之不行君子恥之故曰自昭明德云初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也位居坤初以隂處隂其進未决曰摧如互艮在上艮山為摧小人扼君子之進其勢若山夫君子難進易退守道履正惟貞是守罔孚奚患孟子曰我無官守言責進退豈不綽綽有餘裕㦲晉初以止靜為貞九四剛過其位離火有炎上之性而初以坤順在下為罔孚四互體坎坎為小人道茍不同進祗辱也摧如宜矣坤博大為裕不裕將有戚戚之咎未受命謂何初止坤下離明所未燭也若受命而罔孚必當思所以孚安可裕六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也君子以進為憂憂道之不行也憂君之未信小人間已也惟憂故能貞惟貞故獲吉詩曰靖共爾位好是正直神之聽之介爾景福中正者必獲福於上下夫中正天下之直道幽明共喜而福之也以直道事君則言信道行生民蒙恵受兹介福理無疑矣二以隂居坤中為中正互體坎在前四以剛阻之為愁如王母為五五柔中曰王母昔召公不說周公為作君奭召公以主㓜國難恐文武之業或墜而已才德不足勝其任於是以天下為已憂而有不說之色愁如義也後之言人臣大忠大節者必曰周召受此介福召公以之六三衆允悔亡象曰衆允之志上行也記曰不信民弗從民從則志行夫民從而志行君子躬行之應也三居坤上有互艮體博厚靜止之德養非一日且三順以麗明天下信而從之曰衆允坤為衆漆雕開曰吾斯之未能信夫不信而進則拂人心敗國事為悔莫大故君子必信矣而後能取信於人人苟孚信悔復何有然則為臣而居上位於晉非德若六三信而後進是自貽罪於天下後世也可不慎夫九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也變乾之健而坤順在下曰晉臣德以順為本也六變而離明居上順而麗明晉其光矣九四自乾變坤五變而四復歸於陽有互坎體棄明德包險心曰晉如鼫鼠貞厲夫鼠晝伏夜動伺隙肆欲鼫鼠其大者也九四位不中正以離體居互坎中互震初互艮終止於晝動於夜譬諸侯德昬漁獵其民人而奄有之者大臣貪得懐私疾賢而畏人者其趨嚮舉措若鼠趨明麗物然危可勝言㦲曰貞厲厲其貞也鼠惟麗物而不自以為危卒不免難為臣者可不戒夫且四以剛厄三隂之進疾賢之大者跡其設志不過欲叨竊利禄以肥其身及其家而已陽大為鼫坎為鼠六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也此文王伊周之心也離居坤上柔進上行臣有明德而用之以順故悔亡五位在離中離為日月初明終晦為失得離中虚為勿恤出坎為有慶獲六二正應且在下者莫不順麗其明為往吉无不利夫聖賢進而處危疑之地呼吸之間吉凶以生若文王居羑里伊尹營桐宫周公遭變其進亦難矣惟夫體明順之德且左右獲賢才助用能均大福於天下勿恤云者不當恤一己私往盡愛君愛天下心斯吉矣臣德之盛也易不可執一求坤晉明夷遯之類五位不專主君要當揆其為一時卦主而論其宜也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也剛過而窮曰晉其角其明德可用以自治曰維用伐邑知窮而厲必戒必止故吉吉故无咎漢蕭王陳李之賢不知剛過而自恃為貞卒不免難其吝孰大然則剛過而有明德之臣人主用之以弼違止難决勝其任若屬以經綸燮理之柄悖矣詩云惟仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏強禦山甫晉而窮㢤坤為邑離為戈兵曰伐邑離上為未光離牝牛為角離下坤上明夷利艱貞彖曰明入地中明夷内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之文王難在外箕子難在内文王順以蒙難箕子正以守志為道為天下心一也晦而益明曰利艱貞明矣以晦為貞知其艱而用晦是以貞自坎變為艱離為文明坤為柔順卦變坎互坎又在中為大難為明夷明夷明傷於内也昬亂之世主徳虧闇若日之入於地中然讒險得志於君子有明德者從而傷之君子不為明傷而變其志故處晦而德愈明也吁有文王箕子之明德而終莫之能導紂而反諸正而已反被其害性習之移不可變耳夫文王箕子有愛君之忠顧其心豈一日忘於君也㦲其用晦也有不得已也坎為晦二陽陷坎險其離明之德雖傷於内而終莫之虧為利艱貞二陽蓋箕子文王象象曰明入地中明夷君子以莅衆用晦而明明夫當求之晦夫士君子欲有為於世而規規然自衒其明攻之毁之者必至矣惟淵黙靜重退藏于宻因時而動事業可興晦尚矣況居明夷時明可復用乎文王在岐化行江漢履柔履順履仁而明德益昭於天下君子用晦明可復也且一身之間知用晦則神氣守而智益明雖酧酢事變不失其性不獨莅衆當晦也坤為衆明入地中旦而復明曰用晦而明初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也微子去之正此象君子見㡬以義斷恩夫箕子奴比干死羽翼既傷微子之道孤矣是不可以有為明甚不去將為身害為正道害漢穆生以醴酒不設决去就亦庶乎知學易者離為鳥初在下為垂翼離明為君子坎一變反兊為不食為有言歴離之三爻為三日互體震在上為行為攸往四正應初居互震中為主人且賔主相應其情易通而猶有言義難明也惟初德剛志明故能見㡬而行不然牽於言而陷於險矣左氏謂有言為讒言取當時筮卦之義云耳易用於筮其變不同六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也二有中正至順之德麗二剛間大明在下豈文王居羑里時邪非才健志順若太公閎夭散冝生之徒宻為之輔何以卒免於難得君子助曰壯吉二陽為馬坎一變有互巽體再變艮三變離巽為股反巽為左股艮手拯之曰拯馬順以則者何順以法天也如日之行晦明地中以晦逺害順以則也九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也武王於是不得已而將行天罰矣周武不忍坐視天下之險思大其明德以出天下於險曰明夷於南狩三剛徳在諸侯位以離承坤離麗為狩坤西南為南狩上應為得大首用明去闇化之有漸曰不可疾貞書曰既歴三紀世變風移如之何其疾也徐而貞之民心可革離明在下坤順在上明德之升順道以動其動也時為不可疾六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也太公常事紂而為之心腹知紂志不在天下不敢負天下而私紂以留也曰于出門庭坤中為腹變坎為心互體艮為門庭六五箕子之明夷利貞象曰箕子之貞明不可息也箕子有君道而在臣位商所以亡也聖人謂使如箕子立而獲主商祀周焉得有天下故以箕子居明夷五位示微意焉箕子後為武王陳洪範武躬行之為天下後世利是為明夷之正嗚呼箕子有志於明道無志於愛身道不𫝊箕子憂也夫正道而息於天下非天地心君子之貞參天地是故文王以晦明為正箕子以不死為正至矣㢤故曰箕子之貞明不可息云嗚呼武王之未盡善吾於此見之矣武王有虞帝心豈不北靣事箕子邪箕子不以商祀殄絶為恨而傳道於武王若箕子則心同虞帝矣上六不明晦初登于天後入于地象白初登于天照四國也後入于地失則也明夷自坎變至上安其險不變而明德以衰復入於地蓋商紂之象云坎四變互乾承上為登天六變坤在離上為入地嗟夫紂之不道晦而已人主其慎夫惑之者㢤惑斯怠怠斯晦夫明性本有也卒歸於闇亡者習焉耳習不可不慎也四隂為四國失則謂失照臨之道觀上失則之訓知六二順以則天為文王矣離下巽上家人利女貞彖曰家人女正位乎内男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣家人自巽變再變為離巽化也入也離禮也明也家人以禮為本巽以入禮内明外化家道於是成上巽下離皆女象自古家國興亡莫不一本於女禮以大㛰為正女貞則無往不正也故家人以女貞為利序卦曰明夷傷也傷於外必反於家夫治亂自家始家治自女貞始明夷之傷當求之家以復其傷紂之不明晦妲己惑之而已惑於色而慢於禮紂之所以亡也女正位乎内男正位乎外男女正天地之大義也家人又有互離體二隂居離中而四陽悉當其位曰女正位乎内男正位乎外夫天地正位化功遂成男女分正德配天地風化之美可使天下各安其性命之情生育之功茂矣斯義為大雜卦曰睽外也家人内也蓋剛柔易位後必有睽睽起於内而形於外其害遂加於天下然則男女之位其可不正邪家人有嚴君焉父母之謂也父母主恩而曰嚴君不可以恩廢禮也嚴其貴乎不嚴則孝衰矣古之君子誠身行禮嚴於禮不嚴於事禮行而威德著矣離火勢不可犯為嚴君父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣言禮樂教化由此出也夫人君正家於上凡天下父子兄弟夫婦率從其化而正於下則陵犯不生而天下志定天下志定故其治定禮行於家樂以是生教以是成其效豈不大㢤初上以剛位上下為父子自二至五隂陽各得其配序為兄弟夫婦且家人互坎在中坎險也家道不明將流入於坎險惟離明變之而禮化之行其效足以致天下之定而險難無自生可不謹邪可不慎邪象曰風自火出家人君子以言有物而行有恒風象化火象禮化自禮出君子於家必誠其言行非禮儀法度不言行又踐之誠故著著故不息禮行一已化成天下夫天下一心一性一理也君子言行即天下言行其應若響有國有家者安可不慎與離火為言巽風激之為有物互坎坎水為行為有恒習坎亦曰常德行初九閑有家悔亡象曰閑有家志未變也治家在正始始正而後上下之志定陽外隂内為閑初九以剛德位離明下故能閑家於始而正其志云六二无攸遂在中饋貞吉象曰六二之吉順以巽也承命而行婦道之正閫以外不敢專也漢唐女后之禍率由家法不立戒㦲坎離水火交錯為中饋惟臣亦然盡忠於内效順於外臣之分也權出二則分分則亂春秋大夫出疆無遂事况在國乎二柔順中正以巽於五是以无攸遂而獲吉若二非明哲者莫能也九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也嗃嗃從正嘻嘻恃寵得失之理自明九三剛過於中雖未能履躬行之化而三有剛明德用能嗃嗃其言規以禮法故悔厲於前而獲吉於後蓋禮勝情必安禮貴於家尚矣若夫嘻嘻安逸見於婦子間日積月習防範俱廢能有終乎三位互坎中上下皆具離體家道昬明於是分故其取象如此嗃嗃水火相激聲然則家人嗃嗃以言教也有孚威如以身教也言之與身其效相去逺矣六四富家大吉象曰富家大吉順在位也上嚴下順家道斯肥四居近臣位以順為百辟天下先而下莫敢不順上以承化下以順應治道斯盛譬諸家長者順少者靡不率從風化之行王業可成也故曰大吉四位巽初位居互離中離南方萬物畢亨為富惟四巽順而有明德是以能富其家也九五王假有家勿恤吉象曰王假有家交相愛也王者之於家必欲小大各盡其道若曰如是亦足矣姑息之心一生禮浸以慢為家之害不可勝諱先王自家而施之天下不恤私愛以行其所謂真愛上下内外更相警敕日慎一日率由於禮義之中其效至享國長久小大蒙福交相愛之實著於是矣夫禍變一起上而君下而臣宗族室家不復相保向之阿媚諂諛欺誑誕謾以敗法亂常者真吾之害而吾亦有以害之也豈若勿恤而交相愛乎五剛中以巽體居重離上德仁而明蓋禮行於身於家而方孜孜焉自謹於禮不敢湏臾忽之者也故聲色邪佞莫得移之而能盡假家之道嗚呼盛矣夫上九有孚威如終吉象曰威如之吉反身之謂也禮之用大矣禮化既孚不嚴自畏己正於此威加於彼必然之符也蓋家道以禮為本而禮先正已已正則有以化服其心不敢私毫違犯禮義若天地鬼神臨之是為威如威如而家治家治而天下治矣先王反身修禮自身達之家自家達之天下政事綱紀正於上而夷狄蠻貊莫不斂衽畏服不敢啟陵侮心威如之吉孰有大於此乎兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行說而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣㦲家人男女正位隂陽各得位相應睽反之二三四五隂陽失位而火澤二女象成是為睽同中有異曰睽二女同居而志不同行勢則使之也聖人甚懼天下之志易以睽而思其志所必通與夫事之必同而類者將以合天下睽而一其志此睽卦之所以立也說而麗乎明柔進而上行得中而應乎剛謂何說明卦體君有明德臣說而麗曰麗乎明且遯二隂自家人進為睽五雖柔中下應九二而剛賢畢輔以敷中德於天下故小事吉睽非君臣剛中不能合德而大有為於時六五柔中故可小事而已然則人主不幸處睽宜務剛其德㦲鴻鴈美周宣詩萬民離散勞來還定安集之宣王居睽而吉者也宣王用柔不可大事天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣㢤言睽有不睽之道也蓋天下固有其跡暌其事其志則一得所一而同之造化可通鬼神可格夷狄可服禽獸可馴是道聖人始用之於一身終用之於天下國家睽中復有不暌者存其用大矣初上為天地坎離水火交變其中上下相合以生養萬物曰其事同二三四五為男女隂陽之位雖失正而坎離互居於中有男女正配象曰其志通隂為萬物二隂俱處離中萬物相見之時曰其事類蓋萬物形狀不同而人與人為類鳥獸草木各以其形其性為類有不可得而少易者也噫天下睽離本於跡同而志殊二女同居而睽是也若夫天地男女萬物則不然相待以致用其事其志蓋有不得不一者惟聖人得所一而同之是以功利洽於天下而足以成天地之能聖人之道可謂盛矣離上下有互離澤下上有互坎水火之動不已而性各趨其上下睽之立象如此象曰上火下澤睽君子以同而異火水有交濟之道若火之與澤為性相反不可復濟天下睽離象也君子知夫天下之心本自同一𤼵而為志所趨則異於是一視以仁將以復天下心而止其睽曰同而異蓋有禮制存其間上下親踈貴賤各當其序君子小人下及四民安其分而不相踰越其異也乃所以大同之使志與事皆定如是而睽可合也初九悔亡喪馬勿逐自復見惡人无咎象曰見惡人以辟咎也睽道貴合初以剛說應四為悔亡喪馬謂何睽初雖有至健才未可行行必疑曰䘮馬得應則馬復夫何故四實下之也蓋睽必上下相求而後能有合四位離隂先有互坎體為惡人方睽雖曰惡人義不可絶絶則為正道害孔子見陽貨謂其用事於魯不可不見息睽一道也乾為馬卦自艮變再變有乾體初動以應四四下之復成乾故有喪馬自復象七日歴六位而復初也夫天下睽離之始坎離水火交戰於前是兵戎之㡬也四以炎上之性行險於外視在下君子意蔑如矣非剛說若初不以四惡人而逺之使有害君子心吾道其墜曰避咎君子非為身謀為道為天下謀也况因四以自通於離明之五則睽有可息之道雖惡人其可不見邪離目為見九二遇主于巷无咎象曰遇主于巷未失道也九二當睽離之時四以剛險間之欲有合於五甚難惟因五之明至誠委曲以開導之於先徐引而卒歸之正睽必合合必久茍直繩以先王所為行疑弗入矣二以剛中履人臣正位居兊說中又有互體離說而有明徳故能盡臣道於睽互坎在前坎隱為巷蓋大臣以剛中之才遇剛中之君非堯舜不陳若孟子云可矣不然強以所難其睽益甚周公相成王因伯禽示誨進之有漸至誠委曲之意盡矣記曰為人臣于其身以善其君周公優為之周公其遇主于巷者乎未失道謂於正道不愆然非君子得已也六三見輿曵其牛掣其人天且劓无初有終象曰見輿曵位不當也无初有終遇剛也六三以隂介二陽間二陽非我應其合也難天其刑之曰天且劓終遇上九曰无初有終君子守道睽久必遇柔既遇剛才斯奮矣天且劓云者二剛害之使其道不得上通也道之不行天也故曰天且劓云二剛間三或牽其前或止其後為輿曵牛掣夫君子在睽所適貴正二陽雖剛非正應也心既不同睽何以復儻或從之斯失正矣君子寕劓以保厥終互坎剛動在前坎􅃓輪為輿曵互離剛動在後離牝牛為牛掣兊西方為鼻兊毁為劓九四睽孤遇元夫交孚厲无咎象曰交孚无咎志行也離性炎上四以陽處二隂中往不知反其道為孤曰睽孤而初在澤下四復有互坎象水澤之性本自相通為遇元夫初以剛德說麗於明且艮再變有乾體仁足以止睽曰无夫初四俱剛德其遇必合曰交孚厲无咎厲无咎厲而後无咎也蓋易暌難合人道之常不可不厲且四在睽為近臣危懼最甚不有剛德君子為之同心協誠礪以正道何以有為而得志於睽㢤初曰見惡人无咎四曰交孚厲无咎是四本惡人因初見之道既交孚志以上行四為是无咎君子化人㨗若影響如此然則在上位者如之何而逺君子而不求其所以遇也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也五有離眀中德而下應九二二剛中足以輔之君臣相與之深道修志合利澤其施矣睽可已也故曰厥宗噬膚往何咎昔周公相成王道德之感王者深王卒用之天下蒙慶夫周公遭變其睽至甚非有以感入之於先何以終合而成大治於後㦲二在互離下為宗眀德同也兊口為噬為慶隂柔為膚二自下歴三而往為噬膚藥石之言淪入肌膚云耳上九睽孤見豕負塗載鬼一車先張之弧後說之弧匪宼㛰媾往遇雨則吉象曰遇雨之吉羣疑亡也處睽位極處上下莫之應且離兊之性相反其孤為甚夫小人害君子必壅蔽其上之聰明使耳目無所聞見道既孤矣疑乃生焉見豕負塗主汚也載鬼一車本无有是事也先張之弧後說之弧始甚惡之終乃釋也遇雨則吉隂陽和而通也睽互坎象為豕為鬼為弧為匪宼為㛰為遇雨古之聖人明目達聰詢於芻蕘戒孤也雖然上九位離明上明何以孤豈非自恃其剛明邈無虚已下賢意小人得以乗間而蔽之歟嗟乎為人上者不患不明患在恃其明以自用逆耳之言不復聞故讒間易入而疑隙以生也四與上睽孤象同皆以隂阻之而上下不獲相應四之炎上臣道孤也上之疑君子而邇小人君道孤也語曰德不孤必有鄰君臣之間其勉夫德而戒夫孤㢤互坎承之坎險為小人艮下坎上蹇利西南不利東北利見大人貞吉彖曰蹇難也險在前也見險而能止知矣㢤蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣㦲二陽自臨變為蹇二陽陷重坎中君心昬於内百姓困於外君子之道於是蹇君子有剛德明夷傷之蒙蒙之屯難之蹇陷之而君子不為時蹇而亡利天下心惟力行其貞而已故曰蹇利西南不利東北利見大人貞吉西南謂出險而明東北謂入險而晦君子以明德行事而大中至正之道施於天下蹇難其散是以利西南若東北則造晦而入險其道窮矣大人指五五德位足以濟蹇難曰利見大人蹇必正身以正邦曰貞吉兊變有坤體曰利西南蹇六爻无凶咎悔吝辭蓋蹇初以艮止在下餘爻隂陽各正其位君子止以脩德不失其正凶咎悔吝無自生也蹇難也險在前也見險而能止知矣㦲或謂君子知蹇不可為而止曰見險而能止嗚呼使君子皆以蹇不可為而止天下孰與已蹇安可謂之能止邪君子愛君愛天下未嘗一日忘已蹇心時止則止時行則行其止在時君心苟復時有可為吾其行矣是謂能止若水在山方春盈科而進不一於止而已也夫見險能止則内足以全其道而不失已外足以應於變而不失時顧雖蹇君或應之捐身徇國有所不辭不亦知乎初上三四皆有往來之訓其義以往為失來為得欲其反已比賢以自充厥德也至二五則不然二曰王臣蹇蹇五曰大蹇朋來不復致往來辭正以二五得中得位而君臣遇合於是不思所以已天下之蹇非君子用心然則見險而必止是忘君忘天下者所為不可謂之知見險能止者必能有行而其行在時如是而後為知蹇利西南往得中也不利東北其道窮也利見大人往有功也當位貞吉以正邦也蹇之時用大矣㦲見君子已蹇之心未嘗一日安於止也坤位西南九五自臨來得坤之中曰往得中大人得中能已天下之險而濟其蹇利物之功於是大時至西南萬物以成坤邑為邦離目為見險艮時止時行為能止坎北方為知象曰山上有水蹇君子以反身修德君子居蹇養德俟時反身謂反求諸已君子曰我其未中未誠無以格君心而息天下之難歟君子以已蹇為己任養其清明而止之於性若水在山不忘東嚮時至德行孰不被澤自坎而艮自艮而震雷雨既作水其進矣重險為反艮為身為德初六往蹇來譽象曰往蹇來譽冝待也前有重坎為往蹇伯夷太公在海濵天下莫不稱賢彼其晦跡東海初非以釣名譽也惟德修於身心念所格不忘天下天下賢之初處艮下前遇坎險靜止自養用以獲譽夫子釋之曰宜待謂待時待君之求也夫君子不恝然忘其君民一日而怠夫德之修其來也非為已也將畜德以行於天下也不然何以譽六二王臣蹇蹇匪躬之故象曰王臣蹇蹇終无尤也君子不以蹇難不進二以柔中而上應九五為王臣五居互離上為王蹇蹇其盡瘁事國乎曰是動於事者烏足以息難君子誠止於中憂時至念不絶於心汲汲夫德之修政之立無湏臾肯忽曰蹇蹇言其心不一日忘乎蹇也君子視君難猶已難不私其身用不獲戾天人而道行於天下重坎為蹇蹇艮中前有重坎為匪躬匪躬云者君子蹇蹇以公不以私以國不以身也終无尤臣道之美也九三往蹇來反象曰往蹇來反内喜之也三以剛德處互坎中故曰往蹇其反也非漠然無意君上也知險難鼎至未易遂止於是内從君子以充其德且明哲俟時而率君子以事上知所先矣君子喜之何蹇不濟二隂以艮止在内為君子互坎趨下為反卦自兊變為喜六四往蹇來連象曰往蹇來連當位實也四有互離體位居坎初故亦曰往蹇夫四以明德處險而屬心君子蓋有意夫止天下之險矣其位上下俱陽陽為實曰當位實其義則誠信足以交君子而下之謂也連謂三九五大蹇朋來象曰大蹇朋來以中節也濟大難而獲同德之助其道在中中尚矣過則亢而失助不及則不可與有為惟中故動無不當君子歸之中節謂節之以中九三居互坎中初二喜之四連之上應之與之者可謂衆矣五得三而上下之賢畢應為朋來陽與陽為朋也朋來而羣賢並應何憂乎蹇重坎為大蹇且賢者在蹇非中節之主莫之敢進何㦲濟蹇尚中人君不知修德以中所行所為必逆天人之心尚安能任用真賢而信其言行其道以恵利天下㦲進無益也故有九五之中節而後朋為之來然則人君之勉修中德其可緩歟其可忽歟位在坎中而艮承之為中節上六往蹇來碩吉利見大人象曰往蹇來碩志在内也利見大人以從貴也蹇極不可往其往也蹇險難之極用柔曷濟碩謂三碩陽也大也因三而剛德内充利見九五斯可有為於蹇矣蓋柔在蹇上非碩德何以強其志成其善俾得從君之正以止息天下之大難㦲陽為貴從九五曰從貴蹇至上六而吉道以者凡以得九三之應而已是以古之君子在上位莫不樂得夫賢才之助也坎下震上解利西南无所往其來復吉有攸往夙吉彖曰解險以動動而免乎險解解利西南往得衆也其來復吉乃得中也有攸往夙吉往有功也天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣㦲震變坎為解震至四之變而後出坎險解蹇之反也解二陽亦陷於隂惟其剛動不息以復於震故蹇難以散觧亦曰利西南何謂西南坤方平易至順之地蓋險散而解非躬行平易正直之道以順天下則无以得天下心无所往武不可黷也其歸馬放牛之義乎坤進而兊生物之仁息矣安可往其來復吉謂大復先王仁政則吉震動出險曰復復其常也復然後動動得厥中功利斯及於天下作聰明亂舊章民聴惑矣有攸往夙吉貴不息也四時之運息息不停濟解者其可怠夫誠㢤緩斯損夙斯吉詩美周宣復古而箴規之詩繼之宣王勤始怠終昧夙吉之戒也且天下難解之初人情莫不幸其安而安之自非秉德之剛志在天下孰不於此而少怠其治乎解五柔中主聖人故賛解以夙吉云互離離日為夙解險而動動而免乎難何謂解本震體剛動於内以出坎險曰免乎難夫人君有剛一之德動以濟難難無不散内乏剛德而安於巽靜莫之解矣故人君必復其剛一之德而後難解難解而又能復先王仁政坐以待旦夙興不替然後治以成業以大獲吉乎解也二陽自臨升其上皆有坤體為利西南為得衆陽來而復於内進居坎中為乃得中天地解而雷雨作雷雨作而百果草木皆甲拆解之時大矣㢤何謂天地中和氣停蓄非一日至解而雷雨交作天下萬物莫不悉趨亨嘉之㑹百果草木雷雨之功易見者也聖人固獨取象於是然則君子欲復先王之道以大仁政於解亦在夫謹養其中剛以行之而已解以剛動於時為大震坎一再索乾而得之乾為木果為百果震為木為蒼筤為萑葦為草木象曰雷雨作解君子以赦過宥罪與之更始使萬物各得其生天地之仁也天地付仁功於雷雨君子法之赦宥以行夫使天下樂其生而相率為善則仁政治而解道成矣坎為法律刑獄震𤼵生為赦過宥罪過罪之未著不幸而過者赦之仁之至也初六无咎象曰剛柔之際義无咎也承二應四為剛柔際得所依輔險其免焉解貴剛貴得中初以柔處坎先雖有忠信之質非從剛健君子比德應上無以出險而濟解剛柔際則中矣故无咎也九二田獲三狐得黃矢貞吉象曰九二貞吉得中道也解難既散深察小人情狀以保天下之治大臣職也二剛中應五位在坎中有離明體得君而有明德且用之以中故智足以知小人而制其命夫懐險者盡得其情而一待以中直之道使不能蔽吾君聰明為吾治害君子之正也蓋察見小人情狀非難察見其情而待之以中正俾不至若鳥獸之窮而易慮退聴安吾德化為難且夫小人未罹罪而遽繩以法一小人死百小人疑非君子之中兹適足以召變起亂耳惟九二具離明至德本之以震仁是以得黃矢貞吉互離為田田以除害為義重坎坎隱伏為三狐狐晝伏夜動三狐坎數離又為黃離自坤中來故離六二曰黃離坎為矢六三負且乗致宼至貞吝象曰負且乗亦可醜也自我致戎又誰咎也小人任重治功必墮難所由生也聖人於解𤼵之示小人必不可用於時而解緩之世尤所當謹孟子曰不仁在髙位是播其惡於衆小人得位内而中夏外而四夷莫不皆啟陵侮之心如漢淮南視公孫宏輩猶𤼵蒙耳且小人用事於時而綱紀慢於上政事暴於下人心積怨敵國輕視宼安得不至邪六三位不中正居坎險上互坎又在前内外懐險蔑棄仁心蓋小人之雄者也如斯人而竊要位天下孰不與已為敵㢤寇自我來夫復何疑且夫負者而乗則是足反居上首反居下顛倒錯謬大亂之道也一震震為大途三以隂承陽為貞且乗坎二二有剛健德為君子乗為君子之器坎為寇吝所當得為貞吝九四解而拇朋至斯孚象曰解而拇未當位也大難既夷為大臣者必獲同德之助而後能取信於上震為足四為陽居震動先曰拇以九居四剛陽失位體有互坎陽陷於隂未能有行曰解而拇朋至斯孚謂何曰大臣責任至重惟道有以孚信君心然後能大其仁德於天下四去坎險用離明虚已待下朋為之至道同志合有以感動上心君仁天下莫不仁矣其孚如是功亦大㢤朋謂二蓋陽與陽為朋二自震初升居坎中震初而九履之當位也至四以九履隂為未當位是四德不若震初之陽朋陽之來明德益修五動以應誠意交通然後生化之功自是興也嗚呼大臣居解惟患不得其朋而已得我朋也而踈之逺之則非但不能格君心中才柔德之君豈能無疑於我㦲是將陷於險而不能自免矣戒之㢤六五君子維有解吉有孚于小人象曰君子有解小人退也人君必修德於身而勉勵其事業然後君子樂從君臣合德大難以定小人退聴不敢害治蓋彼知吾治終不可害而吾君臣之德有以孚其心於是俯首聴命於下也五柔履尊位居震動中二四皆以剛德為五用君臣固結其心若一小人知國勢不可復摇而君臣之間不可復間莫不革慮從化以成解治曰君子維有解吉有孚于小人然則人主何憂夫小人㦲第勉夫在我敬修厥德以信用君子焉斯可矣坎險在下為小人五居互坎上出險為有孚二陽協從為維維聯合義也上六公用射隼于髙墉之上獲之无不利象曰公用射隼以解悖也隼健鷙害物譬小人桀黠弗從吾化終為天下百姓害是不可不力除以成解功也禹為舜征有苖正上六事夫居解上而為天下害者去天下平治可久矣故曰以解悖言悖道者不可容也繫辭載孔子釋上六事曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有互離離麗為隼重坎為􅃓矢坎在内而爻不言弓矢為藏器離日為待時震大塗為无不利離中虚陽包之為墉然則孔子之於義曷常捨象數而取義也兊下艮上損有孚元吉无咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉无咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行乾三上益坤名卦曰損持滿之道也泰治既極君德日消上益下困浸以成否其道窮矣不有剛德君子以誠信之道自通於君復其心而止之使之德崇而志損若浚澤以培山者然則何以救其弊㢤損自泰來損救泰也益自否來益息否也損而反質人情甚難非有孚孰其信之蓋損必自身及國及天下孚乃格格而後損道成卦具六善有孚誠信著也元吉仁德被也无咎亢滿之災可止也可貞貞已以貞物而人樂從也利有攸往必獲益也曷之用二簋可用享損德之至可交神明且捨此非所宜用也彖論卦體曰損下益上其道上行損而有孚元吉无咎可貞利有攸往正謂乾三益坤上君子道上行以吾之德成君之德致謙於已歸美於君下說以承上止而應損道遂孚天下被恵艮止澤虚為孚三隂下承衆信之為有孚上自乾來為元吉艮止為可貞剛上為利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虚與時偕行言損益有時稽之天地參之人事而後損可為也蓋治至於泰非損則咎古之居盈成者必用損法天也時乎時非損非益何以成化祭禮春祠夏禴秋嘗冬烝祠禴薄祭方春夏時品物鮮少所當損也迺欲豐大其禮則是重拂天地心而鬼神弗之歆享矣以是推之二簋之用可違時乎損剛益柔有時謂剛柔之用務在中或損或益上下无常因時盈處制為之極則功利之及萬物者大矣孔子曰殷因於是禮所損益可知也周因於殷禮所損益可知也如或繼周者雖百世可知也三代損益不同莫不因時以便利天下孔子喟然興歎謂後之為君者誠知夫損益剛柔之中則天下可以百其𫝊矣百世之心今日之心也損益當於人心天下烏有不治㢤雖然聖人之治雖曰損益偕行而始終以損為本何以言之蓋治而用損則剛道上行謙德内充可以常泰无否用損者必益其理然也損益為卦雖不同聖人所主在損而已孔子序卦謂損而不已必益豈非益本於損聖人以損為先務歟艮二隂在下為二簋一陽在上為宗廟象曰山下有澤損君子以懲忿窒欲用損自身始虚其髙亢止其渾濁性斯復復斯損如是則仁德内充用損而益矣忿欲害性至大者懲之窒之悉自虚止之功忿欲懲窒於已而後恵利及乎天下夫損非以身先之終不可以有行也初九已事遄往无咎酌損之象曰已事遄往尚合志也救弊欲速君子之仁速則濟故无咎酌損謂何天下有中道量德度時各稱分量損斯可久矣初四居艮兊先其志易合且從感速曰遄往艮一變離有飛鳥象為遄初有剛德用能酌損兊澤為酌九二利貞征凶弗損益之象曰九二利貞中以為志也二以剛居兊說中利在守貞征凶者何戒夫枉道取說失其貞也蓋枉道取進求益祗損惟夫以中為志不變其守待上之求以行其道然後有益於君有益於天下彼幸進曲從志不在中者又安足與有為而救時之弊邪二不變其陽為弗損其弗損也乃所以為益曰弗損益之古之君子必重其道而難於進蓋道重則君信君信則志合君臣遇合以中相濟何治不成也九二之意豈不美㢤六三三人行則損一人一人行則得其友象曰一人行三則疑也三陽皆君子三人行則損一人君子固有損歟曰天地萬物之理一則感二則敵三則分數至三而變故夫上下相遇非一則誠莫通一而後功用立上下致一生物之功可參天地夫相遇而得致一之友則已損物益利孰大邪嗚呼君子同心德者也一君子用天下之君子其孰不用方論致一之道故獨取一人行則得其友為義非為用止於一人也荀卿反覆於人主論一相之說其言蓋有所傳授得易之致一矣六四損其疾使遄有喜无咎象曰損其疾亦可喜也四德位俱隂又處互坤隂中在損為疾損貴剛柔得中而初之剛德足以勉四而納之中曰損其疾初不敢自擅其功而復安於初曰使遄有喜无咎夫居人臣上位雖才德不足踰人得剛賢之助相與用中於損弊其可革也故曰亦可喜也六五或益之十朋之龜弗克違元吉象曰六五之吉自上祐也五柔順履中其心至虚有日損功益之者上也而曰或益之蓋六五謙德既孚上益之羣賢從而益之德盛業大受天下益矣曰或益之上自乾來上益之乾陽皆以類來坤隂亦必應之矣十朋之龜元龜也大寳龜也賢者之知如神故取象以龜賢者樂告仁德斯大曰无吉若曰如是安如是危如是治如是亂先事而圖治安常保弗克違也上本乾體為上祐夫得賢人也使之得賢天也不然何以遇故曰自上祐云龜地中物損益為卦有艮止震動坤順之體為龜損六五益六二其位互坤坤成數十為十朋之龜上九弗損益之无咎貞吉利有攸往得臣无家象曰弗損益之大得志也上本隂位宜損三自下益之曰弗損益之三益之是天下之父歸之也天下父歸之其子安往互坤居下坤為衆坤衆益之天下孰不願益邪處損而益夫何咎貞吉戒以必貞而吉上位不中宜戒曰貞止亢滿也利有攸往得臣无家謂何上利大有為於損九以得忘家臣蓋重申弗損益之義三去乾陽從坤隂為无家艮反震震動為大得志震下巽上益利有攸往利渉大川彖曰益損上益下民說无疆自上下下其道大光利有攸往中正有慶利渉大川木道乃行益動而巽日進无疆天施地生其益无方凡益之道與時偕行否之為否君益於上民困於下上益下削邦危甚矣聖人知泰必有否致止虚之功於損用能損己益物其動也仁損己益之中正也利有攸往損己而民心得故无往不利也互坤在中陽下之為得民心民心苟得何為不成何難不濟㢤用是利渉大川坤為大川損上益下民說无疆自上下下其道大光損乾四益坤初曰損上益下益下不必與之以利饒之以財上損下自益蓋聖人躬修道德於身制情性去私欲凡害身者悉損之故能用中用禮用謙用柔用儉聖人損已若此下容有不獲益者乎民獲益而樂其生則生理得而說於下矣曰民說无疆互兊為說為慶互坤為民為无疆為无方夫聖人不獨益天下而使之富樂而已也又將下下而收其賢才與之共益天下且增修已所未至損已以富之下賢以敎之仁德愈著君道愈光曰自上下下其道大光乾降而下為大光益道至是而盡矣中正有慶謂二五以中正應用以獲慶二五居隂陽中以吾損已之德益天下天下萬物悉蒙休利民心說歸之大治以興曰有慶利渉大川木道乃行巽之仁德於是施也聖人之益其動以仁躋天下於平安之域不知何時而已曰木道乃行巽木在上震動在下為利渉益動而巽日進无疆天施地生其益无方凡益之道與時偕行益道之太如是夫動而巽於道在已之益莫加也動而巽於理巽於情巽於心仁德之感天下說從功效可算計㢤陽動九地之下進而至巽萬物各得其生曰其益无方聖人之益配天地以施生天下也與時偕行謂何聖人不求益因時而與之益堯舜禹湯文武因時之大者也夫古之聖人無一日不致力於損已而天下无一日不獲益凡以得夫損益之中因時而行耳風雷相激為日進乾陽在下互坤居上為天施地生象曰風雷益君子以見善則遷有過則改日新之學行於身而後利物之功及天下風而雷隂陽之變也萬物至是有去故從新之益君子法之修諸身而益加於人其利􅄎㢤坤隂變否為遷善為改過初九利用為大作元吉无咎象曰元吉无咎下不厚事也初居震動先其才剛健下以剛動上以巽應是可以大有為於天下以輔成其益也曰利用大作初自乾來為无吉象以其能體謙用仁也獲謙仁之吉故无咎且夫動而任事怨咎所歸惟任大事而不自為勞不矜不伐以行於世其孰與之爭者㦲震動居互坤下為利用大作坤土居上為不厚事不厚事謂不以事為利也六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二以柔中獲益曰或益之初自乾四來上承於二而乾陽畢應為或益益之自乾若天錫善人之助云古謂无龜直二十大貝雙貝曰朋十朋之龜賢智大者弗克違忠告之言無差忒也獲益如是王而用之足以定社稷利百姓養天下服夷狄上帝其歆喜之矣曰王用享于帝吉五上本乾位乾為王為帝舜獲禹稷契臯陶助堯薦於天周公十夫予翼畢召公之徒輔助之金縢書啟天乃雨反風夫賢天所喜也故享帝莫大於得賢永貞謂何其以二柔中勉以持久歟蓋正念一差天地鬼神知之益者逺矣君子未嘗一日忘貞而其心不在君在天下也六三益之用凶事无咎有孚中行告公用圭象曰益用凶事固有之也處風雷變化之地而位居震動上宜有非常之事曰凶事若周公東征汲黯𤼵粟本以益人夫何咎也有孚上下信也上下信而行以中正生物之功必大曰告公用圭圭象陽生物以生物為心无咎宜矣三其可與權者歟居互坤中為有孚震為圭六四中行告公從利用為依遷國象曰告公從以益志也三四皆曰中行曰告公三四有互坤體位居震巽之間在一卦為中為中行告公謂何不敢専私意也五與上皆乾體曰公老子曰公乃王王乃天故三四皆曰告公四純隂爻居巽先動而用巽其動不妄是以中行告公從而利用依遷國也自古不得已而遷國便民莫如周太王之仁以益為志不以一己私為志志順於天告公從也互坤為國震動在下為遷國四比五為依依於君依於天也九五有孚恵心勿問无吉有孚恵我德象曰有孚恵心勿問之矣恵我德大得志也九五獲六二中德之助其德日益修故有孚上孚心下孚德上下交孚益之至也聖人誠已不言而人化之其躬行之實足以感動變易天下心聖人知天下心本無二而以至誠格之俾莫不率從是為恵心勿問元吉吉本仁也仁之所行恵自及之初不待問曰勿問恵我德謂何天下知聖人益己莫不相勉而化聖人之德聖人之德至是彌著海内大治四夷化服曰恵我德聖人利天下之志於是得矣五本乾體居互艮上乾剛艮止為孚五分四益下止靜而順衆隂以虚承之為有孚恵心為大得志反兊為勿問乾為元為德巽順為恵上九莫益之或擊之立心勿恒凶象曰莫益之偏辭也或擊之自外來也上九本乾體居巽窮上而震動承之剛亢躁動求益不已已心不恒惟利之圖人心以離擊之者至故凶夫危懼无交而用以動以語以求民雖至愚知其必不能益已孰肯戴上而求益也君子於益必先求諸在我而恒其心心恒則動中節語中倫賢者樂輔民知恵利之將加於身孰不與之應之㦲互坤在下五以剛居上卦中三隂不應於上為莫益互艮艮手為或擊偏辭謂其位不中惟偏則失正而立心勿恒互兊為辭擊自外來謂内不與之擊必自外宼戎興起皆來自外者且寇戎之起本自失民心民心之失本自為上者不能恒其心而賢者去之誠信不及於人是可不慎乎雷風為恒風雷為益上九處風雷極處故有勿恒之失也紫巖易傳卷四
