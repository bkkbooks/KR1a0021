body:
  text: 紫巖易傳卷七宋張浚撰繫辭上天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣易書之作本乎自然聖人首發之故仰觀俯察而乾坤之體以定或卑或高而貴賤之分以位圓動方靜而剛柔之冝以斷羣聚于天地之間者有自然之吉凶形象于天地之間者有自然之變化葢天地設位易行乎中吾不知天地之為易乎易之為天地乎聖人以一心之微稽諸天地而易書有作隂陽在吾身造化在吾手心法之一與天地並是以闡萬理於太極揆常變於卦爻其象數之所包括莫非天地自然之理天下後世順則治逆則亂得則吉失則凶其道必致不可少易也學者而不先明乎此尚烏足與論易哉是故剛柔相摩八卦相盪鼔之以雷霆潤之以風雨日月運行一寒一暑天地之間舉無非易剛柔相摩勢之激也八卦相盪序之移也鼓以雷霆而有氣者作潤以風雨而有形者生日晝月夜終始不息歲功成焉象數黙運有不知所以然而然者故乾坤之道自是而益尊乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功萬形流動變化不停乾坤男女成功以著乾以一唱物資始焉坤以二承物資生焉一可該萬其知甚易二故不煩其能甚簡乾何為哉物所資始乾之與物本无間也不亦易知而有親乎坤何為哉物以資生坤之於物任其自成不亦易從而有功乎聖人發乾坤之奥明易簡之徳蓋將使夫履大寶之位者會乾坤於一心致易簡之妙用庻幾有以參天地贊化育也有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣天地之道備於易具於乾坤體於聖賢親之以心其親必久徳於是立功本自然其功必大業於是建蓋天下一理耳易故不難而上下之心莫不相通簡故不繁而因彼自然物遂其性天下之治實本諸此自非聖賢誠一之道克配乾坤其孰能與此邪後之在上者矜智能峻刑罰而易失之矣作聦明變舊章而簡失之矣理失於上亂作於下又安能保有大業中天地而成其覆載之功也歟聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也數本无也聖人肈之於心通合天地以著見於易數行而卦成卦成而象見觀其自然繫之以辭吉凶不可少逃矣夫吉之與凶得之與失一定之理而聖人作易將以合天人而回其心固有變化之道焉變化妙理不失厥中避凶趨吉之道可得而行矣夫聖人之趨吉非求一己之吉也將以求天下萬物之吉也其避凶亦然孰為變化剛柔相推易之變化也或以剛推柔或以柔推剛其道其才其位其時所遇不同變化自是而生而變化之所以為變化皆不離夫自然之中天地得此而生成萬物聖人體此而克配天地其道神矣吉凶者失得之象數得為吉數失為凶得之自已失之自已吉凶由已不由他也悔吝者憂虞之象悔吝之起吉凶未著憂虞是圖其悔可復也變化者進退之象一剛一柔推移不已有一於進必有一退變化以成也剛柔者晝夜之象晝道屬剛夜道屬柔循環天地始終成物无有窮已莫非自然也六爻之動三極之道也此蓋緫論易之所以爲中嗚呼易者何也中也中者何也太極也易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶而吉凶之用備於變化故夫太極以一起萬錯綜該括馴至无窮一之爲中未嘗少變六爻之動天地人之中理具焉猶太極之无在不中也善學者存誠去僞得中爲心以求夫易書變化之中庻幾可以學易矣如是而後能有所建立於天下也故夫吉凶易之正也變化易之權也權中之正與天地通矣是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉无不利易序順道其可以不安爻辭盡變其可以不玩居之而安故動靜契道樂之而玩故施爲通變觀象玩辭居則爲之將以窮理而審其吉凶也觀變玩占動則爲之將以應物而變其吉凶也占謂變之所之玩占而吉凶之理得之在我其動也罔不得中而深當天人之心矣民之所喜天必祐之吉无不利不亦冝乎學易而至於獲天之祐有吉而已此道之所以運數而非數之能攝也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也无咎者善補過也易重補過此天心也本皆有咎今乃无之豈非得變化之中故歟是故列貴賤者存乎位齊小大者存乎卦辯吉凶者存乎辭憂悔吝者存乎介震无咎者存乎悔是故卦有小大辭有險易辭也者各指其所之位謂六爻之位卦之所設本乎隂陽隂小陽大體固不同而各以所遇之時爲正陽得位則陽用事隂得位則隂用事小大之理至卦而齊介者何也位有上下我則介之親比一失悔吝隨起君子慎焉體本有咎知悔於心動以无咎震者動也卦之小大齊於時辭之險易指於卦艱難則險和平則易憂迫則險寛舒則易觀象玩辭中道可得矣易與天地凖故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說精氣爲物游魂爲變是故知鬼神之情狀易者何也天地之心也聖人虚一而靜脗合天地而得其所以爲心著爲易書其道適凖天地雖大待之以彌綸焉彌以成之綸以理之天地之道始得其平陰陽錯行日月運轉始而終終而始生化不窮莫有差忒孰爲此者天地也然此非天地之功易之功也易苟不明而聖人大中之道不復見於天下後世人欲日肆天理日消陰陽之行必失其叙天地運化或幾乎息絶矣其孰與彌綸之哉在天成象有自然之文在地成形有自然之理聖人仰觀俯察㑹之於心易書以作神明由是而顯其用變化由是而發其機幽明之故可坐而窺矣出於震而萬物以始成於艮而萬物以終始終代謝息息不停莫不各得夫死生之正焉順道則能成其正背道則必害其正聖人達死生於一致故於道能順死生之說可揆而議矣氣聚爲物氣散爲變聚散不同理實一致鬼神情狀與人无異人之所喜鬼神所喜也人之所欲鬼神所欲也鬼神之情狀可稽而見矣聖人知此三者發其蘊於易彌綸妙用於是成之故夫知幽明之故而天理得矣知死生之說而人事修矣知鬼神之情狀而敬愛行矣聖人以是詔後世訓天下育萬物成天地而皆載之於易書故曰能彌綸天地之道也與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知自此而下皆聖人事不曰聖人又不曰易何哉聖人體易而用之於身聖人即易也與天地相似徳之合也天且不違況於人乎知周乎萬物而道濟天下智仁兩得而盡道之中也中故不過旁行而不流委蛇曲折皆當於道也當道而行何流之有樂天知命故不憂恪修在我以安其所受於天也樂天故知命知命則與天爲一矣因時而行又何憂焉安土敦乎仁故能愛由我之安使天下皆得其安而仁道於是爲厚也記曰不能安土則不能樂天安土之功大矣仁愛於是得焉聖人行易于身者如此故功用之見於天地萬物者如彼範圍天地之化而不過曲成萬物而不遺致中和而天地位萬物育也一心之微昭格天地天地之化待以陶成聖人之道於斯爲盛通乎晝夜之道而知攝天地陰陽於一已以一貫之而知其所以然也易道至大自我流出其爲知也不亦至歟蓋嘗論之天地自然之道所以運轉今古育成萬物者備於易發於聖人之心聖人心法之妙與天地通一之所該萬无不舉故天地造化之幾賴以財成而成位乎上下聖人有補於天地至大其道神矣嗚呼易者天地之心也天地之心聖人先得之以著見于易然則易者聖人之心也天地之心即易之心易之心即聖人之心曰凖曰相似猶爲强名辭耳以心觀之吾又安知孰爲天地孰爲易孰爲聖人也哉學者當反求諸心以極夫虚靜之道心光所燭理自不昧用之於身用之天下固无所往而不冝也可不勉邪故神无方而易无體一陰一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣繫辭於是原神易所以然而論之神者何易之神也寂然不動感而遂通化育萬物无乎不在曰神无方易者何聖人之易也易有太極聖人發之變動不居周流六虚曰易无體无方无體不可致詰肈爲陰陽道以名焉乾坤以定而易行乎其中矣道不偏於陰亦不偏於陽靜而爲隂靜本乎動而陰中有陽動而爲陽動本乎靜而陽中有陰一陰一陽道之中也曰神曰易於是而著繼之者善中无有不善也成之者性性皆有是中也仁者有見於仁以道爲仁而用之而道不專在仁知者有見於知以道爲知而用之而道不專在知人受天地之中以生其所以視聽食息動作云爲无非易者惟弗覺弗知以自背戾於道道之大全用以不明于天下君子之道爲是而鮮是章言易有中道流出萬善復之於性道固无虧或仁或知隨見以用民之蚩蚩由焉而已道之全體非君子則莫能盡之聖言及此欲使天下後世因性以修夫善因善以進夫道大中之道我自得之而易之爲神始昭明著見於天下聖人徳業自是而日興也顯諸仁藏諸用鼓萬物而不與聖人同憂盛徳大業至矣哉冨有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事陰陽不測之謂神易道之大動无非仁本諸自然莫可測究其用藏矣天地之間自形自色自生自成仁徳所被孰不鼓舞夫聖人體易於身者也而曰不與聖人同憂何邪曰聖人汲汲皇皇愛利萬物聖人之心有憂也聖人之道與易同體譬如太虚隨物應變果何憂哉盛徳大業所由以生也大業若地故曰冨有盛徳若天故曰日新聖人徳業之盛大本於身發於天下傳於後世其道則備於易著於乾坤用於占見於事妙於神後之欲成其徳業者舎此无以盡心焉易變通之書也窮則變變則通通則久八卦之還始終无有窮已天下萬物之生出機入機一息不停亦无有窮已聖人體易以輔成萬物之生心術之所感召政敎之所格化求所以生之亦无有窮已曰生生之謂易易之生生乾坤闡之占事戒之而又有至神之道以運動于中乾一以唱象成於乾坤二以承法效於坤剛柔迭推變化以見吉凶悔吝自是而生占以知來吉可趨也事以通變窮可通也體而行之推而用之平治天下化育萬物作之於心應之於天其道甚神超出形數孰窮其用聖人所以參天地之運奪造化之機以道御數而非隂陽之數所能緫攝一本諸此冝其徳之盛業之大克配天地永永而无極也歟夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之閒則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時陰陽之義配日月易簡之善配至徳易生於聖人之心道之廣大克配天地自然之象自然之數自然之理并包天地无有窮極易本无遠以言乎遠感通之用應而不藏易本无邇以言乎邇不動之體自古固存求之天地凡有貌象聲色无非易者聖人先得之列爲乾坤易道以行夫六十四卦皆乾坤之畫也乾坤定位易无餘蘊矣乾陽物也其數則一而道以一行靜專動直皆一之所施也物所資始其大无外是曰大生坤陰物也其數則二而道以二應靜翕動闢皆二之所承也物所資生其廣有量是曰廣生廣大配天地乾坤之廣大也乾坤无體託天地以爲體廣大之道舎天地何以見之變通配四時乾坤之變通也自乾坤爲八卦自八卦爲六十四變通莫窮時以序成陰陽之義配日月乾坤之陰陽也陽中於陰其精象月陰中於陽其明象日易簡之善配至徳乾坤之易簡也乾知以易坤能以簡合是二美中徳以成嗚呼易簡爲用大矣此天地之至徳而聖人體之以範圍天地曲成萬物者也易簡之理得而後成位乎其中天之所以運地之所以處四時之所以錯行日月之所以代明非易簡其何以成功子上下誠能行易簡於吾身乎則天地在我以廣以大我自得之君天下者不可不盡心於此也子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門聖人用易以成其徳業心術之妙與天地爲一所不可得而見也而著諸天下見諸行事曰知曰禮庻幾其可以推明之聖人清明之知仰稽於天道徳仁義之化自是而行故徳以之日新聖人中正之禮俯則於地綱紀法度之數自是而出故業以之冨有天地之道聖人實體之於身所以徳業盛大足以配天地而成其能夫聖人非體天地也體易也易與天地非一非二故曰天地設位易行乎其中矣嗚呼天命之謂性率性之謂道易道具於所性之中與生俱生率而成之存者存矣若道若義自我流出无不悉契天人之心徳業之崇廣其孰禦之哉聖人勉後世而進之於易是以發其微端於此云聖人有以見天下之賾而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也聖人稽諸天地驗諸河圖易道之大自得于心因心以立數因數以立卦三才至理包括无隱卦之成體象固具焉非聖人見天下之賾而有以闡其奥象孰爲而明卦之列位爻以成焉非聖人見天下之動而有以揆其變爻孰爲而定擬形容而象物冝聖人所以發天地之機也象之所存理不得遁道於是乎顯觀㑹通以行典禮聖人所以盡經綸之妙也爻之所設時不得違道於是乎通至賾幽深若可惡也聖人言之於象道以之顯觀而玩之其可已邪至動紛錯若可亂也聖人言之於爻道以之通循而守之其可失邪夫聖人徳業之崇廣取法於天地而著見於易有象以言至賾有爻以言至動變化之道由之而成使天下皆知趨吉以歸諸善易之爲易至是益神矣擬之而後言議之而後動擬議以成其變化鳴鶴在陰其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎擬象而言言必中理象之所存理不得而遁也議爻而動動必適時爻之所設時不得而違也蓋易生於聖人之心著於天地運於陰陽散於萬物顯於象數君子有言有行于天下非致擬議之誠於易其何以感格天人而有以參天地贊化育以極夫變化之妙哉鳴鶴在陰其子和之一氣之應自然之理也君子居一室之近而言之善不善發聞于千里之外亦其氣之黙通者然耳蓋受形于天地均此一心心同而氣同氣同而所感召亦同古之君子於言行必致謹誠以三才之道備於一身本无有閒順其道則得違其道則失在我而已矣言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎歟聖人所以警天下後世而勉之也夫出言而善千里應之治所由生也出言而不善千里違之亂所由生也應違在人而治亂成於天地之閒天地與人夫何逺之有哉古者賢聖之君在上日月爲之著明四時爲之順序陰陽爲之調和天下爲之安平夷狄爲之馴服萬物爲之敷暢嘉祥爲之興發災戾爲之消弭皆自言行發之而言行之所以至善要在擬議此聖賢所以貴於學也同人先號咷而後笑子曰君子之道或出或處或黙或語二人同心其利斷金同心之言其臭如蘭自鳴鶴在陰以下聖人發明易之有象本於自然辭之所指不離於象而天地萬物之理毫髮不違擬象而言言不外理言无有不當者矣而後之說者乃以象爲不足據此何理邪先號後笑以至出處語黙之異皆陰陽内外之象也同人互體巽兌巽風兌說爲號爲笑二人同心謂何二五本皆離位八變爲同人離中虛爲心故曰同心二以離體承乾離火乾金有革制之道是以利在斷金而强梗難化若三之伏戎四之乘墉終莫得爲之閒也互兌兌爲信爲言互巽巽爲仁爲臭同心之言必有仁信之實孚于號令天下悅服故曰其臭如蘭云嗚呼同人二五以中直之心相與於先終之强梗爲之革化善言布於天下中直之用顧不大邪後之君臣有作冝以是而正其心誠然天地喜之鬼神福之何患乎不相遇也初六藉用白茅无咎子曰茍錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之爲物薄而用可重也慎斯術也以往其无所失矣大過初六以巽體在下巽爲白爲茅卦自震變一變而坤再變而坎三變而巽易坤爲巽曰藉用白茅巽爲不果爲進退曰慎之至祭祀之禮藉器以茅所以致潔白通明神也君子當大過之初致恭致敬以禮行世如是亦足矣而重之以清潔之徳惟恐不及其所以大過於人而有以恱服天下之心端在此夫往无所失聖人之言不誣也勞謙君子有終吉子曰勞而不伐有功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也謙九三爻辭也九三何以爲勞謙謙自師來以震動之體居艮止上惟動故勞迅動以行師其勞可勝旣乎卦位艮山居坤地中坤順道也卑道也柔道也是爲勞而不伐夫山安靜而萬物生焉今處地之中莫見其高是爲有功不徳厚之至坤象也夫厚坤之徳也語以其功下人謂不伐不徳在四陰後蓋能後巳而先人者也臣道之正莫加於此徳言盛禮言恭以内外卦象而論也其崇若山象徳之盛其順若地象禮之恭且夫知恭而已内无其徳焉其恭僞爲非所謂謙惟徳盛禮恭則上天喜之人心歸之謙於是有終致恭以存其位恭盡於己位自安也禹平水土不矜不伐得此道焉亢龍有悔子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也乾上九位在五陽上貴也高也惟過中曰无位位不得中何以行道羣陽居下曰无民陽歸于五莫從其亢曰賢人在下位而无輔嗚呼有高貴之資而失位失民失賢若此所爲所行其必悖於道矣動而有悔不亦冝乎不出户庭无咎子曰亂之所生也則言語以爲階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也節初九當用節之初居兌澤下前有互艮以不出户庭爲節取慎密之義也夫君臣何貴於密蓋承渙離之後而用節焉一言之漏召禍起爭有不可勝言夫節者人情所難躬行以率之慎密以先之號令之行庻乎其必從矣聖人慮及此其惡夫小人之害節者邪子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盗斯奪之矣上慢下暴盜斯伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也盜者天下之所甚惡爲天下生民大害未有甚於斯者也易通天地人之蘊聖人慨然見於辭曰作易者其知盜乎意其必有甚高至微之論聖人迺以解之六三爻辭發明之嗚呼我知之矣自有天地以來人君以一身位天下萬物之上内而姦宄外而夷狄伺閒以肆欲得之志不知其幾何相得其人則心術紀綱正於上而盜以之息相非其人則心術紀綱亂於上而盜以之興此天地陰陽必至之理不待占卜而後可決也夫此隙則彼投猶水之來猶風之至猶火之炎一氣之所感召蓋有不知所以然而然者今欲以致盜者復使之治蓋是猶以水救水以風召風以火救火也而欲幸其一旦息止世固有是理乎嗚呼人君觀諸此亦可爲動心矣負販至賤事懷險嗜利義莫之顧惟負則然乘者君子所以載物衞上措天下於安平者也其責任至重迺負販者乘之此惟利之求彼惟利之趨奪乘之凶將不旋踵夫乘爲天下重器并與乘奪之天下國家其復能保有邪蓋小人在位播其惡於天下禮失於上政亂於下禮失故慢政亂故暴姦邪自是生君子自是去民心自是失法度自是廢禮樂自是亡驕奢自是作財用自是匱戎備自是弛盜斯伐之復又何疑哉聖人猶懼後世人不我信也繼之以慢藏誨盜冶容誨淫意蓋曰盜本无心我則啟之事實自取无所貽咎云耳六三位下卦坎位上上有互坎以柔履剛位不得中前承震震爲足爲大塗蓋小人之貪利至險者也坎爲乘爲寇盜各以象之美惡取之互離爲伐爲冶容坎在下震發之爲慢藏大衍之數五十其用四十有九分而爲二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神徳行是故可與酬酢可與祐神矣此篇諸儒言之詳者皆得而略之大衍聖人作易數也聖人稽諸洛書驗之河圖易數於是而定夫洛書備天地自然之數自一至十合之爲五十有五此天地生成數也河圖以九宫配數至九而止合之爲四十有五河圖之數不取十而一與九爲十二與八爲十三與七爲十四與六爲十五居中位以成縱横十五之數十固行乎其中謂河洛之數不同者非也夫十盈數也盈故不能變聖人衍易虛其五而用之易道貴變變故通通故神夫虛五非捨五不用也五其中而五存矣天五黙運中道明焉易之生生不窮與造化通與天地並蓋本諸此然則其用乃止於四十有九何邪曰大衍立蓍布數合四十九爲一一已肈見一者何太極也道也分掛揲歸自此而起其體五十其用虚一而一不離於用故夫四其十而易以四成一其九而易以九變太極之道周行其閒謂四十有九爲七七數亦非也象兩兩儀也象三三才也歸竒於扐以象閏謂取揲蓍之餘以歸於扐老陽老陰餘數合之三十有八少陰少陽餘數合之亦三十有八乘以六位緫二百二十有二求閏之法以二百二十二爲起算數再扐後掛謂左手四揲之餘復歸於扐曰再扐再扐而復掛一焉曰後掛再扐而再閏之法行矣天數五一三五七九也地數五二四六八十也五者天地之中五位相得而各有合太元一與六共宗以下得之凡天地之數五十有五見於洛書者則然天地之道隂陽之理萬物之化神明之用悉備於此故曰所以成變化而行鬼神也變化謂五行四時十二月推運无窮終始萬物生生化化莫測其端變化代作有成无已造化之功始獲昭著鬼神以行其理則然耳四營而成易以四揲之九於是通而七八九六之數成焉書所由以作也十有八變而成卦三變而一爻立天地人之道曲盡无遺卦所由以成也八卦而小成八卦奠位時序以正隂陽以定六子八物交相致用於宇宙之閒天地造化之理於是小成引而伸之觸類而長之自一而八自八而六十四數之所攝象之所該靡有窮盡小大精粗之理形名度數之冝上自道徳下至藝術凡天下所謂能事莫不於此而取正矣蓋太極以一運一之所通包括萬法天地陰陽萬物之理皆不得遁其情故道以之而顯惟變所適莫窮其用故徳行以之而神可與酬酢裁天下之變而有餘也可與祐神賛天地之化而不匱也嗚呼易本无也易以一起聖人清明在躬得一於心神物應之其志以定一之所統了无遺焉以自然之數發自然之象闡自然之理生化之功於此不息而易道于以大明後之學易者誠能致知止之功極靜定之理復誠明之性易之爲一我自得之反身以求萬物皆備如是而後能盡人道人道盡而後能克配天地其功用至大學者所冝勉旃子曰知變化之道者其知神之所爲乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此易之變化也易之變化其妙通神聖人實體之故在易爲變化之道在聖人爲聖人之道以言尚辭言无不當以動尚變動无不時言動發於邇變化成于外自然之符也制器尚象器於是无弊卜筮尚占筮於是通神器成而天下受其利筮立而大事爲之決易道之神又孰有加于四者哉是以君子將有爲也將有行也問焉而以言其受命也如嚮无有逺近幽深遂知來物非天下之至精其孰能與於此詩稱帝謂文王豈曰諄諄然謂之文王心與天同文王之心天實啓焉故曰謂君子問焉而以言蓋若擬之而後言者君子心法純一易明乎君子之心教化訓迪不違天理言无非易易无非道孰不感服而受命邪无有逺近幽深遂知來物純一所格也以此酬酢以此制治綽綽然有餘裕矣夫天下萬物之理不外乎易以心體易以易行世如鑑之設如水之止有形有色皆不能遁其情自非精一不二其能清明在躬有所照燭若此哉或曰君子問易書而後言夫書易之跡也蹈其跡而不明夫道何以致受命之速惟以心體易易全於心有爲有行言无非易兹其所以能有格也歟然則君子之問易在心而不在跡矣參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易肈於變變成於數其本一也因三而參卦數以定因五而伍爻數以立故參之而六位於是乎備伍之而七八九六於是乎設參伍並用變動不居易道行矣錯之如何八卦相錯九六之數復錯而成爻錯則然耳緫之如何自一爲八自八爲六十四乾坤之策三百六十其循无端其應无窮緫則然耳通其變焉隂陽迭推剛柔互易日月星辰之所以運五行四時之所以行昭明著見播在天地序則不愆理則不紊天地之文豈不於此而遂成歟極其數焉自三百有六十以至萬有一千五百二十引而伸之觸類長之无一物之不具无一理之或遺天下之象豈不遂定於此歟凡此皆易之變也非聖人盡其變而發其蘊于心易幾乎息矣故曰非天下之至變其孰能與於此夫易无思也无爲也寂然不動感而遂通天下之故非天下之至神其孰能與於此易有太極象數以生一之未離思爲曷著數肈於一其變无窮象以數顯天下之理靡不該焉是易之神也易之爲神果何自闡哉蓋聖人神明之幾得之於心驗之於天發之於數形之於象而至神之道自是而明然則易之神聖人之神也聖人以心體易以身用易以書載易易之至神我心先得寓以象數其理曲盡君子法之發爲至精天下以之受命來物以之遂知其精蓋神矣達爲至變可以成天地之文可以定天下之象其變神矣而神之无思无爲寂然不動之體感而遂通之用初不離於精變之閒故夫精變之跡有思有爲也精變之道无思无爲也天下之至神蓋太極妙用而聖人先得于心者也夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也極深至精之用也研幾至變之用也精之所燭來物遂知天下之志於此而可通變之所該萬象以定天下之務於此而可成夫聖人體易於身故雖高拱一堂之上而能使四方萬里之逺志之所存我先知之而必有以通其志務之所在我優爲之而必有以成其務舉心于此獲應於彼其道不亦神矣夫自至精至變以極於至神易之爲易无餘蘊矣聖人之道莫有加於此矣天一地二天三地四天五地六天七地八天九地十子曰夫易何爲者也夫易開物成務冐天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑大衍虚五以用天地之數易道以興一之所通包括无外萬物由之而生萬務由之而立凡天下之所謂道舉无遺於此矣聖人體之得一於心萬以之起象數黙用其變无窮志以之通神所格也業以之定神所運也疑以之斷神所照也夫天下萬物一神耳數變象顯理无逃焉至神之道實行乎中學易者清明其心與天爲一即心以求諸數即數以求諸象即象數以求諸變即變以求諸神易道在我而天下之治可以興矣是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聦明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其徳夫蓍卦爻具於易發於聖人之心蓍運无窮神存其中卦體有常知存其中六爻之義變動不居吉凶存其中聖人何爲哉宅心於虚惟道之適如天之行莫窺其朕設是三者以利天下民患可得而同矣夫凶固有患也吉何與於患豈不曰危生於安亂生於治亡生於存吉之爲患有不可勝言者乎蓍之有神理之未形我先得之故曰知來卦之有知象之已著无不備焉故曰藏往自非聦明足以照易睿知足以定易烏能使大易生物之徳洋溢于天下若是哉且夫易道之行難可弭也禍可消也四夷可賔也天下可服也生生大功於是而出威武之神孰可測究故曰其孰能與於此古之聦明睿知神武而不殺者夫夫易聖人非獨以善一身蓋將以善天下也惟民至愚孰與明易聖人爲是仰稽天道俯察人情亟興神物前民之用卜筮之道於此而行齊以定之戒以齊之由吾神明以道夫卜筮之神明天下始知所避就而用无不利故曰聖人以此齊戒以神明其徳夫以此洗心聖人用易於一已而闡其道也以此齊戒聖人用易於天下而妙其神也是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神陽動而施萬物以出陰靜而翕萬物以入乾陽物也故闢户爲乾坤陰物也故闔户爲坤一闔一闢氣以之變往來不窮道以之通天地萬物之機如樞之運如轂之轉不知何時而已是以發於可見有自然之象象寓於形爲備物之器聖人明生於心心合於易制而用之法以之立器以之成天下由吾之化而不知所以爲化其道神矣觀夫乾坤之畫交錯于六十四卦中窮而能變變而能通由包犧氏而下因時制器一本夫十三卦之象所以生之化之養之濟之威之教之安之无不備具天下萬世至今利焉兹非神之所爲而何歟嗚呼易者天地之心也聖人先天地而體其心故制器尚象道通於神乾坤闔闢之功用之在我器成而天下无不蒙其利矣不亦盛乎是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業太極者何中也道之大中渾然爲一二以之生雖分於二其一固存兩儀謂何乾坤陰陽之别也四象謂何七八九六之數也七八九六何以謂之象蓋陰陽之生數五以配五行一爲水二爲火三爲木四爲金五爲土方五行之生形已肈而未著氣已見而未成伍之以五而七八九六旋相爲用五土周流其中象乃立焉故自一至六五也自二至七自三至八自四至九亦五也歴五土之位而金木水火之象顯矣運爲四時分爲四方凡麗於四皆此象也四象具而八卦作八卦作而吉凶定吉凶定而大業成然則將以建天下之治易其可以不明乎獨曰八卦六十四卦皆八卦所錯也是故法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇高莫大乎富貴備物致用立成器以爲天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也聖人定天下之大業設爲成器立爲卜筮以利天下本之於易稽諸天地驗諸四時參諸日月不茍然也天地之閒物无非象象之所在天下法焉故曰法象莫大乎天地四時之運始始終終无有窮已故曰變通莫大乎四時天位乎上吉凶著見不過日月故曰懸象著明莫大乎日月冨貴者崇高之資冨貴非聖人心也聖人必資冨貴以行其道故曰崇高莫大乎冨貴惟聖人爲能明易而發其象器以之立故曰備物致用立成器以爲天下利莫大乎聖人民之蚩蚩迷所適而孰與同其患賾者探之隱者索之深者鈎之逺者致之吉凶以定事業以成蓋聖人致功於易而體其神將以同民之患蓍龜所由以興也故曰探賾索隱鈎深致逺定天下之吉凶成天下之亹亹者莫大乎蓍龜天生神物聖人則之神物謂蓍龜此法象之見於天地也天地變化聖人效之此變通之見於四時也天垂象見吉凶聖人象之此懸象著明之見於日月者也舉日月之大而在天之文悉備矣河出圖洛出書聖人則之此亦法象之見於天地而聖人所獨得於心者也易道至是而行於天下矣而所以發其幾者本於七八九六之四象所以盡其蘊者本於文王周公孔子之辭象示辭告吉凶遂定大業之成端自於此易曰自天祐之吉无不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也聖人致功於易凡以大明吉凶之理于天下夫數之所攝備消長盈虚之變吉凶由以生也而聖人用易妙與天通有回天之功非數所得而拘攝焉仲尼論易有四象所以示繫辭焉所以告定之以吉凶所以斷繼之曰自天祐之吉无不利嗚呼有吉而已數得而攝之哉古之聖人革亂爲治變危爲安易亡爲存用兹道也此大有上九爻辭聖人言之豈无深意云祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉无不利也聖人因明大有之義俾後世有天下國家者知有大之業本於尚賢尚賢之道本於信順也何以言之有信順之心必行信順之實而後可以得志於天人大有上九履信以感人思順以應天而又能尊尚賢者俾位乎上賢者民所歸人胡爲而不信賢者天所悅天胡爲而不順信順之實大著明於此矣百世之業其長久而不替夫大有自乾變五變有坤體七變而復歸於乾乾爲天坤衆爲人互兌在下曰履信坤復變乾下有伏坤曰思乎順羣陽從之成立於上曰尚賢子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼔之舞之以盡神聖人作易將以載道而傳之天下後世也書不能盡言言不能盡意无他至道之妙見於言者非書可得而悉寓於意者非言可得而窮耳不然雖累千萬言亦何補於易哉聖人爲是揲數以起象因象以成卦凡天下情僞不得遯其情聖人之意旣已黙傳然後繫之以辭以發其象故道以象顯言以書盡意以言盡書足於言言足於意皆本於自然之象无毫釐絲髪之差也易之爲道於是无餘蘊變而通之爻之所錯也鼔之舞之道之所行也天下之吉凶至此而定不亦盡利歟天下之大業因此而成不亦盡神歟乾坤其易之蘊邪乾坤成列而易立乎其中矣乾坤毁則无以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業陽一爲乾隂二爲坤一二旣肈千萬斯起至精至變至神之理實藏于是夫三百八十四爻皆乾坤之策所生也易道爲是著明天下故乾坤成列易立乎其中焉乾坤毁則无以見易何也乾坤亦有毁乎蓋曰使聖人不立乾坤之名則易之神道莫爲而顯而乾坤之用不復變通生成之化亦將鬱而弗彰矣易者道也乾坤者器也道形而上神則妙之器形而下體則著之道之與器本不相離散而在天地萬物之閒者其理莫不皆然化而裁之以歸諸中吉凶自是而定爻之所以變也推而行之以極其用象器自是而立書之所以通也聖人出而有爲夫何爲哉觀時㑹通舉易以措諸天下大治以建大功以成其爲事業也孰禦之是道也由包犧氏而下莫不用之易十三卦制器變通之序義固明矣是故夫象聖人有以見天下之賾而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存于卦鼔天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人黙而成之不言而信存乎徳行卦極至賾象所具也辭極至動爻所之也化而裁之中道斯明不有變也其能化乎推而行之象器以定不有通也其可推乎神而明之㑹之此心也非聖人之洗心莫能明之矣黙而成之見於有行也非聖人之躬行莫能成之矣夫於易而不知所以神明之于先黙成之於後則易道无自而顯且將无所用于天下易之爲書殆爲空言而已聖人患焉上繫終之以此所以示訓於千萬世也紫巖易傳卷七
