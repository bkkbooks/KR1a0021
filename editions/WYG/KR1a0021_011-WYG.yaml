body:
  text: 紫巖易傳跋曽王父忠獻公潛心於易嘗為之傳前後兩著稿親題第二稿云此本改正處極多紹興戊寅四月六日某書始為定本矣獻之頃嘗繕錄之附以讀易雜説通為十卷藏之於家忠獻嘗為屏山劉公書云無他用心惟静黙體道卒究聖人心法又答澹庵胡公書云杜門亦惟聖賢之道是求夫求而得之者其在是矣惜其傳之未廣朅来春陵刻於郡齋與學者共之
